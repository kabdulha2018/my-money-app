        let visibleItemSet = null; // null = no filtering
        if (!isAdmin) {
          const seen = new Set();
          (visibleState.transactions || []).forEach(t => {
            const k = (t.item || t.payee || '').trim().toLowerCase();
            if (k) seen.add(k);
          });
          // Master items: only keep entries that show up in member-visible txs
          visibleItemSet = (state.items || []).filter(it => {
            const k = (it.name || '').trim().toLowerCase();
            return k && seen.has(k);
          });
        }
        return (
        <TxSheet
          initial={editing}
          /* v5.26: tell TxSheet whether this tx already has a pending 'add'
             op in the user's queue. If so, the user is editing a brand-new
             local row (typically created by Duplicate, but also by pressing
             "+" then re-opening), and the Save button should label it as
             "บันทึกเป็นรายการใหม่" so the user understands that on Deploy
             this is one ADD, not an EDIT of an existing OneDrive row. */
          isPendingNew={editing?.id ? pendingByTxId?.get(editing.id)?.action === 'add' : true}
          allTx={isAdmin ? state.transactions : visibleState.transactions}
          masterItems={visibleItemSet || state.items || []}
          /* v5.17 (Gemini-flagged privacy leak): non-admin members previously
             saw ALL accounts via autocomplete — including admin's private
             ones — and could even file a transaction under one by typing the
             exact name. Pass the permission-filtered list instead. Admin
             still sees everything. The same filter is also applied below in
             onSave so a member can't bypass the UI by editing the field
             directly with a hidden account name. */
          masterAccounts={isAdmin ? (state.accounts || []) : (visibleState.accounts || [])}
          masterProjects={state.projects || []}
          masterCategories={state.categories || []}
          account={account}
          skipSync={skipSync}
          pushToast={pushToast}
          onOpenItemsManager={() => setShowItemsManager(true)}
          onRenameMaster={renameMasterField}
          onDeleteMaster={deleteMasterField}
          onClose={() => { setShowAdd(false); setEditing(null); }}
          onSave={e => {
            // Auto-add item to master list if new
            const itemName = (e.item || '').trim();
            if (itemName) {
              const exists = (state.items || []).some(it => it.name.toLowerCase() === itemName.toLowerCase());
              if (!exists) addMasterItem(itemName);
            }
            // Auto-add account to master list if new (default 2 decimals)
            const accName = (e.accountName || '').trim();
            if (accName) {
              // v5.17: defence in depth. Even though the autocomplete only
              // shows visible accounts to a member (see masterAccounts above),
              // a sufficiently determined member could still type the exact
              // name of an admin's private account. Refuse the save in that
              // case — they can create a legitimately new account with their
              // own name, but they can't file under someone else's.
              const accExistsGlobal = (state.accounts || []).some(a => (a.name || '').toLowerCase() === accName.toLowerCase());
              const accVisibleToUser = ((isAdmin ? state.accounts : visibleState.accounts) || [])
                .some(a => (a.name || '').toLowerCase() === accName.toLowerCase());
              if (accExistsGlobal && !accVisibleToUser && !isAdmin) {
                pushToast('ไม่อนุญาต: ชื่อบัญชีนี้ทับซ้อนกับบัญชีของผู้ใช้อื่น');
                return; // block the save entirely
              }
              if (!accExistsGlobal) addMasterAccount(accName, 2);
            }
            // Auto-add project to master list if new
            const projName = (e.project || '').trim();
            if (projName) {
              const projExists = (state.projects || []).some(p => (p.name || '').toLowerCase() === projName.toLowerCase());
              if (!projExists) addMasterProject(projName);
            }
            addOrUpdate(e);
            setShowAdd(false);
            setEditing(null);

      {showHistoryViewer && (

      {showStorageMgr && isAdmin && (
        <StorageManager

          pushToast={pushToast}
          resettingQueue={resettingQueue}

              pushToast('รีเซ็ตล้มเหลว: ' + (e.message || e));
            } finally {
              setResettingQueue(false);
            }
          }}
          scanningOrphans={scanningOrphans}
          orphanScanResult={orphanScanResult}
          onScanOrphans={async () => {
            setScanningOrphans(true);
            try {
              // Pass current pendingOps so photos referenced by pending-but-
              // not-yet-deployed ops don't get swept up. We snapshot pendingOps
              // here rather than passing the live array — scan is async and

              const result = await scanOrphanedPhotos({ pendingOps: pendingOps.slice() });
              setOrphanScanResult(result);

              setScanningOrphans(false);
            }
          }}
          onDeleteOrphans={async () => {
            if (!orphanScanResult) return;
            try {
              const res = await deleteOrphans(orphanScanResult);
              const total = res.cloudOk + res.localOk;
              const failed = res.cloudFail + res.localFail;
              pushToast(`ลบ ${total} รูปแล้ว` + (failed ? ` (ล้มเหลว ${failed})` : ''));
              setOrphanScanResult(null);
            } catch (e) {
              console.error('Delete orphans failed:', e);

      {showItemsManager && (

          onAdd={(name) => {
            const ok = addMasterItem(name);

          onUpdate={(id, name) => {
            // v5.15: enforce server-side too — non-admin can't edit master items
            if (!isAdmin) { pushToast('ผู้ใช้ทั่วไปไม่สามารถแก้ไขรายการได้'); return false; }
            const r = updateMasterItem(id, name);

          onRemove={(id) => {
            if (!isAdmin) { pushToast('ผู้ใช้ทั่วไปไม่สามารถลบรายการได้'); return; }
            removeMasterItem(id);
            pushToast('ลบจากรายการแนะนำแล้ว');
          }}
          pushToast={pushToast}
          pendingByItemId={pendingByResource.item}
        />
      )}

      {showAccountsManager && (
        <AccountsManager
          accounts={state.accounts || []}
          transactions={state.transactions}
          onClose={() => setShowAccountsManager(false)}
          onAdd={(name, decimals, unitSymbol, unitPosition) => {
            const ok = addMasterAccount(name, decimals, unitSymbol, unitPosition);
            if (!ok) pushToast('มีบัญชีนี้อยู่แล้ว');
            else pushToast(`เพิ่มบัญชีแล้ว`);
            return ok;
          }}
          onUpdate={(id, name, decimals, unitSymbol, unitPosition) => {
            const r = updateMasterAccount(id, name, decimals, unitSymbol, unitPosition);
            if (r.ok) {
              pushToast(r.affectedTx > 0
                ? `แก้ไขแล้ว · อัปเดต ${r.affectedTx} รายการ`
                : 'แก้ไขแล้ว');
            } else if (r.reason === 'duplicate') pushToast('มีบัญชีนี้อยู่แล้ว');
            else if (r.reason === 'empty') pushToast('ชื่อต้องไม่ว่าง');
            return r.ok;
          }}
          onRemove={(id) => {
            const r = removeMasterAccount(id);
            if (r.ok) pushToast('ลบบัญชีแล้ว');
            else if (r.reason === 'not-creator') pushToast('ลบได้เฉพาะบัญชีที่ตัวเองสร้างเท่านั้น');
            else pushToast('ลบไม่สำเร็จ');
            return r.ok;
          }}
          onSetPerm={(accId, userId, perm) => {
            setAccountPerm(accId, userId, perm);
            const u = (state.users || []).find(x => x.id === userId);
            pushToast(`${u?.label || userId}: ${PERM_LABEL(perm)}`);
          }}
          users={state.users || []}
          isAdmin={isAdmin}
          currentUserId={currentUser?.id}
          pushToast={pushToast}
          pendingByAccountId={pendingByResource.account}
        />
      )}

      {showProjectsManager && (
        <ProjectsManager
          projects={state.projects || []}
          transactions={state.transactions}
          onClose={() => setShowProjectsManager(false)}
          onAdd={(name) => {
            const ok = addMasterProject(name);
            if (!ok) pushToast('มีโครงการนี้อยู่แล้ว');
            else pushToast('เพิ่มโครงการแล้ว');
            return ok;
          }}
          onUpdate={(id, name) => {
            const r = updateMasterProject(id, name);
            if (r.ok) {
              pushToast(r.affectedTx > 0
                ? `แก้ไขแล้ว · อัปเดต ${r.affectedTx} รายการ`
                : 'แก้ไขแล้ว');
            } else if (r.reason === 'duplicate') pushToast('มีโครงการนี้อยู่แล้ว');
            else if (r.reason === 'empty') pushToast('ชื่อต้องไม่ว่าง');
            return r.ok;
          }}
          onRemove={(id) => {
            removeMasterProject(id);
            pushToast('ลบโครงการแล้ว');
          }}
          pendingByProjectId={pendingByResource.project}
        />
      )}

      {showCategoriesManager && (
        <CategoriesManager
          categories={state.categories || []}
          transactions={state.transactions}
          onClose={() => setShowCategoriesManager(false)}
          onAdd={(name, icon, type) => {
            const ok = addMasterCategory(name, icon, type);
            if (!ok) pushToast('มีหมวดหมู่ชื่อนี้แล้ว');
            else pushToast('เพิ่มหมวดหมู่แล้ว');
            return ok;
          }}
          onUpdate={(id, name, icon) => {
            const r = updateMasterCategory(id, name, icon);
            if (r.ok) pushToast('แก้ไขแล้ว');
            else if (r.reason === 'duplicate') pushToast('มีหมวดหมู่ชื่อนี้แล้ว');
            else if (r.reason === 'empty') pushToast('ชื่อต้องไม่ว่าง');
            return r.ok;
          }}
          onRemove={(id) => {
            const affected = removeMasterCategory(id);
            pushToast(affected > 0
              ? `ลบแล้ว · ล้างจาก ${affected} รายการ`
              : 'ลบหมวดหมู่แล้ว');
          }}
          pendingByCategoryId={pendingByResource.category}
        />
      )}

      {/* v5.0: Users manager — admin only */}
      {showUsersManager && isAdmin && (
        <UsersManager
          users={state.users || []}
          currentUserId={appProfileId}
          onClose={() => setShowUsersManager(false)}
          onAdd={addUser}
          onUpdate={updateUser}
          onChangePin={changeUserPin}
          onRemove={removeUser}
          pushToast={pushToast}
          pendingByUserId={pendingByResource.user}
        />
      )}

      {/* v5.5: Advanced search — uses visibleState so non-admins only search permitted accounts */}
      {showSearch && (
        <SearchSheet
          allTransactions={visibleState.transactions}
          accounts={visibleState.accounts}
          projects={state.projects || []}
          categories={state.categories || []}
          onClose={() => setShowSearch(false)}
          onPickTx={(t) => { setActionTx(t); setShowSearch(false); }}
        />
      )}

      {/* Row action menu (tap row → show menu) */}
      {actionTx && (
        <TxActionMenu
          tx={actionTx}
          txList={monthTx}
          onNavigate={(t) => setActionTx(t)}
          accounts={state.accounts || []}
          customCats={state.categories || []}
          onClose={() => setActionTx(null)}
          onEdit={() => { setEditing(actionTx); setActionTx(null); }}
          onDuplicate={() => { duplicateTx(actionTx); setActionTx(null); }}
          onDelete={() => { setConfirmDeleteTx(actionTx); setActionTx(null); }}
          canEdit={(() => {
            // v5.0: per-user permission check on this transaction's account
            const acc = (state.accounts || []).find(a =>
              (a.name || '').trim() === (actionTx.accountName || '').trim()
            );
            return canEditTx(currentUser, acc, actionTx);
          })()}
          canDuplicate={(() => {
            const acc = (state.accounts || []).find(a =>
              (a.name || '').trim() === (actionTx.accountName || '').trim()
            );
            return canAddToAccount(currentUser, acc);
          })()}
        />
      )}

      {/* Confirm delete dialog */}
      {confirmDeleteTx && (
        <ConfirmDeleteTx
          tx={confirmDeleteTx}
          accounts={state.accounts || []}
          onCancel={() => setConfirmDeleteTx(null)}
          onConfirm={() => { removeTx(confirmDeleteTx.id); setConfirmDeleteTx(null); }}
        />
      )}

      {toast && <div className="toast fade">{toast}</div>}
    </>
  );
}

// ============ Views ============
// v5.15: SyncPill is now both an indicator AND a button — tapping it forces
// an immediate sync, bypassing the 2.5s debounce. This is the user's escape
// hatch for the Chrome-tab-freeze problem (Gemini's diagnosis): if the OS
// suspended a queued setTimeout, the user can press the pill while the tab
// is foregrounded to fire the PUT right now.
function SyncPill({ status, account, skipSync, onForceSync, compact = false }) {
  if (!account || skipSync) {
    return (
      <span className="sync-pill">
        <span className="sync-dot off"></span>
        ออฟไลน์
      </span>
    );
  }
  // 'pending' is the new state from v5.15: local change exists but PUT
  // hasn't been confirmed yet, so green CANNOT show here. We render it in
  // the same amber colour as 'idle' to keep the visual contract simple:
  // green = saved on server, anything else = not yet.
  const map = {
    pending: { cls: 'warn',  text: 'มีข้อมูลค้าง' },
    syncing: { cls: 'sync',  text: 'กำลังซิงค์' },
    ok:      { cls: 'ok',    text: 'ซิงค์แล้ว' },
    error:   { cls: 'err',   text: 'ซิงค์ล้มเหลว' },
    idle:    { cls: 'warn',  text: 'พร้อมซิงค์' },
    offline: { cls: 'off',   text: 'ออฟไลน์' },
  };
  const s = map[status] || map.idle;
  // Only allow tap-to-sync when there's actually something to do or the
  // previous attempt errored. Already-OK and currently-syncing pills are
  // display-only.
  const clickable = onForceSync && (status === 'pending' || status === 'idle' || status === 'error');
  return (
    <button type="button"
            className={`sync-pill ${clickable ? 'sync-pill-btn' : ''}`}
            onClick={clickable ? onForceSync : undefined}
            aria-label={clickable ? 'ซิงค์ตอนนี้' : s.text}
            title={clickable ? 'แตะเพื่อซิงค์ทันที' : s.text}
            disabled={!clickable}
            style={{
              background: 'transparent',
              border: 'none',
              padding: '4px 8px',
              cursor: clickable ? 'pointer' : 'default',
              font: 'inherit',
              color: 'inherit',
            }}>
      <span className={`sync-dot ${s.cls}`}></span>
      {s.text}
    </button>
  );
}

function KebabMenu({ onOpenAccounts, onOpenProjects, onOpenItems, onOpenCategories, isAdmin = true }) {
  const [open, setOpen] = useState(false);
  const [expanded, setExpanded] = useState(null); // 'accounts' | 'projects' | 'items' | 'categories' | null
  const wrapRef = useRef(null);

  useEffect(() => {
    if (!open) return;
    const handler = (e) => {
      if (wrapRef.current && !wrapRef.current.contains(e.target)) {
        setOpen(false);
        setExpanded(null);
      }
    };
    document.addEventListener('mousedown', handler);
    document.addEventListener('touchstart', handler);
    return () => {
      document.removeEventListener('mousedown', handler);
      document.removeEventListener('touchstart', handler);
    };
  }, [open]);

  const toggleSection = (key) => {
    setExpanded(prev => prev === key ? null : key);
  };

  const run = (action, manager) => {
    setOpen(false);
    setExpanded(null);
    // Small delay lets the menu dismiss before modal opens
    setTimeout(() => manager(action), 50);
  };

  // v5.15 (rule 1ก-จ): non-admin sees a reduced action set.
  //   - Accounts: can add new ones, can delete ONES THEY CREATED, but cannot
  //     bulk-edit other people's account names/decimals/units. The "delete"
  //     entry here opens the manager in delete mode; the per-row enforcement
  //     in AccountsManager already restricts which accounts get a working
  //     trash button.
  //   - Items: can add (rule 1ค) but not edit/delete (rule 1ง).
  //   - Projects / Categories: same — add only.
  // Admins see everything as before.
  const sections = isAdmin ? [
    { key: 'accounts', icon: '💰', label: 'บัญชี', manager: onOpenAccounts,
      actions: [
        { id: 'add', label: 'เพิ่มบัญชี' },
        { id: 'edit', label: 'แก้ไขบัญชี' },
        { id: 'delete', label: 'ลบบัญชี' },
      ]
    },
    { key: 'projects', icon: '📁', label: 'โครงการ', manager: onOpenProjects,
      actions: [
        { id: 'add', label: 'เพิ่มโครงการ' },
        { id: 'edit', label: 'แก้ไขโครงการ' },
        { id: 'delete', label: 'ลบโครงการ' },
      ]
    },
    { key: 'items', icon: '🏷️', label: 'รายการ', manager: onOpenItems,
      actions: [
        { id: 'add', label: 'เพิ่มรายการ' },
        { id: 'edit', label: 'แก้ไขรายการ' },
        { id: 'delete', label: 'ลบรายการ' },
      ]
    },
    { key: 'categories', icon: '🗂️', label: 'หมวดหมู่', manager: onOpenCategories,
      actions: [
        { id: 'add', label: 'เพิ่มหมวดหมู่' },
        { id: 'edit', label: 'แก้ไขหมวดหมู่' },
        { id: 'delete', label: 'ลบหมวดหมู่' },
      ]
    },
  ] : [
    // Non-admin menu — reduced
    { key: 'accounts', icon: '💰', label: 'บัญชี', manager: onOpenAccounts,
      actions: [
        { id: 'add', label: 'เพิ่มบัญชี' },
        { id: 'delete', label: 'ลบบัญชีของตัวเอง' },
      ]
    },
    { key: 'items', icon: '🏷️', label: 'รายการ', manager: onOpenItems,
      actions: [
        { id: 'add', label: 'เพิ่มรายการ' },
      ]
    },
  ];

  return (
    <div className="kebab-wrap" ref={wrapRef}>
      <button className={`kebab-btn ${open ? 'open' : ''}`}
              onClick={() => setOpen(v => !v)}
              aria-label="เมนู" type="button">
        <span className="dot"></span>
        <span className="dot"></span>
        <span className="dot"></span>
      </button>
      {open && (
        <div className="kebab-menu fade">
          {sections.map(sec => {
            const isExpanded = expanded === sec.key;
            return (
              <div key={sec.key} className="kebab-section">
                <button type="button"
                        className={`kebab-section-head ${isExpanded ? 'expanded' : ''}`}
                        onClick={() => toggleSection(sec.key)}>
                  <span className="em">{sec.icon}</span>
                  <span className="lbl">{sec.label}</span>
                  <Ic.ChevDown size={14} className="chev"/>
                </button>
                {isExpanded && (
                  <div className="kebab-submenu">
                    {sec.actions.map(a => (
                      <button key={a.id} type="button"
                              className="kebab-subitem"
                              onClick={() => run(a.id, sec.manager)}>
                        {a.label}
                      </button>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function AccountFilter({ accountList, selected, onSelect, onManage }) {
  const [open, setOpen] = useState(false);
  const wrapRef = useRef(null);

  // Close on outside click
  useEffect(() => {

    const handler = (e) => {
      if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener('mousedown', handler);
    document.addEventListener('touchstart', handler);
    return () => {
      document.removeEventListener('mousedown', handler);
      document.removeEventListener('touchstart', handler);
    };
  }, [open]);

  const isAll = selected === 'all';
  const displayLabel = isAll ? 'ทั้งหมด' : selected;

  const pick = (value) => {

    <div className="acct-filter" ref={wrapRef}>

        <div className="acct-filter-menu fade">

                  onClick={() => pick('all')} type="button">

                    className={`acct-filter-item ${selected === acc ? 'active' : ''}`}
                    onClick={() => pick(acc)} type="button">
              <span className="name">{acc}</span>
              {selected === acc && <Ic.Check size={14} className="check"/>}
            </button>
          ))}

          )}
          {onManage && (
            <>
              <div className="acct-filter-divider"/>
              <button className="acct-filter-item manage"
                      onClick={handleManage} type="button">
                <Ic.Settings size={14}/>
                <span className="name">จัดการบัญชี (ทศนิยม)</span>
              </button>
            </>
          )}
        </div>
      )}
    </div>
  );
}

function AccountsOverviewView({ state, onSelectAccount, onSelectAll, onManageAccounts, onManageProjects, onManageItems, onManageCategories, zoomLevel, onZoom, isAdmin }) {
  // Aggregate per-account stats (cumulative, all-time)
  const accountsList = useMemo(() => {
    const stats = new Map(); // key: name.toLowerCase()
    // Seed with master accounts so 0-tx accounts still appear
    (state.accounts || []).forEach(a => {
      const key = (a.name || '').toLowerCase();
      if (!key) return;
      // v5.6: derive unit symbol+position once. Legacy/missing → ฿ before.
      const unitSymbol = a.unitSymbol != null ? a.unitSymbol : '฿';
      const unitPosition = a.unitPosition || (UNIT_PRESETS.find(p => p.symbol === unitSymbol)?.position) || 'before';
      stats.set(key, {
        name: a.name,
        decimals: Number.isFinite(a.decimals) ? a.decimals : 2,
        unitSymbol, unitPosition,
        income: 0, expense: 0, count: 0,
      });
    });
    // Aggregate transactions
    (state.transactions || []).forEach(t => {
      const name = (t.accountName || '').trim();
      if (!name) return;
      const key = name.toLowerCase();
      if (!stats.has(key)) {
        stats.set(key, { name, decimals: 2, unitSymbol: '฿', unitPosition: 'before', income: 0, expense: 0, count: 0 });
      }
      const s = stats.get(key);
      if (t.type === 'income') s.income += t.amount;
      else s.expense += t.amount;
      s.count += 1;
    });
    const arr = Array.from(stats.values()).map(s => ({ ...s, balance: s.income - s.expense }));
    // Thai locale alphabetical sort
    arr.sort((a, b) => a.name.localeCompare(b.name, 'th'));
    return arr;
  }, [state.accounts, state.transactions]);

  return (
    <div>
      <header className="page-head rise">
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', gap: 10}}>
          <div className="crumb">สมุดเงินส่วนตัว</div>
          <ZoomBtn level={zoomLevel} onCycle={onZoom}/>
          <KebabMenu
            onOpenAccounts={onManageAccounts}
            onOpenProjects={onManageProjects}
            onOpenItems={onManageItems}
            onOpenCategories={onManageCategories}
            isAdmin={isAdmin}
          />
        </div>
        <h1 className="page-title">my money</h1>
      </header>

function DonutChart({ data, palette, total }) {
  const size = 220, cx = size/2, cy = size/2, R = 76, r = 52;
  let angle = -Math.PI / 2;
  const arcs = data.map((d, i) => {
    const frac = d.value / total;
    const end = angle + frac * Math.PI * 2;
    const large = frac > 0.5 ? 1 : 0;
    const x1 = cx + R * Math.cos(angle), y1 = cy + R * Math.sin(angle);
    const x2 = cx + R * Math.cos(end),   y2 = cy + R * Math.sin(end);
    const x3 = cx + r * Math.cos(end),   y3 = cy + r * Math.sin(end);
    const x4 = cx + r * Math.cos(angle), y4 = cy + r * Math.sin(angle);
    const path = `M ${x1} ${y1} A ${R} ${R} 0 ${large} 1 ${x2} ${y2} L ${x3} ${y3} A ${r} ${r} 0 ${large} 0 ${x4} ${y4} Z`;
    angle = end;
    return <path key={d.id} d={path} fill={palette[i % palette.length]} stroke="var(--bg)" strokeWidth="2" />;
  });
  return <svg viewBox={`0 0 ${size} ${size}`}>{arcs}</svg>;
}

    // Note: users[].pinHash อาจถูก export ด้วย — ผู้ใช้ admin ที่ดาวน์โหลดไฟล์จะเห็น
    // แต่ pinHash เป็น SHA-256 reverse ไม่ได้ ปลอดภัยพอ
    const data = {
      app: 'my-money',
      version: 2,
      exportedAt: new Date().toISOString(),
      lastModified: state.lastModified,
      transactions: state.transactions || [],
      items:        state.items || [],
      accounts:     state.accounts || [],
      projects:     state.projects || [],
      categories:   state.categories || [],
      users:        state.users || [],
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const ts = new Date().toISOString().replace(/[:T]/g,'-').slice(0,16);
    a.href = url; a.download = `my-money-backup-${ts}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    pushToast('สร้างไฟล์สำรองแล้ว · ครบทุก field');
  };
  const onImport = (e) => {
    const f = e.target.files?.[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const d = JSON.parse(r.result);
        if (!Array.isArray(d.transactions)) throw new Error('no tx');
        // Detect old export format (only had transactions field) vs new full schema
        const isOldFormat = !Array.isArray(d.accounts) && !Array.isArray(d.users);
        if (isOldFormat) {
          if (!confirm('ไฟล์นี้เป็นรูปแบบเก่า (มีแค่รายการ ไม่มีบัญชี/users) ต้องการ merge รายการเข้ากับข้อมูลปัจจุบันไหม?')) return;
          // Merge transactions only — keep current accounts/users/etc.
          const byId = new Map();
          (state.transactions || []).forEach(t => byId.set(t.id, t));
          d.transactions.forEach(t => byId.set(t.id, t));
          const merged = Array.from(byId.values()).sort((a,b) => b.date.localeCompare(a.date));
          setState(prev => ({ ...prev, transactions: merged, lastModified: new Date().toISOString() }));
          pushToast(`นำเข้า ${d.transactions.length} รายการ (เก็บบัญชี/users เดิม)`);
          return;
        }
        // New full-schema import: replace everything
        if (!confirm(`ไฟล์ backup นี้มี: ${d.transactions.length} รายการ, ${(d.accounts||[]).length} บัญชี, ${(d.users||[]).length} ผู้ใช้\n\nการ import จะแทนที่ข้อมูลปัจจุบันทั้งหมด ดำเนินการต่อ?`)) return;
        setState({
          transactions: d.transactions,
          items:        d.items || [],
          accounts:     d.accounts || [],
          projects:     d.projects || [],
          categories:   d.categories || [],
          users:        d.users || [],
          lastModified: new Date().toISOString(),
        });
        pushToast(`กู้คืนแล้ว · ${d.transactions.length} รายการ + ${(d.accounts||[]).length} บัญชี`);
      } catch (err) { console.error(err); pushToast('ไฟล์ไม่ถูกต้อง'); }
    };
    r.readAsText(f);
    e.target.value = '';
  };
  const clearAll = () => {
    setState({ transactions: [], items: [], accounts: [], projects: [], categories: [], users: [], lastModified: new Date().toISOString() });
    setConfirm(false);
    pushToast('ลบข้อมูลทั้งหมดแล้ว');
  };

  const accName = account?.name || account?.username || 'ผู้ใช้';
  const accEmail = account?.username || '';
  const initial = (accName[0] || '?').toUpperCase();
  const lastSyncStr = lastSync ? lastSync.toLocaleString('th-TH', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }) : '—';

  return (
    <div>
      <header className="page-head rise">
        <div className="crumb">ซิงค์ · สำรอง · จัดการ</div>
        <h1 className="page-title">ตั้งค่า</h1>
      </header>

      {/* OneDrive Cloud Panel */}
      <div className="panel rise">
        <div className="hd">
          <div className="ico-wrap"><Ic.Cloud size={16}/></div>
          <div>
            <div className="tt">OneDrive ซิงค์อัตโนมัติ</div>
            <div className="sb">ข้อมูลเก็บในโฟลเดอร์ /Apps/ ของ OneDrive</div>
          </div>
        </div>

        {account && !skipSync ? (
          <>
            <div className="account-row">
              <div className="av">{initial}</div>
              <div className="info">
                <div className="nm">{accName}</div>
                <div className="em">{accEmail}</div>
              </div>
              <SyncPill status={status} account={account} skipSync={skipSync} onForceSync={onForceSync}/>
            </div>
            <div className="two-col">
              <button className="btn-ghost" onClick={onSyncNow}>
                <Ic.Refresh size={14} className={status === 'syncing' ? 'spin' : ''} style={{marginRight: 6, verticalAlign: '-2px'}}/>
                ซิงค์ตอนนี้
              </button>
              <button className="btn-ghost" onClick={onSignOut}>
                <Ic.LogOut size={14} style={{marginRight: 6, verticalAlign: '-2px'}}/>
                ออกจากระบบ
              </button>
            </div>
            <div className="hint-text">
              ซิงค์ล่าสุด: <strong>{lastSyncStr}</strong>
              {errMsg && <div style={{marginTop: 6, color: 'var(--expense-soft)', fontSize: 11}}>⚠️ {errMsg}</div>}
            </div>
          </>
        ) : (
          <>
            <div className="hint-text" style={{marginTop: 14}}>
              {skipSync ? 'คุณกำลังใช้งานแบบออฟไลน์ ข้อมูลเก็บในเครื่องเท่านั้น' : 'ยังไม่ได้เข้าสู่ระบบ'}
            </div>
            <div className="two-col">
              <button className="btn-primary" onClick={skipSync ? onEnableSync : onSignIn} disabled={authLoading}>
                <Ic.Cloud size={14}/> เข้าสู่ระบบ
              </button>
            </div>
          </>
        )}
      </div>

      {/* Manual Backup — admin only (v5.0) */}
      {isAdmin && (
        <div className="panel rise">
          <div className="hd">
            <div className="ico-wrap"><Ic.FileJson size={16}/></div>
            <div>
              <div className="tt">สำรอง/กู้คืนด้วยตนเอง</div>
              <div className="sb">Export / Import ไฟล์ JSON</div>
            </div>
          </div>
          <div className="two-col">
            <button className="btn-primary" onClick={exportJSON}><Ic.Download size={14}/> Export</button>
            <button className="btn-ghost" onClick={() => fileRef.current?.click()}><Ic.Upload size={14}/> Import</button>
            <input ref={fileRef} type="file" accept="application/json,.json" onChange={onImport} style={{display:'none'}}/>
          </div>
        </div>
      )}

      {/* Install on other devices (v1.2) — admin only (v5.0) */}
      {isAdmin && (
        <div className="panel rise">
          <div className="hd">
            <div className="ico-wrap"><Ic.Phone size={16}/></div>
            <div>
              <div className="tt">การเปลี่ยน/เพิ่มมือถือ</div>
              <div className="sb">ติดตั้งบนเครื่องอื่น · เครื่องหาย · แชร์ให้ครอบครัว</div>
            </div>
          </div>

          <div className="qr-box">
            <img
              className="qr-img"
              src={qrFailed ? qrFallbackUrl : qrApiUrl}
              alt="QR Code"
              onError={() => { if (!qrFailed) setQrFailed(true); }}
            />
            <div className="qr-url">{appUrl}</div>
          </div>

          <div className="two-col" style={{marginTop: 12}}>
            <button className="btn-primary" onClick={shareUrl}>
              <Ic.Share size={14}/> แชร์ลิงก์
            </button>
            <button className="btn-ghost" onClick={copyUrl}>
              <Ic.Copy size={14}/> คัดลอก URL
            </button>
          </div>

          <details className="readme-box">
            <summary>
              <Ic.Book size={14}/>
              <span>วิธีติดตั้งบนเครื่องใหม่</span>
              <Ic.ChevDown size={16} className="chev"/>
            </summary>
            <div className="readme-content">
              <h4>📱 วิธีที่ 1: สแกน QR (ง่ายที่สุด)</h4>
              <ol>
                <li>เปิดกล้องบนมือถือเครื่องใหม่ (หรือ Chrome/Samsung Internet)</li>
                <li>สแกน QR code ด้านบน หรือพิมพ์ URL</li>
                <li>กด "เข้าสู่ระบบด้วย Microsoft"</li>
                <li>Sign in ด้วยบัญชี Microsoft เดียวกัน</li>
                <li>ข้อมูลจะซิงค์จาก OneDrive อัตโนมัติ!</li>
              </ol>

              <h4>📲 ติดตั้งเป็นไอคอนบนหน้าจอ</h4>
              <p><strong>Chrome:</strong> เมนู ⋮ → "Install app" หรือ "Add to Home screen"</p>
              <p><strong>Samsung Internet:</strong> เมนูด้านล่าง → "เพิ่มหน้าในหน้าจอโฮม"</p>

              <h4>👨‍👩‍👧 ใช้ร่วมกับคนในครอบครัว</h4>
              <p><strong>แบบที่ 1 — แยกข้อมูล:</strong> ให้แต่ละคน Sign in ด้วยบัญชี Microsoft ของตัวเอง แต่ละคนจะได้กระเป๋าเงินของตัวเอง ไม่เห็นกัน</p>
              <p><strong>แบบที่ 2 — ใช้ร่วมกัน (สามี-ภรรยา):</strong> ทุกเครื่อง Sign in ด้วยบัญชีเดียวกัน จะเห็นและแก้ไขข้อมูลชุดเดียวกันแบบ real-time</p>

              <h4>🔒 กรณีเครื่องหาย / เปลี่ยนเครื่อง</h4>
              <p>ข้อมูลทั้งหมดอยู่บน <strong>OneDrive</strong> ไม่หายไปกับเครื่อง แค่เปิด URL บนเครื่องใหม่แล้ว Sign in = ได้ข้อมูลกลับคืนครบถ้วน</p>

              <h4>💾 วิธีที่ 2: ใช้ไฟล์ติดตั้งเอง (สำหรับคนเทคนิค)</h4>
              <p>ดาวน์โหลดไฟล์ HTML → อัปโหลดขึ้น hosting ของตัวเอง (Netlify, GitHub Pages) → เพิ่ม Redirect URI ใหม่ใน Azure</p>
            </div>
          </details>

          <div className="two-col" style={{marginTop: 12}}>
            <button className="btn-ghost" onClick={downloadHtml}>
              <Ic.Download size={14}/> ดาวน์โหลดไฟล์
            </button>
            <button className="btn-ghost" onClick={uploadInstaller} disabled={installerUploading || !account}>
              {installerUploading
                ? <><Ic.Refresh size={14} className="spin"/> กำลังอัปโหลด...</>
                : <><Ic.Cloud size={14}/> เก็บบน OneDrive</>}
            </button>
          </div>

          {lastInstallerUpload && (
            <div className="installer-status ok">
              <Ic.Check size={12}/>
              <span>
                เก็บไฟล์ติดตั้งบน OneDrive แล้ว · โฟลเดอร์ <strong style={{color: 'var(--gold)'}}>Apps/my money/installer/</strong>
                <br/>
                <span style={{fontSize: 10.5, color: 'var(--text-faint)'}}>
                  ล่าสุด: {new Date(lastInstallerUpload).toLocaleString('th-TH', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' })}
                </span>
              </span>
            </div>
          )}
        </div>
      )}

      {/* v5.0: Users management panel — admin only */}
      {isAdmin && (
        <div className="panel rise">
          <div className="hd">
            <div className="ico-wrap"><Ic.Users size={16}/></div>
            <div>
              <div className="tt">จัดการผู้ใช้</div>
              <div className="sb">เพิ่ม/แก้ไข/ลบผู้ใช้ · เปลี่ยน PIN</div>
            </div>
          </div>
          <p style={{fontSize: 12, color: 'var(--text-dim)', margin: '12px 0', lineHeight: 1.55}}>
            ผู้ใช้ทั้งหมด {(state.users || []).length} คน · คุณเป็น <span className="admin-tag-inline">admin</span>
          </p>
          <button className="btn-ghost" style={{width: '100%'}} onClick={onOpenUsersManager}>
            <Ic.Users size={14}/> เปิดหน้าจัดการ
          </button>
        </div>
      )}

      {/* v5.29 Phase 4: Per-user Deploy History (all users, not admin-only).
          Lets each user audit what they pushed and what got
          cancelled/retry-later. The list is capped at 100 entries per user,
          stored locally in IndexedDB. */}
      <div className="panel rise">
        <div className="hd">
          <div className="ico-wrap">📜</div>
          <div>
            <div className="tt">ประวัติ Deploy</div>
            <div className="sb">ดูรายการที่ส่งขึ้น OneDrive ในอดีต (เก็บ 100 รายการล่าสุด)</div>
          </div>
        </div>
        <p style={{fontSize: 12, color: 'var(--text-dim)', margin: '12px 0', lineHeight: 1.55}}>
          {(userHistoryCount > 0)
            ? `${userHistoryCount} รายการในประวัติ — แตะเพื่อดูรายละเอียด`
            : 'ยังไม่มีประวัติ deploy ในเครื่องนี้'}
        </p>
        <button className="btn-ghost" style={{width: '100%'}} onClick={onOpenHistoryViewer}>
          📜 เปิดหน้าประวัติ
        </button>
      </div>

      {/* v5.29 Phase 4: Storage management (admin only). Two tools:
          - Reset Queue: emergency wipe of Q.json if locking gets stuck
          - Orphan Photos: scan OneDrive + local cache for unreferenced
            photos and clean them up. */}
      {isAdmin && (
        <div className="panel rise">
          <div className="hd">
            <div className="ico-wrap">🧹</div>
            <div>
              <div className="tt">จัดการพื้นที่เก็บข้อมูล</div>
              <div className="sb">รีเซ็ตคิว · ลบรูปที่ไม่ใช้แล้ว (admin)</div>
            </div>
          </div>
          <p style={{fontSize: 12, color: 'var(--text-dim)', margin: '12px 0', lineHeight: 1.55}}>
            เครื่องมือสำหรับ admin — ใช้กรณีฉุกเฉินหรือลด clutter ใน OneDrive
          </p>
          <button className="btn-ghost" style={{width: '100%'}} onClick={onOpenStorageMgr}>
            🛠️ เปิดเครื่องมือ
          </button>
        </div>
      )}

      {/* v5.15: Per-user transaction count summary — admin only.
          Useful for spotting which user added how many entries this overall
          period, and for catching transactions whose createdBy is missing
          (legacy or imported data that predates the multi-user system). */}
      {isAdmin && (() => {
        const txs = state.transactions || [];
        const users = state.users || [];
        // Count by createdBy. Anything that isn't a known user id (or is empty)
        // gets bucketed as "ไม่ระบุ" so the total still adds up.
        const knownIds = new Set(users.map(u => u.id));
        const counts = {};
        let unknownCount = 0;
        for (const t of txs) {
          const by = t.createdBy;
          if (by && knownIds.has(by)) {
            counts[by] = (counts[by] || 0) + 1;
          } else {
            unknownCount += 1;
          }
        }
        // Build the rows: one per known user (in the same order as state.users
        // for stable display), then "ไม่ระบุ" at the bottom if non-zero.
        const rows = users.map(u => ({
          id: u.id,
          label: u.label || u.id,
          icon: u.icon || '👤',
          role: u.role,
          count: counts[u.id] || 0,
        }));
        if (unknownCount > 0) {
          rows.push({ id: '__unknown', label: 'ไม่ระบุ', icon: '❓', role: null, count: unknownCount });
        }
        return (
          <div className="panel rise">
            <div className="hd">
              <div className="ico-wrap"><Ic.Chart size={16}/></div>
              <div>
                <div className="tt">สรุปรายการต่อผู้ใช้</div>
                <div className="sb">นับ transaction แยกตามผู้สร้าง · รวม {txs.length} รายการ</div>
              </div>
            </div>
            <div style={{marginTop: 12, display: 'flex', flexDirection: 'column', gap: 6}}>
              {rows.map(r => (
                <div key={r.id} style={{
                  display: 'flex', alignItems: 'center', gap: 10,
                  padding: '8px 12px',
                  background: 'var(--surface)',
                  border: '1px solid var(--line)',
                  borderRadius: 8,
                  fontSize: 13,
                }}>
                  <span style={{fontSize: 18}}>{r.icon}</span>
                  <span style={{flex: 1, minWidth: 0, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap'}}>
                    {r.label}
                    {r.role === 'admin' && <span className="admin-tag-inline" style={{marginLeft: 6}}>admin</span>}
                  </span>
                  <span style={{
                    fontVariantNumeric: 'tabular-nums',
                    fontWeight: 600,
                    color: r.count > 0 ? 'var(--text)' : 'var(--text-faint)',
                  }}>
                    {r.count.toLocaleString('th-TH')} รายการ
                  </span>
                </div>
              ))}
            </div>
            {unknownCount > 0 && (
              <p style={{fontSize: 11, color: 'var(--text-faint)', marginTop: 10, lineHeight: 1.5}}>
                "ไม่ระบุ" คือรายการที่ไม่มีข้อมูลผู้สร้าง เช่น import มาจากเวอร์ชันเก่าก่อนระบบผู้ใช้
              </p>
            )}
          </div>
        );
      })()}

      {/* v3.5: Offline storage / photo cache — admin only (v5.0) */}
      {isAdmin && (
        <OfflineStoragePanel
          account={account}
          isOnline={isOnline}
          cacheStatus={cacheStatus}
          pendingCount={pendingCount}
          pushToast={pushToast}
        />
      )}

      {/* v2.9: Lessons / Journal — admin only (v5.0) */}
      {isAdmin && (
        <div className="panel rise">
          <div className="hd">
            <div className="ico-wrap"><Ic.Book size={16}/></div>
            <div>
              <div className="tt">บันทึกบทเรียน</div>
              <div className="sb">เก็บความรู้ไว้ศึกษาภายหลัง · บน OneDrive</div>
            </div>
          </div>

          <p style={{fontSize: 12, color: 'var(--text-dim)', margin: '12px 0', lineHeight: 1.55}}>
            เปิด/แก้ไขสมุดบันทึก คัดลอกคำอธิบายดีๆ จาก Claude มาเก็บไว้
            ทุกอย่างเซฟเป็น Markdown บน OneDrive โหลดดูจากเครื่องไหนก็ได้
          </p>

          <button className="btn-ghost" style={{width: '100%', marginBottom: 8}}
                  onClick={() => setShowLessonsEditor(true)} disabled={!account}>
            <Ic.Pencil size={14}/> เปิด/แก้ไขสมุดบันทึก
          </button>

          <div className="two-col">
            <button className="btn-ghost" onClick={downloadLessonsMd} disabled={!account}>
              <Ic.Download size={14}/> ดาวน์โหลด .md
            </button>
            <button className="btn-ghost" onClick={openLessonsInOneDrive} disabled={!account}>
              <Ic.Cloud size={14}/> เปิดบน OneDrive
            </button>
          </div>

          {!account && (
            <div style={{marginTop: 10, fontSize: 11, color: 'var(--text-faint)', textAlign: 'center'}}>
              ต้อง Sign in กับ Microsoft ก่อนใช้งานสมุดบันทึก
            </div>
          )}
        </div>
      )}

      {/* Stats — admin only (v5.0) */}
      {isAdmin && (
        <div className="panel rise">
          <div className="hd">
            <div className="ico-wrap"><Ic.Chart size={16}/></div>
            <div>
              <div className="tt">ข้อมูลของคุณ</div>
              <div className="sb">สรุปภาพรวม</div>
            </div>
          </div>
          <div className="info-grid">
            <div className="info-cell"><div className="k">ทั้งหมด</div><div className="v">{state.transactions.length}</div></div>
            <div className="info-cell"><div className="k">รายรับ</div><div className="v">{state.transactions.filter(t=>t.type==='income').length}</div></div>
            <div className="info-cell"><div className="k">รายจ่าย</div><div className="v">{state.transactions.filter(t=>t.type==='expense').length}</div></div>
          </div>
        </div>
      )}

      {/* Danger — admin only (v5.0) */}
      {isAdmin && (
        <div className="panel rise">
          <div className="hd">
            <div className="ico-wrap" style={{background: 'rgba(184,88,66,0.12)', color: 'var(--expense-soft)'}}><Ic.Trash size={16}/></div>
            <div>
              <div className="tt">เขตอันตราย</div>
              <div className="sb">ลบข้อมูลทั้งหมดในเครื่อง</div>
            </div>
          </div>
          {!confirm ? (
            <button className="btn-danger" style={{width: '100%', marginTop: 14}} onClick={() => setConfirm(true)}>
              ลบข้อมูลทั้งหมด
            </button>
          ) : (
            <div className="two-col">
              <button className="btn-ghost" onClick={() => setConfirm(false)}>ยกเลิก</button>
              <button className="btn-danger solid" onClick={clearAll}>ยืนยันลบ</button>
            </div>
          )}
        </div>
      )}

      {/* Version pill — visible to everyone for support/debugging */}
      <div className="vstrip">my money · v5.30 · บังคับ refresh หลัง deploy 🔄</div>

      {showLessonsEditor && (
        <LessonsEditor
          onClose={() => setShowLessonsEditor(false)}
          pushToast={pushToast}
        />
      )}
    </div>
  );
}

function MonthSelector({ value, onChange }) {
  const prev = () => { const d = new Date(value.y, value.m - 1, 1); onChange({ y: d.getFullYear(), m: d.getMonth() }); };
  const next = () => { const d = new Date(value.y, value.m + 1, 1); onChange({ y: d.getFullYear(), m: d.getMonth() }); };
  const now = new Date();
  const isNow = now.getFullYear() === value.y && now.getMonth() === value.m;
  const today = () => onChange({ y: now.getFullYear(), m: now.getMonth() });
  return (
    <div className="month-sel">
      <button className="nav-btn" onClick={prev}><Ic.ChevL size={16}/></button>
      <div className="label">
        <div className="m">{THAI_MONTHS_FULL[value.m]}</div>
        <div className="y">พ.ศ. {toBuddhistYear(value.y)}</div>
      </div>
      <button className="nav-btn" onClick={next}><Ic.ChevR size={16}/></button>
      {!isNow && <button className="today-btn" onClick={today}>วันนี้</button>}
    </div>
  );
}

// v5.8: Inline thumbnail loader for the list view. Loads only the FIRST photo's
// blob (saves bandwidth + decode time on long lists), revokes the object URL on
// unmount, and silently shows nothing if the photo isn't available yet.
function TxRowThumb({ photoId }) {
  const [url, setUrl] = useState(null);
  useEffect(() => {
    let cancelled = false;
    let createdUrl = null;
    if (!photoId) return;
    fetchPhotoUrl(photoId).then(u => {
      if (cancelled) {
        try { URL.revokeObjectURL(u); } catch {}
        return;
      }
      createdUrl = u;
      setUrl(u);
    }).catch(() => { /* photo not available yet — silently hide */ });
    return () => {
      cancelled = true;
      if (createdUrl) { try { URL.revokeObjectURL(createdUrl); } catch {} }
    };
  }, [photoId]);
  if (!url) return null;
  return <img className="tx-row-thumb" src={url} alt="" loading="lazy"/>;
}

function TxRow({ t, onClick, delay = 0, accounts, customCats, pendingOp = null }) {
  const cat = getCat(t.type, t.category, customCats);
  const isIn = t.type === 'income';
  const timeStr = timeFromIso(t.createdAt);
  // v1.4 item replaces payee (backward compat)
  const itemOrPayee = (t.item || t.payee || '').trim();
  // Build the main title: prefer item/payee, else note, else category label if any, else "รายการ"
  const title = itemOrPayee || t.note?.trim() || (t.category ? cat.label : 'รายการ');
  // v5.16 (per user request): account name moved out of the sub-line and into
  // the date-badge column. The sub-line now only carries category + project.
  // We intentionally drop the account from subParts here — but if title fell
  // back to the note (no item), we DO show the note in noteText below; in
  // that case the title and noteText would be the same, so we suppress
  // noteText to avoid duplication.
  const subParts = [];
  if (t.category) subParts.push(cat.label);
  if (t.project) subParts.push('📁 ' + t.project);
  const subText = subParts.join(' · ');
  // v5.16: separate display of the note. Only show it on its own line when:
  //   - the row has a note, AND
  //   - the title isn't already showing the same note (i.e. there was an
  //     item/payee, so title used that and the note is genuinely additional).
  const noteText = (t.note && t.note.trim() && itemOrPayee) ? t.note.trim() : '';
  // v5.8: pull the first photo (if any) for the inline thumbnail. Older rows may
  // use the legacy single-photoId field; both shapes are handled.
  const firstPhotoId = Array.isArray(t.photos) && t.photos.length > 0
    ? t.photos[0].id
    : (t.photoId || null);
  const photoCount = Array.isArray(t.photos) ? t.photos.length : (t.photoId ? 1 : 0);
  // Build short DD/MM date for the badge
  const d = t.date ? new Date(t.date + 'T00:00:00') : null;
  const dd = d ? String(d.getDate()).padStart(2, '0') : '--';
  const mm = d ? String(d.getMonth() + 1).padStart(2, '0') : '--';

  // v5.19 Phase 1: pending-op badge. The badge color and tooltip depend on
  // which kind of operation is queued — yellow for adds, orange for edits,
  // red for deletes. Caller (the parent List/Home view) computed this by
  // looking up t.id in the pendingByTxId map; we just render it here.
  const pendingMeta = pendingOp ? (
    pendingOp.action === 'add'    ? { color: 'var(--sync-warn)',     label: '🟡', title: 'รอ deploy: เพิ่มใหม่' } :
    pendingOp.action === 'edit'   ? { color: 'orange',                label: '🟠', title: 'รอ deploy: แก้ไข' } :
    pendingOp.action === 'delete' ? { color: 'var(--expense-soft)',  label: '🔴', title: 'รอ deploy: ลบ' } :
    null
  ) : null;

  return (
    <button className="tx-row rise" style={{animationDelay: `${delay}ms`, alignItems: 'flex-start'}} onClick={onClick}>
      <div className="date-badge">
        <div className="dd">{dd}/{mm}</div>
        <div className="tt">{timeStr || '--:--:--'}</div>
        {t.accountName && <div className="acc" title={t.accountName}>{t.accountName}</div>}
      </div>
      <div className="mid" style={{display: 'flex', flexDirection: 'column', minWidth: 0, flex: 1}}>
        <div className="title-ln" style={{whiteSpace: 'normal', wordBreak: 'break-word', lineHeight: 1.3, textDecoration: pendingMeta?.title?.includes('ลบ') ? 'line-through' : 'none'}}>
          {title}
          {pendingMeta && (
            <span title={pendingMeta.title}
                  style={{
                    display: 'inline-block',
                    marginLeft: 6,
                    fontSize: 12,
                    verticalAlign: 'middle',
                    padding: '1px 6px',
                    borderRadius: 8,
                    background: pendingMeta.color,
                    color: '#fff',
                    fontWeight: 600,
                  }}>
              {pendingMeta.label} pending
            </span>
          )}
        </div>
        {noteText && (
          <div className="note-ln">{noteText}</div>
        )}
        <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginTop: 6, gap: 10}}>
          <div className="sub-ln" style={{marginTop: 0, textAlign: 'left'}}>{subText || ''}</div>
          <div style={{display: 'flex', alignItems: 'center', gap: 8, flexShrink: 0}}>
            <div className={`amt ${isIn ? 'in' : 'out'}`}>
              {fmtAmount(t.amount, isIn, t.accountName, accounts)}
            </div>
            {firstPhotoId && (
              <div className="tx-row-thumb-wrap">
                <TxRowThumb photoId={firstPhotoId}/>
                {photoCount > 1 && <span className="tx-row-thumb-badge">{photoCount}</span>}
              </div>
            )}
          </div>
        </div>
      </div>
    </button>
  );
}

function MasterFieldManager({ mode, allTx, onClose, onRename, onDelete, onSelect, pushToast }) {
  const title = mode === 'item' ? 'จัดการชื่อรายการ' : 'จัดการบัญชี';
  const label = mode === 'item' ? 'ชื่อรายการ' : 'บัญชี';
  const icon  = mode === 'item' ? '🏪' : '🏦';

  // Build list {name, count}
  const list = useMemo(() => {
    const legacy = { cash: 'เงินสด', bank: 'ธนาคาร', credit: 'บัตรเครดิต', ewallet: 'e-Wallet' };
    const m = new Map();
    (allTx || []).forEach(t => {
      let k;
      if (mode === 'item') k = (t.item || t.payee || '').trim();
      else { k = (t.accountName || '').trim(); if (legacy[k]) k = legacy[k]; }
      if (k) m.set(k, (m.get(k) || 0) + 1);
    });
    return Array.from(m.entries())
      .map(([name, count]) => ({ name, count }))
      .sort((a, b) => b.count - a.count);
  }, [allTx, mode]);

  const [query, setQuery] = useState('');
  const [editingName, setEditingName] = useState(null); // original name being edited
  const [editValue, setEditValue] = useState('');
  const [confirmDelete, setConfirmDelete] = useState(null); // name pending delete
  const [showAdd, setShowAdd] = useState(false);
  const [newName, setNewName] = useState('');

  const filtered = useMemo(() => {
    const q = query.trim().toLowerCase();
    if (!q) return list;
    return list.filter(e => e.name.toLowerCase().includes(q));
  }, [list, query]);

  const startEdit = (name) => { setEditingName(name); setEditValue(name); setConfirmDelete(null); };
  const cancelEdit = () => { setEditingName(null); setEditValue(''); };
  const saveEdit = () => {
    const oldN = editingName;
    const newN = editValue.trim();
    if (!newN) return;
    if (oldN === newN) { cancelEdit(); return; }
    // Reject case-insensitive duplicate unless same
    const dup = list.find(e => e.name.toLowerCase() === newN.toLowerCase() && e.name !== oldN);
    if (dup) { pushToast?.(`ซ้ำกับ "${dup.name}" ที่มีอยู่แล้ว`); return; }
    const n = onRename(mode, oldN, newN);
    pushToast?.(`แก้ชื่อแล้ว (${n} รายการ)`);
    cancelEdit();
  };

  const doDelete = (name) => {
    const n = onDelete(mode, name);
    pushToast?.(`ลบ "${name}" แล้ว (${n} รายการ)`);
    setConfirmDelete(null);
  };

  const addNew = () => {
    const n = newName.trim();
    if (!n) return;
    const dup = list.find(e => e.name.toLowerCase() === n.toLowerCase());
    if (dup) { pushToast?.(`"${dup.name}" มีอยู่แล้ว`); return; }
    // "Add" just means: select this value so when user saves the tx, it's included
    onSelect?.(n);
    pushToast?.(`เพิ่ม "${n}" พร้อมใช้งาน`);
    setNewName('');
    setShowAdd(false);
    onClose();
  };

  return (
    <div className="manager-backdrop fade" onClick={onClose}>
      <div className="manager-modal sheet-in" onClick={e => e.stopPropagation()}>
        <div className="manager-head">
          <div>
            <div className="manager-title">{icon} {title}</div>
            <div className="manager-sub">{list.length} รายการ · แตะเพื่อใช้</div>
          </div>
          <button className="icon-btn-round" onClick={onClose}><Ic.X size={16}/></button>
        </div>

        <div className="manager-search">
          <input type="text" value={query} onChange={e => setQuery(e.target.value)}
                 placeholder={`ค้นหา${label}...`}/>
          <button className="manager-add-btn" onClick={() => setShowAdd(v => !v)}>
            <Ic.Plus size={14}/> เพิ่มใหม่
          </button>
        </div>

        {showAdd && (
          <div className="manager-add-row fade">
            <input type="text" value={newName}
                   onChange={e => setNewName(e.target.value)}
                   placeholder={`ชื่อ${label}ใหม่`}
                   autoFocus
                   onKeyDown={e => { if (e.key === 'Enter') addNew(); }}/>
            <button onClick={addNew} disabled={!newName.trim()}>เพิ่ม</button>
          </div>
        )}

        <div className="manager-list">
          {filtered.length === 0 && (
            <div className="manager-empty">
              {query ? 'ไม่พบรายการที่ค้นหา' : `ยังไม่มี${label} — กด "เพิ่มใหม่" เพื่อเริ่ม`}
            </div>
          )}
          {filtered.map(e => {
            const isEdit = editingName === e.name;
            const isConfirm = confirmDelete === e.name;
            return (
              <div key={e.name} className="manager-item">
                {isEdit ? (
                  <div className="manager-edit">
                    <input type="text" value={editValue}
                           onChange={ev => setEditValue(ev.target.value)}
                           autoFocus
                           onKeyDown={ev => {
                             if (ev.key === 'Enter') saveEdit();
                             else if (ev.key === 'Escape') cancelEdit();
                           }}/>
                    <button className="mgr-mini ok" onClick={saveEdit} disabled={!editValue.trim()}>
                      <Ic.Check size={14}/>
                    </button>
                    <button className="mgr-mini" onClick={cancelEdit}>
                      <Ic.X size={14}/>
                    </button>
                  </div>
                ) : isConfirm ? (
                  <div className="manager-confirm">
                    <div className="mgr-warn">
                      ลบ "{e.name}" พร้อมรายการ {e.count} อัน?
                    </div>
                    <button className="mgr-mini" onClick={() => setConfirmDelete(null)}>
                      ยกเลิก
                    </button>
                    <button className="mgr-mini danger" onClick={() => doDelete(e.name)}>
                      ลบ
                    </button>
                  </div>
                ) : (
                  <>
                    <button className="manager-pick" onClick={() => { onSelect?.(e.name); onClose(); }}>
                      <span className="mgr-name">{e.name}</span>
                      <span className="mgr-count">{e.count}×</span>
                    </button>
                    <button className="mgr-mini" onClick={() => startEdit(e.name)}
                            title="แก้ไข">
                      <Ic.Pencil size={14}/>
                    </button>
                    <button className="mgr-mini danger" onClick={() => setConfirmDelete(e.name)}
                            title="ลบ">
                      <Ic.Trash size={13}/>
                    </button>
                  </>
                )}
              </div>
            );
          })}
        </div>

        <div className="manager-foot">
          <div className="manager-hint">
            💡 การแก้ชื่อจะอัปเดตทุกรายการที่ใช้ชื่อนี้อยู่<br/>
            ⚠️ การลบจะลบรายการทั้งหมดที่ใช้ชื่อนี้ด้วย
          </div>
        </div>
      </div>
    </div>
  );
}

function TxSheet({ initial, onClose, onSave, onDelete, account, skipSync, pushToast, allTx, masterItems, masterAccounts, masterProjects, masterCategories, onOpenItemsManager, onRenameMaster, onDeleteMaster, isPendingNew = false }) {
  const [type, setType] = useState(initial?.type || 'expense');
  const [amount, setAmount] = useState(initial?.amount ? String(initial.amount) : '');
  // Category is OPTIONAL. Existing tx keep whatever they had, including empty/null.
  const [category, setCategory] = useState(initial?.category ?? '');
  const [accountName, setAccountName] = useState(() => {
    if (initial?.accountName) {
      // Migrate legacy preset IDs to human labels
      const legacy = { cash: 'เงินสด', bank: 'ธนาคาร', credit: 'บัตรเครดิต', ewallet: 'e-Wallet' };
      return legacy[initial.accountName] || initial.accountName;
    }
    return '';
  });
  const [project, setProject] = useState(initial?.project || '');  // stored as project name string
  const [item, setItem] = useState(initial?.item || initial?.payee || '');
  const [date, setDate] = useState(initial?.date || todayISO());
  const [time, setTime] = useState(() => {
    return initial ? (timeFromIso(initial.createdAt) || nowTime()) : nowTime();
  });
  const [note, setNote] = useState(initial?.note || '');
  // photos: array of {id, name} - up to 5
  const [photos, setPhotos] = useState(() => {
    if (initial?.photos && Array.isArray(initial.photos)) return initial.photos;
    // Migrate from v1.3 single photo
    if (initial?.photoId) return [{ id: initial.photoId, name: initial.photoName || 'photo' }];
    return [];
  });
  const [photoUrls, setPhotoUrls] = useState({}); // { photoId: blobUrl }
  const [uploadingPhoto, setUploadingPhoto] = useState(false);
  const [viewerIdx, setViewerIdx] = useState(-1);

  // UI state
  const [catOpen, setCatOpen] = useState(false);
  const [showNewProject, setShowNewProject] = useState(false);
  const [newProjectName, setNewProjectName] = useState('');
  const [accountFocused, setAccountFocused] = useState(false);
  const [itemFocused, setItemFocused] = useState(false);
  const [noteFocused, setNoteFocused] = useState(false);
  const [attemptedSave, setAttemptedSave] = useState(false);

  const photoInputRef = useRef(null);
  const isOnline = !!account && !skipSync;

  // When switching income/expense, clear category if it belongs to the other type.
  // An empty category (ไม่ระบุ) is always valid — no auto-defaulting.
  useEffect(() => {
    if (!category) return;
    const list = getCatList(type, masterCategories);
    if (!list.find(c => c.id === category)) setCategory('');
  }, [type, masterCategories]);

  // Load existing photos
  useEffect(() => {
    photos.forEach(p => {
      if (!photoUrls[p.id] && isOnline) {
        fetchPhotoUrl(p.id)
          .then(url => setPhotoUrls(prev => ({ ...prev, [p.id]: url })))
          .catch(e => console.error('load photo', e));
      }
    });
    return () => {
      Object.values(photoUrls).forEach(u => { try { URL.revokeObjectURL(u); } catch {} });
    };
  // eslint-disable-next-line
  }, []);

  const cats = getCatList(type, masterCategories);
  const currentCat = getCat(type, category, masterCategories);

  // --- Derive project list & item list & note list from all existing tx ---
  const projectList = useMemo(() => {
    const set = new Set();
    (allTx || []).forEach(t => { if (t.project?.trim()) set.add(t.project.trim()); });
    (masterProjects || []).forEach(p => { if (p.name?.trim()) set.add(p.name.trim()); });
    return Array.from(set).sort();
  }, [allTx, masterProjects]);
  // Item frequency map for autocomplete ranking — includes master list + tx-derived
  const itemMap = useMemo(() => {
    const m = new Map();
    (allTx || []).forEach(t => {
      const k = (t.item || t.payee || '').trim();
      if (k) m.set(k, (m.get(k) || 0) + 1);
    });
    // Add master-list items with count 0 so they appear as suggestions
    (masterItems || []).forEach(it => {
      const k = (it.name || '').trim();
      if (k && !Array.from(m.keys()).some(key => key.toLowerCase() === k.toLowerCase())) {
        m.set(k, 0);
      }
    });
    return m;
  }, [allTx, masterItems]);
  // Account frequency map (with legacy migration)
  const accountMap = useMemo(() => {
    const m = new Map();
    const legacy = { cash: 'เงินสด', bank: 'ธนาคาร', credit: 'บัตรเครดิต', ewallet: 'e-Wallet' };
    (allTx || []).forEach(t => {
      let k = (t.accountName || '').trim();
      if (!k) return;
      if (legacy[k]) k = legacy[k];
      m.set(k, (m.get(k) || 0) + 1);
    });
    // Also include master-list accounts (even with 0 transactions)
    (masterAccounts || []).forEach(a => {
      const k = (a.name || '').trim();
      if (k && !Array.from(m.keys()).some(key => key.toLowerCase() === k.toLowerCase())) {
        m.set(k, 0);
      }
    });
    return m;
  }, [allTx, masterAccounts]);
  // Note map
  const noteMap = useMemo(() => {
    const m = new Map();
    (allTx || []).forEach(t => {
      const k = (t.note || '').trim();
      if (k) m.set(k, (m.get(k) || 0) + 1);
    });
    return m;
  }, [allTx]);

  // Autocomplete matches for account
  // v5.28: when the field is empty (initial open), show ALL accounts the
  // user has permission to — previously we capped at 8 and sorted by usage,
  // so accounts the user just created (count=0) or rarely-used ones never
  // appeared in the suggestions. For families with many accounts (the
  // current vault has 17+), this meant the dropdown was effectively useless
  // for picking a fresh account; the user would have to remember and type
  // the exact name. Now: no query → return everything in usage-then-alpha
  // order; with a query → cap stays at 8 because the filter narrows things
  // down naturally.
  const accountMatches = useMemo(() => {
    const q = accountName.trim().toLowerCase();
    const entries = Array.from(accountMap.entries()).map(([label, count]) => ({ label, count }));
    const sorted = entries.sort((a, b) => {
      if (b.count !== a.count) return b.count - a.count;
      return a.label.localeCompare(b.label, 'th');
    });
    if (!q) return sorted; // show all permitted accounts on open
    return sorted
      .filter(e => e.label.toLowerCase().includes(q))
      .slice(0, 8);
  }, [accountName, accountMap]);
  const accountExactExists = useMemo(() => {
    const q = accountName.trim().toLowerCase();
    if (!q) return false;
    return Array.from(accountMap.keys()).some(k => k.toLowerCase() === q);
  }, [accountName, accountMap]);

  // Autocomplete matches for item (substring, case-insensitive)
  const itemMatches = useMemo(() => {
    const q = item.trim().toLowerCase();
    const entries = Array.from(itemMap.entries())
      .map(([label, count]) => ({ label, count }));
    if (!q) return entries.sort((a, b) => b.count - a.count).slice(0, 6);
    return entries
      .filter(e => e.label.toLowerCase().includes(q))
      .sort((a, b) => b.count - a.count)
      .slice(0, 6);
  }, [item, itemMap]);
  const itemExactExists = useMemo(() => {
    const q = item.trim().toLowerCase();
    if (!q) return false;
    return Array.from(itemMap.keys()).some(k => k.toLowerCase() === q);
  }, [item, itemMap]);

  const noteMatches = useMemo(() => {
    const q = note.trim().toLowerCase();
    if (!q) return [];
    return Array.from(noteMap.entries())
      .filter(([label]) => label.toLowerCase().includes(q) && label.toLowerCase() !== q)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 5)
      .map(([label, count]) => ({ label, count }));
  }, [note, noteMap]);

  // --- Validation ---
  const itemTrimmed = item.trim();
  const accountTrimmed = accountName.trim();
  const itemMissing = !itemTrimmed;
  const accountMissing = !accountTrimmed;
  const canSave = parseFloat(amount) > 0 && !itemMissing && !accountMissing;

  // --- Photo handlers ---
  // v5.10: handle multiple photos in one pick. Uploads sequentially so we don't
  // overwhelm the network (mobile data, OneDrive throttling) and so the user
  // sees progress one photo at a time. Each photo failure is reported but doesn't
  // abort the rest.
  const onPhotoPick = async (e) => {
    const files = Array.from(e.target.files || []);
    e.target.value = '';
    if (files.length === 0) return;
    if (!isOnline) { pushToast?.('ต้องเข้าสู่ระบบก่อน'); return; }

    // Filter out non-image files first
    const images = files.filter(f => f.type.startsWith('image/'));
    if (images.length === 0) { pushToast?.('ไฟล์ต้องเป็นรูปภาพ'); return; }
    if (images.length < files.length) pushToast?.('ข้ามไฟล์ที่ไม่ใช่รูป');

    // Cap at remaining slots (5 total per transaction)
    const remaining = 5 - photos.length;
    if (remaining <= 0) { pushToast?.('รูปได้สูงสุด 5 รูปต่อรายการ'); return; }
    const toUpload = images.slice(0, remaining);
    if (toUpload.length < images.length) {
      pushToast?.(`อัปได้อีก ${remaining} รูป (จำกัด 5 รูปต่อรายการ)`);
    }

    setUploadingPhoto(true);
    let successCount = 0;
    try {
      const txId = initial?.id || uid();
      for (let i = 0; i < toUpload.length; i++) {
        const file = toUpload[i];
        try {
          const result = await uploadPhoto(file, txId);
          const localUrl = URL.createObjectURL(file);
          setPhotos(prev => [...prev, { id: result.id, name: result.name }]);
          setPhotoUrls(prev => ({ ...prev, [result.id]: localUrl }));
          successCount++;
        } catch (err) {
          console.error('photo upload failed', err);
        }
      }
      if (successCount === toUpload.length) {
        pushToast?.(successCount > 1 ? `อัปโหลด ${successCount} รูปแล้ว` : 'อัปโหลดรูปแล้ว');
      } else if (successCount > 0) {
        pushToast?.(`อัปโหลด ${successCount}/${toUpload.length} รูป`);
      } else {
        pushToast?.('อัปโหลดรูปไม่สำเร็จ');
      }
    } finally {
      setUploadingPhoto(false);
    }
  };

  const removePhotoAt = (idx) => {
    const p = photos[idx];
    if (!p) return;
    deletePhoto(p.id); // from both OneDrive + IDB
    if (photoUrls[p.id]) { try { URL.revokeObjectURL(photoUrls[p.id]); } catch {} }
    setPhotos(prev => prev.filter((_, i) => i !== idx));
    setPhotoUrls(prev => { const n = {...prev}; delete n[p.id]; return n; });
    pushToast?.('ลบรูปแล้ว');
  };

  // --- Project add ---
  const addNewProject = () => {
    const name = newProjectName.trim();
    if (!name) return;
    // Check duplicate (case-insensitive)
    const existing = projectList.find(p => p.toLowerCase() === name.toLowerCase());
    if (existing) {
      setProject(existing);
      setNewProjectName('');
      setShowNewProject(false);
      pushToast?.('ใช้โครงการที่มีอยู่แล้ว');
      return;
    }
    setProject(name);
    setNewProjectName('');
    setShowNewProject(false);
  };

  const save = () => {
    setAttemptedSave(true);
    if (!canSave) {
      if (accountMissing) pushToast?.('กรุณากรอก "บัญชี/กระเป๋า"');
      else if (itemMissing) pushToast?.('กรุณากรอก "ชื่อรายการ"');
      else if (!(parseFloat(amount) > 0)) pushToast?.('กรุณากรอกจำนวนเงิน');
      return;
    }
    // Normalize item (prevent case-insensitive duplicates in suggestions)
    let finalItem = itemTrimmed;
    const existingItem = Array.from(itemMap.keys()).find(k => k.toLowerCase() === finalItem.toLowerCase());
    if (existingItem) finalItem = existingItem;
    // Normalize account name too
    let finalAccount = accountTrimmed;
    const existingAcc = Array.from(accountMap.keys()).find(k => k.toLowerCase() === finalAccount.toLowerCase());
    if (existingAcc) finalAccount = existingAcc;

    onSave({
      id: initial?.id || uid(),
      type, category,
      accountName: finalAccount,
      project: project.trim(),
      item: finalItem,
      date,
      note: note.trim(),
      amount: parseFloat(parseFloat(amount).toFixed(currentDecimals)),
      createdAt: combineDateTime(date, time),
      photos,
      // keep backward-compat field null to remove old v1.3 single photo
      photoId: null, photoName: null,
    });
  };

  // Current account's decimals (affects amount precision + display)
  const currentDecimals = getAccountDecimals(accountName.trim(), masterAccounts || []);
  // v5.6: unit symbol+position for the currently picked account (defaults ฿ before)
  const currentUnit = getAccountUnit(accountName.trim(), masterAccounts || []);

  // v5.12: when the edit sheet first opens for an existing transaction, format
  // the amount with the account's decimal precision (e.g. "2" → "2.00") so it
  // visually matches the on-list display. Skip while the input is focused so
  // we don't fight the user mid-typing.
  const didInitialFormatRef = useRef(false);
  useEffect(() => {
    if (didInitialFormatRef.current) return;
    if (!initial?.amount) return;
    if (!accountName.trim()) return; // wait until decimals are known via account
    const n = parseFloat(amount);
    if (isNaN(n)) return;
    setAmount(n.toFixed(currentDecimals));
    didInitialFormatRef.current = true;
  }, [accountName, currentDecimals, initial, amount]);

  const handleAmount = (e) => {
    let v = e.target.value.replace(/[^\d.]/g, '');
    const parts = v.split('.');
    if (parts.length > 2) v = parts[0] + '.' + parts.slice(1).join('');
    // Truncate decimal places to the account's allowed precision
    const dotIdx = v.indexOf('.');
    if (dotIdx >= 0 && v.length - dotIdx - 1 > currentDecimals) {
      v = v.slice(0, dotIdx + 1 + currentDecimals);
    }
    setAmount(v);
  };

  // v5.12: Per-digit spinner — adjust the amount by ±1, ±0.1, ±0.01, etc.
  // `delta` is a signed power-of-10 magnitude (e.g. +1, -1, +0.1, -0.01).
  // We do the math with rounding on the integer scale to avoid float drift,
  // then re-format using the account's decimals so the displayed value
  // always shows trailing zeros (e.g. "2.00" instead of "2").
  const stepAmount = (delta) => {
    const cur = parseFloat(amount) || 0;
    const next = cur + delta;
    if (next < 0) return; // never go negative
    // Round to current account precision, then format with that many decimals.
    const factor = Math.pow(10, currentDecimals);
    const rounded = Math.round(next * factor) / factor;
    setAmount(rounded.toFixed(currentDecimals));
  };

  // Build the layout for the spinner rows. The "shape" is:
  //   - integer part: at least 1 digit (more if amount is large) → each gets a step button
  //   - decimal point separator (if decimals > 0)
  //   - decimal part: `currentDecimals` digits, each with its own step button
  // Step magnitudes:
  //   - integer place i (rightmost = 0) → 10^i
  //   - decimal place i (1-indexed from the dot) → 10^(-i)
  const spinnerLayout = useMemo(() => {
    const intLen = Math.max(1, String(Math.floor(parseFloat(amount) || 0)).length);
    const ints = [];
    for (let i = intLen - 1; i >= 0; i--) ints.push(Math.pow(10, i));
    const decs = [];
    for (let i = 1; i <= currentDecimals; i++) decs.push(Math.pow(10, -i));
    return { ints, decs, hasDot: currentDecimals > 0 };
  }, [amount, currentDecimals]);

  const openFilePicker = (useCamera) => {
    if (photoInputRef.current) {
      if (useCamera) {
        // Camera mode: one shot at a time, with rear camera by default.
        photoInputRef.current.setAttribute('capture', 'environment');
        photoInputRef.current.removeAttribute('multiple');
      } else {
        // Gallery mode: allow selecting many at once via long-press to multi-select.
        photoInputRef.current.removeAttribute('capture');
        photoInputRef.current.setAttribute('multiple', 'multiple');
      }
      photoInputRef.current.click();
    }
  };

  // Highlight matched substring helper
  const highlight = (text, query) => {
    if (!query) return text;
    const idx = text.toLowerCase().indexOf(query.toLowerCase());
    if (idx < 0) return text;
    return <>{text.slice(0, idx)}<span className="match">{text.slice(idx, idx + query.length)}</span>{text.slice(idx + query.length)}</>;
  };

  return (
    <div className="sheet-backdrop fade" onClick={onClose}>
      <div className="sheet-wrap sheet-in" onClick={e => e.stopPropagation()}>
        <div className="sheet">
          <div className="sheet-handle"></div>
          <div className="sheet-head">
            <h2>{initial?.id ? 'แก้ไขรายการ' : 'เพิ่มรายการใหม่'}</h2>
            <button className="icon-btn-round" onClick={onClose}><Ic.X size={16}/></button>
          </div>

          <div className="type-toggle">
            <div className="indicator" style={{
              left: type === 'income' ? '4px' : 'calc(50% + 0px)',
              background: type === 'income' ? 'rgba(139,179,139,0.15)' : 'rgba(184,88,66,0.15)',
              border: `1px solid ${type === 'income' ? 'var(--income)' : 'var(--expense)'}`,
            }}/>
            <button onClick={() => setType('income')} style={{color: type === 'income' ? 'var(--income-soft)' : 'var(--text-dim)'}}>
              <Ic.ArrowIn size={14}/> รายรับ
            </button>
            <button onClick={() => setType('expense')} style={{color: type === 'expense' ? 'var(--expense-soft)' : 'var(--text-dim)'}}>
              <Ic.ArrowOut size={14}/> รายจ่าย
            </button>
          </div>

          <div className="amount-box">
            <div className="lbl">
              {currentUnit.symbol && currentUnit.position === 'after' ? `จำนวน (${currentUnit.symbol})` : 'จำนวนเงิน'}
              {currentDecimals > 2 && accountName.trim() && (
                <span style={{color: 'var(--gold)', marginLeft: 8, fontSize: 10, letterSpacing: '0.05em', textTransform: 'none'}}>
                  · ทศนิยม {currentDecimals} ตำแหน่ง
                </span>
              )}
            </div>

            {/* v5.13 revised: stack the up-row, input track, and down-row using
                identical intrinsic widths. Each digit cell is 26px wide and
                the dot gap is 14px, matching the IBM Plex Mono font we use in
                the input below. */}
            {(() => {
              const STEP_W = 26;
              const DOT_W = 14;
              const trackWidth = (spinnerLayout.ints.length * STEP_W)
                + (spinnerLayout.hasDot ? DOT_W : 0)
                + (spinnerLayout.decs.length * STEP_W);
              return (
                <div className="amount-spinner-stack">
                  {/* ^ row */}
                  <div className="amount-spinner-row" aria-hidden="true" style={{width: trackWidth}}>
                    {spinnerLayout.ints.map((mag, i) => (
                      <button key={`up-i-${i}`} type="button" className="step up"
                              onClick={() => stepAmount(mag)} tabIndex={-1}
                              title={`+${mag}`}>^</button>
                    ))}
                    {spinnerLayout.hasDot && <span className="gap"></span>}
                    {spinnerLayout.decs.map((mag, i) => (
                      <button key={`up-d-${i}`} type="button" className="step up"
                              onClick={() => stepAmount(mag)} tabIndex={-1}
                              title={`+${mag}`}>^</button>
                    ))}
                  </div>

                  {/* Input track — matches spinner row width so the digits
                      appear directly under the buttons. The currency symbol
                      sits beside the track, not inside it. */}
                  <div className="amount-input-track">
                    {currentUnit.symbol && currentUnit.position === 'before' && (
                      <span className="cur">{currentUnit.symbol}</span>
                    )}
                    <span className="digit-input-shell" style={{width: trackWidth}}>
                      <input inputMode="decimal" placeholder="0" value={amount} onChange={handleAmount}
                             onBlur={() => {
                               if (amount !== '' && !isNaN(parseFloat(amount))) {
                                 setAmount(parseFloat(amount).toFixed(currentDecimals));
                               }
                             }}
                             style={{color: type === 'income' ? 'var(--income-soft)' : 'var(--text)'}}/>
                    </span>
                    {currentUnit.symbol && currentUnit.position === 'after' && (
                      <span className="cur after">{currentUnit.symbol}</span>
                    )}
                  </div>

                  {/* v row */}
                  <div className="amount-spinner-row dot-row" aria-hidden="true" style={{width: trackWidth}}>
                    {spinnerLayout.ints.map((mag, i) => (
                      <button key={`dn-i-${i}`} type="button" className="step down"
                              onClick={() => stepAmount(-mag)} tabIndex={-1}
                              title={`−${mag}`}
                              style={{transform:'rotate(180deg)'}}>^</button>
                    ))}
                    {spinnerLayout.hasDot && <span className="gap"></span>}
                    {spinnerLayout.decs.map((mag, i) => (
                      <button key={`dn-d-${i}`} type="button" className="step down"
                              onClick={() => stepAmount(-mag)} tabIndex={-1}
                              title={`−${mag}`}
                              style={{transform:'rotate(180deg)'}}>^</button>
                    ))}
                  </div>
                </div>
              );
            })()}
          </div>

          {/* Category - dropdown */}
          <div className="cat-head">หมวดหมู่</div>
