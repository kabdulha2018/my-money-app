      clearTimeout(pollTimerRef.current);
      pollTimerRef.current = null;
    }
  }, []);
  // Cleanup on unmount or user logout.
  useEffect(() => () => { stopHeartbeat(); stopPoll(); }, [stopHeartbeat, stopPoll]);

  // ----- lock release (used by both happy path and cancel/error paths) -----
  const releaseLock = useCallback(async () => {
    if (!currentUser?.id) return;
    stopHeartbeat();
    stopPoll();
    try {
      await qMutate(doc => {
        const before = doc.queue.length;
        doc.queue = doc.queue.filter(e => e.userId !== currentUser.id);
        return doc.queue.length === before ? null : doc;
      });
    } catch (e) {
      // If release fails (network, conflict storm), the entry will be
      // evicted by other clients via lease timeout — not catastrophic,
      // just suboptimal. Log and move on.
      console.warn('Q release failed:', e);
    }
    txOrderIdRef.current = null;
  }, [currentUser?.id, stopHeartbeat, stopPoll]);

  // ----- heartbeat: while editing, refresh Q.json[me].heartbeat every 10s -----
  const sendHeartbeat = useCallback(async () => {
    if (!currentUser?.id || phaseRef.current !== 'editing') return;
    try {
      await qMutate(doc => {
        const me = doc.queue.find(e => e.userId === currentUser.id);
        if (!me || me.status !== 'editing') return null; // no-op if we're not editing anymore
        me.heartbeat = new Date().toISOString();
        return doc;
      });
    } catch (e) {
      // Heartbeat failures are tolerated: a single missed beat is fine
      // (we have 3 beats of slack before lease expires). Log and continue.
      console.warn('heartbeat failed:', e);
    }
  }, [currentUser?.id]);

  // ----- poll while waiting: check if it's our turn yet -----
  const pollForTurn = useCallback(async () => {
    if (cancelledRef.current) return;
    if (phaseRef.current !== 'waiting') return;
    try {
      const { doc } = await qFetch();
      // Evict dead editors so a crashed client doesn't block us forever.
      const live = qEvictDead(doc.queue);
      const sorted = qSortQueue(live);
      const myIdx = sorted.findIndex(e => e.userId === currentUser.id);

      if (myIdx === -1) {
        // We somehow got removed from the queue (maybe someone reset the
        // queue file). Surface as error so user can retry.
        setPhase('error');
        setErrMsg('คุณถูกลบจากคิว — กรุณาลองใหม่');
        stopPoll();
        return;
      }
      setQueuePosition(myIdx + 1);
      setQueueLength(sorted.length);

      // Are we the head AND no one is currently editing? If yes, attempt
      // promotion (which is itself an atomic Q.json mutation). If not,
      // schedule another poll.
      const headIsUs = myIdx === 0;
      const someoneElseEditing = sorted.some(e => e.userId !== currentUser.id && e.status === 'editing');
      if (headIsUs && !someoneElseEditing) {
        // Try to promote.
        const promotedDoc = await qMutate(d => {
          // Re-evict at write time to be safe — dead editor might have
          // appeared between our fetch and our write.
          const liveQ = qEvictDead(d.queue);
          const sortedQ = qSortQueue(liveQ);
          const me = sortedQ.find(e => e.userId === currentUser.id);
          if (!me) return null;
          // Defensive: only promote if we're STILL the head and no one
          // else is editing in the (just re-evicted) queue.
          if (sortedQ[0]?.userId !== currentUser.id) return null;
          if (sortedQ.some(e => e.userId !== currentUser.id && e.status === 'editing')) return null;
          me.status = 'editing';
          me.acquiredAt = new Date().toISOString();
          me.heartbeat = me.acquiredAt;
          d.queue = sortedQ;
          return d;
        });
        // Re-validate: did we end up the only editor? Two clients might both
        // succeed at the optimistic promote (one races onto the other's
        // intermediate state). Re-fetch and check.
        const { doc: verifyDoc } = await qFetch();
        const verifySorted = qSortQueue(qEvictDead(verifyDoc.queue));
        const editors = verifySorted.filter(e => e.status === 'editing');
        if (editors.length > 1) {
          // Multi-editor race. Whoever has the LATER acquiredAt demotes back
          // to waiting (they lost the tie). The earlier one keeps the lock.
          const sortedEditors = [...editors].sort((a, b) => (a.acquiredAt < b.acquiredAt ? -1 : 1));
          if (sortedEditors[0].userId !== currentUser.id) {
            // We're the loser — demote ourselves and continue polling.
            await qMutate(d => {
              const me = d.queue.find(e => e.userId === currentUser.id);
              if (!me || me.status !== 'editing') return null;
              me.status = 'waiting';
              delete me.acquiredAt;
              return d;
            });
            // Schedule next poll.
            pollTimerRef.current = setTimeout(pollForTurn, 2000);
            return;
          }
        }
        // We hold the lock. Transition to editing and start the heartbeat.
        setPhase('editing');
        setQueuePosition(null);
        heartbeatTimerRef.current = setInterval(sendHeartbeat, HEARTBEAT_INTERVAL_MS);
      } else {
        // Not our turn yet — try again shortly.
        pollTimerRef.current = setTimeout(pollForTurn, 2000);
      }
    } catch (e) {
      console.error('pollForTurn error:', e);
      // Transient error — keep polling. If the network is genuinely down
      // the user will see it via the existing isOnline indicator.
      pollTimerRef.current = setTimeout(pollForTurn, 3000);
    }
  }, [currentUser?.id, sendHeartbeat, stopPoll]);

  // ----- public API: kick off the deploy flow -----
  // Returns a promise that resolves once the lock is released (after onApply
  // runs). Callers can await this to know when to refresh their UI.
  const startDeploy = useCallback(async (onApply) => {
    if (!currentUser?.id) {
      setErrMsg('ต้องเข้าสู่ระบบก่อน');
      return { ok: false, reason: 'no-user' };
    }
    if (!isOnline) {
      setErrMsg('ออฟไลน์ — กรุณาเชื่อมต่ออินเทอร์เน็ต');
      return { ok: false, reason: 'offline' };
    }
    if (phaseRef.current !== 'idle') {
      // already in flight — ignore double-tap
      return { ok: false, reason: 'busy' };
    }

    cancelledRef.current = false;
    setErrMsg(null);
    setPhase('waiting');
    setQueuePosition(null);
    setQueueLength(0);

    // Step 1: append ourselves to the queue with status='waiting'.
    const now = Date.now();
    const txOrderId = now * 1000 + Math.floor(Math.random() * 1000);
    txOrderIdRef.current = txOrderId;
    const myEntry = {
      userId:    currentUser.id,
      userLabel: currentUser.label || currentUser.id,
      timestamp: new Date(now).toISOString(),
      txOrderId,
      status:    'waiting',
      heartbeat: new Date(now).toISOString(),
    };
    try {
      await qMutate(doc => {
        // First evict any dead editors so we don't enqueue behind a corpse.
        doc.queue = qEvictDead(doc.queue);
        // If we somehow already have an entry (e.g. from a previous crashed
        // session), remove it first to avoid duplicates.
        doc.queue = doc.queue.filter(e => e.userId !== currentUser.id);
        doc.queue.push(myEntry);
        return doc;
      });
    } catch (e) {
      setPhase('error');
      setErrMsg('เพิ่มเข้าคิวไม่สำเร็จ: ' + (e.message || e));
      return { ok: false, reason: 'enqueue-failed', error: e };
    }

    // Step 2: poll until we're at the head and can promote ourselves.
    // pollForTurn will eventually flip phase to 'editing' (or 'error').
    pollForTurn();

    // Step 3: wait until phase becomes 'editing' or 'error'/'idle' (cancel).
    // We do this via a polled promise — clean and simple.
    await new Promise((resolve) => {
      const check = () => {
        if (phaseRef.current === 'editing') return resolve();
        if (phaseRef.current === 'error' || phaseRef.current === 'idle') return resolve();
        setTimeout(check, 250);
      };
      check();
    });

    if (phaseRef.current !== 'editing') {
      // Aborted before we got the lock — release if we have an entry just in case.
      await releaseLock();
      setPhase('idle');
      return { ok: false, reason: 'aborted' };
    }

    // Step 4: we hold the lock. Run the caller's apply logic.
    let applyResult = null;
    try {
      if (typeof onApply === 'function') {
        applyResult = await onApply();
      }
    } catch (e) {
      console.error('onApply threw:', e);
      setErrMsg('Apply ล้มเหลว: ' + (e.message || e));
      // Even on apply failure, we release the lock — don't hold the queue
      // hostage. The caller can decide how to surface the error.
    }

    // Step 5: release the lock and return to idle.
    setPhase('releasing');
    await releaseLock();
    setPhase('idle');
    return { ok: true, applyResult };
  }, [currentUser?.id, isOnline, pollForTurn, releaseLock]);

  // ----- public API: cancel an in-flight deploy (only valid while waiting) -----
  const cancelDeploy = useCallback(async () => {
    if (phaseRef.current !== 'waiting') return;
    cancelledRef.current = true;
    stopPoll();
    await releaseLock();
    setPhase('idle');
    setQueuePosition(null);
    setQueueLength(0);
  }, [stopPoll, releaseLock]);

  return {
    phase,            // 'idle' | 'waiting' | 'editing' | 'releasing' | 'error'
    queuePosition,    // 1-indexed; null when not waiting
    queueLength,      // total people in queue (incl. self)
    errMsg,
    startDeploy,      // (onApply) => Promise<{ok, applyResult}>
    cancelDeploy,     // () => Promise<void>
  };
}

// ========== App ==========
// ============ v5.0: PIN-based profile gate (uses runtime user list) ============
// User picks profile after Microsoft login → enters 4-digit PIN → enters app.
// Profile stored in sessionStorage so closing the tab/Chrome auto-locks.
// v5.10: text input with clear (✕) and restore (↩) buttons.
// - Empty value → no buttons
// - Has text → show ✕ to clear (saves the text in a stash)
// - Just cleared → show ↩ to restore the stashed text
// Stash is reset whenever the user types again, so restore only works
// immediately after the most recent clear.
// Spreads any extra props onto the inner <input> (placeholder, type, onFocus, …).
function ClearableInput({ value, onChange, ...rest }) {
  const stashRef = useRef('');
  const [justCleared, setJustCleared] = useState(false);
  const handleChange = (e) => {
    setJustCleared(false);
    onChange?.(e);
  };
  const clear = () => {
    if (!value) return;
    stashRef.current = value;
    setJustCleared(true);
    // Synthesize an event so the parent's onChange handler treats this as a
    // normal text edit (no special "clear" callback needed in callers).
    onChange?.({ target: { value: '' } });
  };
  const restore = () => {
    if (!stashRef.current) return;
    onChange?.({ target: { value: stashRef.current } });
    setJustCleared(false);
  };
  const showClear = !justCleared && (value || '').length > 0;
  const showRestore = justCleared && stashRef.current.length > 0;
  return (
    <span className="clearable-wrap">
      <input {...rest} value={value} onChange={handleChange}/>
      {showClear && (
        <button type="button" className="clearable-btn clear"
                onMouseDown={(e) => e.preventDefault()}
                onClick={clear}
                aria-label="ล้างข้อความ"
                title="ล้างข้อความ">
          <Ic.X size={12}/>
        </button>
      )}
      {showRestore && (
        <button type="button" className="clearable-btn restore"
                onMouseDown={(e) => e.preventDefault()}
                onClick={restore}
                aria-label="คืนค่าข้อความ"
                title="คืนค่าข้อความ">
          <Ic.Refresh size={12}/>
        </button>
      )}
    </span>
  );
}

// v5.11: textarea variant of ClearableInput — auto-grows up to a max number of
// rows so long item names / notes wrap onto a second line instead of being
// truncated. Clear/restore behaviour is identical to ClearableInput.
function ClearableTextarea({ value, onChange, minRows = 1, maxRows = 4, ...rest }) {
  const stashRef = useRef('');
  const taRef = useRef(null);
  const [justCleared, setJustCleared] = useState(false);

  // Resize the textarea to fit its content, capped between minRows and maxRows.
  // We measure with scrollHeight on the live element, then clamp.
  const autosize = () => {
    const el = taRef.current;
    if (!el) return;
    el.style.height = 'auto';
    const cs = window.getComputedStyle(el);
    const lh = parseFloat(cs.lineHeight) || 20;
    const padTop = parseFloat(cs.paddingTop) || 0;
    const padBot = parseFloat(cs.paddingBottom) || 0;
    const minH = lh * minRows + padTop + padBot;
    const maxH = lh * maxRows + padTop + padBot;
    const next = Math.max(minH, Math.min(maxH, el.scrollHeight));
    el.style.height = next + 'px';
    el.style.overflowY = el.scrollHeight > maxH ? 'auto' : 'hidden';
  };
  useEffect(() => { autosize(); }, [value]);

  const handleChange = (e) => {
    setJustCleared(false);
    onChange?.(e);
  };
  const clear = () => {
    if (!value) return;
    stashRef.current = value;
    setJustCleared(true);
    onChange?.({ target: { value: '' } });
  };
  const restore = () => {
    if (!stashRef.current) return;
    onChange?.({ target: { value: stashRef.current } });
    setJustCleared(false);
  };
  const showClear = !justCleared && (value || '').length > 0;
  const showRestore = justCleared && stashRef.current.length > 0;
  return (
    <>
      <textarea ref={taRef} rows={minRows} {...rest} value={value} onChange={handleChange}/>
      {(showClear || showRestore) && (
        <span className="field-actions">
          {showClear && (
            <button type="button" className="clearable-btn clear"
                    onMouseDown={(e) => e.preventDefault()}
                    onClick={clear}
                    aria-label="ล้างข้อความ" title="ล้างข้อความ">
              <Ic.X size={12}/>
            </button>
          )}
          {showRestore && (
            <button type="button" className="clearable-btn restore"
                    onMouseDown={(e) => e.preventDefault()}
                    onClick={restore}
                    aria-label="คืนค่าข้อความ" title="คืนค่าข้อความ">
              <Ic.Refresh size={12}/>
            </button>
          )}
        </span>
      )}
    </>
  );
}

function PinScreen({ profile, onBack, onSuccess }) {
  const [pin, setPin] = useState('');
  const [error, setError] = useState(false);
  const [verifying, setVerifying] = useState(false);

  const tryPin = async (entered) => {
    setVerifying(true);
    try {
      const expected = profile.pinHash;
      const got = await hashPin(entered);
      if (got === expected) {
        setTimeout(onSuccess, 100);
      } else {
        setError(true);
        setTimeout(() => { setPin(''); setError(false); }, 600);
      }
    } finally {
      setVerifying(false);
    }
  };

  const handleKey = (n) => {
    if (verifying) return;
    if (pin.length >= 4) return;
    const next = pin + n;
    setPin(next);
    if (next.length === 4) {
      tryPin(next);
    }
  };
  const del = () => { if (!verifying) setPin(prev => prev.slice(0, -1)); };

  return (
    <div className="pin-pad rise">
      <button className="pin-back" onClick={onBack} aria-label="ย้อนกลับ">
        <Ic.ChevL size={20}/>
      </button>
      <div className="pin-icon">{profile.icon || '👤'}</div>
      <h2 className="pin-name">{profile.label}</h2>
      <div className={`pin-prompt ${error ? 'err' : ''}`}>
        {error ? 'รหัสผ่านไม่ถูกต้อง' : 'กรุณาใส่รหัส PIN 4 หลัก'}
      </div>
      <div className={`pin-dots ${error ? 'shake' : ''}`}>
        {[0,1,2,3].map(i => (
          <div key={i}
               className={`pin-dot ${pin.length > i ? 'filled' : ''} ${error ? 'err' : ''}`}>
          </div>
        ))}
      </div>
      <div className="pin-keys">
        {[1,2,3,4,5,6,7,8,9].map(n => (
          <button key={n} className="pin-key" onClick={() => handleKey(String(n))}>{n}</button>
        ))}
        <button className="pin-key empty" tabIndex={-1}></button>
        <button className="pin-key" onClick={() => handleKey('0')}>0</button>
        <button className="pin-key del" onClick={del} aria-label="ลบ">⌫</button>
      </div>
    </div>
  );
}

function App() {
  const [booting, setBooting] = useState(true);
  const [account, setAccount] = useState(null);
  const [authError, setAuthError] = useState(null);
  const [authLoading, setAuthLoading] = useState(false);
  const [skipSync, setSkipSync] = useState(false);
  const [state, setState] = useState({ transactions: [], items: [], accounts: [], projects: [], categories: [], users: [], lastModified: null });
  const isOnline = !!account && HAS_CONFIG && !skipSync;
  const { status, lastSync, errMsg, pullOnce, schedulePush, forcePush, setStatus } = useSync(state, setState, isOnline);

  // v5.0: PIN-based profile gate (replaces v3.7 role+lock and v4.0 hardcoded profiles)
  //
  // Flow:
  //   Microsoft login → Profile Picker → PIN entry → app
  //
  // - Profile is stored in sessionStorage so closing the tab/Chrome auto-locks.
  //   Next time the user opens the URL they must re-enter PIN.
  // - User list lives in state.users (synced via OneDrive). Admin manages from UsersManager.
  // - PINs are stored as SHA-256 hashes — viewing the JSON file does not reveal them.
  // - There is NO URL bypass — even ?as=wife or ?unlock= do nothing now.
  const [appProfileId, setAppProfileId] = useState(() => {
    try { return sessionStorage.getItem('mymoney:profile') || null; }
    catch { return null; }
  });
  const [unlockTarget, setUnlockTarget] = useState(null); // profile being unlocked
  const switchProfile = (p) => {
    try { sessionStorage.setItem('mymoney:profile', p.id); } catch {}
    setAppProfileId(p.id);
    setUnlockTarget(null);
  };
  const lockProfile = () => {
    try { sessionStorage.removeItem('mymoney:profile'); } catch {}
    setAppProfileId(null);
    setUnlockTarget(null);
  };
  // v5.0: derive current user object from state.users + appProfileId
  const currentUser = useMemo(
    () => (state.users || []).find(u => u.id === appProfileId) || null,
    [state.users, appProfileId]
  );
  const isAdmin = currentUser?.role === 'admin';

  // v5.20 Phase 2: deploy lock state machine. Must be declared AFTER
  // currentUser is initialized (it depends on currentUser). Currently
  // passed a no-op onApply because the actual op-application logic lands
  // in Phase 3. The hook owns the queue lifecycle (waiting → editing →
  // release) and exposes phase / queue position so the UI can show
  // progress to the user.
  const deploy = useDeploy(currentUser, isOnline);

  // v5.19 Phase 1: Per-user pending operation log. The doc carries
  //   { userId, operations: [active], history: [done, capped] }
  // and lives in IndexedDB; we mirror the active operations into React
  // state so the UI can react to them (banner count, pending badges,
  // Manage screen, etc.). reloadUserOps() must be called whenever we
  // mutate the doc through the idb* helpers — there's no observable
  // notification for IDB writes, so we call it explicitly.
  //
  // We DO NOT eagerly load history here — only when the History viewer
  // is opened (Phase 4), to keep this state lean for the common case.
  const [userOpsDoc, setUserOpsDoc] = useState(() => emptyUserOpsDoc(appProfileId || 'anonymous'));
  const reloadUserOps = useCallback(async () => {
    if (!currentUser?.id) {
      setUserOpsDoc(emptyUserOpsDoc('anonymous'));
      return;
    }
    const doc = await idbGetUserOps(currentUser.id);
    setUserOpsDoc(doc);
  }, [currentUser?.id]);
  // Reload whenever the active user changes (sign-in, switch profile, etc.).
  useEffect(() => { reloadUserOps(); }, [reloadUserOps]);

  // v5.29 Phase 4 — Recovery toast. If the user has pending ops from a
  // previous session (closed the tab/app without deploying), let them know
  // on first sight after the doc loads. We fire this once per user-id per
  // session via a ref so re-renders or auto-syncs don't keep spamming.
  // The toast is intentionally non-intrusive: the banner above the main
  // view already shows the count + Deploy button, so this is just a hint
  // that pending work survived. Skipped entirely when ops is empty.
  const recoveryToastShownRef = useRef(new Set());
  useEffect(() => {
    const uid = currentUser?.id;
    if (!uid) return;
    if (booting) return;
    if (recoveryToastShownRef.current.has(uid)) return;
    const n = (userOpsDoc.operations || []).length;
    if (n > 0) {
      recoveryToastShownRef.current.add(uid);
      pushToast(`มี ${n} รายการรอ deploy จากครั้งก่อน`);
    }
  }, [currentUser?.id, booting, userOpsDoc.operations]);

  // Helper: append an op and refresh the in-memory copy. Components that
  // mutate (TxSheet save, removeTx, etc.) call addPendingOp so the same
  // merge-on-same-tx logic from appendUserOp() applies in one place.
  const addPendingOp = useCallback(async ({ resource = 'tx', action, before, after }) => {
    if (!currentUser?.id) return;
    const op = {
      id: newOpId(),
      resource,
      action,
      before: before || null,
      after: after || null,
      status: 'pending',
      ts: new Date().toISOString(),
    };
    await appendUserOp(currentUser.id, op);
    await reloadUserOps();
  }, [currentUser?.id, reloadUserOps]);

  const removePendingOp = useCallback(async (opId) => {
    if (!currentUser?.id) return;
    await removeUserOp(currentUser.id, opId);
    await reloadUserOps();
  }, [currentUser?.id, reloadUserOps]);

  const clearAllPendingOps = useCallback(async () => {
    if (!currentUser?.id) return;
    await clearUserOps(currentUser.id);
    await reloadUserOps();
  }, [currentUser?.id, reloadUserOps]);

  // Convenience derivations for downstream UI:
  //   pendingOps      — the active operations array (may be empty)
  //   pendingByTxId   — Map for O(1) lookup when we render TxRow badges;
  //                     each tx can only have ONE pending op of its own at
  //                     a time (the merge logic in appendUserOp guarantees
  //                     this), so the map value is a single op, not a list.
  //                     v5.23 Phase 5a: scoped to resource='tx' so we don't
  //                     accidentally flag a tx row that happens to share an
  //                     id with a master-list row's pending op.
  const pendingOps = userOpsDoc.operations || [];
  const pendingByTxId = useMemo(() => {
    const m = new Map();
    for (const op of pendingOps) {
      const resource = op.resource || 'tx';
      if (resource !== 'tx') continue;
      const id =
        op.action === 'add'    ? op.after?.id  :
        op.action === 'edit'   ? (op.after?.id || op.before?.id) :
        op.action === 'delete' ? op.before?.id :
        null;
      if (id) m.set(id, op);
    }
    return m;
  }, [pendingOps]);

  // v5.23 Phase 5a: generic per-resource lookup. Phase 5b/5c will pass these
  // into AccountsManager, ItemsManager, etc. so master-list rows can render
  // pending badges too. Structure: { account: Map<id, op>, item: Map, ... }.
  // We build all resources in one pass so the cost is O(ops), not O(ops *
  // resources). It's still a useMemo so we don't rebuild on every render.
  const pendingByResource = useMemo(() => {
    const all = { account: new Map(), item: new Map(), project: new Map(),
                  category: new Map(), user: new Map() };
    for (const op of pendingOps) {
      const resource = op.resource || 'tx';
      if (resource === 'tx') continue;
      const target = all[resource];
      if (!target) continue;
      const id =
        op.action === 'add'    ? op.after?.id  :
        op.action === 'edit'   ? (op.after?.id || op.before?.id) :
        op.action === 'delete' ? op.before?.id :
        null;
      if (id) target.set(id, op);
    }
    return all;
  }, [pendingOps]);

  // Strip any legacy URL parameters from previous versions (?as=, ?unlock=, ?role=)
  useEffect(() => {
    try {
      const url = new URL(window.location.href);
      let changed = false;
      ['as', 'unlock', 'role'].forEach(k => {
        if (url.searchParams.has(k)) { url.searchParams.delete(k); changed = true; }
      });
      if (changed) window.history.replaceState({}, '', url.toString());
    } catch {}
  }, []);
  // One-time cleanup of v3.x localStorage flags now that we use sessionStorage profile
  useEffect(() => {
    try {
      localStorage.removeItem('mymoney:role');
      localStorage.removeItem('mymoney:locked');
    } catch {}
  }, []);

  const [tab, setTab] = useState('home');
  const [homeView, setHomeView] = useState('overview'); // 'overview' | 'summary'
  const [viewMonth, setViewMonth] = useState(() => { const d = new Date(); return { y: d.getFullYear(), m: d.getMonth() }; });
  const [selectedAccount, setSelectedAccount] = useState('all'); // 'all' or specific account name
  const [editing, setEditing] = useState(null);
  const [actionTx, setActionTx] = useState(null); // row action menu target
  const [confirmDeleteTx, setConfirmDeleteTx] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [showItemsManager, setShowItemsManager] = useState(false);
  const [showAccountsManager, setShowAccountsManager] = useState(false);
  const [showProjectsManager, setShowProjectsManager] = useState(false);
  const [showCategoriesManager, setShowCategoriesManager] = useState(false);
  const [showUsersManager, setShowUsersManager] = useState(false); // v5.0: admin-only
  const [showSearch, setShowSearch] = useState(false); // v5.5: advanced search
  const [showManagePending, setShowManagePending] = useState(false); // v5.19 Phase 1
  // v5.21 Phase 3: result of the most recent deploy. Shown in a modal once
  // the deploy completes (success/cancelled/retry-later breakdown).
  const [deployResult, setDeployResult] = useState(null);
  // v5.29 Phase 4 modals.
  // - showHistoryViewer:  audit log of past deploys (per-user, capped at 100)
  // - showStorageMgr:     admin storage panel (Reset Queue + Orphan Photos)
  // - orphanScanResult:   most recent scanOrphanedPhotos() output, shown in
  //                       a confirm dialog before we actually delete.
  // - scanningOrphans:    spinner flag while the scan is in flight.
  // - resettingQueue:     spinner flag while qReset() is in flight.
  const [showHistoryViewer, setShowHistoryViewer] = useState(false);
  const [showStorageMgr, setShowStorageMgr] = useState(false);
  const [orphanScanResult, setOrphanScanResult] = useState(null);
  const [scanningOrphans, setScanningOrphans] = useState(false);
  const [resettingQueue, setResettingQueue] = useState(false);
  // v2.8: text zoom level — 0=normal, 1=large (115%), 2=larger (130%), 3=largest (145%)
  const [zoomLevel, setZoomLevel] = useState(() => {
    try {
      const v = localStorage.getItem('mymoney:zoom');
      const n = parseInt(v, 10);
      return Number.isFinite(n) && n >= 0 && n <= 3 ? n : 0;
    } catch { return 0; }
  });
  useEffect(() => {
    if (zoomLevel === 0) document.documentElement.removeAttribute('data-zoom');
    else document.documentElement.setAttribute('data-zoom', String(zoomLevel));
    try { localStorage.setItem('mymoney:zoom', String(zoomLevel)); } catch {}
  }, [zoomLevel]);
  const cycleZoom = () => setZoomLevel(z => (z + 1) % 4);
  const [toast, setToast] = useState(null);
  const pushToast = (m) => { setToast(m); setTimeout(() => setToast(null), 2200); };

  // Load local + init auth
  useEffect(() => { (async () => {
    setState(loadLocal());
    if (HAS_CONFIG) {
      try {
        const acc = await getAccount();
        if (acc) setAccount(acc);
      } catch (e) { console.error(e); }
    }
    setBooting(false);
  })(); }, []);

  // Persist local always
  useEffect(() => { if (!booting) saveLocal(state); }, [state, booting]);

  // Trigger initial pull when account ready
  const didPullRef = useRef(false);
  useEffect(() => {
    if (account && !didPullRef.current && !booting) {
      didPullRef.current = true;
      pullOnce();
    }
  }, [account, booting, pullOnce]);

  // v5.15: Smart wake-up + close-tab guard (per Gemini's diagnosis of the
  // May 2 data loss). Two effects in one useEffect to keep them sharing the
  // same hidden-timestamp ref since they observe related browser events.
  //
  // (a) visibilitychange — Chrome on Android freezes timers and JS heaps in
  //     hidden tabs to save battery. If the user pulls the app to the back-
  //     ground while a 2.5s debounce is pending, the timer can be paused or
  //     killed entirely; the user comes back next morning to find the
  //     "ซิงค์แล้ว" badge from yesterday over data that never uploaded. To
  //     handle this we record the moment the tab went hidden, and on return
  //     — if it's been long enough that the OS likely killed the JS heap —
  //     we re-pull from OneDrive before letting any further edits propagate.
  //     5 minutes is a heuristic: short enough to catch real freezes, long
  //     enough to ignore quick app switches.
  //
  // (b) beforeunload — if the user tries to close the tab while we still
  //     have unsaved local edits (status === 'pending' or 'syncing'), the
  //     browser shows its generic "leave site?" prompt. This catches the
  //     scenario where the user finishes typing, sees the green dot from a
  //     previous save, and closes Chrome before the new debounce fires.
  const lastHiddenAtRef = useRef(null);
  useEffect(() => {
    const onVisibility = () => {
      if (document.visibilityState === 'hidden') {
        lastHiddenAtRef.current = Date.now();
      } else if (document.visibilityState === 'visible') {
        const hiddenSince = lastHiddenAtRef.current;
        lastHiddenAtRef.current = null;
        if (!hiddenSince) return;
        const minutesAway = (Date.now() - hiddenSince) / 60000;
        // v5.15: If there's a pending push that may have been frozen by the
        // browser while the tab was hidden, fire it now while we're in the
        // foreground. This covers the scenario the user described: "auto-
        // sync ไม่เคยสำเร็จ ต้องกดซิงค์เอง" — the debounced setTimeout was
        // killed when the OS suspended the tab. forcePush() respects the
        // same guards as schedulePush, so it's safe to call even if the
        // pending save was already flushed elsewhere.
        if (status === 'pending' && account && !booting && !skipSync) {
          forcePush();
        }
        if (minutesAway > 5 && account && !booting && !skipSync) {
          // Tab was hidden long enough that the OS likely froze us — re-pull
          // before the user starts editing on top of stale state.
          pullOnce();
        }
      }
    };
    const onBeforeUnload = (e) => {
      // Only block close if there is actually unsaved work in flight.
      if (status === 'pending' || status === 'syncing') {
        e.preventDefault();
        e.returnValue = '';
        return '';
      }
    };
    document.addEventListener('visibilitychange', onVisibility);
    window.addEventListener('beforeunload', onBeforeUnload);
    return () => {
      document.removeEventListener('visibilitychange', onVisibility);
      window.removeEventListener('beforeunload', onBeforeUnload);
    };
  }, [account, booting, skipSync, pullOnce, forcePush, status]);

  // v2.9: Archive this index.html into OneDrive once per version, after login
  const didArchiveRef = useRef(false);
  useEffect(() => {
    if (!account || skipSync || booting) return;
    if (didArchiveRef.current) return;
    didArchiveRef.current = true;
    // Delay slightly so the initial pull/sync is not delayed by this background work
    const timer = setTimeout(() => {
      archiveVersionIfNeeded()
        .then(r => {
          if (r.archived) {
            console.log(`[archive] saved ${APP_VERSION} (${r.sizeKB} KB) to OneDrive`);
          } else {
            console.log(`[archive] ${APP_VERSION} skipped: ${r.reason}`);
          }
        })
        .catch(e => console.warn('[archive] failed:', e));
    }, 4000);
    return () => clearTimeout(timer);
  }, [account, skipSync, booting]);

  // v3.5: Pre-cache all photos for offline viewing (after login, runs once per session)
  const [cacheStatus, setCacheStatus] = useState({ done: 0, total: 0, running: false });
  const didPrecacheRef = useRef(false);
  useEffect(() => {
    if (!account || skipSync || booting) return;
    if (didPrecacheRef.current) return;
    if (!isOnline) return;
    if (!state.transactions || state.transactions.length === 0) return;
    didPrecacheRef.current = true;
    const timer = setTimeout(async () => {
      setCacheStatus(s => ({ ...s, running: true }));
      const result = await preCacheAllPhotos(state.transactions, (p) => {
        setCacheStatus({ done: p.done, total: p.total, running: p.done < p.total });
      });
      setCacheStatus({ done: result.done, total: result.total, running: false });
      if (result.total > 0) {
        console.log(`[precache] downloaded ${result.done}/${result.total} photos`);
      }
    }, 6000); // wait until after archive task
    return () => clearTimeout(timer);
  }, [account, skipSync, booting, isOnline, state.transactions]);

  // v3.5: Flush pending uploads when coming back online
  const [pendingCount, setPendingCount] = useState(0);
  // Helper that swaps a local-id → OneDrive-id inside transactions and resaves state
  const swapPhotoId = useCallback((localId, newId) => {
    setState(prev => {
      let changed = false;
      const newTx = (prev.transactions || []).map(t => {
        if (Array.isArray(t.photos)) {
          let mod = false;
          const next = t.photos.map(p => {
            if (p.id === localId) { mod = true; changed = true; return { ...p, id: newId }; }
            return p;
          });
          return mod ? { ...t, photos: next } : t;
        }
        if (t.photoId === localId) { changed = true; return { ...t, photoId: newId }; }
        return t;
      });
      if (!changed) return prev;
      return { ...prev, transactions: newTx, lastModified: new Date().toISOString() };
    });
  }, []);
  // Periodically refresh pending count + flush queue when online
  useEffect(() => {
    if (!account || skipSync || booting) return;
    let cancelled = false;
    const refresh = async () => {
      const pend = await idbListPending();
      if (!cancelled) setPendingCount(pend.length);
    };
    refresh();
    const flush = async () => {
      if (!isOnline) return;
      const pend = await idbListPending();
      if (pend.length === 0) return;
      const r = await flushPendingUploads(swapPhotoId);
      if (r.uploaded > 0) {
        pushToast(`อัปโหลดรูปค้าง ${r.uploaded} รูปแล้ว`);
      }
      refresh();
    };
    flush();
    // Check periodically (every 30s) in case user goes offline → online without page reload
    const intv = setInterval(flush, 30000);
    // Also flush immediately when "online" event fires
    const onOnline = () => flush();
    window.addEventListener('online', onOnline);
    return () => { cancelled = true; clearInterval(intv); window.removeEventListener('online', onOnline); };
  }, [account, skipSync, booting, isOnline, swapPhotoId]);

  // Trigger push on change
  const firstChangeRef = useRef(true);
  useEffect(() => {
    if (booting) return;
    if (firstChangeRef.current) { firstChangeRef.current = false; return; }
    // v5.21 Phase 3: do NOT auto-push while a Deploy is in flight. Deploy
    // owns my-money.json writes during its critical section — letting the
    // 2.5s debounce timer fire concurrently would race against
    // applyOpsToVault and could overwrite the deploy result with stale
    // local state (e.g. state captured before the post-deploy pull
    // completed). The Deploy flow does its own setState() with the fresh
    // remote vault, which will trigger this effect again — but by that
    // point deploy.phase is back to 'idle' so we'll push normally.
    if (deploy.phase === 'waiting' || deploy.phase === 'editing' || deploy.phase === 'releasing') return;
    if (isOnline && didPullRef.current) schedulePush();
  }, [state.transactions, state.items, state.accounts, state.projects, state.categories, state.users, state.lastModified, isOnline, booting, schedulePush, deploy.phase]);

  // Migration: backfill master lists (accounts/projects/items) from existing transactions.
  // This handles legacy data from before the master list feature existed.
  // Runs ONCE per session after data is loaded — not on every state change, otherwise
  // deleting a master entry would re-add it from existing transactions.
  const didMigrateRef = useRef(false);
  useEffect(() => {
    if (booting) return;
    if (didMigrateRef.current) return;
    if (!state.transactions || state.transactions.length === 0) return;
    didMigrateRef.current = true;

    const LEGACY_ACCT = { cash: 'เงินสด', bank: 'ธนาคาร', credit: 'บัตรเครดิต', ewallet: 'e-Wallet' };
    const txAccounts = new Set();
    const txProjects = new Set();
    const txItems = new Set();
    state.transactions.forEach(t => {
      let a = (t.accountName || '').trim();
      if (a) { if (LEGACY_ACCT[a]) a = LEGACY_ACCT[a]; txAccounts.add(a); }
      const p = (t.project || '').trim();
      if (p) txProjects.add(p);
      const i = (t.item || t.payee || '').trim();
      if (i) txItems.add(i);
    });

    const existingA = new Set((state.accounts || []).map(a => (a.name || '').toLowerCase()));
    const existingP = new Set((state.projects || []).map(p => (p.name || '').toLowerCase()));
    const existingI = new Set((state.items || []).map(it => (it.name || '').toLowerCase()));

    const newA = Array.from(txAccounts).filter(n => !existingA.has(n.toLowerCase()));
    const newP = Array.from(txProjects).filter(n => !existingP.has(n.toLowerCase()));
    const newI = Array.from(txItems).filter(n => !existingI.has(n.toLowerCase()));

    if (newA.length === 0 && newP.length === 0 && newI.length === 0) return;

    const now = new Date().toISOString();
    mutate(prev => ({
      ...prev,
      accounts: [...(prev.accounts || []), ...newA.map(name => ({ id: uid(), name, decimals: 2, createdAt: now }))],
      projects: [...(prev.projects || []), ...newP.map(name => ({ id: uid(), name, createdAt: now }))],
      items:    [...(prev.items    || []), ...newI.map(name => ({ id: uid(), name, createdAt: now }))],
    }));
  }, [booting, state.transactions]);

  // v5.0 Migration: seed users + assign legacy transactions to admin.
  // Must run AFTER initial pull from OneDrive (to avoid overwriting remote users
  // that already have non-default PINs). We detect "pull complete" by either:
  //   - account is offline/skipSync (no pull will happen), or
  //   - didPullRef is true AND state.lastModified is set (data has loaded from remote)
  const didMigrateV5Ref = useRef(false);
  useEffect(() => {
    if (booting) return;
    if (didMigrateV5Ref.current) return;
    // Wait for the initial pull to settle before migrating, so we don't seed default
    // users on top of remote users with already-customised PINs.
    const offlineMode = !account || skipSync;
    const pullDone = didPullRef.current && (state.lastModified != null || (state.transactions || []).length === 0);
    if (!offlineMode && !pullDone) return;

    didMigrateV5Ref.current = true;
    (async () => {
      const hasUsers = Array.isArray(state.users) && state.users.length > 0;
      const needsTxOwner = (state.transactions || []).some(t => !t.createdBy);
      if (hasUsers && !needsTxOwner) return;
      // Seed users with default PIN '1234' hashed
      const defaultHash = await hashPin(DEFAULT_PIN);
      const seededUsers = hasUsers
        ? state.users
        : DEFAULT_USERS.map(u => ({ ...u, pinHash: defaultHash }));
      mutate(prev => {
        // Re-check inside mutator in case state changed since the effect started
        const reHasUsers = Array.isArray(prev.users) && prev.users.length > 0;
        const nextUsers = reHasUsers ? prev.users : seededUsers;
        const adminId = (nextUsers.find(u => u.role === 'admin') || nextUsers[0])?.id || 'abi';
        const nextTx = (prev.transactions || []).map(t =>
          t.createdBy ? t : { ...t, createdBy: adminId }
        );
        return { ...prev, users: nextUsers, transactions: nextTx };
      });
    })();
  }, [booting, account, skipSync, state.lastModified, state.users, state.transactions]);

  // Actions
  const mutate = (mutator) => {
    // v5.15 (per Gemini's diagnosis): the moment local state changes, mark
    // the indicator pending. The 2.5s debounce in schedulePush already does
    // this when it runs, but doing it here too closes the small gap where
    // the UI was still showing 'ok' between the state change and the
    // schedulePush callback firing. The green dot can never appear over an
    // unsaved edit, even for one render.
    if (isOnline) setStatus('pending');
    setState(prev => {
      const next = mutator(prev);
      return { ...next, lastModified: new Date().toISOString() };
    });
  };

  const addOrUpdate = (entry) => {
    // v5.19 Phase 1: capture before/after snapshots for the operation log.
    // We need `before` for edits so the deploy step can detect drift (the
    // server side row might have been edited by someone else in the
    // meantime; `before` lets us compare-and-set safely).
    const existingBefore = state.transactions.find(t => t.id === entry.id) || null;
    mutate(prev => {
      const idx = prev.transactions.findIndex(t => t.id === entry.id);
      if (idx >= 0) {
        // Preserve original createdBy on edit — never reassign ownership
        const existing = prev.transactions[idx];
        const merged = { ...entry, createdBy: existing.createdBy || entry.createdBy || appProfileId };
        const copy = [...prev.transactions]; copy[idx] = merged;
        return { ...prev, transactions: copy };
      }
      // New transaction → tag with current user as creator
      const tagged = { ...entry, createdBy: appProfileId };
      return { ...prev, transactions: [tagged, ...prev.transactions] };
    });
    // v5.19 Phase 1: also record this in the user's pending op log. Note we
    // do this AFTER mutate() so the Sentry/Toast UX feels identical to v5.18,
    // and we do it fire-and-forget — the op log is best-effort and not
    // user-blocking. If IDB is wedged we fall through to the regular
    // schedule-push path silently (Phase 2 will surface an error UI).
    if (existingBefore) {
      // Edit: snapshot the pre-state in `before` and post-state in `after`.
      const after = { ...entry, createdBy: existingBefore.createdBy || entry.createdBy || appProfileId };
      addPendingOp({ action: 'edit', before: existingBefore, after }).catch(() => {});
    } else {
      const after = { ...entry, createdBy: appProfileId };
      addPendingOp({ action: 'add', before: null, after }).catch(() => {});
    }
    pushToast(entry.type === 'income' ? 'บันทึกรายรับแล้ว' : 'บันทึกรายจ่ายแล้ว');
  };
  const removeTx = (id) => {
    // Clean up associated photos (both v1.4 array and v1.3 single)
    const tx = state.transactions.find(t => t.id === id);
    if (tx) {
      if (Array.isArray(tx.photos)) tx.photos.forEach(p => deletePhoto(p.id));
      else if (tx.photoId) deletePhoto(tx.photoId);
    }
    mutate(prev => ({ ...prev, transactions: prev.transactions.filter(t => t.id !== id) }));
    // v5.19 Phase 1: record the delete op. before = full row snapshot so the
    // deploy step can detect drift; after = null because there's nothing
    // left. If the user is deleting a tx they haven't deployed yet (i.e. it
    // currently has a pending add op of theirs), appendUserOp's merge logic
    // will simply DROP that pending add — net effect: nothing to deploy,
    // which is what the user wanted.
    if (tx) {
      addPendingOp({ action: 'delete', before: tx, after: null }).catch(() => {});
    }
    pushToast('ลบรายการแล้ว');
  };
  // Duplicate a transaction: copy all fields with new ID, current date/time, no photos
  const duplicateTx = (tx) => {
    if (!tx) return;
    // v5.7: "ทำซ้ำ" copies every field of the source transaction except:
    //   - id (must be unique)
    //   - photos (don't copy receipts/images — they belong to the original)
    //   - createdBy (the new entry is owned by whoever clicked Duplicate, so they
    //     can edit/delete it under the v5.0 permission system)
    // Date and createdAt are preserved verbatim — user can edit them in the sheet
    // afterwards if needed.
    //
    // v5.26: Bug fix. Previously duplicateTx only called mutate() and did NOT
    // record a pending 'add' op. Consequence: when the user opened the
    // duplicate to tweak it and pressed save, addOrUpdate found a row with
    // that id in local state and recorded an 'edit' op (because the row "already
    // existed"). On Deploy, the apply step looked for that id in the remote
    // vault, didn't find it (it was a brand-new local row that never made
    // it to OneDrive on its own), and marked the op 'cancelled' with reason
    // "รายการต้นฉบับถูกลบแล้ว". The user saw their 3 freshly-duplicated tx
    // entries silently lose their changes.
    //
    // Fix: record an 'add' op the moment we duplicate. If the user later
    // opens the row and edits it, the smart-merge in appendUserOp will
    // update the existing add op's `after` snapshot rather than appending a
    // separate edit op — so the Deploy ends up applying ONE add with the
    // final state, which is exactly what the user wants.
    const copy = {
      ...tx,
      id: uid(),
      photos: [],
      photoId: null, photoName: null,
      createdBy: appProfileId || tx.createdBy,
    };
    mutate(prev => ({ ...prev, transactions: [copy, ...prev.transactions] }));
    addPendingOp({ resource: 'tx', action: 'add', before: null, after: copy }).catch(() => {});
    pushToast('ทำซ้ำเป็นรายการใหม่');
  };

  // Bulk rename a master field value (item, accountName, or project)
  // across ALL transactions — used by the "manage" modal
  const renameMasterField = (field, oldName, newName) => {
    const oldTrim = (oldName || '').trim();
    const newTrim = (newName || '').trim();
    if (!oldTrim || !newTrim || oldTrim === newTrim) return 0;
    let count = 0;
    mutate(prev => {
      const updated = prev.transactions.map(t => {
        // match item (also legacy payee)
        if (field === 'item') {
          if ((t.item || t.payee || '').trim() === oldTrim) {
            count++;
            return { ...t, item: newTrim, payee: undefined };
          }
        } else if ((t[field] || '').trim() === oldTrim) {
          count++;
          return { ...t, [field]: newTrim };
        }
        return t;
      });
      return { ...prev, transactions: updated };
    });
    return count;
  };

  // Delete all transactions that use a given master field value
  // (also cleans up their photos)
  const deleteMasterField = (field, name) => {
    const target = (name || '').trim();
    if (!target) return 0;
    const matches = state.transactions.filter(t => {
      if (field === 'item') return (t.item || t.payee || '').trim() === target;
      return (t[field] || '').trim() === target;
    });
    // Clean photos
    matches.forEach(tx => {
      if (Array.isArray(tx.photos)) tx.photos.forEach(p => deletePhoto(p.id));
      else if (tx.photoId) deletePhoto(tx.photoId);
    });
    mutate(prev => {
      const kept = prev.transactions.filter(t => {
        if (field === 'item') return (t.item || t.payee || '').trim() !== target;
        return (t[field] || '').trim() !== target;
      });
      return { ...prev, transactions: kept };
    });
    return matches.length;
  };

  // ============ Items Master List Handlers ============
  // Add a new item to master list (ignores duplicates case-insensitively)
  const addMasterItem = (name) => {
    const n = (name || '').trim();
    if (!n) return false;
    const items = state.items || [];
    const exists = items.some(it => it.name.toLowerCase() === n.toLowerCase());
    if (exists) return false;
    // v5.24 Phase 5b: build the item once, use it for BOTH the local
    // mutate and the pending op record so the deploy step replays exactly
    // what the user sees in their UI right now.
    const newItem = { id: uid(), name: n, createdAt: new Date().toISOString() };
    mutate(prev => ({
      ...prev,
      items: [...(prev.items || []), newItem],
    }));
    addPendingOp({ resource: 'item', action: 'add', before: null, after: newItem }).catch(() => {});
    return true;
  };
  // Rename a master item — also updates all transactions referring to the old name
  const updateMasterItem = (id, newName) => {
    const n = (newName || '').trim();
    if (!n) return { ok: false, reason: 'empty' };
    const items = state.items || [];
    const target = items.find(it => it.id === id);
    if (!target) return { ok: false, reason: 'notfound' };
    if (target.name === n) return { ok: true, affectedTx: 0 };
    // Check duplicate (case-insensitive, excluding self)
    const dup = items.some(it => it.id !== id && it.name.toLowerCase() === n.toLowerCase());
    if (dup) return { ok: false, reason: 'duplicate' };
    // v5.24 Phase 5b: cascade rename on the local transactions for snappy
    // UI feedback, but ONLY record one pending op (the item rename itself).
    // The cascaded tx changes will get pulled down from the freshly-deployed
    // vault when other users' Deploy or our own auto-sync runs — we don't
    // want to record N tx edits as separate pending ops, which would bloat
    // the queue and confuse the user.
    const affected = renameMasterField('item', target.name, n);
    const updated = { ...target, name: n };
    mutate(prev => ({
      ...prev,
      items: (prev.items || []).map(it => it.id === id ? updated : it),
    }));
    addPendingOp({ resource: 'item', action: 'edit', before: target, after: updated }).catch(() => {});
    return { ok: true, affectedTx: affected };
  };
  // Remove from master list only; leaves existing transactions alone
  const removeMasterItem = (id) => {
    const target = (state.items || []).find(it => it.id === id);
    mutate(prev => ({ ...prev, items: (prev.items || []).filter(it => it.id !== id) }));
    if (target) {
      addPendingOp({ resource: 'item', action: 'delete', before: target, after: null }).catch(() => {});
    }
  };

  // ============ Accounts Master List Handlers ============
  const addMasterAccount = (name, decimals = 2, unitSymbol = '฿', unitPosition = 'before') => {
    const n = (name || '').trim();
    if (!n) return false;
    const accs = state.accounts || [];
    const exists = accs.some(a => (a.name || '').toLowerCase() === n.toLowerCase());
    if (exists) return false;
    const d = Math.max(0, Math.min(10, Number.isFinite(+decimals) ? +decimals : 2));
    // unitSymbol can be empty string ('') — keep as-is. Only fall back to '฿' when undefined/null.
    const sym = unitSymbol == null ? '฿' : String(unitSymbol);
    const pos = unitPosition === 'after' ? 'after' : 'before';
    // v5.15: When a non-admin creates an account, auto-grant them edit-own
    // permission AND record them as the creator. Admin always has implicit
    // access (the visibleAccounts filter short-circuits for admin role), so
    // we don't need to add admin to permissions explicitly. Recording the
    // creator id lets us enforce "only the creator can delete the account
    // they created" later (rule 1จ from the user's spec).
    const initialPerms = {};
    if (currentUser && currentUser.role !== 'admin') {
      initialPerms[currentUser.id] = 'edit-own';
    }
    // v5.24 Phase 5b: build the account once, use it for BOTH the local
    // mutate and the pending op record.
    const newAccount = {
      id: uid(), name: n, decimals: d,
      unitSymbol: sym, unitPosition: pos,
      permissions: initialPerms,
      createdBy: currentUser?.id || null,
      createdAt: new Date().toISOString(),
    };
    mutate(prev => ({
      ...prev,
      accounts: [...(prev.accounts || []), newAccount],
    }));
    addPendingOp({ resource: 'account', action: 'add', before: null, after: newAccount }).catch(() => {});
    return true;
  };
  const updateMasterAccount = (id, newName, newDecimals, newUnitSymbol, newUnitPosition) => {
    const n = (newName || '').trim();
    if (!n) return { ok: false, reason: 'empty' };
    const d = Math.max(0, Math.min(10, Number.isFinite(+newDecimals) ? +newDecimals : 2));
    const accs = state.accounts || [];
    const target = accs.find(a => a.id === id);
    if (!target) return { ok: false, reason: 'notfound' };
    const dup = accs.some(a => a.id !== id && (a.name || '').toLowerCase() === n.toLowerCase());
    if (dup) return { ok: false, reason: 'duplicate' };
    // Cascade rename transactions if name changed (local only; see comment
    // in updateMasterItem above for why we only record the master rename
    // as a pending op).
    let affected = 0;
    if (target.name !== n) {
      affected = renameMasterField('accountName', target.name, n);
    }
    // Resolve unit fields (preserve current value if caller doesn't pass them)
    const sym = newUnitSymbol === undefined
      ? (target.unitSymbol != null ? target.unitSymbol : '฿')
      : (newUnitSymbol == null ? '฿' : String(newUnitSymbol));
    const pos = newUnitPosition === undefined
      ? (target.unitPosition || guessUnitPosition(sym))
      : (newUnitPosition === 'after' ? 'after' : 'before');
    // v5.24 Phase 5b: snapshot before/after for the pending op. We keep the
    // existing permissions (this function doesn't touch them — that's
    // setAccountPerm's job).
    const updated = { ...target, name: n, decimals: d, unitSymbol: sym, unitPosition: pos };
    mutate(prev => ({
      ...prev,
      accounts: (prev.accounts || []).map(a =>
        a.id === id ? updated : a
      ),
    }));
    addPendingOp({ resource: 'account', action: 'edit', before: target, after: updated }).catch(() => {});
    return { ok: true, affectedTx: affected };
  };
  const removeMasterAccount = (id) => {
    // v5.15 (rule 1จ): non-admin can only delete accounts they themselves
    // created. Admin can always delete anything. We return a result object so
    // the caller can show a clear toast — silent failure would be confusing
    // when the delete button works for admins but not for members.
    const target = (state.accounts || []).find(a => a.id === id);
    if (!target) return { ok: false, reason: 'notfound' };
    if (currentUser && currentUser.role !== 'admin') {
      const isCreator = target.createdBy && target.createdBy === currentUser.id;
      if (!isCreator) return { ok: false, reason: 'not-creator' };
    }
    mutate(prev => ({ ...prev, accounts: (prev.accounts || []).filter(a => a.id !== id) }));
    addPendingOp({ resource: 'account', action: 'delete', before: target, after: null }).catch(() => {});
    return { ok: true };
  };
  // v5.0: set per-user permission on an account (admin only).
  // perm ∈ { 'none', 'view', 'edit-own' }
  const setAccountPerm = (accountId, userId, perm) => {
    if (!PERM_OPTS.some(p => p.id === perm)) return;
    // v5.24 Phase 5b: setAccountPerm modifies account.permissions — the rest
    // of the account stays the same. We record this as an account 'edit' op
    // with before/after snapshots so drift detection still works: if someone
    // else changed the account between when this admin saw it and when their
    // Deploy fires, the apply step will catch it.
    const target = (state.accounts || []).find(a => a.id === accountId);
    if (!target) return;
    const nextPerms = { ...(target.permissions || {}) };
    if (perm === 'none') delete nextPerms[userId];
    else nextPerms[userId] = perm;
    const updated = { ...target, permissions: nextPerms };
    mutate(prev => ({
      ...prev,
      accounts: (prev.accounts || []).map(a => a.id === accountId ? updated : a),
    }));
    addPendingOp({ resource: 'account', action: 'edit', before: target, after: updated }).catch(() => {});
  };

  // v5.0: user management (admin-only). All ops mutate state.users which syncs to OneDrive.
  const addUser = async (label, role = 'member', icon = '👤', pin = DEFAULT_PIN) => {
    const trimmed = (label || '').trim();
    if (!trimmed) return { ok: false, reason: 'empty' };
    const users = state.users || [];
    // v5.14: use crypto.randomUUID() for guaranteed uniqueness — the previous
    // approach of slugifying the label silently dropped non-ASCII characters
    // (Thai script), so every Thai name collapsed to "user" and got serialised
    // to "user-2", "user-3"… When the array order shifted (e.g. after a sync
    // race), those positional IDs could point to different humans than expected,
    // which is how a member could end up acting under an admin's id. UUIDs are
    // opaque, fixed, and never collide.
    let id;
    if (typeof crypto !== 'undefined' && crypto.randomUUID) {
      id = `u_${crypto.randomUUID().replace(/-/g, '').slice(0, 12)}`;
    } else {
      // Fallback for very old browsers without randomUUID — use timestamp+random.
      id = `u_${Date.now().toString(36)}${Math.random().toString(36).slice(2, 8)}`;
    }
    // Extra safety: in case of cosmic collision, retry with longer suffix
    while (users.some(u => u.id === id)) {
      id = `u_${crypto.randomUUID ? crypto.randomUUID().replace(/-/g, '') : Date.now().toString(36) + Math.random().toString(36).slice(2)}`;
    }
    const pinHash = await hashPin(pin);
    // v5.27 Phase 5c: build the user object once for both mutate and the
    // pending 'add' op. We include pinHash in the op snapshot so the deploy
    // step writes it to OneDrive (without it the user couldn't log in from
    // other devices). Drift-detection deliberately ignores pinHash, so a
    // concurrent PIN change on the same user won't mark our op retry-later.
    const newUser = { id, label: trimmed, icon,
                      role: role === 'admin' ? 'admin' : 'member', pinHash };
    mutate(prev => ({
      ...prev,
      users: [...(prev.users || []), newUser],
    }));
    addPendingOp({ resource: 'user', action: 'add', before: null, after: newUser }).catch(() => {});
    return { ok: true, id };
  };
  const updateUser = (id, patch) => {
    // v5.27 Phase 5c: route through Q. The caller may patch any subset of
    // {label, icon, role, pinHash}; we snapshot the full before/after so
    // drift detection works against the freshly-fetched vault during deploy.
    const target = (state.users || []).find(u => u.id === id);
    if (!target) return;
    const updated = { ...target, ...patch, id: target.id };
    mutate(prev => ({
      ...prev,
      users: (prev.users || []).map(u => u.id === id ? updated : u),
    }));
    addPendingOp({ resource: 'user', action: 'edit', before: target, after: updated }).catch(() => {});
  };
  const changeUserPin = async (id, newPin) => {
    if (!/^\d{4}$/.test(newPin)) return { ok: false, reason: 'format' };
    const pinHash = await hashPin(newPin);
    // updateUser already records an 'edit' pending op for us. Drift fields
    // for 'user' deliberately exclude pinHash, so a concurrent edit of
    // label/icon/role by another admin won't mark this op retry-later.
    updateUser(id, { pinHash });
    return { ok: true };
  };
  const removeUser = (id) => {
    // Cannot remove the only admin
    const users = state.users || [];
    const admins = users.filter(u => u.role === 'admin');
    const target = users.find(u => u.id === id);
    if (target?.role === 'admin' && admins.length <= 1) {
      return { ok: false, reason: 'last-admin' };
    }
    // v5.27 Phase 5c: record the user-delete op so it goes through Q. The
    // local cascade still happens (we strip the removed user's id from each
    // account's permissions map for snappy UI), but we only record the
    // user-delete op — the permission cleanup on each affected account is
    // implicit (the apply step deletes the user row; consumers of the
    // permissions map should already treat missing-user ids as no access).
    mutate(prev => ({
      ...prev,
      users: (prev.users || []).filter(u => u.id !== id),
      // Strip removed user from every account's permissions map
      accounts: (prev.accounts || []).map(a => {
        if (!a.permissions || !a.permissions[id]) return a;
        const next = { ...a.permissions };
        delete next[id];
        return { ...a, permissions: next };
      }),
    }));
    if (target) {
      addPendingOp({ resource: 'user', action: 'delete', before: target, after: null }).catch(() => {});
    }
    return { ok: true };
  };

  // ============ Projects Master List Handlers ============
  const addMasterProject = (name) => {
    const n = (name || '').trim();
    if (!n) return false;
    const projs = state.projects || [];
    const exists = projs.some(p => (p.name || '').toLowerCase() === n.toLowerCase());
    if (exists) return false;
    // v5.27 Phase 5c: route project mutations through the Q + Deploy system,
    // just like accounts and items in 5b. Same pattern: build once, mutate
    // local state, record an 'add' pending op for Deploy.
    const newProject = { id: uid(), name: n, createdAt: new Date().toISOString() };
    mutate(prev => ({
      ...prev,
      projects: [...(prev.projects || []), newProject],
    }));
    addPendingOp({ resource: 'project', action: 'add', before: null, after: newProject }).catch(() => {});
    return true;
  };
  const updateMasterProject = (id, newName) => {
    const n = (newName || '').trim();
    if (!n) return { ok: false, reason: 'empty' };
    const projs = state.projects || [];
    const target = projs.find(p => p.id === id);
    if (!target) return { ok: false, reason: 'notfound' };
    if (target.name === n) return { ok: true, affectedTx: 0 };
    const dup = projs.some(p => p.id !== id && (p.name || '').toLowerCase() === n.toLowerCase());
    if (dup) return { ok: false, reason: 'duplicate' };
    // Cascade rename in local tx (UI feedback only) — see updateMasterItem
    // for why we don't record per-tx edit ops on cascade rename.
    const affected = renameMasterField('project', target.name, n);
    const updated = { ...target, name: n };
    mutate(prev => ({
      ...prev,
      projects: (prev.projects || []).map(p => p.id === id ? updated : p),
    }));
    addPendingOp({ resource: 'project', action: 'edit', before: target, after: updated }).catch(() => {});
    return { ok: true, affectedTx: affected };
  };
  const removeMasterProject = (id) => {
    const target = (state.projects || []).find(p => p.id === id);
    mutate(prev => ({ ...prev, projects: (prev.projects || []).filter(p => p.id !== id) }));
    if (target) {
      addPendingOp({ resource: 'project', action: 'delete', before: target, after: null }).catch(() => {});
    }
  };

  // ============ Categories Master List Handlers ============
  // Categories are stored as { id, name, icon, type: 'income'|'expense' }.
  // id stays stable across renames. The id is used in tx.category for reference.
  // For backward compat with built-in ids ('food', 'salary', ...), editing a built-in
  // creates a custom entry with the SAME id that overrides it.
  const addMasterCategory = (name, icon, type) => {
    const n = (name || '').trim();
    if (!n) return false;
    const t = (type === 'income') ? 'income' : 'expense';
    const cats = state.categories || [];
    const exists = cats.some(c => c.type === t && (c.name || '').toLowerCase() === n.toLowerCase());
    if (exists) return false;
    // v5.27 Phase 5c
    const newCategory = {
      id: 'cat-' + uid(), name: n, icon: icon || '🏷️', type: t,
      createdAt: new Date().toISOString(),
    };
    mutate(prev => ({
      ...prev,
      categories: [...(prev.categories || []), newCategory],
    }));
    addPendingOp({ resource: 'category', action: 'add', before: null, after: newCategory }).catch(() => {});
    return true;
  };
  const updateMasterCategory = (id, newName, newIcon) => {
    const n = (newName || '').trim();
    if (!n) return { ok: false, reason: 'empty' };
    const cats = state.categories || [];
    const target = cats.find(c => c.id === id);
    if (!target) return { ok: false, reason: 'notfound' };
    const dup = cats.some(c => c.id !== id && c.type === target.type && (c.name || '').toLowerCase() === n.toLowerCase());
    if (dup) return { ok: false, reason: 'duplicate' };
    const updated = { ...target, name: n, icon: newIcon || target.icon };
    mutate(prev => ({
      ...prev,
      categories: (prev.categories || []).map(c => c.id === id ? updated : c),
    }));
    addPendingOp({ resource: 'category', action: 'edit', before: target, after: updated }).catch(() => {});
    return { ok: true, affectedTx: 0 };
  };
  // Deleting a category: clears the category field on matching transactions
  // (instead of deleting the transactions themselves), per user requirement.
  const removeMasterCategory = (id) => {
    // v5.27 Phase 5c: capture target BEFORE the mutate so the pending op
    // carries the full snapshot. The cascade that clears tx.category fields
    // is local-only — same rationale as item/account/project cascades.
    const target = (state.categories || []).find(c => c.id === id);
    let affected = 0;
    mutate(prev => {
      const kept = (prev.transactions || []).map(t => {
        if (t.category === id) { affected += 1; return { ...t, category: '' }; }
        return t;
      });
      return {
        ...prev,
        transactions: kept,
        categories: (prev.categories || []).filter(c => c.id !== id),
      };
    });
    if (target) {
      addPendingOp({ resource: 'category', action: 'delete', before: target, after: null }).catch(() => {});
    }
    return affected;
  };

  const doSignIn = async () => {
    setAuthLoading(true); setAuthError(null);
    try {
      const acc = await signIn();
      setAccount(acc);
    } catch (e) {
      console.error(e);
      // v5.12: Don't display popup-related errors — they're handled internally
      // (we always fall back to redirect). If we're here it's a genuine config
      // or network error worth showing.
      const msg = String(e?.errorCode || e?.message || e || '');
      if (!/popup|block_nested|user_cancelled/i.test(msg)) {
        setAuthError(msg);
      }
    } finally { setAuthLoading(false); }
  };
  // v5.12: Explicit redirect path. Used by the "ลองวิธีอื่น" link when popup
  // sign-in doesn't work for the user (e.g. opened from another app).
  const doSignInRedirect = async () => {
    setAuthLoading(true); setAuthError(null);
    try {
      await signInRedirect();
      // navigation happens — page unloads; no further code runs here
    } catch (e) {
      console.error(e);
      setAuthError(String(e?.errorCode || e?.message || e || ''));
      setAuthLoading(false);
    }
  };
  const doSignOut = async () => {
    try { await signOut(); } catch (e) { console.error(e); }
    setAccount(null);
    didPullRef.current = false;
    lockProfile(); // v4.0: also clear active profile so PIN is needed again next login
    pushToast('ออกจากระบบแล้ว');
  };

  // v4.0: Profile-based visibility filtering (replaces v3.7 shared flag).
  // v5.0: Filter accounts visible to the current user.
  // - Admin sees every account.
  // - Members see accounts where account.permissions[user.id] is 'view' or 'edit-own'.
  // Legacy schema migration is best-effort: 'shared:true' (v3.x) or visibility:'all'
  // (v4.x) → all members get 'view' access. visibility:'<userId>' (v4.x) →
  // that single user gets 'edit-own'. visibility:'owner' (v4.x default) → no member access.
  const visibleAccounts = useMemo(() => {
    if (!currentUser) return [];
    return (state.accounts || []).filter(a => {
      if (currentUser.role === 'admin') return true;
      // Backfill legacy schema on-the-fly for read; persisted by AccountsManager when edited.
      let perms = a.permissions;
      if (!perms) {
        perms = {};
        const allMembers = (state.users || []).filter(u => u.role !== 'admin').map(u => u.id);
        if (a.shared === true || a.visibility === 'all') {
          allMembers.forEach(id => { perms[id] = 'view'; });
        } else if (a.visibility && a.visibility !== 'owner') {
          // legacy v4 single-user visibility → that user gets edit-own
          perms[a.visibility] = 'edit-own';
        }
      }
      return (perms[currentUser.id] || 'none') !== 'none';
    });
  }, [state.accounts, state.users, currentUser]);

  const visibleAccountNames = useMemo(
    () => new Set(visibleAccounts.map(a => (a.name || '').trim())),
    [visibleAccounts]
  );

  const accountList = useMemo(() => {
    const set = new Set();
    state.transactions.forEach(t => {
      const k = (t.accountName || '').trim();
      if (!k) return;
      if (!isAdmin && !visibleAccountNames.has(k)) return;
      set.add(k);
    });
    visibleAccounts.forEach(a => { if (a.name) set.add(a.name); });

  // visibleState: filtered view that downstream components consume.

  //begin
 const totals = monthTx.reduce((a, t) => {

  totals.bal = totals.inc - totals.exp;

//begin
// คำนวณยอดรวมทั้งหมด (B) โดยให้กรองตามบัญชีที่เลือกด้วย
  const grandTotals = txSource.reduce((a, t) => {

    if (selectedAccount !== 'all' && (t.accountName || '').trim() !== selectedAccount) {

    if (t.type === 'income') a.inc += amt; else a.exp += amt;
    return a;

  // end

  return (
    <>
      <main>

        {/* v5.19 Phase 1: Pending operations banner. Renders above the main

            Phase 2/3. For now it just shows a toast explaining that. */}
        {/* v5.20 Phase 2: Banner now reflects the deploy lock state machine.
            - idle  + has pending ops  → show Deploy button (wired up)
            - waiting                  → show queue position + Cancel button
            - editing                  → show "กำลัง deploy..." (no buttons)
            - releasing                → show "เสร็จสิ้น..."
            - error                    → show error message + dismiss button
            
            For Phase 2 the Deploy button just goes through the lock cycle
            (acquire → editing → release) without applying anything. Phase 3

        {(pendingOps.length > 0 || deploy.phase !== 'idle') && (
          <div style={{
            margin: '0 14px 10px',
            padding: '10px 14px',
            borderRadius: 12,
            background:
              deploy.phase === 'editing'  ? 'rgba(34,197,94,0.12)' :

              deploy.phase === 'error'    ? 'rgba(239,68,68,0.12)' :
              'var(--sync-warn-bg, rgba(251,191,36,0.12))',
            border:
              '1px solid ' + (
                deploy.phase === 'editing' ? 'rgba(34,197,94,0.5)' :
                deploy.phase === 'waiting' ? 'rgba(59,130,246,0.5)' :
                deploy.phase === 'error'   ? 'rgba(239,68,68,0.5)' :
                'var(--sync-warn, #fbbf24)'
              ),
            display: 'flex', alignItems: 'center', gap: 10,
            fontSize: 13,
          }}>
            {deploy.phase === 'idle' && (
              <>
                <span style={{fontSize: 18}}>🟡</span>
                <span style={{flex: 1, color: 'var(--text)'}}>
                  <b>{pendingOps.length} รายการ</b> รอ deploy
                </span>
                <button
                  onClick={() => setShowManagePending(true)}
                  style={{
                    padding: '6px 12px', fontSize: 12, fontWeight: 600,
                    background: 'transparent',
                    border: '1px solid var(--line-strong, var(--line))',
                    borderRadius: 8, cursor: 'pointer',
                    color: 'var(--text)',
                  }}>
                  จัดการ
                </button>
                <button
                  onClick={async () => {
                    // v5.21 Phase 3: real apply logic now lives here.
                    // We snapshot pendingOps at the moment Deploy is pressed
                    // so any ops the user adds AFTER pressing Deploy stay
                    // pending for the next round (rather than getting
                    // swept up halfway through the apply).
                    const opsSnapshot = pendingOps.slice();
                    if (opsSnapshot.length === 0) {
                      pushToast('ไม่มีรายการรอ deploy');
                      return;
                    }
                    let applyOutcome = null;
                    const result = await deploy.startDeploy(async () => {
                      // INSIDE THE LOCK: replay the snapshot against the
                      // freshest my-money.json from OneDrive, then commit
                      // the results into the user's history bucket.
                      applyOutcome = await applyOpsToVault(opsSnapshot);
                      if (currentUser?.id) {
                        await commitDeployResults(currentUser.id, applyOutcome.results);
                        // Refresh the React-side mirror of userx.json so the
                        // banner / badges re-render correctly.
                        await reloadUserOps();
                      }
                      // v5.30: MANDATORY post-deploy state refresh — the
                      // user explicitly asked for this: after a successful
                      // deploy the local state MUST match what was just
                      // uploaded to OneDrive, no exceptions. Previously we
                      // had a try-catch that swallowed network errors silently
                      // and left the UI showing stale local state — confusing
                      // because the user just clicked Deploy and "nothing
                      // changed visually".
                      //
                      // Two-layer approach:
                      // 1. PRIMARY: setState with applyOutcome.finalState.
                      //    This is the exact object we just uploaded; it's
                      //    guaranteed to match OneDrive (we wrote it there
                      //    in remoteSave(vault) inside applyOpsToVault).
                      //    No network dependency — this layer always works.
                      // 2. VERIFY: pull again to double-check. If the pull
                      //    succeeds we overwrite once more with the server
                      //    copy (handles the extremely rare case where
                      //    something else wrote to my-money.json between
                      //    our upload and this fetch — impossible while we
                      //    hold the Q.json lock, but belt-and-suspenders).
                      //    If pull fails, the PRIMARY setState above already
                      //    gave us the right state, so a warning is enough.
                      if (applyOutcome.finalState) {
                        setState(applyOutcome.finalState);
                      }
                      try {
                        const fresh = await remoteFetch();
                        if (fresh) setState(fresh);
                      } catch (e) {
                        console.warn('post-deploy verify pull failed:', e);
                        pushToast('โหลด vault ใหม่ไม่สำเร็จ (ใช้ state ที่เพิ่ง deploy)');
                      }
                      return applyOutcome;
                    });
                    if (result?.ok && applyOutcome) {
                      // Show the per-op summary modal.
                      setDeployResult(applyOutcome);
                    } else if (result?.reason && result.reason !== 'busy') {
                      pushToast('Deploy ล้มเหลว: ' + result.reason);
                    }
                  }}

          </div>

        {tab === 'home' && homeView === 'overview' && (
          <AccountsOverviewView

        {tab === 'list' && (

            onTap={setActionTx}

            onManageAccounts={() => setShowAccountsManager(true)}

        {tab === 'chart' && (

        {tab === 'settings' && (

            userHistoryCount={(userOpsDoc.history || []).length}
          />
        )}
      </main>

      <TabBar tab={tab} setTab={setTab} onAdd={() => setShowAdd(true)} />

      {(showAdd || editing) && (() => {
        // v5.15 (rule 1ข): for non-admin members, the item dropdown should

        // i.e. items used in transactions on accounts they have permission

        // entry (there's no enforcement preventing that, and it would be
