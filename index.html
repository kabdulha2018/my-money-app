      const ts = new Date().toISOString().slice(0,10);
      const filename = `my-money-installer-${ts}.html`;
      const uploadRes = await fetch(
        `https://graph.microsoft.com/v1.0/me/drive/special/approot:/installer/${filename}:/content`,
        {
          method: 'PUT',
          headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'text/html' },
          body: html,
        }
      );
      if (!uploadRes.ok) throw new Error(`HTTP ${uploadRes.status}`);
      // Also save a readme.txt in the same folder
      const readme = `my money - คู่มือติดตั้ง
อัปเดตล่าสุด: ${new Date().toLocaleString('th-TH')}

วิธีติดตั้งบนมือถือเครื่องใหม่:

ข้อมูลอยู่บน OneDrive ทั้งหมด ไม่มีทางหาย
เปิดเครื่องใหม่ → ไป URL เดิม → Sign in → ได้ข้อมูลกลับทันที

ใช้กับคนในครอบครัว:

- ใช้ร่วมกัน: Sign in ด้วยบัญชีเดียวกันทุกเครื่อง (ข้อมูลชุดเดียวกัน)

ไฟล์ในโฟลเดอร์นี้:
- ${filename} = ไฟล์ HTML สำหรับติดตั้งเองบน web hosting
- readme.txt = คู่มือนี้
- ../my-money.json = ข้อมูลหลักของแอป (อย่าแก้ไข)
`;
      await fetch(
        `https://graph.microsoft.com/v1.0/me/drive/special/approot:/installer/readme.txt:/content`,
        {
          method: 'PUT',
          headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'text/plain' },

        }
      );
      const now = new Date().toISOString();
      try { localStorage.setItem('mymoney:installerUploadedAt', now); } catch {}

      pushToast('บันทึกลง OneDrive/installer/ สำเร็จ');
    } catch (e) {

  const exportJSON = () => {
    // v5.4: export ทุก field ของ schema (เคยมีบั๊ก: เก่า export แค่ transactions
    // → ทำให้ import กลับมา accounts/items/users/etc หาย)
    // Note: users[].pinHash อาจถูก export ด้วย — ผู้ใช้ admin ที่ดาวน์โหลดไฟล์จะเห็น
    // แต่ pinHash เป็น SHA-256 reverse ไม่ได้ ปลอดภัยพอ
    const data = {
      app: 'my-money',
      version: 2,
      exportedAt: new Date().toISOString(),
      lastModified: state.lastModified,
      transactions: state.transactions || [],

      accounts:     state.accounts || [],

          transactions: d.transactions,

          categories:   d.categories || [],

// ============ Shared UI ============
function MonthSelector({ value, onChange }) {
  const prev = () => { const d = new Date(value.y, value.m - 1, 1); onChange({ y: d.getFullYear(), m: d.getMonth() }); };
  const next = () => { const d = new Date(value.y, value.m + 1, 1); onChange({ y: d.getFullYear(), m: d.getMonth() }); };
  const now = new Date();
  const isNow = now.getFullYear() === value.y && now.getMonth() === value.m;
  const today = () => onChange({ y: now.getFullYear(), m: now.getMonth() });
  return (
    <div className="month-sel">
      <button className="nav-btn" onClick={prev}><Ic.ChevL size={16}/></button>
      <div className="label">
        <div className="m">{THAI_MONTHS_FULL[value.m]}</div>
        <div className="y">พ.ศ. {toBuddhistYear(value.y)}</div>
      </div>
      <button className="nav-btn" onClick={next}><Ic.ChevR size={16}/></button>
      {!isNow && <button className="today-btn" onClick={today}>วันนี้</button>}
    </div>
  );
}

function TxRow({ t, onClick, delay = 0, accounts, customCats }) {
  const cat = getCat(t.type, t.category, customCats);
  const isIn = t.type === 'income';
  const timeStr = timeFromIso(t.createdAt);
  // v1.4 item replaces payee (backward compat)
  const itemOrPayee = (t.item || t.payee || '').trim();
  // Build the main title: prefer item/payee, else note, else category label if any, else "รายการ"
  const title = itemOrPayee || t.note?.trim() || (t.category ? cat.label : 'รายการ');
  const subParts = [];
  if (t.category) subParts.push(cat.label);
  if (t.project) subParts.push('📁 ' + t.project);
  if (t.accountName) subParts.push(t.accountName);
  const subText = subParts.join(' · ');
  const photoCount = Array.isArray(t.photos) ? t.photos.length : (t.photoId ? 1 : 0);
  // Build short DD/MM date for the badge
  const d = t.date ? new Date(t.date + 'T00:00:00') : null;
  const dd = d ? String(d.getDate()).padStart(2, '0') : '--';
  const mm = d ? String(d.getMonth() + 1).padStart(2, '0') : '--';
  return (
    <button className="tx-row rise" style={{animationDelay: `${delay}ms`}} onClick={onClick}>
      <div className="date-badge">
        <div className="dd">{dd}/{mm}</div>
        <div className="tt">{timeStr || '--:--:--'}</div>
      </div>
      <div className="mid">
        <div className="title-ln">
          {title}
          {photoCount > 0 && (
            <span style={{marginLeft: 6, fontSize: 11, color: 'var(--gold)', verticalAlign: 'middle'}}>
              📷{photoCount > 1 ? ` ${photoCount}` : ''}
            </span>
          )}
        </div>
        {subText && <div className="sub-ln">{subText}</div>}
      </div>
      <div className={`amt ${isIn ? 'in' : 'out'}`}>
        {isIn ? '+' : '−'}฿{fmtMoney(t.amount, getAccountDecimals(t.accountName, accounts))}
      </div>
    </button>
  );
}

// ============ Master Field Manager (Item / Account editor) ============
function MasterFieldManager({ mode, allTx, onClose, onRename, onDelete, onSelect, pushToast }) {
  const title = mode === 'item' ? 'จัดการชื่อรายการ' : 'จัดการบัญชี';
  const label = mode === 'item' ? 'ชื่อรายการ' : 'บัญชี';
  const icon  = mode === 'item' ? '🏪' : '🏦';

  // Build list {name, count}
  const list = useMemo(() => {
    const legacy = { cash: 'เงินสด', bank: 'ธนาคาร', credit: 'บัตรเครดิต', ewallet: 'e-Wallet' };
    const m = new Map();
    (allTx || []).forEach(t => {
      let k;
      if (mode === 'item') k = (t.item || t.payee || '').trim();
      else { k = (t.accountName || '').trim(); if (legacy[k]) k = legacy[k]; }
      if (k) m.set(k, (m.get(k) || 0) + 1);
    });
    return Array.from(m.entries())
      .map(([name, count]) => ({ name, count }))
      .sort((a, b) => b.count - a.count);
  }, [allTx, mode]);

  const [query, setQuery] = useState('');
  const [editingName, setEditingName] = useState(null); // original name being edited
  const [editValue, setEditValue] = useState('');
  const [confirmDelete, setConfirmDelete] = useState(null); // name pending delete
  const [showAdd, setShowAdd] = useState(false);
  const [newName, setNewName] = useState('');

  const filtered = useMemo(() => {
    const q = query.trim().toLowerCase();
    if (!q) return list;
    return list.filter(e => e.name.toLowerCase().includes(q));
  }, [list, query]);

  const startEdit = (name) => { setEditingName(name); setEditValue(name); setConfirmDelete(null); };
  const cancelEdit = () => { setEditingName(null); setEditValue(''); };
  const saveEdit = () => {
    const oldN = editingName;
    const newN = editValue.trim();
    if (!newN) return;
    if (oldN === newN) { cancelEdit(); return; }
    // Reject case-insensitive duplicate unless same
    const dup = list.find(e => e.name.toLowerCase() === newN.toLowerCase() && e.name !== oldN);
    if (dup) { pushToast?.(`ซ้ำกับ "${dup.name}" ที่มีอยู่แล้ว`); return; }
    const n = onRename(mode, oldN, newN);
    pushToast?.(`แก้ชื่อแล้ว (${n} รายการ)`);
    cancelEdit();
  };

  const doDelete = (name) => {
    const n = onDelete(mode, name);
    pushToast?.(`ลบ "${name}" แล้ว (${n} รายการ)`);
    setConfirmDelete(null);
  };

  const addNew = () => {
    const n = newName.trim();
    if (!n) return;
    const dup = list.find(e => e.name.toLowerCase() === n.toLowerCase());
    if (dup) { pushToast?.(`"${dup.name}" มีอยู่แล้ว`); return; }
    // "Add" just means: select this value so when user saves the tx, it's included
    onSelect?.(n);
    pushToast?.(`เพิ่ม "${n}" พร้อมใช้งาน`);
    setNewName('');
    setShowAdd(false);
    onClose();
  };

  return (
    <div className="manager-backdrop fade" onClick={onClose}>
      <div className="manager-modal sheet-in" onClick={e => e.stopPropagation()}>
        <div className="manager-head">
          <div>
            <div className="manager-title">{icon} {title}</div>
            <div className="manager-sub">{list.length} รายการ · แตะเพื่อใช้</div>
          </div>
          <button className="icon-btn-round" onClick={onClose}><Ic.X size={16}/></button>
        </div>

        <div className="manager-search">
          <input type="text" value={query} onChange={e => setQuery(e.target.value)}
                 placeholder={`ค้นหา${label}...`}/>
          <button className="manager-add-btn" onClick={() => setShowAdd(v => !v)}>
            <Ic.Plus size={14}/> เพิ่มใหม่
          </button>
        </div>

        {showAdd && (
          <div className="manager-add-row fade">
            <input type="text" value={newName}
                   onChange={e => setNewName(e.target.value)}
                   placeholder={`ชื่อ${label}ใหม่`}
                   autoFocus
                   onKeyDown={e => { if (e.key === 'Enter') addNew(); }}/>
            <button onClick={addNew} disabled={!newName.trim()}>เพิ่ม</button>
          </div>
        )}

        <div className="manager-list">
          {filtered.length === 0 && (
            <div className="manager-empty">
              {query ? 'ไม่พบรายการที่ค้นหา' : `ยังไม่มี${label} — กด "เพิ่มใหม่" เพื่อเริ่ม`}
            </div>
          )}
          {filtered.map(e => {
            const isEdit = editingName === e.name;
            const isConfirm = confirmDelete === e.name;
            return (
              <div key={e.name} className="manager-item">
                {isEdit ? (
                  <div className="manager-edit">
                    <input type="text" value={editValue}
                           onChange={ev => setEditValue(ev.target.value)}
                           autoFocus
                           onKeyDown={ev => {
                             if (ev.key === 'Enter') saveEdit();
                             else if (ev.key === 'Escape') cancelEdit();
                           }}/>
                    <button className="mgr-mini ok" onClick={saveEdit} disabled={!editValue.trim()}>
                      <Ic.Check size={14}/>
                    </button>
                    <button className="mgr-mini" onClick={cancelEdit}>
                      <Ic.X size={14}/>
                    </button>
                  </div>
                ) : isConfirm ? (
                  <div className="manager-confirm">
                    <div className="mgr-warn">
                      ลบ "{e.name}" พร้อมรายการ {e.count} อัน?
                    </div>
                    <button className="mgr-mini" onClick={() => setConfirmDelete(null)}>
                      ยกเลิก
                    </button>
                    <button className="mgr-mini danger" onClick={() => doDelete(e.name)}>
                      ลบ
                    </button>
                  </div>
                ) : (
                  <>
                    <button className="manager-pick" onClick={() => { onSelect?.(e.name); onClose(); }}>
                      <span className="mgr-name">{e.name}</span>
                      <span className="mgr-count">{e.count}×</span>
                    </button>
                    <button className="mgr-mini" onClick={() => startEdit(e.name)}
                            title="แก้ไข">
                      <Ic.Pencil size={14}/>
                    </button>
                    <button className="mgr-mini danger" onClick={() => setConfirmDelete(e.name)}
                            title="ลบ">
                      <Ic.Trash size={13}/>
                    </button>
                  </>
                )}
              </div>
            );
          })}
        </div>

        <div className="manager-foot">
          <div className="manager-hint">
            💡 การแก้ชื่อจะอัปเดตทุกรายการที่ใช้ชื่อนี้อยู่<br/>
            ⚠️ การลบจะลบรายการทั้งหมดที่ใช้ชื่อนี้ด้วย
          </div>
        </div>
      </div>
    </div>
  );
}

function TxSheet({ initial, onClose, onSave, onDelete, account, skipSync, pushToast, allTx, masterItems, masterAccounts, masterProjects, masterCategories, onOpenItemsManager, onRenameMaster, onDeleteMaster }) {
  const [type, setType] = useState(initial?.type || 'expense');
  const [amount, setAmount] = useState(initial?.amount ? String(initial.amount) : '');
  // Category is OPTIONAL. Existing tx keep whatever they had, including empty/null.
  const [category, setCategory] = useState(initial?.category ?? '');
  const [accountName, setAccountName] = useState(() => {
    if (initial?.accountName) {
      // Migrate legacy preset IDs to human labels
      const legacy = { cash: 'เงินสด', bank: 'ธนาคาร', credit: 'บัตรเครดิต', ewallet: 'e-Wallet' };
      return legacy[initial.accountName] || initial.accountName;
    }
    return '';
  });
  const [project, setProject] = useState(initial?.project || '');  // stored as project name string
  const [item, setItem] = useState(initial?.item || initial?.payee || '');
  const [date, setDate] = useState(initial?.date || todayISO());
  const [time, setTime] = useState(() => {
    return initial ? (timeFromIso(initial.createdAt) || nowTime()) : nowTime();
  });
  const [note, setNote] = useState(initial?.note || '');
  // photos: array of {id, name} - up to 5
  const [photos, setPhotos] = useState(() => {
    if (initial?.photos && Array.isArray(initial.photos)) return initial.photos;
    // Migrate from v1.3 single photo
    if (initial?.photoId) return [{ id: initial.photoId, name: initial.photoName || 'photo' }];
    return [];
  });
  const [photoUrls, setPhotoUrls] = useState({}); // { photoId: blobUrl }
  const [uploadingPhoto, setUploadingPhoto] = useState(false);
  const [viewerIdx, setViewerIdx] = useState(-1);

  // UI state
  const [catOpen, setCatOpen] = useState(false);
  const [showNewProject, setShowNewProject] = useState(false);
  const [newProjectName, setNewProjectName] = useState('');
  const [accountFocused, setAccountFocused] = useState(false);
  const [itemFocused, setItemFocused] = useState(false);
  const [noteFocused, setNoteFocused] = useState(false);
  const [attemptedSave, setAttemptedSave] = useState(false);

  const photoInputRef = useRef(null);
  const isOnline = !!account && !skipSync;

  // When switching income/expense, clear category if it belongs to the other type.
  // An empty category (ไม่ระบุ) is always valid — no auto-defaulting.
  useEffect(() => {
    if (!category) return;
    const list = getCatList(type, masterCategories);
    if (!list.find(c => c.id === category)) setCategory('');
  }, [type, masterCategories]);

  // Load existing photos
  useEffect(() => {
    photos.forEach(p => {
      if (!photoUrls[p.id] && isOnline) {
        fetchPhotoUrl(p.id)
          .then(url => setPhotoUrls(prev => ({ ...prev, [p.id]: url })))
          .catch(e => console.error('load photo', e));
      }
    });
    return () => {
      Object.values(photoUrls).forEach(u => { try { URL.revokeObjectURL(u); } catch {} });
    };
  // eslint-disable-next-line
  }, []);

  const cats = getCatList(type, masterCategories);
  const currentCat = getCat(type, category, masterCategories);

  // --- Derive project list & item list & note list from all existing tx ---
  const projectList = useMemo(() => {
    const set = new Set();
    (allTx || []).forEach(t => { if (t.project?.trim()) set.add(t.project.trim()); });
    (masterProjects || []).forEach(p => { if (p.name?.trim()) set.add(p.name.trim()); });
    return Array.from(set).sort();
  }, [allTx, masterProjects]);
  // Item frequency map for autocomplete ranking — includes master list + tx-derived
  const itemMap = useMemo(() => {
    const m = new Map();
    (allTx || []).forEach(t => {
      const k = (t.item || t.payee || '').trim();
      if (k) m.set(k, (m.get(k) || 0) + 1);
    });
    // Add master-list items with count 0 so they appear as suggestions
    (masterItems || []).forEach(it => {
      const k = (it.name || '').trim();
      if (k && !Array.from(m.keys()).some(key => key.toLowerCase() === k.toLowerCase())) {
        m.set(k, 0);
      }
    });
    return m;
  }, [allTx, masterItems]);
  // Account frequency map (with legacy migration)
  const accountMap = useMemo(() => {
    const m = new Map();
    const legacy = { cash: 'เงินสด', bank: 'ธนาคาร', credit: 'บัตรเครดิต', ewallet: 'e-Wallet' };
    (allTx || []).forEach(t => {
      let k = (t.accountName || '').trim();
      if (!k) return;
      if (legacy[k]) k = legacy[k];
      m.set(k, (m.get(k) || 0) + 1);
    });
    // Also include master-list accounts (even with 0 transactions)
    (masterAccounts || []).forEach(a => {
      const k = (a.name || '').trim();
      if (k && !Array.from(m.keys()).some(key => key.toLowerCase() === k.toLowerCase())) {
        m.set(k, 0);
      }
    });
    return m;
  }, [allTx, masterAccounts]);
  // Note map
  const noteMap = useMemo(() => {
    const m = new Map();
    (allTx || []).forEach(t => {
      const k = (t.note || '').trim();
      if (k) m.set(k, (m.get(k) || 0) + 1);
    });
    return m;
  }, [allTx]);

  // Autocomplete matches for account
  const accountMatches = useMemo(() => {
    const q = accountName.trim().toLowerCase();
    const entries = Array.from(accountMap.entries()).map(([label, count]) => ({ label, count }));
    if (!q) return entries.sort((a, b) => b.count - a.count).slice(0, 8);
    return entries
      .filter(e => e.label.toLowerCase().includes(q))
      .sort((a, b) => b.count - a.count)
      .slice(0, 8);
  }, [accountName, accountMap]);
  const accountExactExists = useMemo(() => {
    const q = accountName.trim().toLowerCase();
    if (!q) return false;
    return Array.from(accountMap.keys()).some(k => k.toLowerCase() === q);
  }, [accountName, accountMap]);

  // Autocomplete matches for item (substring, case-insensitive)
  const itemMatches = useMemo(() => {
    const q = item.trim().toLowerCase();
    const entries = Array.from(itemMap.entries())
      .map(([label, count]) => ({ label, count }));
    if (!q) return entries.sort((a, b) => b.count - a.count).slice(0, 6);
    return entries
      .filter(e => e.label.toLowerCase().includes(q))
      .sort((a, b) => b.count - a.count)
      .slice(0, 6);
  }, [item, itemMap]);
  const itemExactExists = useMemo(() => {
    const q = item.trim().toLowerCase();
    if (!q) return false;
    return Array.from(itemMap.keys()).some(k => k.toLowerCase() === q);
  }, [item, itemMap]);

  const noteMatches = useMemo(() => {
    const q = note.trim().toLowerCase();
    if (!q) return [];
    return Array.from(noteMap.entries())
      .filter(([label]) => label.toLowerCase().includes(q) && label.toLowerCase() !== q)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 5)
      .map(([label, count]) => ({ label, count }));
  }, [note, noteMap]);

  // --- Validation ---
  const itemTrimmed = item.trim();
  const accountTrimmed = accountName.trim();
  const itemMissing = !itemTrimmed;
  const accountMissing = !accountTrimmed;
  const canSave = parseFloat(amount) > 0 && !itemMissing && !accountMissing;

  // --- Photo handlers ---
  const onPhotoPick = async (e) => {
    const file = e.target.files?.[0];
    e.target.value = '';
    if (!file) return;
    if (!isOnline) { pushToast?.('ต้องเข้าสู่ระบบก่อน'); return; }
    if (!file.type.startsWith('image/')) { pushToast?.('ไฟล์ต้องเป็นรูปภาพ'); return; }
    if (photos.length >= 5) { pushToast?.('รูปได้สูงสุด 5 รูปต่อรายการ'); return; }
    setUploadingPhoto(true);
    try {
      const txId = initial?.id || uid();
      const result = await uploadPhoto(file, txId);
      const localUrl = URL.createObjectURL(file);
      setPhotos(prev => [...prev, { id: result.id, name: result.name }]);
      setPhotoUrls(prev => ({ ...prev, [result.id]: localUrl }));
      pushToast?.('อัปโหลดรูปแล้ว');
    } catch (err) {
      console.error(err);
      pushToast?.('อัปโหลดรูปไม่สำเร็จ');
    } finally {
      setUploadingPhoto(false);
    }
  };

  const removePhotoAt = (idx) => {
    const p = photos[idx];
    if (!p) return;
    deletePhoto(p.id); // from both OneDrive + IDB
    if (photoUrls[p.id]) { try { URL.revokeObjectURL(photoUrls[p.id]); } catch {} }
    setPhotos(prev => prev.filter((_, i) => i !== idx));
    setPhotoUrls(prev => { const n = {...prev}; delete n[p.id]; return n; });
    pushToast?.('ลบรูปแล้ว');
  };

  // --- Project add ---
  const addNewProject = () => {
    const name = newProjectName.trim();
    if (!name) return;
    // Check duplicate (case-insensitive)
    const existing = projectList.find(p => p.toLowerCase() === name.toLowerCase());
    if (existing) {
      setProject(existing);
      setNewProjectName('');
      setShowNewProject(false);
      pushToast?.('ใช้โครงการที่มีอยู่แล้ว');
      return;
    }
    setProject(name);
    setNewProjectName('');
    setShowNewProject(false);
  };

  const save = () => {
    setAttemptedSave(true);
    if (!canSave) {
      if (accountMissing) pushToast?.('กรุณากรอก "บัญชี/กระเป๋า"');
      else if (itemMissing) pushToast?.('กรุณากรอก "ชื่อรายการ"');
      else if (!(parseFloat(amount) > 0)) pushToast?.('กรุณากรอกจำนวนเงิน');
      return;
    }
    // Normalize item (prevent case-insensitive duplicates in suggestions)
    let finalItem = itemTrimmed;
    const existingItem = Array.from(itemMap.keys()).find(k => k.toLowerCase() === finalItem.toLowerCase());
    if (existingItem) finalItem = existingItem;
    // Normalize account name too
    let finalAccount = accountTrimmed;
    const existingAcc = Array.from(accountMap.keys()).find(k => k.toLowerCase() === finalAccount.toLowerCase());
    if (existingAcc) finalAccount = existingAcc;

    onSave({
      id: initial?.id || uid(),
      type, category,
      accountName: finalAccount,
      project: project.trim(),
      item: finalItem,
      date,
      note: note.trim(),
      amount: parseFloat(parseFloat(amount).toFixed(currentDecimals)),
      createdAt: combineDateTime(date, time),
      photos,
      // keep backward-compat field null to remove old v1.3 single photo
      photoId: null, photoName: null,
    });
  };

  // Current account's decimals (affects amount precision + display)
  const currentDecimals = getAccountDecimals(accountName.trim(), masterAccounts || []);

  const handleAmount = (e) => {
    let v = e.target.value.replace(/[^\d.]/g, '');
    const parts = v.split('.');
    if (parts.length > 2) v = parts[0] + '.' + parts.slice(1).join('');
    // Truncate decimal places to the account's allowed precision
    const dotIdx = v.indexOf('.');
    if (dotIdx >= 0 && v.length - dotIdx - 1 > currentDecimals) {
      v = v.slice(0, dotIdx + 1 + currentDecimals);
    }
    setAmount(v);
  };

  const openFilePicker = (useCamera) => {
    if (photoInputRef.current) {
      if (useCamera) photoInputRef.current.setAttribute('capture', 'environment');
      else photoInputRef.current.removeAttribute('capture');
      photoInputRef.current.click();
    }
  };

  // Highlight matched substring helper
  const highlight = (text, query) => {
    if (!query) return text;
    const idx = text.toLowerCase().indexOf(query.toLowerCase());
    if (idx < 0) return text;
    return <>{text.slice(0, idx)}<span className="match">{text.slice(idx, idx + query.length)}</span>{text.slice(idx + query.length)}</>;
  };

  return (
    <div className="sheet-backdrop fade" onClick={onClose}>
      <div className="sheet-wrap sheet-in" onClick={e => e.stopPropagation()}>
        <div className="sheet">
          <div className="sheet-handle"></div>
          <div className="sheet-head">
            <h2>{initial?.id ? 'แก้ไขรายการ' : 'เพิ่มรายการใหม่'}</h2>
            <button className="icon-btn-round" onClick={onClose}><Ic.X size={16}/></button>
          </div>

          <div className="type-toggle">
            <div className="indicator" style={{
              left: type === 'income' ? '4px' : 'calc(50% + 0px)',
              background: type === 'income' ? 'rgba(139,179,139,0.15)' : 'rgba(184,88,66,0.15)',
              border: `1px solid ${type === 'income' ? 'var(--income)' : 'var(--expense)'}`,
            }}/>
            <button onClick={() => setType('income')} style={{color: type === 'income' ? 'var(--income-soft)' : 'var(--text-dim)'}}>
              <Ic.ArrowIn size={14}/> รายรับ
            </button>
            <button onClick={() => setType('expense')} style={{color: type === 'expense' ? 'var(--expense-soft)' : 'var(--text-dim)'}}>
              <Ic.ArrowOut size={14}/> รายจ่าย
            </button>
          </div>

          <div className="amount-box">
            <div className="lbl">
              จำนวนเงิน
              {currentDecimals > 2 && accountName.trim() && (

                    onMouseDown={(e) => { e.preventDefault(); setAccountFocused(false); }}>

                <button type="button" onClick={addNewProject}

          {/* Date + Time */}

            <label className="form-row">

              <button type="button" className="now-btn" onClick={() => setTime(nowTime())}>
                ตอนนี้

            {/* Item - required, with autocomplete + manager */}
            <div className="autocomplete-wrap">
              <label className={`form-row ${attemptedSave && itemMissing ? 'has-error' : ''}`}>
                <span className="lbl">ชื่อรายการ<span className="req">*</span></span>
                <input type="text" value={item}
                       onChange={e => setItem(e.target.value)}
                       onFocus={() => setItemFocused(true)}
                       onBlur={() => setTimeout(() => setItemFocused(false), 180)}
                       placeholder="เช่น กาแฟ, ข้าวมันไก่, ค่าแท็กซี่"/>
                <button type="button" className="field-manage-btn"
                        onMouseDown={(e) => e.preventDefault()}
                        onClick={() => { onOpenItemsManager?.(); }}
                        title="จัดการรายการ">
                  <Ic.Settings size={14}/>
                </button>
              </label>
              {itemFocused && itemMatches.length > 0 && (
                <div className="autocomplete-list">
                  {itemMatches.map(m => (
                    <button key={m.label} type="button"
                      className="autocomplete-item"
                      onMouseDown={(e) => { e.preventDefault(); setItem(m.label); setItemFocused(false); }}>
                      <span>{highlight(m.label, item.trim())}</span>
                      <span className="count">{m.count}×</span>
                    </button>
                  ))}
                  {item.trim() && !itemExactExists && (
                    <button type="button"
                      className="autocomplete-item new-hint"
                      onMouseDown={(e) => { e.preventDefault(); setItemFocused(false); }}>
                      <Ic.Plus size={12}/> เพิ่มใหม่: "{item.trim()}"
                    </button>
                  )}

              {attemptedSave && itemMissing && (
                <div className="field-error">⚠️ ต้องกรอกชื่อรายการ</div>
              )}

            {/* Note - with substring autocomplete */}
            <div className="autocomplete-wrap">
              <label className="form-row">
                <span className="lbl">บันทึก</span>
                <input type="text" value={note}
                       onChange={e => setNote(e.target.value)}
                       onFocus={() => setNoteFocused(true)}
                       onBlur={() => setTimeout(() => setNoteFocused(false), 180)}
                       placeholder="รายละเอียดเพิ่มเติม (ไม่บังคับ)"/>
              </label>
              {noteFocused && noteMatches.length > 0 && (
                <div className="autocomplete-list">
                  {noteMatches.map(m => (
                    <button key={m.label} type="button"
                      className="autocomplete-item"
                      onMouseDown={(e) => { e.preventDefault(); setNote(m.label); setNoteFocused(false); }}>
                      <span>{highlight(m.label, note.trim())}</span>
                      <span className="count">{m.count}×</span>
                    </button>
                  ))}
                </div>
              )}
            </div>
          </div>

          {/* Photo gallery - up to 5 */}
          <div className="cat-head" style={{marginTop: 16, display: 'flex', alignItems: 'center', gap: 6}}>
            <Ic.Image size={12}/> รูปใบเสร็จ
            <span style={{marginLeft: 'auto', fontSize: 10.5, color: 'var(--text-faint)',
                          fontWeight: 400, letterSpacing: 0, textTransform: 'none'}}>
              สูงสุด 5 รูป
            </span>
          </div>
          <div className="photo-gallery">
            {photos.map((p, i) => (
              <div key={p.id} className="photo-tile">
                {photoUrls[p.id] ? (
                  <img src={photoUrls[p.id]} alt={`receipt ${i+1}`}
                       onClick={() => setViewerIdx(i)}/>
                ) : (
                  <div className="loading-mini">
                    <Ic.Refresh size={16} className="spin"/>

                )}
                <button className="rm-corner" type="button"
                        aria-label="ลบรูปนี้"
                        onClick={(e) => {
                          e.stopPropagation();
                          if (confirm('ลบรูปนี้?')) removePhotoAt(i);
                        }}>
                  <Ic.Trash size={14}/>
                </button>
              </div>
            ))}
            {photos.length < 5 && (
              <>
                <button type="button" className="photo-tile add-tile"
                        onClick={() => openFilePicker(true)}
                        disabled={!isOnline || uploadingPhoto}>
                  {uploadingPhoto ? <Ic.Refresh size={18} className="spin"/> : <Ic.Camera size={20}/>}
                  <span>ถ่ายรูป</span>
                </button>
                <button type="button" className="photo-tile add-tile"
                        onClick={() => openFilePicker(false)}
                        disabled={!isOnline || uploadingPhoto}>
                  <Ic.Image size={20}/>
                  <span>แกลเลอรี</span>
                </button>
              </>
            )}
            <input ref={photoInputRef} type="file" accept="image/*"
                   onChange={onPhotoPick} style={{display:'none'}}/>
          </div>
          <div className="photo-count-hint">
            {photos.length}/5 รูป
            {!isOnline && ' · ต้องเข้าสู่ระบบเพื่อแนบรูป'}
          </div>

          <div className="sheet-actions">
            <button className="btn-ghost" onClick={onClose}>ยกเลิก</button>
            <button className="btn-primary" onClick={save} disabled={!canSave && attemptedSave}>
              <Ic.Check size={16}/> {initial?.id ? 'บันทึก' : 'บันทึกรายการ'}
            </button>
          </div>
        </div>
      </div>

      {viewerIdx >= 0 && photos[viewerIdx] && photoUrls[photos[viewerIdx].id] && (
        <div className="photo-viewer fade" onClick={() => setViewerIdx(-1)}>
          <button className="close-btn" onClick={() => setViewerIdx(-1)}>
            <Ic.X size={18}/>
          </button>
          <img src={photoUrls[photos[viewerIdx].id]} alt="receipt"/>
        </div>
      )}
    </div>
  );
}

// ============ Row Action Menu (Edit/Duplicate/Delete) ============
function TxActionMenu({ tx, onClose, onEdit, onDuplicate, onDelete, accounts, customCats, txList, onNavigate, canEdit = true, canDuplicate = true }) {
  const cat = getCat(tx.type, tx.category, customCats);
  const timeStr = timeFromIso(tx.createdAt);
  const title = (tx.item || tx.payee || '').trim() || tx.note?.trim() || (tx.category ? cat.label : 'รายการ');
  const isIn = tx.type === 'income';
  const decimals = getAccountDecimals(tx.accountName, accounts);

  // Find current index + neighbors in the list
  const list = Array.isArray(txList) ? txList : [];
  const curIdx = list.findIndex(t => t.id === tx.id);
  const hasPrev = curIdx > 0;
  const hasNext = curIdx >= 0 && curIdx < list.length - 1;
  const goPrev = () => { if (hasPrev) onNavigate?.(list[curIdx - 1]); };
  const goNext = () => { if (hasNext) onNavigate?.(list[curIdx + 1]); };

  // Swipe gesture state
  const [dragX, setDragX] = useState(0);   // current finger offset
  const [animX, setAnimX] = useState(null); // when set, sheet glides to this X then resets
  const dragRef = useRef({ startX: 0, startY: 0, active: false, locked: null });
  const SWIPE_THRESH = 70;  // px to trigger
  const onTouchStart = (e) => {
    const t = e.touches[0];
    dragRef.current = { startX: t.clientX, startY: t.clientY, active: true, locked: null };
    setAnimX(null);
  };
  const onTouchMove = (e) => {
    if (!dragRef.current.active) return;
    const t = e.touches[0];
    const dx = t.clientX - dragRef.current.startX;
    const dy = t.clientY - dragRef.current.startY;
    if (dragRef.current.locked === null) {
      if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
        dragRef.current.locked = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
      }
    }
    if (dragRef.current.locked === 'h') {
      // prevent vertical scroll only when horizontal swipe is active
      e.preventDefault?.();
      // resistance at the boundary: if no neighbor, dampen
      let adjusted = dx;
      if ((dx > 0 && !hasPrev) || (dx < 0 && !hasNext)) adjusted = dx * 0.3;
      setDragX(adjusted);
    }
  };
  const onTouchEnd = () => {
    if (!dragRef.current.active) return;
    const final = dragX;
    dragRef.current.active = false;
    if (final <= -SWIPE_THRESH && hasNext) {
      // swiped left → next; glide off-screen to the left then load next
      setAnimX(-window.innerWidth);
      setTimeout(() => { setDragX(0); setAnimX(null); goNext(); }, 180);
    } else if (final >= SWIPE_THRESH && hasPrev) {
      setAnimX(window.innerWidth);
      setTimeout(() => { setDragX(0); setAnimX(null); goPrev(); }, 180);
    } else {
      // snap back
      setAnimX(0);
      setTimeout(() => { setDragX(0); setAnimX(null); }, 200);
    }
  };

  // Keyboard arrows for desktop / accessibility
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'ArrowLeft') goPrev();
      else if (e.key === 'ArrowRight') goNext();
      else if (e.key === 'Escape') onClose();
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [curIdx, hasPrev, hasNext]);

  // Normalize photos: support both v1.4 photos[] and legacy v1.3 single photoId
  const photoList = useMemo(() => {
    if (Array.isArray(tx.photos) && tx.photos.length > 0) return tx.photos;
    if (tx.photoId) return [{ id: tx.photoId, name: tx.photoName || 'photo' }];
    return [];
  }, [tx.photos, tx.photoId, tx.photoName]);
  const photoCount = photoList.length;

  // Load photo thumbnails (uses local cache first, then fetches from OneDrive)
  const [photoUrls, setPhotoUrls] = useState({}); // { id: blobUrl }
  const [viewerIdx, setViewerIdx] = useState(-1);
  useEffect(() => {
    let cancelled = false;
    photoList.forEach(p => {
      if (photoUrls[p.id]) return;
      fetchPhotoUrl(p.id)
        .then(url => { if (!cancelled) setPhotoUrls(prev => ({ ...prev, [p.id]: url })); })
        .catch(() => {});
    });
    return () => { cancelled = true; };
  }, [photoList]);

  // Format date as DD/MM/YYYY (Buddhist year)
  const dStr = (() => {
    if (!tx.date) return '';
    const d = new Date(tx.date + 'T00:00:00');
    const dd = String(d.getDate()).padStart(2, '0');
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const yy = d.getFullYear() + 543;
    const dayName = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'][d.getDay()];
    return `${dd}/${mm}/${yy} (${dayName})`;
  })();

  // CSS transform style for the swipe-aware section (preview + thumbnails)
  const swipeTransform = animX !== null ? animX : dragX;
  const swipeStyle = {
    transform: `translateX(${swipeTransform}px)`,
    transition: animX !== null ? 'transform .18s cubic-bezier(.2,.8,.2,1)' : 'none',
    willChange: 'transform',
  };
  // Subtle opacity hint while dragging
  const swipeOpacity = Math.max(0.55, 1 - Math.min(Math.abs(dragX), 200) / 400);

  return (
    <div className="sheet-backdrop fade" onClick={onClose}>
      <div className="sheet-wrap sheet-in" onClick={e => e.stopPropagation()}>
        <div className="sheet">
          <div className="sheet-handle"></div>
          <div className="action-menu-wrap">

            {/* Navigation header: prev / counter / next */}
            {list.length > 1 && (
              <div className="nav-header">
                <button className="nav-btn" onClick={goPrev} disabled={!hasPrev}
                        aria-label="รายการก่อนหน้า">
                  <Ic.ChevL size={16}/>
                </button>
                <div className="nav-counter">
                  {curIdx >= 0 ? `${curIdx + 1} / ${list.length}` : ''}
                  <div className="nav-hint">ปัด ← →</div>
                </div>
                <button className="nav-btn" onClick={goNext} disabled={!hasNext}
                        aria-label="รายการถัดไป">
                  <Ic.ChevR size={16}/>
                </button>
              </div>
            )}

            {/* Swipe-aware container */}
            <div className="swipe-area"
                 style={{ ...swipeStyle, opacity: swipeOpacity }}
                 onTouchStart={onTouchStart}
                 onTouchMove={onTouchMove}
                 onTouchEnd={onTouchEnd}
                 onTouchCancel={onTouchEnd}>
            <div className="action-menu-preview">
              <div className="head-row">
                <span className={`type-pill ${isIn ? 'in' : 'out'}`}>
                  {isIn ? <><Ic.ArrowIn size={11}/> รายรับ</> : <><Ic.ArrowOut size={11}/> รายจ่าย</>}
                </span>
                <span className={`amt ${isIn ? 'in' : 'out'}`}>
                  {isIn ? '+' : '−'}฿{fmtMoney(tx.amount, decimals)}
                </span>
              </div>

              <div className="title">{title}</div>

              <div className="detail-list">
                <div className="det">
                  <span className="lbl">วันที่</span>
                  <span className="val mono">{dStr || '—'}</span>
                </div>
                <div className="det">
                  <span className="lbl">เวลา</span>
                  <span className="val mono">{timeStr || '—'}</span>
                </div>
                <div className="det">
                  <span className="lbl">บัญชี</span>
                  <span className="val">{tx.accountName || <span className="muted">—</span>}</span>
                </div>
                <div className="det">
                  <span className="lbl">หมวดหมู่</span>
                  <span className="val">
                    {tx.category ? (
                      <><span className="ico-em">{cat.icon}</span>{cat.label}</>
                    ) : (
                      <span className="muted">ไม่ระบุ</span>
                    )}
                  </span>
                </div>
                {tx.project && (
                  <div className="det">
                    <span className="lbl">โครงการ</span>
                    <span className="val"><span className="ico-em">📁</span>{tx.project}</span>
                  </div>
                )}
                {tx.note && tx.note.trim() && (
                  <div className="det">
                    <span className="lbl">บันทึก</span>
                    <span className="val">{tx.note}</span>
                  </div>
                )}
              </div>
            </div>

            {/* Thumbnail strip outside the detail card so it can grow full width */}
            {photoCount > 0 && (
              <div className="preview-thumbs">
                <div className="preview-thumbs-head">
                  <span>รูปใบเสร็จ</span>
                  <span className="ct">{photoCount} รูป</span>
                </div>
                <div className="preview-thumbs-grid">
                  {photoList.map((p, i) => (
                    <button key={p.id} type="button" className="thumb-cell"
                            onClick={() => photoUrls[p.id] && setViewerIdx(i)}>
                      {photoUrls[p.id] ? (
                        <img src={photoUrls[p.id]} alt="receipt"/>
                      ) : (
                        <div className="loading"><Ic.Refresh size={14} className="spin"/></div>
                      )}
                    </button>
                  ))}
                </div>
              </div>
            )}
            </div>{/* /swipe-area */}

            <div className="action-btn-list">
              <button className="action-btn-row primary" onClick={onEdit} aria-label="แก้ไข"
                      disabled={!canEdit}
                      title={!canEdit ? 'ไม่มีสิทธิ์แก้ไขรายการนี้' : 'แก้ไข'}>
                <div className="ico">{canEdit ? <Ic.Pencil size={20}/> : <Ic.Lock size={20}/>}</div>
                <div className="lbl">{canEdit ? 'แก้ไข' : 'ดูอย่างเดียว'}</div>
              </button>
              <button className="action-btn-row neutral" onClick={onDuplicate} aria-label="คัดลอก"
                      disabled={!canDuplicate}
                      title={!canDuplicate ? 'ไม่มีสิทธิ์เพิ่มในบัญชีนี้' : 'คัดลอก'}>
                <div className="ico"><Ic.Copy size={20}/></div>
                <div className="lbl">คัดลอก</div>
              </button>
              <button className="action-btn-row danger" onClick={onDelete} aria-label="ลบ"
                      disabled={!canEdit}
                      title={!canEdit ? 'ไม่มีสิทธิ์ลบรายการนี้' : 'ลบ'}>
                <div className="ico"><Ic.Trash size={20}/></div>
                <div className="lbl">ลบ</div>
              </button>
              <button className="action-btn-row cancel" onClick={onClose} aria-label="ยกเลิก">
                <div className="ico"><Ic.X size={20}/></div>
                <div className="lbl">ยกเลิก</div>
              </button>
            </div>
          </div>
        </div>
      </div>

      {/* Full-screen photo viewer */}
      {viewerIdx >= 0 && photoList[viewerIdx] && photoUrls[photoList[viewerIdx].id] && (
        <div className="photo-viewer fade" onClick={() => setViewerIdx(-1)}>
          <button className="close-btn" onClick={() => setViewerIdx(-1)}>
            <Ic.X size={18}/>
          </button>
          <img src={photoUrls[photoList[viewerIdx].id]} alt="receipt"/>
        </div>
      )}
    </div>
  );
}

// ============ Confirm Delete Dialog ============
function ConfirmDeleteTx({ tx, onCancel, onConfirm, accounts }) {
  const cat = getCat(tx.type, tx.category);
  const title = (tx.item || tx.payee || '').trim() || tx.note?.trim() || cat.label;
  const photoCount = Array.isArray(tx.photos) ? tx.photos.length : (tx.photoId ? 1 : 0);
  const decimals = getAccountDecimals(tx.accountName, accounts);
  return (
    <div className="confirm-backdrop fade" onClick={onCancel}>
      <div className="confirm-dialog sheet-in" onClick={e => e.stopPropagation()}>
        <div className="c-icon"><Ic.Trash size={22}/></div>
        <h3>ลบรายการนี้?</h3>
        <div className="c-desc">
          <strong>{title}</strong> — ฿{fmtMoney(tx.amount, decimals)}
          <br/>
          การลบนี้ถาวร ไม่สามารถกู้คืนได้
          {photoCount > 0 && (
            <><br/><span style={{color: 'var(--expense-soft)'}}>รูป {photoCount} รูปจะถูกลบจาก OneDrive ด้วย</span></>
          )}
        </div>
        <div className="c-actions">
          <button className="btn-ghost" onClick={onCancel}>ยกเลิก</button>
          <button className="btn-danger solid" onClick={onConfirm}>
            <Ic.Trash size={14}/> ยืนยันลบ
          </button>
        </div>
      </div>
    </div>
  );
}

// ============ Items Manager Modal ============
// ============ v5.0: Users Manager (admin only) ============
// Lets the admin add/rename/remove users, change PINs, and toggle admin role.
// Each user has: id (immutable, generated from label), label, icon, role, pinHash.
// PIN changes are immediately hashed before storing.
function UsersManager({ users, currentUserId, onClose, onAdd, onUpdate, onChangePin, onRemove, pushToast }) {
  const [editingId, setEditingId] = useState(null);
  const [editLabel, setEditLabel] = useState('');
  const [editIcon, setEditIcon] = useState('👤');
  const [editRole, setEditRole] = useState('member');
  const [pinTarget, setPinTarget] = useState(null); // user being PIN-reset
  const [pinValue, setPinValue] = useState('');
  const [confirmDelId, setConfirmDelId] = useState(null);
  // Add form state
  const [adding, setAdding] = useState(false);
  const [newLabel, setNewLabel] = useState('');
  const [newIcon, setNewIcon] = useState('👤');
  const [newRole, setNewRole] = useState('member');

  const startEdit = (u) => {
    setEditingId(u.id);
    setEditLabel(u.label);
    setEditIcon(u.icon || '👤');
    setEditRole(u.role || 'member');
  };
  const cancelEdit = () => { setEditingId(null); };
  const saveEdit = () => {
    const n = editLabel.trim();
    if (!n) { pushToast('ชื่อต้องไม่ว่าง'); return; }
    onUpdate(editingId, { label: n, icon: editIcon, role: editRole });
    pushToast('แก้ไขแล้ว');
    setEditingId(null);
  };

  const startAdd = () => { setAdding(true); setNewLabel(''); setNewIcon('👤'); setNewRole('member'); };
  const cancelAdd = () => setAdding(false);
  const saveAdd = async () => {
    const r = await onAdd(newLabel, newRole, newIcon);
    if (r.ok) {
      pushToast(`เพิ่ม ${newLabel} แล้ว · PIN เริ่มต้น 1234`);
      setAdding(false);
    } else if (r.reason === 'empty') {
      pushToast('ชื่อต้องไม่ว่าง');
    }
  };

  const startPinReset = (u) => { setPinTarget(u); setPinValue(''); };
  const cancelPinReset = () => { setPinTarget(null); setPinValue(''); };
  const savePinReset = async () => {
    if (!/^\d{4}$/.test(pinValue)) { pushToast('PIN ต้องเป็นตัวเลข 4 หลัก'); return; }
    const r = await onChangePin(pinTarget.id, pinValue);
    if (r.ok) {
      pushToast(`เปลี่ยน PIN ของ ${pinTarget.label} แล้ว`);
      setPinTarget(null);
      setPinValue('');
    }
  };

  const ICONS = ['👤','👨','👩','👴','👵','👦','👧','👶','👑','🧑','👨‍🦱','👩‍🦱','🧔','👨‍🦳','👩‍🦳'];

  // PIN reset overlay
  if (pinTarget) {
    return (
      <div className="sheet-backdrop fade" onClick={cancelPinReset} style={{zIndex: 95}}>
        <div className="sheet-wrap sheet-in" onClick={e => e.stopPropagation()}>
          <div className="sheet">
            <div className="sheet-handle"></div>
            <div className="sheet-head">
              <h2>🔑 ตั้ง PIN ใหม่</h2>
              <button className="icon-btn-round" onClick={cancelPinReset}><Ic.X size={16}/></button>
            </div>
            <div style={{textAlign: 'center', padding: '14px 8px'}}>
              <div style={{fontSize: 40, marginBottom: 8}}>{pinTarget.icon || '👤'}</div>
              <div style={{fontSize: 16, color: 'var(--text)'}}>{pinTarget.label}</div>
              <div style={{fontSize: 11, color: 'var(--text-faint)', marginTop: 4}}>
                ใส่ PIN ใหม่ 4 หลัก
              </div>
            </div>
            <input
              type="tel"
              maxLength={4}
              pattern="\d{4}"
              inputMode="numeric"
              value={pinValue}
              onChange={(e) => setPinValue(e.target.value.replace(/\D/g, '').slice(0, 4))}
              autoFocus
              style={{
                width: '100%',
                fontSize: 28, textAlign: 'center', letterSpacing: '0.5em',
                fontFamily: 'IBM Plex Mono, monospace',
                padding: '14px 12px', borderRadius: 12,
                background: 'var(--surface)', border: '1px solid var(--line)',
                color: 'var(--text)',
              }}
            />
            <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginTop: 16}}>
              <button className="btn-ghost" onClick={cancelPinReset}>ยกเลิก</button>
              <button className="btn-primary" onClick={savePinReset} disabled={pinValue.length !== 4}>
                <Ic.Check size={14}/> บันทึก
              </button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="sheet-backdrop fade" onClick={onClose}>
      <div className="sheet-wrap sheet-in" onClick={e => e.stopPropagation()}>
        <div className="sheet">
          <div className="sheet-handle"></div>
          <div className="sheet-head">
            <h2>👥 จัดการผู้ใช้</h2>
            <button className="icon-btn-round" onClick={onClose}><Ic.X size={16}/></button>
          </div>
          <div style={{fontSize: 11, color: 'var(--text-faint)', marginTop: 6, marginBottom: 12}}>
            ผู้ใช้ทุกคนเริ่มต้นด้วย PIN <code style={{color: 'var(--gold)'}}>1234</code> · เปลี่ยนได้ที่ปุ่ม 🔑
          </div>

          {/* Add user form */}
          {adding ? (
            <div className="user-add-card">
              <div className="user-add-row">
                <select
                  value={newIcon}
                  onChange={(e) => setNewIcon(e.target.value)}
                  className="user-icon-select">
                  {ICONS.map(i => <option key={i} value={i}>{i}</option>)}
                </select>
                <input
                  type="text"
                  placeholder="ชื่อผู้ใช้ เช่น ลูกสาว"
                  value={newLabel}
                  onChange={(e) => setNewLabel(e.target.value)}
                  className="user-name-input"
                  autoFocus
                />
              </div>
              <select
                value={newRole}
                onChange={(e) => setNewRole(e.target.value)}
                className="vis-select"
                style={{width: '100%', marginTop: 8}}>
                <option value="member">👤 ผู้ใช้ทั่วไป</option>
                <option value="admin">👑 ผู้ดูแลระบบ (admin)</option>
              </select>
              <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginTop: 10}}>
                <button className="btn-ghost" onClick={cancelAdd}>ยกเลิก</button>
                <button className="btn-primary" onClick={saveAdd} disabled={!newLabel.trim()}>
                  <Ic.Plus size={14}/> เพิ่ม
                </button>
              </div>
            </div>
          ) : (
            <button className="btn-ghost" style={{width: '100%', marginBottom: 14}} onClick={startAdd}>
              <Ic.Plus size={14}/> เพิ่มผู้ใช้ใหม่
            </button>
          )}

          {/* Users list */}
          <div className="items-mgr-list">
            {(users || []).map(u => {
              const isMe = u.id === currentUserId;
              return (
                <div key={u.id} className={`mgr-row ${isMe ? 'me' : ''}`}>
                  {editingId === u.id ? (
                    <>
                      <select
                        value={editIcon}
                        onChange={(e) => setEditIcon(e.target.value)}
                        className="user-icon-select">
                        {ICONS.map(i => <option key={i} value={i}>{i}</option>)}
                      </select>
                      <input
                        className="user-name-input"
                        value={editLabel}
                        onChange={(e) => setEditLabel(e.target.value)}
                      />
                      <select
                        value={editRole}
                        onChange={(e) => setEditRole(e.target.value)}
                        className="vis-select">
                        <option value="member">👤 ทั่วไป</option>
                        <option value="admin">👑 admin</option>
                      </select>
                      <div className="actions">
                        <button className="edit-btn" onClick={saveEdit} title="บันทึก">
                          <Ic.Check size={14}/>
                        </button>
                        <button className="del-btn" onClick={cancelEdit} title="ยกเลิก">
                          <Ic.X size={14}/>
                        </button>
                      </div>
                    </>
                  ) : confirmDelId === u.id ? (
                    <>
                      <div className="name-wrap">
                        <div className="name" style={{color: 'var(--expense-soft)'}}>
                          ลบ "{u.label}" ?
                        </div>
                        <div className="meta">บัญชีเก่าจะคงอยู่ แต่ user หาย</div>
                      </div>
                      <div className="actions">
                        <button className="del-btn-confirm" onClick={() => {
                          const r = onRemove(u.id);
                          if (r.ok) { pushToast(`ลบ ${u.label} แล้ว`); setConfirmDelId(null); }
                          else if (r.reason === 'last-admin') pushToast('ลบไม่ได้ — เหลือ admin คนสุดท้าย');
                        }}>
                          <Ic.Check size={14}/>
                        </button>
                        <button className="del-btn" onClick={() => setConfirmDelId(null)}>
                          <Ic.X size={14}/>
                        </button>
                      </div>
                    </>
                  ) : (
                    <>
                      <div className="name-wrap">
                        <div className="name">
                          <span className="user-row-icon">{u.icon || '👤'}</span>
                          {u.label}
                          {isMe && <span className="me-tag">(คุณ)</span>}
                          {u.role === 'admin' && <span className="admin-tag-inline">admin</span>}
                        </div>
                        <div className="meta">
                          ID: <code style={{color: 'var(--gold)'}}>{u.id}</code>
                        </div>
                      </div>
                      <div className="actions">
                        <button className="perm-btn" onClick={() => startPinReset(u)} title="ตั้ง PIN ใหม่">
                          🔑
                        </button>
                        <button className="edit-btn" onClick={() => startEdit(u)} title="แก้ไข">
                          <Ic.Pencil size={14}/>
                        </button>
                        {!isMe && (
                          <button className="del-btn" onClick={() => setConfirmDelId(u.id)} title="ลบ">
                            <Ic.Trash size={14}/>
                          </button>
                        )}
                      </div>
                    </>
                  )}
                </div>
              );
            })}
          </div>

          <div style={{marginTop: 20}}>
            <button className="btn-primary" onClick={onClose} style={{width: '100%'}}>
              เสร็จสิ้น
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function ItemsManager({ items, transactions, onClose, onAdd, onUpdate, onRemove, pushToast }) {
  const [newName, setNewName] = useState('');
  const [editingId, setEditingId] = useState(null);
  const [editDraft, setEditDraft] = useState('');
  const [confirmDelId, setConfirmDelId] = useState(null);

  // Count usage of each item across transactions
  const usageMap = useMemo(() => {
    const m = new Map();
    (transactions || []).forEach(t => {
      const k = (t.item || t.payee || '').trim();
      if (k) m.set(k, (m.get(k) || 0) + 1);
    });
    return m;
  }, [transactions]);

  // Sort: most-used first, then alphabetical
  const sortedItems = useMemo(() => {
    const list = [...(items || [])];
    list.sort((a, b) => {
      const ca = usageMap.get(a.name) || 0;
      const cb = usageMap.get(b.name) || 0;
      if (ca !== cb) return cb - ca;
      return a.name.localeCompare(b.name, 'th');
    });
    return list;
  }, [items, usageMap]);

  const handleAdd = () => {
    const n = newName.trim();
    if (!n) return;
    const ok = onAdd(n);
    if (ok) setNewName('');
  };

  const startEdit = (it) => {
    setEditingId(it.id);
    setEditDraft(it.name);
    setConfirmDelId(null);
  };
  const saveEdit = () => {
    const ok = onUpdate(editingId, editDraft);
    if (ok) { setEditingId(null); setEditDraft(''); }
  };
  const cancelEdit = () => { setEditingId(null); setEditDraft(''); };

  const confirmDelete = (id) => {
    onRemove(id);
    setConfirmDelId(null);
  };

  return (
    <div className="sheet-backdrop fade" onClick={onClose} style={{zIndex: 85}}>
      <div className="sheet-wrap sheet-in" onClick={e => e.stopPropagation()}>
        <div className="sheet">
          <div className="sheet-handle"></div>
          <div className="sheet-head">
            <h2>จัดการรายการ</h2>
            <button className="icon-btn-round" onClick={onClose}><Ic.X size={16}/></button>
          </div>

          {/* Add new */}
          <div className="cat-head" style={{marginTop: 16}}>เพิ่มรายการใหม่</div>
          <div className="items-mgr-addbox">
            <input type="text" value={newName}
                   onChange={e => setNewName(e.target.value)}
                   onKeyDown={e => { if (e.key === 'Enter') handleAdd(); }}
                   placeholder="เช่น กาแฟลาเต้, ค่าเน็ตบ้าน"
                   autoFocus/>
            <button onClick={handleAdd} disabled={!newName.trim()}>
              <Ic.Plus size={14}/> เพิ่ม
            </button>
          </div>

          {/* List */}
          <div className="cat-head" style={{marginTop: 18}}>
            รายการทั้งหมด
          </div>
          {sortedItems.length === 0 ? (
            <div className="items-mgr-empty">
              <div className="em">🏷️</div>
              <div>ยังไม่มีรายการในรายการแนะนำ</div>
              <div style={{fontSize: 11, marginTop: 4}}>
                รายการจะถูกเพิ่มอัตโนมัติเมื่อคุณบันทึกธุรกรรม
              </div>
            </div>
          ) : (
            <>
              <div className="items-mgr-list">
                {sortedItems.map(it => {
                  const isEditing = editingId === it.id;
                  const needsConfirm = confirmDelId === it.id;
                  const usage = usageMap.get(it.name) || 0;
                  return (
                    <div key={it.id} className="items-mgr-row">
                      {isEditing ? (
                        <>
                          <input className="edit" value={editDraft}
                                 onChange={e => setEditDraft(e.target.value)}
                                 onKeyDown={e => {
                                   if (e.key === 'Enter') saveEdit();
                                   else if (e.key === 'Escape') cancelEdit();
                                 }}
                                 autoFocus/>
                          <div className="actions">
                            <button className="save-btn" onClick={saveEdit}
                                    disabled={!editDraft.trim() || editDraft.trim() === it.name}
                                    title="บันทึก">
                              <Ic.Check size={14}/>
                            </button>
                            <button className="cancel-btn" onClick={cancelEdit} title="ยกเลิก">
                              <Ic.X size={14}/>
                            </button>
                          </div>
                        </>
                      ) : needsConfirm ? (
                        <>
                          <div className="name-wrap">
                            <div className="name" style={{color: 'var(--expense-soft)'}}>
                              ลบ "{it.name}" ?
                            </div>
                            <div className="meta">
                              {usage > 0
                                ? `ใช้ใน ${usage} รายการ (ธุรกรรมจะยังอยู่)`
                                : 'จะหายไปจากรายการแนะนำ'}
                            </div>
                          </div>
                          <div className="actions">
                            <button className="save-btn" onClick={() => confirmDelete(it.id)}
                                    style={{background: 'var(--expense)', color: '#FBFAF6'}}
                                    title="ยืนยันลบ">
                              <Ic.Check size={14}/>
                            </button>
                            <button className="cancel-btn" onClick={() => setConfirmDelId(null)}
                                    title="ยกเลิก">
                              <Ic.X size={14}/>
                            </button>
                          </div>
                        </>
                      ) : (
                        <>
                          <div className="name-wrap">
                            <div className="name">{it.name}</div>
                            <div className="meta">
                              {usage > 0 ? `ใช้ ${usage} ครั้ง` : 'ยังไม่ถูกใช้'}
                            </div>
                          </div>
                          <div className="actions">
                            <button className="edit-btn" onClick={() => startEdit(it)}
                                    title="แก้ไข">
                              <Ic.Pencil size={14}/>
                            </button>
                            <button className="del-btn" onClick={() => { setConfirmDelId(it.id); setEditingId(null); }}
                                    title="ลบ">
                              <Ic.Trash size={14}/>
                            </button>
                          </div>
                        </>
                      )}
                    </div>
                  );
                })}
              </div>
              <div className="items-mgr-stats">
                ทั้งหมด {sortedItems.length} รายการ
              </div>
            </>
          )}

          <div style={{marginTop: 20}}>
            <button className="btn-primary" onClick={onClose} style={{width: '100%'}}>
              เสร็จสิ้น
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ============ Accounts Manager Modal ============
function AccountsManager({ accounts, transactions, users, onClose, onAdd, onUpdate, onRemove, onSetPerm, isAdmin, pushToast }) {
  const [newName, setNewName] = useState('');
  const [newDecimals, setNewDecimals] = useState(2);
  const [editingId, setEditingId] = useState(null);
  const [editName, setEditName] = useState('');
  const [editDecimals, setEditDecimals] = useState(2);
  const [confirmDelId, setConfirmDelId] = useState(null);
  const [permPanelId, setPermPanelId] = useState(null); // v5.0: which account's perm panel is open

  // Count usage of each account across transactions
  const usageMap = useMemo(() => {
    const m = new Map();
    (transactions || []).forEach(t => {
      const k = (t.accountName || '').trim();
      if (k) m.set(k, (m.get(k) || 0) + 1);
    });
    return m;
  }, [transactions]);

  // Sort: most-used first, then alphabetical
  const sortedAccounts = useMemo(() => {
    const list = [...(accounts || [])];
    list.sort((a, b) => {
      const ca = usageMap.get(a.name) || 0;
      const cb = usageMap.get(b.name) || 0;
      if (ca !== cb) return cb - ca;
      return a.name.localeCompare(b.name, 'th');
    });
    return list;
  }, [accounts, usageMap]);

  const handleAdd = () => {
    const n = newName.trim();
    if (!n) return;
    const ok = onAdd(n, newDecimals);
    if (ok) { setNewName(''); setNewDecimals(2); }
  };

  const startEdit = (a) => {
    setEditingId(a.id);
    setEditName(a.name);
    setEditDecimals(Number.isFinite(a.decimals) ? a.decimals : 2);
    setConfirmDelId(null);
  };
  const saveEdit = () => {
    const ok = onUpdate(editingId, editName, editDecimals);
    if (ok) { setEditingId(null); setEditName(''); }
  };
  const cancelEdit = () => { setEditingId(null); setEditName(''); };

  const confirmDelete = (id) => {
    onRemove(id);
    setConfirmDelId(null);
  };

  const clampDecimals = (v) => Math.max(0, Math.min(10, Math.floor(Number(v) || 0)));

  return (
    <div className="sheet-backdrop fade" onClick={onClose} style={{zIndex: 85}}>
      <div className="sheet-wrap sheet-in" onClick={e => e.stopPropagation()}>
        <div className="sheet">
          <div className="sheet-handle"></div>
          <div className="sheet-head">
            <h2>จัดการบัญชี</h2>
            <button className="icon-btn-round" onClick={onClose}><Ic.X size={16}/></button>
          </div>

          {/* Add new */}
          <div className="cat-head" style={{marginTop: 16}}>เพิ่มบัญชีใหม่</div>
          <div className="acct-mgr-addbox">
            <input type="text" value={newName}
                   onChange={e => setNewName(e.target.value)}
                   onKeyDown={e => { if (e.key === 'Enter' && newName.trim()) handleAdd(); }}
                   placeholder="เช่น เงินสด, Bitcoin, ทอง"/>
            <div className="decimals-input-wrap">
              <label className="dec-lbl">ทศนิยม</label>
              <input type="number" min="0" max="10" step="1"
                     value={newDecimals}
                     onChange={e => setNewDecimals(clampDecimals(e.target.value))}
                     className="dec-input"/>
            </div>
            <button onClick={handleAdd} disabled={!newName.trim()} className="add-btn-gold">
              <Ic.Plus size={14}/>
            </button>
          </div>
          <div className="acct-mgr-hint">
            💡 บัญชีปกติใช้ 2 ตำแหน่ง · คริปโต/ทองใช้ได้ถึง 10 ตำแหน่ง
          </div>

          {/* List */}
          <div className="cat-head" style={{marginTop: 18}}>
            บัญชีทั้งหมด
          </div>
          {sortedAccounts.length === 0 ? (
            <div className="items-mgr-empty">
              <div className="em">💰</div>
              <div>ยังไม่มีบัญชีในระบบ</div>
              <div style={{fontSize: 11, marginTop: 4}}>
                บัญชีจะถูกเพิ่มอัตโนมัติเมื่อคุณบันทึกธุรกรรม
              </div>
            </div>
          ) : (
            <>
              <div className="items-mgr-list">
                {sortedAccounts.map(a => {
                  const isEditing = editingId === a.id;
                  const needsConfirm = confirmDelId === a.id;
                  const usage = usageMap.get(a.name) || 0;
                  const dec = Number.isFinite(a.decimals) ? a.decimals : 2;
                  return (
                    <div key={a.id} className="items-mgr-row">
                      {isEditing ? (
                        <>
                          <div className="edit-fields">
                            <input className="edit" value={editName}
                                   onChange={e => setEditName(e.target.value)}
                                   autoFocus
                                   placeholder="ชื่อบัญชี"/>
                            <div className="decimals-input-wrap inline">
                              <label className="dec-lbl">ทศนิยม</label>
                              <input type="number" min="0" max="10" step="1"
                                     value={editDecimals}
                                     onChange={e => setEditDecimals(clampDecimals(e.target.value))}
                                     className="dec-input"
                                     onKeyDown={e => {
                                       if (e.key === 'Enter') saveEdit();
                                       else if (e.key === 'Escape') cancelEdit();
                                     }}/>
                            </div>
                          </div>
                          <div className="actions">
                            <button className="save-btn" onClick={saveEdit}
                                    disabled={!editName.trim()}
                                    title="บันทึก">
                              <Ic.Check size={14}/>
                            </button>
                            <button className="cancel-btn" onClick={cancelEdit} title="ยกเลิก">
                              <Ic.X size={14}/>
                            </button>
                          </div>
                        </>
                      ) : needsConfirm ? (
                        <>
                          <div className="name-wrap">
                            <div className="name" style={{color: 'var(--expense-soft)'}}>
                              ลบ "{a.name}" ?
                            </div>
                            <div className="meta">
                              {usage > 0
                                ? `ใช้ใน ${usage} รายการ (ธุรกรรมจะยังอยู่)`
                                : 'จะหายไปจากระบบ'}
                            </div>
                          </div>

                              <Ic.Check size={14}/>
                            </button>
                            <button className="cancel-btn" onClick={() => setConfirmDelId(null)}
                                    title="ยกเลิก">

                            </button>
                          </div>

                      ) : (

                                const perms = a.permissions || {};
                                const members = (users || []).filter(u => u.role !== 'admin');
                                const granted = members.filter(u => (perms[u.id] || 'none') !== 'none');

                                  <span className="shared-badge" title={granted.map(u => u.label).join(', ')}>

                              })()}
                              {a.name}
                              <span className="dec-badge">·{dec}d</span>
                            </div>
                            <div className="meta">
                              {usage > 0 ? `ใช้ ${usage} ครั้ง` : 'ยังไม่ถูกใช้'}

                              ทศนิยม {dec} ตำแหน่ง

                          </div>
                          <div className="actions">

                              <button
                                className="perm-btn"

                            <button className="edit-btn" onClick={() => startEdit(a)}
                                    title="แก้ไข">
                              <Ic.Pencil size={14}/>
                            </button>
                            <button className="del-btn" onClick={() => { setConfirmDelId(a.id); setEditingId(null); }}
                                    title="ลบ">
                              <Ic.Trash size={14}/>
                            </button>
                          </div>
                        </>
                      )}
                      {/* v5.0: per-user permission panel — admin-only, expands inline */}
                      {permPanelId === a.id && isAdmin && (
                        <div className="perm-panel">
                          <div className="perm-panel-hd">สิทธิ์ของแต่ละผู้ใช้</div>

                            return (
                              <div key={u.id} className="perm-row">
                                <span className="perm-user">
                                  <span className="perm-user-icon">{u.icon || '👤'}</span>

                                </span>
                                <select
                                  className="vis-select"

                                  ))}

                          })}
                          {(users || []).filter(u => u.role !== 'admin').length === 0 && (
                            <div className="perm-empty">ยังไม่มีผู้ใช้คนอื่น — เพิ่มได้ในตั้งค่า</div>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
              <div className="items-mgr-stats">
                ทั้งหมด {sortedAccounts.length} บัญชี

            </>
          )}
