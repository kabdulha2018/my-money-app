                                  <Ic.Pencil size={14}/>
                                </button>
                                <button className="del-btn" onClick={() => { setConfirmDelId(it.id); setEditingId(null); }}
                                        title="ลบ">
                                  <Ic.Trash size={14}/>
                                </button>
                              </>
                            )}
                          </div>
                        </>
                      )}
                    </div>
                  );
                })}
              </div>
              <div className="items-mgr-stats">
                ทั้งหมด {sortedItems.length} รายการ
              </div>
            </>
          )}

          <div style={{marginTop: 20}}>
            <button className="btn-primary" onClick={onClose} style={{width: '100%'}}>
              เสร็จสิ้น
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ============ Accounts Manager Modal ============
function AccountsManager({ accounts, transactions, users, onClose, onAdd, onUpdate, onRemove, onSetPerm, isAdmin, currentUserId, pushToast, pendingByAccountId }) {
  const [newName, setNewName] = useState('');
  const [newDecimals, setNewDecimals] = useState(2);
  // v5.6: unit symbol per account. '__custom' is a sentinel meaning "show custom input".
  const [newUnitChoice, setNewUnitChoice] = useState('฿');
  const [newUnitCustom, setNewUnitCustom] = useState('');
  const [newUnitPosition, setNewUnitPosition] = useState('before');
  const [editingId, setEditingId] = useState(null);
  const [editName, setEditName] = useState('');
  const [editDecimals, setEditDecimals] = useState(2);
  const [editUnitChoice, setEditUnitChoice] = useState('฿');
  const [editUnitCustom, setEditUnitCustom] = useState('');
  const [editUnitPosition, setEditUnitPosition] = useState('before');
  const [confirmDelId, setConfirmDelId] = useState(null);
  const [permPanelId, setPermPanelId] = useState(null); // v5.0: which account's perm panel is open

  // When user picks a preset, sync the position automatically.
  // For '__custom' we leave position editable.
  const onPickNewUnit = (choice) => {
    setNewUnitChoice(choice);
    if (choice !== '__custom') {
      const preset = UNIT_PRESETS.find(p => p.symbol === choice);
      if (preset) setNewUnitPosition(preset.position);
    }
  };
  const onPickEditUnit = (choice) => {
    setEditUnitChoice(choice);
    if (choice !== '__custom') {
      const preset = UNIT_PRESETS.find(p => p.symbol === choice);
      if (preset) setEditUnitPosition(preset.position);
    }
  };
  // Resolve actual symbol value to save: '__custom' → use custom textbox value.
  const resolveSymbol = (choice, custom) => choice === '__custom' ? (custom || '') : choice;

  // Count usage of each account across transactions
  const usageMap = useMemo(() => {
    const m = new Map();
    (transactions || []).forEach(t => {
      const k = (t.accountName || '').trim();
      if (k) m.set(k, (m.get(k) || 0) + 1);
    });
    return m;
  }, [transactions]);

  // Sort: most-used first, then alphabetical
  const sortedAccounts = useMemo(() => {
    const list = [...(accounts || [])];
    const q = newName.trim().toLowerCase();
    list.sort((a, b) => {
      if (q) {
        const aMatch = (a.name || '').toLowerCase().includes(q);
        const bMatch = (b.name || '').toLowerCase().includes(q);
        if (aMatch !== bMatch) return aMatch ? -1 : 1;
      }
      const ca = usageMap.get(a.name) || 0;
      const cb = usageMap.get(b.name) || 0;
      if (ca !== cb) return cb - ca;
      return a.name.localeCompare(b.name, 'th');
    });
    return list;
  }, [accounts, usageMap, newName]);

  const handleAdd = () => {
    const n = newName.trim();
    if (!n) return;
    const sym = resolveSymbol(newUnitChoice, newUnitCustom);
    const ok = onAdd(n, newDecimals, sym, newUnitPosition);
    if (ok) {
      setNewName(''); setNewDecimals(2);
      setNewUnitChoice('฿'); setNewUnitCustom(''); setNewUnitPosition('before');
    }
  };

  const startEdit = (a) => {
    setEditingId(a.id);
    setEditName(a.name);
    setEditDecimals(Number.isFinite(a.decimals) ? a.decimals : 2);
    // Resolve current symbol → preset id or '__custom'
    const curSym = a.unitSymbol != null ? a.unitSymbol : '฿';
    const curPos = a.unitPosition || guessUnitPosition(curSym);
    const isPreset = UNIT_PRESETS.some(p => p.symbol === curSym);
    setEditUnitChoice(isPreset ? curSym : '__custom');
    setEditUnitCustom(isPreset ? '' : curSym);
    setEditUnitPosition(curPos);
    setConfirmDelId(null);
  };
  const saveEdit = () => {
    const sym = resolveSymbol(editUnitChoice, editUnitCustom);
    const ok = onUpdate(editingId, editName, editDecimals, sym, editUnitPosition);
    if (ok) { setEditingId(null); setEditName(''); }
  };
  const cancelEdit = () => { setEditingId(null); setEditName(''); };

  const confirmDelete = (id) => {
    onRemove(id);
    setConfirmDelId(null);
  };

  const clampDecimals = (v) => Math.max(0, Math.min(10, Math.floor(Number(v) || 0)));

  return (
    <div className="sheet-backdrop fade" onClick={onClose} style={{zIndex: 85}}>
      <div className="sheet-wrap sheet-in" onClick={e => e.stopPropagation()}>
        <div className="sheet">
          <div className="sheet-handle"></div>
          <div className="sheet-head">
            <h2>จัดการบัญชี</h2>
            <button className="icon-btn-round" onClick={onClose}><Ic.X size={16}/></button>
          </div>

          {/* Add new */}
          <div className="cat-head" style={{marginTop: 16}}>เพิ่มบัญชีใหม่</div>
          {(() => {
            // v5.17: Real-time validation, same pattern as the user-add card.
            // We compute validity once per render and mirror the result into
            // the input border, the helper text, and the +button's disabled
            // state. Threshold matches the existing tolerance — 1 char min.
            const trimmed = newName.trim();
            const isDup = trimmed && sortedAccounts.some(
              a => (a.name || '').toLowerCase() === trimmed.toLowerCase()
            );
            let validState = 'neutral';
            let validMsg = '';
            if (trimmed) {
              if (isDup) { validState = 'dup'; validMsg = '❌ มีบัญชีนี้ในระบบแล้ว'; }
              else { validState = 'ok'; validMsg = '✅ ใช้ชื่อนี้ได้'; }
            }
            const borderColor = (
              validState === 'ok'  ? 'var(--income-soft)'  :
              validState === 'dup' ? 'var(--expense-soft)' :
              'var(--line)'
            );
            const canSubmit = trimmed.length > 0 && !isDup;
            return (
              <>
                <div className="acct-mgr-addbox">
                  <input type="text" value={newName}
                         onChange={e => setNewName(e.target.value)}
                         onKeyDown={e => { if (e.key === 'Enter' && canSubmit) handleAdd(); }}
                         placeholder="เช่น เงินสด, Bitcoin, ทอง"
                         style={{borderColor}}/>
                  <div className="decimals-input-wrap">
                    <label className="dec-lbl">ทศนิยม</label>
                    <input type="number" min="0" max="10" step="1"
                           value={newDecimals}
                           onChange={e => setNewDecimals(clampDecimals(e.target.value))}
                           className="dec-input"/>
                  </div>
                  <button onClick={handleAdd} disabled={!canSubmit} className="add-btn-gold">
                    <Ic.Plus size={14}/>
                  </button>
                </div>
                {validMsg && (
                  <div style={{fontSize: 11, marginTop: 6, marginBottom: 4, fontWeight: 600, color: borderColor}}>
                    {validMsg}
                  </div>
                )}
              </>
            );
          })()}
          <div className="unit-picker">
            <label className="unit-picker-lbl">สัญลักษณ์หน่วย</label>
            <select className="unit-select"
                    value={newUnitChoice}
                    onChange={e => onPickNewUnit(e.target.value)}>
              {UNIT_PRESETS.map(p => (
                <option key={p.label} value={p.symbol}>{p.label}</option>
              ))}
              <option value="__custom">⚙️ กำหนดเอง...</option>
            </select>
            {newUnitChoice === '__custom' && (
              <div className="unit-custom-row">
                <input type="text" maxLength="6"
                       value={newUnitCustom}
                       onChange={e => setNewUnitCustom(e.target.value)}
                       placeholder="เช่น kg, ตัว, กล่อง"
                       className="unit-custom-input"/>
                <select className="unit-pos-select"
                        value={newUnitPosition}
                        onChange={e => setNewUnitPosition(e.target.value)}>
                  <option value="before">ก่อนเลข ({newUnitCustom || '◌'}100)</option>
                  <option value="after">หลังเลข (100 {newUnitCustom || '◌'})</option>
                </select>
              </div>
            )}
          </div>
          <div className="acct-mgr-hint">
            💡 บัญชีปกติใช้ 2 ตำแหน่ง · คริปโต/ทองใช้ได้ถึง 10 ตำแหน่ง · เลือกหน่วยตามชนิดบัญชี
          </div>

          {/* List */}
          <div className="cat-head" style={{marginTop: 18}}>
            บัญชีทั้งหมด
          </div>
          {sortedAccounts.length === 0 ? (
            <div className="items-mgr-empty">
              <div className="em">💰</div>
              <div>ยังไม่มีบัญชีในระบบ</div>
              <div style={{fontSize: 11, marginTop: 4}}>
                บัญชีจะถูกเพิ่มอัตโนมัติเมื่อคุณบันทึกธุรกรรม
              </div>
            </div>
          ) : (
            <>
              <div className="items-mgr-list">
                {sortedAccounts.map(a => {
                  const isEditing = editingId === a.id;
                  const needsConfirm = confirmDelId === a.id;
                  const usage = usageMap.get(a.name) || 0;
                  const dec = Number.isFinite(a.decimals) ? a.decimals : 2;
                  return (
                    <div key={a.id} className="items-mgr-row">
                      {isEditing ? (
                        <>
                          <div className="edit-fields">
                            <input className="edit" value={editName}
                                   onChange={e => setEditName(e.target.value)}
                                   autoFocus
                                   placeholder="ชื่อบัญชี"/>
                            <div className="decimals-input-wrap inline">
                              <label className="dec-lbl">ทศนิยม</label>
                              <input type="number" min="0" max="10" step="1"
                                     value={editDecimals}
                                     onChange={e => setEditDecimals(clampDecimals(e.target.value))}
                                     className="dec-input"
                                     onKeyDown={e => {
                                       if (e.key === 'Enter') saveEdit();
                                       else if (e.key === 'Escape') cancelEdit();
                                     }}/>
                            </div>
                            <div className="unit-picker inline">
                              <label className="unit-picker-lbl">สัญลักษณ์หน่วย</label>
                              <select className="unit-select"
                                      value={editUnitChoice}
                                      onChange={e => onPickEditUnit(e.target.value)}>
                                {UNIT_PRESETS.map(p => (
                                  <option key={p.label} value={p.symbol}>{p.label}</option>
                                ))}
                                <option value="__custom">⚙️ กำหนดเอง...</option>
                              </select>
                              {editUnitChoice === '__custom' && (
                                <div className="unit-custom-row">
                                  <input type="text" maxLength="6"
                                         value={editUnitCustom}
                                         onChange={e => setEditUnitCustom(e.target.value)}
                                         placeholder="เช่น kg, ตัว"
                                         className="unit-custom-input"/>
                                  <select className="unit-pos-select"
                                          value={editUnitPosition}
                                          onChange={e => setEditUnitPosition(e.target.value)}>
                                    <option value="before">ก่อนเลข</option>
                                    <option value="after">หลังเลข</option>
                                  </select>
                                </div>
                              )}
                            </div>
                          </div>
                          <div className="actions">
                            <button className="save-btn" onClick={saveEdit}
                                    disabled={!editName.trim()}
                                    title="บันทึก">
                              <Ic.Check size={14}/>
                            </button>
                            <button className="cancel-btn" onClick={cancelEdit} title="ยกเลิก">
                              <Ic.X size={14}/>
                            </button>
                          </div>
                        </>
                      ) : needsConfirm ? (
                        <>
                          <div className="name-wrap">
                            <div className="name" style={{color: 'var(--expense-soft)'}}>
                              ลบ "{a.name}" ?
                            </div>
                            <div className="meta">
                              {usage > 0
                                ? `ใช้ใน ${usage} รายการ (ธุรกรรมจะยังอยู่)`
                                : 'จะหายไปจากระบบ'}
                            </div>
                          </div>
                          <div className="actions">
                            <button className="save-btn" onClick={() => confirmDelete(a.id)}
                                    style={{background: 'var(--expense)', color: '#FBFAF6'}}
                                    title="ยืนยันลบ">
                              <Ic.Check size={14}/>
                            </button>
                            <button className="cancel-btn" onClick={() => setConfirmDelId(null)}
                                    title="ยกเลิก">
                              <Ic.X size={14}/>
                            </button>
                          </div>
                        </>
                      ) : (
                        <>
                          <div className="name-wrap">
                            <div className="name" style={{
                              textDecoration: pendingByAccountId?.get(a.id)?.action === 'delete' ? 'line-through' : 'none',
                            }}>
                              {(() => {
                                // Show small badges for each member that has any access
                                const perms = a.permissions || {};
                                const members = (users || []).filter(u => u.role !== 'admin');
                                const granted = members.filter(u => (perms[u.id] || 'none') !== 'none');
                                if (granted.length === 0) return null;
                                return (
                                  <span className="shared-badge" title={granted.map(u => u.label).join(', ')}>
                                    {granted.map(u => u.icon || '👤').join('')}
                                  </span>
                                );
                              })()}
                              {a.name}
                              <span className="dec-badge">·{dec}d</span>
                              {pendingByAccountId?.get(a.id) && (() => {
                                const op = pendingByAccountId.get(a.id);
                                const meta = op.action === 'add'    ? { c: 'var(--sync-warn)',    e: '🟡' } :
                                             op.action === 'edit'   ? { c: 'orange',               e: '🟠' } :
                                             op.action === 'delete' ? { c: 'var(--expense-soft)', e: '🔴' } :
                                             null;
                                return meta ? (
                                  <span style={{
                                    display: 'inline-block', marginLeft: 6, padding: '1px 6px',
                                    borderRadius: 6, background: meta.c, color: '#fff',
                                    fontSize: 10, fontWeight: 600, verticalAlign: 'middle',
                                  }} title={`รอ deploy: ${op.action}`}>
                                    {meta.e} pending
                                  </span>
                                ) : null;
                              })()}
                            </div>
                            <div className="meta">
                              {usage > 0 ? `ใช้ ${usage} ครั้ง` : 'ยังไม่ถูกใช้'}
                              {' · '}
                              ทศนิยม {dec} ตำแหน่ง
                            </div>
                          </div>
                          <div className="actions">
                            {isAdmin && (
                              <button
                                className="perm-btn"
                                onClick={() => setPermPanelId(permPanelId === a.id ? null : a.id)}
                                title="ตั้งสิทธิ์ผู้ใช้">
                                <Ic.Users size={14}/>
                              </button>
                            )}
                            {isAdmin && (
                              <button className="edit-btn" onClick={() => startEdit(a)}
                                      title="แก้ไข">
                                <Ic.Pencil size={14}/>
                              </button>
                            )}
                            {/* v5.15 (rule 1จ): non-admin can only delete accounts they
                                themselves created. Admin can always delete. */}
                            {(isAdmin || (a.createdBy && a.createdBy === currentUserId)) && (
                              <button className="del-btn" onClick={() => { setConfirmDelId(a.id); setEditingId(null); }}
                                      title="ลบ">
                                <Ic.Trash size={14}/>
                              </button>
                            )}
                          </div>
                        </>
                      )}
                      {/* v5.0: per-user permission panel — admin-only, expands inline */}
                      {permPanelId === a.id && isAdmin && (
                        <div className="perm-panel">
                          <div className="perm-panel-hd">สิทธิ์ของแต่ละผู้ใช้</div>
                          {(users || []).filter(u => u.role !== 'admin').map(u => {
                            const cur = (a.permissions || {})[u.id] || 'none';
                            return (
                              <div key={u.id} className="perm-row">
                                <span className="perm-user">
                                  <span className="perm-user-icon">{u.icon || '👤'}</span>
                                  {u.label}
                                </span>
                                <select
                                  className="vis-select"
                                  value={cur}
                                  onChange={(e) => onSetPerm(a.id, u.id, e.target.value)}>
                                  {PERM_OPTS.map(p => (
                                    <option key={p.id} value={p.id}>{p.label}</option>
                                  ))}
                                </select>
                              </div>
                            );
                          })}
                          {(users || []).filter(u => u.role !== 'admin').length === 0 && (
                            <div className="perm-empty">ยังไม่มีผู้ใช้คนอื่น — เพิ่มได้ในตั้งค่า</div>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
              <div className="items-mgr-stats">
                ทั้งหมด {sortedAccounts.length} บัญชี
              </div>
            </>
          )}

          <div style={{marginTop: 20}}>
            <button className="btn-primary" onClick={onClose} style={{width: '100%'}}>
              เสร็จสิ้น
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ============ Projects Manager Modal ============
function ProjectsManager({ projects, transactions, onClose, onAdd, onUpdate, onRemove, pendingByProjectId }) {
  const [newName, setNewName] = useState('');
  const [editingId, setEditingId] = useState(null);
  const [editDraft, setEditDraft] = useState('');
  const [confirmDelId, setConfirmDelId] = useState(null);

  const usageMap = useMemo(() => {
    const m = new Map();
    (transactions || []).forEach(t => {
      const k = (t.project || '').trim();
      if (k) m.set(k, (m.get(k) || 0) + 1);
    });
    return m;
  }, [transactions]);

  const sortedProjects = useMemo(() => {
    const list = [...(projects || [])];
    const q = newName.trim().toLowerCase();
    list.sort((a, b) => {
      if (q) {
        const aMatch = (a.name || '').toLowerCase().includes(q);
        const bMatch = (b.name || '').toLowerCase().includes(q);
        if (aMatch !== bMatch) return aMatch ? -1 : 1;
      }
      const ca = usageMap.get(a.name) || 0;
      const cb = usageMap.get(b.name) || 0;
      if (ca !== cb) return cb - ca;
      return a.name.localeCompare(b.name, 'th');
    });
    return list;
  }, [projects, usageMap, newName]);

  const handleAdd = () => {
    const n = newName.trim();
    if (!n) return;
    const ok = onAdd(n);
    if (ok) setNewName('');
  };

  const startEdit = (p) => {
    setEditingId(p.id);
    setEditDraft(p.name);
    setConfirmDelId(null);
  };
  const saveEdit = () => {
    const ok = onUpdate(editingId, editDraft);
    if (ok) { setEditingId(null); setEditDraft(''); }
  };
  const cancelEdit = () => { setEditingId(null); setEditDraft(''); };
  const confirmDelete = (id) => { onRemove(id); setConfirmDelId(null); };

  return (
    <div className="sheet-backdrop fade" onClick={onClose} style={{zIndex: 85}}>
      <div className="sheet-wrap sheet-in" onClick={e => e.stopPropagation()}>
        <div className="sheet">
          <div className="sheet-handle"></div>
          <div className="sheet-head">
            <h2>จัดการโครงการ</h2>
            <button className="icon-btn-round" onClick={onClose}><Ic.X size={16}/></button>
          </div>

          <div className="cat-head" style={{marginTop: 16}}>เพิ่มโครงการใหม่</div>
          <div className="items-mgr-addbox">
            <input type="text" value={newName}
                   onChange={e => setNewName(e.target.value)}
                   onKeyDown={e => { if (e.key === 'Enter') handleAdd(); }}
                   placeholder="เช่น ซื้อบ้าน, เที่ยวญี่ปุ่น, การศึกษาลูก"
                   autoFocus/>
            <button onClick={handleAdd} disabled={!newName.trim()}>
              <Ic.Plus size={14}/> เพิ่ม
            </button>
          </div>

          <div className="cat-head" style={{marginTop: 18}}>โครงการทั้งหมด</div>
          {sortedProjects.length === 0 ? (
            <div className="items-mgr-empty">
              <div className="em">📁</div>
              <div>ยังไม่มีโครงการในระบบ</div>
              <div style={{fontSize: 11, marginTop: 4}}>
                โครงการจะถูกเพิ่มอัตโนมัติเมื่อคุณบันทึกธุรกรรม
              </div>
            </div>
          ) : (
            <>
              <div className="items-mgr-list">
                {sortedProjects.map(p => {
                  const isEditing = editingId === p.id;
                  const needsConfirm = confirmDelId === p.id;
                  const usage = usageMap.get(p.name) || 0;
                  return (
                    <div key={p.id} className="items-mgr-row">
                      {isEditing ? (
                        <>
                          <input className="edit" value={editDraft}
                                 onChange={e => setEditDraft(e.target.value)}
                                 onKeyDown={e => {
                                   if (e.key === 'Enter') saveEdit();
                                   else if (e.key === 'Escape') cancelEdit();
                                 }}
                                 autoFocus/>
                          <div className="actions">
                            <button className="save-btn" onClick={saveEdit}
                                    disabled={!editDraft.trim() || editDraft.trim() === p.name}
                                    title="บันทึก"><Ic.Check size={14}/></button>
                            <button className="cancel-btn" onClick={cancelEdit} title="ยกเลิก">
                              <Ic.X size={14}/>
                            </button>
                          </div>
                        </>
                      ) : needsConfirm ? (
                        <>
                          <div className="name-wrap">
                            <div className="name" style={{color: 'var(--expense-soft)'}}>ลบ "{p.name}" ?</div>
                            <div className="meta">
                              {usage > 0 ? `ใช้ใน ${usage} รายการ (ธุรกรรมจะยังอยู่)` : 'จะหายไปจากระบบ'}
                            </div>
                          </div>
                          <div className="actions">
                            <button className="save-btn" onClick={() => confirmDelete(p.id)}
                                    style={{background: 'var(--expense)', color: '#FBFAF6'}}
                                    title="ยืนยันลบ"><Ic.Check size={14}/></button>
                            <button className="cancel-btn" onClick={() => setConfirmDelId(null)}
                                    title="ยกเลิก"><Ic.X size={14}/></button>
                          </div>
                        </>
                      ) : (
                        <>
                          <div className="name-wrap">
                            <div className="name" style={{
                              textDecoration: pendingByProjectId?.get(p.id)?.action === 'delete' ? 'line-through' : 'none',
                            }}>
                              📁 {p.name}
                              {pendingByProjectId?.get(p.id) && (() => {
                                const op = pendingByProjectId.get(p.id);
                                const meta = op.action === 'add'    ? { c: 'var(--sync-warn)',    e: '🟡' } :
                                             op.action === 'edit'   ? { c: 'orange',               e: '🟠' } :
                                             op.action === 'delete' ? { c: 'var(--expense-soft)', e: '🔴' } :
                                             null;
                                return meta ? (
                                  <span style={{
                                    display: 'inline-block', marginLeft: 6, padding: '1px 6px',
                                    borderRadius: 6, background: meta.c, color: '#fff',
                                    fontSize: 10, fontWeight: 600, verticalAlign: 'middle',
                                  }} title={`รอ deploy: ${op.action}`}>
                                    {meta.e} pending
                                  </span>
                                ) : null;
                              })()}
                            </div>
                            <div className="meta">{usage > 0 ? `ใช้ ${usage} ครั้ง` : 'ยังไม่ถูกใช้'}</div>
                          </div>
                          <div className="actions">
                            <button className="edit-btn" onClick={() => startEdit(p)} title="แก้ไข">
                              <Ic.Pencil size={14}/>
                            </button>
                            <button className="del-btn" onClick={() => { setConfirmDelId(p.id); setEditingId(null); }}
                                    title="ลบ"><Ic.Trash size={14}/></button>
                          </div>
                        </>
                      )}
                    </div>
                  );
                })}
              </div>
              <div className="items-mgr-stats">ทั้งหมด {sortedProjects.length} โครงการ</div>
            </>
          )}

          <div style={{marginTop: 20}}>
            <button className="btn-primary" onClick={onClose} style={{width: '100%'}}>
              เสร็จสิ้น
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ============ Categories Manager Modal ============
// Manages only CUSTOM categories. Built-in categories are shown but not editable.
function CategoriesManager({ categories, transactions, onClose, onAdd, onUpdate, onRemove, pushToast, pendingByCategoryId }) {
  const [tab, setTab] = useState('expense'); // 'income' | 'expense'
  const [newName, setNewName] = useState('');
  const [newIcon, setNewIcon] = useState('🏷️');
  const [editingId, setEditingId] = useState(null);
  const [editName, setEditName] = useState('');
  const [editIcon, setEditIcon] = useState('');
  const [confirmDelId, setConfirmDelId] = useState(null);

  // Count usage per category id across transactions of this tab's type
  const usageMap = useMemo(() => {
    const m = new Map();
    (transactions || []).forEach(t => {
      if (t.type !== tab) return;
      const k = (t.category || '').trim();
      if (k) m.set(k, (m.get(k) || 0) + 1);
    });
    return m;
  }, [transactions, tab]);

  // Built-in categories (read-only in the manager; shown for reference)
  const builtins = tab === 'income' ? INCOME_CATS : EXPENSE_CATS;

  // Custom categories for this tab
  const customs = useMemo(() => {
    const list = (categories || []).filter(c => c.type === tab);
    list.sort((a, b) => (a.name || '').localeCompare(b.name || '', 'th'));
    return list;
  }, [categories, tab]);

  const handleAdd = () => {
    const n = newName.trim();
    if (!n) return;
    const ok = onAdd(n, newIcon || '🏷️', tab);
    if (ok) { setNewName(''); setNewIcon('🏷️'); }
  };

  const startEdit = (c) => {
    setEditingId(c.id);
    setEditName(c.name);
    setEditIcon(c.icon || '🏷️');
    setConfirmDelId(null);
  };
  const saveEdit = () => {
    const ok = onUpdate(editingId, editName, editIcon);
    if (ok) { setEditingId(null); setEditName(''); setEditIcon(''); }
  };
  const cancelEdit = () => { setEditingId(null); setEditName(''); setEditIcon(''); };

  return (
    <div className="sheet-backdrop fade" onClick={onClose} style={{zIndex: 85}}>

// ============ v3.5: Offline storage panel ============
// Shows pre-cache progress, pending uploads, and lets the user clear cache.
function OfflineStoragePanel({ account, isOnline, cacheStatus, pendingCount, pushToast }) {
  const [stats, setStats] = useState({ count: 0, bytes: 0 });
  const [busy, setBusy] = useState(false);

  // Refresh storage stats periodically + when key inputs change
  const refreshStats = async () => {
    const s = await idbCacheSize();
    setStats(s);
  };
  useEffect(() => {
    refreshStats();
    const intv = setInterval(refreshStats, 5000);
    return () => clearInterval(intv);
  }, [cacheStatus.done, pendingCount]);

  const formatBytes = (b) => {
    if (b < 1024) return `${b} B`;
    if (b < 1024 * 1024) return `${(b / 1024).toFixed(0)} KB`;
    return `${(b / 1024 / 1024).toFixed(1)} MB`;
  };

  const onClearCache = async () => {
    if (!confirm('ลบรูปที่ cache ในเครื่อง? (รูปบน OneDrive ยังอยู่ — ดาวน์โหลดใหม่เมื่อเปิดดูครั้งหน้า)')) return;
    setBusy(true);
    await clearPhotoCache();
    await refreshStats();
    setBusy(false);
    pushToast('ล้าง cache แล้ว');
  };

  const cachingProgress = cacheStatus.running && cacheStatus.total > 0
    ? Math.round((cacheStatus.done / cacheStatus.total) * 100)
    : null;

  return (
    <div className="panel rise">
      <div className="hd">
        <div className="ico-wrap"><Ic.Download size={16}/></div>
        <div>
          <div className="tt">รูปออฟไลน์</div>
          <div className="sb">
            {isOnline ? 'ออนไลน์ · sync อัตโนมัติ' : '🔌 ออฟไลน์ · ดูรูปจากเครื่องได้'}
          </div>
        </div>
      </div>

      {/* Stats grid */}
      <div className="cache-stats">
        <div className="cell">
          <div className="num">{stats.count.toLocaleString()}</div>
          <div className="lbl">รูปใน cache</div>
        </div>
        <div className="cell">
          <div className="num">{formatBytes(stats.bytes)}</div>
          <div className="lbl">ขนาด</div>
        </div>
        <div className="cell">
          <div className="num" style={{color: pendingCount > 0 ? 'var(--sync-warn)' : 'var(--income-soft)'}}>
            {pendingCount}
          </div>
          <div className="lbl">รออัปโหลด</div>
        </div>
      </div>

      {/* Pre-cache progress bar */}
      {cachingProgress !== null && (
        <div style={{marginTop: 12}}>
          <div style={{display: 'flex', justifyContent: 'space-between', fontSize: 11, color: 'var(--text-dim)', marginBottom: 4}}>
            <span>กำลังดาวน์โหลดรูป...</span>
            <span>{cacheStatus.done} / {cacheStatus.total}</span>
          </div>
          <div className="cache-progress">
            <div className="bar" style={{width: `${cachingProgress}%`}}></div>
          </div>
        </div>
      )}

      {/* Pending uploads notice */}
      {pendingCount > 0 && (
        <div className="cache-notice warn">
          ⏳ มีรูป {pendingCount} รูปรออัปโหลด — จะ upload อัตโนมัติเมื่อออนไลน์
        </div>
      )}

      <p style={{fontSize: 11, color: 'var(--text-dim)', margin: '12px 0 8px', lineHeight: 1.55}}>
        💡 รูปทั้งหมดจะถูกดาวน์โหลดเก็บไว้ในเครื่อง (Chrome) เปิดดูได้แม้ไม่มีเน็ต
        เก็บใน Chrome's IndexedDB ไม่ใช่ Gallery มือถือ — ลบ Chrome data จะหาย แต่ OneDrive ยังมีอยู่
      </p>

      <button className="btn-ghost" style={{width: '100%'}}
              onClick={onClearCache} disabled={busy || stats.count === 0}>
        {busy ? <><Ic.Refresh size={14} className="spin"/> กำลังล้าง</> : <><Ic.Trash size={14}/> ล้าง cache ในเครื่อง</>}
      </button>
    </div>
  );
}

// ============ v5.5: Advanced Search ============
// User can enter up to 3 keyword fragments (AND-combined), filter by project,
// account, and date range. Each non-empty keyword must appear (substring,
// case-insensitive, whitespace-trimmed) somewhere in any field of the transaction.
// Results are tappable — opens TxActionMenu like the regular list.
function SearchSheet({ allTransactions, accounts, projects, categories, onClose, onPickTx }) {
  const [k1, setK1] = useState('');
  const [k2, setK2] = useState('');
  const [k3, setK3] = useState('');
  const [project, setProject] = useState('');
  const [accountName, setAccountName] = useState('');
  const [dateFrom, setDateFrom] = useState('');
  const [dateTo, setDateTo] = useState('');
  const [submitted, setSubmitted] = useState(false); // run search after first click

  // Build a flat searchable string for a transaction across every meaningful field.
  // We deliberately include numbers (amount), dates, ids — same as the user expects
  // for "search every field".
  const searchableText = (t) => {
    const parts = [
      t.type, t.category, t.accountName, t.project, t.item, t.payee,
      t.note, t.date, t.createdAt,
      t.amount != null ? String(t.amount) : '',
      // photo names too (in case user remembers a receipt filename)
      ...(Array.isArray(t.photos) ? t.photos.map(p => p?.name || '') : []),
    ];
    return parts.filter(Boolean).join(' ').toLowerCase();
  };

  const results = useMemo(() => {
    if (!submitted) return null;
    const keywords = [k1, k2, k3].map(s => (s || '').trim().toLowerCase()).filter(Boolean);
    const projF = (project || '').trim();
    const accF = (accountName || '').trim();
    return (allTransactions || []).filter(t => {
      // Date range (inclusive). Skip if date doesn't parse.
      if (dateFrom && t.date && t.date < dateFrom) return false;
      if (dateTo && t.date && t.date > dateTo) return false;
      // Project / account filters (exact match, optional)
      if (projF && (t.project || '').trim() !== projF) return false;
      if (accF && (t.accountName || '').trim() !== accF) return false;
      // Keyword AND across every field
      if (keywords.length > 0) {
        const hay = searchableText(t);
        for (const kw of keywords) {
          if (!hay.includes(kw)) return false;
        }
      }
      return true;
    }).sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  }, [submitted, k1, k2, k3, project, accountName, dateFrom, dateTo, allTransactions]);

  const reset = () => {
    setK1(''); setK2(''); setK3('');
    setProject(''); setAccountName('');
    setDateFrom(''); setDateTo('');
    setSubmitted(false);
  };

  const onSubmit = () => {
    setSubmitted(true);
  };

  // No results yet & not yet submitted → show only the form
  // Submitted → show results list below the form
  return (
    <div className="sheet-backdrop fade" onClick={onClose} style={{zIndex: 90}}>
      <div className="sheet-wrap sheet-in" onClick={e => e.stopPropagation()}>
        <div className="sheet">
          <div className="sheet-handle"></div>
          <div className="sheet-head">
            <h2>🔍 ค้นหารายการ</h2>
            <button className="icon-btn-round" onClick={onClose}><Ic.X size={16}/></button>
          </div>

          {/* Keyword inputs — all optional, AND-combined */}
          <div className="search-form">
            <label className="search-label">คำค้นหา (ใส่อย่างน้อย 1 ช่อง)</label>
            <ClearableInput
              type="text"
              className="search-input"
              placeholder="ข้อความที่ 1 (เช่น ค่าน้ำ)"
              value={k1}
              onChange={(e) => setK1(e.target.value)}
            />
            <ClearableInput
              type="text"
              className="search-input"
              placeholder="ข้อความที่ 2 (เช่น เมษ — เพิ่มเงื่อนไข)"
              value={k2}
              onChange={(e) => setK2(e.target.value)}
            />
            <ClearableInput
              type="text"
              className="search-input"
              placeholder="ข้อความที่ 3 (optional)"
              value={k3}
              onChange={(e) => setK3(e.target.value)}
            />

            <div className="search-divider"></div>

            <label className="search-label">เลือก (optional)</label>
            <select
              className="search-input"
              value={project}
              onChange={(e) => setProject(e.target.value)}>
              <option value="">— ทุกโครงการ —</option>
              {(projects || []).map(p => (
                <option key={p.id} value={p.name}>{p.name}</option>
              ))}
            </select>
            <select
              className="search-input"
              value={accountName}
              onChange={(e) => setAccountName(e.target.value)}>
              <option value="">— ทุกบัญชี —</option>
              {(accounts || []).map(a => (
                <option key={a.id} value={a.name}>{a.name}</option>
              ))}
            </select>

            <div className="search-divider"></div>

            <label className="search-label">ช่วงเวลา (optional)</label>
            <div className="search-date-row">
              <div className="search-date-cell">
                <span className="search-date-lbl">จาก</span>
                <input
                  type="date"
                  className="search-input"
                  value={dateFrom}
                  onChange={(e) => setDateFrom(e.target.value)}
                />
              </div>
              <div className="search-date-cell">
                <span className="search-date-lbl">ถึง</span>
                <input
                  type="date"
                  className="search-input"
                  value={dateTo}
                  onChange={(e) => setDateTo(e.target.value)}
                />
              </div>
            </div>

            <div className="search-actions">
              <button className="btn-ghost" onClick={reset} type="button">
                ล้าง
              </button>
              <button className="btn-primary" onClick={onSubmit} type="button">
                <Ic.Search size={14}/> ค้นหา
              </button>
            </div>
          </div>

          {/* Results list — v5.9: reuse TxRow so search results show thumbnails too */}
          {submitted && results !== null && (
            <div className="search-results">
              <div className="search-results-hd">
                {results.length === 0
                  ? '— ไม่พบรายการที่ตรง —'
                  : `พบ ${results.length} รายการ`}
              </div>
              <div className="tx-list" style={{marginTop: 8}}>
                {results.map((t, i) => (
                  <TxRow key={t.id}
                         t={t}
                         delay={Math.min(i * 20, 200)}
                         accounts={accounts}
                         customCats={categories || []}
                         onClick={() => onPickTx(t)}/>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// Note: v5.9 removed the dedicated SearchResultRow component — search results
// now reuse the same TxRow used in the main list, so they get thumbnails and
// consistent styling for free.

function LessonsEditor({ onClose, pushToast }) {
  const [content, setContent] = useState('');
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [originalContent, setOriginalContent] = useState('');
  const [savedAt, setSavedAt] = useState(null);

  // Load existing lessons.md once on mount
  useEffect(() => {
    let cancelled = false;
    (async () => {
      const text = await odriveGetText('lessons.md');
      if (cancelled) return;
      const initial = text != null ? text : LESSONS_TEMPLATE;
      setContent(initial);
      setOriginalContent(initial);
      setLoading(false);
    })();
    return () => { cancelled = true; };
  }, []);

  const dirty = content !== originalContent;

  const save = async () => {
    if (saving || !dirty) return;
    setSaving(true);
    try {
      await odrivePutText('lessons.md', content, 'text/markdown; charset=utf-8');
      setOriginalContent(content);
      setSavedAt(new Date());
      pushToast('บันทึกแล้ว');
    } catch (e) {
      pushToast('บันทึกไม่สำเร็จ');
      console.error('save lessons.md failed:', e);
    } finally {
      setSaving(false);
    }
  };

  const insertTimestamp = () => {
    const now = new Date();
    const stamp = now.toLocaleString('th-TH', {
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit',
    });
    const heading = `\n\n## ${stamp}\n\n`;
    setContent(c => c + heading);
  };

  const tryClose = () => {
    if (dirty && !confirm('ยังไม่ได้บันทึก ออกเลยหรือไม่?')) return;
    onClose();
  };

  return (
    <div className="sheet-backdrop fade" onClick={tryClose} style={{zIndex: 90}}>
      <div className="sheet-wrap sheet-in" onClick={e => e.stopPropagation()}>
        <div className="sheet">
          <div className="sheet-handle"></div>
          <div className="sheet-head">
            <h2>📔 สมุดบันทึก</h2>
            <button className="icon-btn-round" onClick={tryClose}><Ic.X size={16}/></button>
          </div>

          <div style={{fontSize: 11, color: 'var(--text-faint)', marginTop: 6, marginBottom: 12}}>
            เก็บที่ <span style={{color: 'var(--gold)', fontFamily: 'IBM Plex Mono, monospace'}}>/Apps/my money/lessons.md</span>
          </div>

          {loading ? (
            <div style={{textAlign: 'center', padding: 40, color: 'var(--text-dim)'}}>
              <Ic.Refresh size={20} className="spin"/>
              <div style={{marginTop: 8, fontSize: 13}}>กำลังโหลด...</div>
            </div>
          ) : (
            <>
              <textarea
                className="lessons-editor"
                value={content}
                onChange={e => setContent(e.target.value)}
                placeholder="เขียนบทเรียน / คำอธิบายของ Claude / โน้ตสำคัญที่นี่..."
                spellCheck={false}
              />

              <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 8, fontSize: 11, color: 'var(--text-faint)'}}>
                <span>{content.length.toLocaleString()} ตัวอักษร</span>
                {savedAt && !dirty && (
                  <span style={{color: 'var(--income-soft)'}}>
                    ✓ บันทึกแล้ว {savedAt.toLocaleTimeString('th-TH', {hour: '2-digit', minute: '2-digit'})}
                  </span>
                )}
                {dirty && <span style={{color: 'var(--sync-warn)'}}>● มีการแก้ไข</span>}
              </div>

              <div className="lessons-savebar">
                <button className="btn-ghost" onClick={insertTimestamp} type="button">
                  <Ic.Plus size={14}/> เพิ่มหัวข้อใหม่
                </button>
                <button className="btn-primary" onClick={save} disabled={!dirty || saving} type="button">
                  {saving ? <><Ic.Refresh size={14} className="spin"/> กำลังบันทึก</> : <><Ic.Cloud size={14}/> บันทึก</>}
                </button>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}
