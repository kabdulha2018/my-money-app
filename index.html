// ============ ⚠️ v5.0: User & Permission System ============
// User registry is stored INSIDE state.users (synced via OneDrive).
// PINs are stored as SHA-256 hashes — even someone with raw OneDrive access can't
// read the PIN.
//
// On first run after upgrading from v4.x (or fresh install), DEFAULT_USERS is
// seeded into state. Admin can then add/remove/rename/change-PIN from inside the app.

const DEFAULT_USERS = [
  { id: 'abi',     label: 'อาบี',       icon: '👑', role: 'admin'  },
  { id: 'amimoh',  label: 'อามีเมาะห์', icon: '👩', role: 'member' },
  { id: 'ummirin', label: 'อุมมีรีน',   icon: '👩', role: 'member' },
  { id: 'hakam',   label: 'ฮากัม',      icon: '👦', role: 'member' },
];
const DEFAULT_PIN = '1234'; // ทุก user เริ่มต้นด้วย PIN 1234 — admin ควรเปลี่ยนทันทีหลัง deploy

// Per-account permission levels (for non-admin users; admins always have full access)
const PERM_OPTS = [
  { id: 'none',     label: '🚫 ไม่เห็น'                    },
  { id: 'view',     label: '👁️ ดูอย่างเดียว'                },
  { id: 'edit-own', label: '✏️ ดู+แก้เฉพาะของตัวเอง'        },
];
const PERM_LABEL = (id) => (PERM_OPTS.find(p => p.id === id) || PERM_OPTS[0]).label;

// Hash a PIN using SHA-256 + a fixed app salt. Pure function, no side effects.
// Returns hex string. Used both when creating a user and when verifying a PIN entry.
async function hashPin(pin) {
  const text = `mymoney:v5:${pin}`;
  const buf = new TextEncoder().encode(text);
  const digest = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(digest))
    .map(b => b.toString(16).padStart(2, '0'))
    .join('');
}

// Resolve effective permission for a user on a given account.
// Admin → always 'edit-own' (treated as full edit; combined with admin role checks
// elsewhere they can edit any tx, not just their own).
// Member → looks up account.permissions[userId], defaults to 'none'.
function getAccountPerm(user, account) {
  if (!user || !account) return 'none';
  if (user.role === 'admin') return 'admin';
  return (account.permissions && account.permissions[user.id]) || 'none';
}
// True if user can see this account at all
function canViewAccount(user, account) {
  const p = getAccountPerm(user, account);
  return p !== 'none';
}
// True if user can edit/delete this specific transaction
function canEditTx(user, account, tx) {
  const p = getAccountPerm(user, account);
  if (p === 'admin') return true;       // admin can edit anything
  if (p === 'edit-own') return tx.createdBy === user.id;
  return false;                         // 'view' or 'none'
}
// True if user can ADD new transactions to this account
function canAddToAccount(user, account) {
  const p = getAccountPerm(user, account);
  return p === 'admin' || p === 'edit-own';
}

// ========== MSAL + Graph ==========
const CFG = window.APP_CONFIG;
const HAS_CONFIG = CFG.clientId && !CFG.clientId.startsWith("REPLACE_");
const GRAPH_URL = (path) => `https://graph.microsoft.com/v1.0${path}`;
const FILE_PATH = `/me/drive/special/approot:/${CFG.dataFileName}:/content`;

let msalInstance = null;
async function initMsal() {
  if (!HAS_CONFIG) return null;
  if (msalInstance) return msalInstance;
  msalInstance = new msal.PublicClientApplication({
    auth: {
      clientId: CFG.clientId,
      authority: CFG.authority,
      redirectUri: window.location.origin + window.location.pathname,
    },
    cache: {
      cacheLocation: 'localStorage',
      storeAuthStateInCookie: false,
    },
  });
  await msalInstance.initialize();
  // handle redirect if coming back from auth (safety)
  try { await msalInstance.handleRedirectPromise(); } catch {}
  return msalInstance;
}

async function getAccount() {
  const inst = await initMsal();
  if (!inst) return null;
  const accs = inst.getAllAccounts();
  return accs[0] || null;
}

// v5.2: Detect in-app browsers (Messenger, LINE, Facebook, Instagram, etc.)
// These browsers run pages inside a popup which prevents MSAL popup-based login.
// When detected we skip popup entirely and use redirect from the start.
function isInAppBrowser() {
  try {
    const ua = navigator.userAgent || '';
    // Common in-app browser markers — covers Messenger, FB, Instagram, LINE,
    // KakaoTalk, WeChat, TikTok, etc.
    if (/FBAN|FBAV|Messenger|Instagram|Line\/|KAKAOTALK|MicroMessenger|Twitter|TikTok|Snapchat/i.test(ua)) {
      return true;
    }
    // Detect "is this window itself a popup" — works for any in-app browser even if
    // the user-agent doesn't list itself. window.opener !== null means another window
    // opened us (which is what in-app browsers do).
    if (window.opener && window.opener !== window) return true;
  } catch {}
  return false;
}

async function signIn() {
  const inst = await initMsal();
  // v5.2: If we're already inside an in-app browser, skip popup and go straight to
  // redirect — popup will only fail with block_nested_popups.
  if (isInAppBrowser()) {
    await inst.loginRedirect({ scopes: CFG.scopes, prompt: 'select_account' });
    return null; // navigation happens; nothing more to do
  }
  // Try popup first (works in regular Chrome).
  // If MSAL throws ANY popup-related error, fall back to redirect.
  try {
    const res = await inst.loginPopup({ scopes: CFG.scopes, prompt: 'select_account' });
    return res.account;
  } catch (e) {
    const code = String(e?.errorCode || e?.errorMessage || e?.message || '');
    const isPopupBlocked = /block_nested_popups|popup_window_error|empty_window_error|popup_blocked/i.test(code)
      || (e?.name === 'BrowserAuthError' && /popup/i.test(code));
    if (isPopupBlocked) {
      await inst.loginRedirect({ scopes: CFG.scopes, prompt: 'select_account' });
      return null;
    }
    throw e;
  }
}

async function signOut() {
  const inst = await initMsal();
  const account = inst.getAllAccounts()[0];
  if (account) {
    try {
      await inst.logoutPopup({ account, mainWindowRedirectUri: window.location.origin + window.location.pathname });
    } catch (e) {
      // Popup blocked (in-app browser) or other error — clear local cache as last resort.
      // We deliberately don't try logoutRedirect here because users normally want to
      // stay on this page after sign-out, not navigate to Microsoft's logout page.
      try { await inst.clearCache(); } catch {}
    }
  }
}

async function getToken() {
  const inst = await initMsal();
  const account = inst.getAllAccounts()[0];
  if (!account) throw new Error('Not signed in');
  try {
    const r = await inst.acquireTokenSilent({ scopes: CFG.scopes, account });
    return r.accessToken;
  } catch (e) {
    if (e.name === 'InteractionRequiredAuthError' || /interaction_required|consent_required|login_required/i.test(String(e?.errorCode || e?.message))) {
      // v5.2: in in-app browser go straight to redirect
      if (isInAppBrowser()) {
        await inst.acquireTokenRedirect({ scopes: CFG.scopes, account });
        throw new Error('Redirecting for token...');
      }
      try {
        const r = await inst.acquireTokenPopup({ scopes: CFG.scopes, account });
        return r.accessToken;
      } catch (popupErr) {
        const code = String(popupErr?.errorCode || popupErr?.errorMessage || popupErr?.message || '');
        const isPopupBlocked = /block_nested_popups|popup_window_error|empty_window_error|popup_blocked/i.test(code)
          || (popupErr?.name === 'BrowserAuthError' && /popup/i.test(code));
        if (isPopupBlocked) {
          await inst.acquireTokenRedirect({ scopes: CFG.scopes, account });
          throw new Error('Redirecting for token...');
        }
        throw popupErr;
      }
    }
    throw e;
  }
}

async function remoteFetch() {
  const token = await getToken();
  const res = await fetch(GRAPH_URL(FILE_PATH), {
    headers: { Authorization: `Bearer ${token}` },
  });
  if (res.status === 404) return null;
  if (!res.ok) throw new Error(`Load ${res.status}`);
  return await res.json();
}

async function remoteSave(data) {
  const token = await getToken();
  const res = await fetch(GRAPH_URL(FILE_PATH), {
    method: 'PUT',
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(data),
  });
  if (!res.ok) { const t = await res.text(); throw new Error(`Save ${res.status}: ${t.slice(0,120)}`); }
  return await res.json();
}

// ========== Local photo store (IndexedDB) ==========
// v3.5: bumped to v2 — added 'pending' store for offline uploads queue
const IDB_NAME = 'mymoney-photos';
const IDB_STORE = 'photos';        // cached photos: key = OneDrive ID, value = Blob
const IDB_PENDING = 'pending';     // queued uploads: key = local-temp-id, value = { blob, txId, name, createdAt }
let _idbPromise = null;
function openDB() {
  if (_idbPromise) return _idbPromise;
  _idbPromise = new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, 2);
    req.onupgradeneeded = (e) => {
      const db = req.result;
      if (!db.objectStoreNames.contains(IDB_STORE)) {
        db.createObjectStore(IDB_STORE); // key = photoId (OneDrive ID)
      }
      if (!db.objectStoreNames.contains(IDB_PENDING)) {
        db.createObjectStore(IDB_PENDING); // key = local-temp-id, value = { blob, txId, name }
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
  return _idbPromise;
}
async function idbPutBlob(key, blob) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).put(blob, key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}
async function idbGetBlob(key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, 'readonly');
    const req = tx.objectStore(IDB_STORE).get(key);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = () => reject(req.error);
  });
}
async function idbDeleteBlob(key) {
  try {
    const db = await openDB();
    return new Promise((resolve) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).delete(key);
      tx.oncomplete = () => resolve();
      tx.onerror = () => resolve();
    });
  } catch { /* ignore */ }
}
// v3.5: list all photo IDs currently cached locally
async function idbListPhotoIds() {
  try {
    const db = await openDB();
    return new Promise((resolve) => {
      const tx = db.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).getAllKeys();
      req.onsuccess = () => resolve(Array.isArray(req.result) ? req.result : []);
      req.onerror = () => resolve([]);
    });
  } catch { return []; }
}
// v3.5: estimate total cached size (sum of blob sizes)
async function idbCacheSize() {
  try {
    const db = await openDB();
    return new Promise((resolve) => {
      const tx = db.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).getAll();
      req.onsuccess = () => {
        const blobs = req.result || [];
        const total = blobs.reduce((sum, b) => sum + (b.size || 0), 0);
        resolve({ count: blobs.length, bytes: total });
      };
      req.onerror = () => resolve({ count: 0, bytes: 0 });
    });
  } catch { return { count: 0, bytes: 0 }; }
}

// v3.5: pending uploads queue (offline mode)
async function idbAddPending(localId, payload) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_PENDING, 'readwrite');
    tx.objectStore(IDB_PENDING).put(payload, localId);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}
async function idbGetPending(localId) {
  const db = await openDB();
  return new Promise((resolve) => {
    const tx = db.transaction(IDB_PENDING, 'readonly');
    const req = tx.objectStore(IDB_PENDING).get(localId);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = () => resolve(null);
  });
}
async function idbDeletePending(localId) {
  try {
    const db = await openDB();
    return new Promise((resolve) => {
      const tx = db.transaction(IDB_PENDING, 'readwrite');
      tx.objectStore(IDB_PENDING).delete(localId);
      tx.oncomplete = () => resolve();
      tx.onerror = () => resolve();
    });
  } catch {}
}
async function idbListPending() {
  try {
    const db = await openDB();
    return new Promise((resolve) => {
      const tx = db.transaction(IDB_PENDING, 'readonly');
      const req = tx.objectStore(IDB_PENDING).getAll();
      const reqKeys = tx.objectStore(IDB_PENDING).getAllKeys();
      const out = [];
      tx.oncomplete = () => {
        const values = req.result || [];
        const keys = reqKeys.result || [];
        for (let i = 0; i < keys.length; i++) out.push({ localId: keys[i], ...values[i] });
        resolve(out);
      };
      tx.onerror = () => resolve([]);
    });
  } catch { return []; }
}

// Upload photo: saves to BOTH OneDrive (/photos/) AND local IndexedDB.
// v3.5: if offline OR upload fails → queue for later (returns local-id-prefixed result)
async function uploadPhoto(file, txId) {
  // If offline, queue immediately
  if (!navigator.onLine) {
    return await queuePhotoForUpload(file, txId);
  }
  // Resize first
  const blob = await resizeImage(file, 1600, 0.82);
  const ext = (file.name.split('.').pop() || 'jpg').toLowerCase().replace(/[^a-z]/g, '') || 'jpg';
  const filename = `${txId}-${Date.now()}.${ext}`;
  try {
    const token = await getToken();
    const path = `/me/drive/special/approot:/photos/${filename}:/content`;
    const res = await fetch(GRAPH_URL(path), {
      method: 'PUT',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': blob.type || 'image/jpeg' },
      body: blob,
    });
    if (!res.ok) {
      // Network/auth error — fall back to queue rather than losing the photo
      console.warn(`Upload failed (${res.status}), queueing offline`);
      return await queuePhotoForUpload(file, txId);
    }
    const meta = await res.json();
    // Cache locally — keyed by OneDrive ID for later fast retrieval
    try { await idbPutBlob(meta.id, blob); } catch (e) { console.warn('local cache save failed', e); }
    return { id: meta.id, name: meta.name, size: meta.size };
  } catch (e) {
    console.warn('Upload error, queueing offline:', e);
    return await queuePhotoForUpload(file, txId);
  }
}

// Fetch photo URL: tries local IndexedDB first, falls back to OneDrive.
// v3.5: local-* IDs are pending uploads — never reach out to OneDrive for them.
async function fetchPhotoUrl(photoId) {
  // Try local first
  try {
    const blob = await idbGetBlob(photoId);
    if (blob) return URL.createObjectURL(blob);
  } catch {}
  // If this is a local-only ID and we don't have it, give up — it's not on cloud yet
  if (String(photoId).startsWith('local-')) {
    throw new Error('Pending upload not found in local cache');
  }
  // Fallback to OneDrive
  const token = await getToken();
  const res = await fetch(GRAPH_URL(`/me/drive/items/${photoId}/content`), {
    headers: { Authorization: `Bearer ${token}` },
  });
  if (!res.ok) throw new Error(`Photo fetch ${res.status}`);
  const blob = await res.blob();
  // Cache for next time
  try { await idbPutBlob(photoId, blob); } catch {}
  return URL.createObjectURL(blob);
}

// Delete photo from BOTH OneDrive and local cache.
// v3.5: handle local-* IDs that haven't been uploaded yet (no OneDrive call needed).
async function deletePhoto(photoId) {
  // Delete from local cache (always, even offline)
  idbDeleteBlob(photoId);
  // If pending, also remove from queue
  if (String(photoId).startsWith('local-')) {
    idbDeletePending(photoId);
    return;
  }
  // Delete from OneDrive
  try {
    const token = await getToken();
    await fetch(GRAPH_URL(`/me/drive/items/${photoId}`), {
      method: 'DELETE',
      headers: { Authorization: `Bearer ${token}` },
    });
  } catch (e) { console.warn('Photo delete failed:', e); }
}

// ========== v3.5: Offline mode helpers ==========

// Save a photo locally for later upload. Returns a synthetic local ID with
// "local-" prefix so the rest of the app can recognise it as not-yet-on-cloud.
async function queuePhotoForUpload(file, txId) {
  const blob = await resizeImage(file, 1600, 0.82);
  const localId = 'local-' + Math.random().toString(36).slice(2, 10) + '-' + Date.now();
  const ext = (file.name.split('.').pop() || 'jpg').toLowerCase().replace(/[^a-z]/g, '') || 'jpg';
  const name = `${txId}-${Date.now()}.${ext}`;
  // Store the blob in BOTH stores: photos (so it can be displayed by ID) and pending (queue)
  await idbPutBlob(localId, blob);
  await idbAddPending(localId, { txId, name, contentType: blob.type || 'image/jpeg', createdAt: new Date().toISOString() });
  return { id: localId, name, size: blob.size };
}

// Push all pending uploads to OneDrive. Updates state to swap local IDs → OneDrive IDs.
// Returns { uploaded, failed, skipped } counts. Caller should pass a `swapId` callback
// that will rewrite the photo ID inside transactions.
async function flushPendingUploads(swapId) {
  const pending = await idbListPending();
  let uploaded = 0, failed = 0;
  for (const item of pending) {
    try {
      const blob = await idbGetBlob(item.localId);
      if (!blob) { await idbDeletePending(item.localId); continue; }
      const token = await getToken();
      const path = `/me/drive/special/approot:/photos/${item.name}:/content`;
      const res = await fetch(GRAPH_URL(path), {
        method: 'PUT',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': item.contentType || 'image/jpeg' },
        body: blob,
      });
      if (!res.ok) { failed += 1; continue; }
      const meta = await res.json();
      // Re-key the cached blob from local-id → OneDrive id, so future fetches by OneDrive id hit cache
      try {
        await idbPutBlob(meta.id, blob);
        await idbDeleteBlob(item.localId);
      } catch {}
      await idbDeletePending(item.localId);
      // Tell the React layer to swap IDs in transactions
      try { swapId?.(item.localId, meta.id); } catch (e) { console.warn(e); }
      uploaded += 1;
    } catch (e) {
      console.warn('flush pending: one item failed', e);
      failed += 1;
    }
  }
  return { uploaded, failed, total: pending.length };
}

// Pre-cache: download every photo referenced in transactions[] that isn't already in IDB.
// Called in background after login. Reports progress through an optional callback.
async function preCacheAllPhotos(transactions, onProgress) {
  // Collect every OneDrive photo ID from transactions (skip local- ids)
  const ids = new Set();
  (transactions || []).forEach(t => {
    if (Array.isArray(t.photos)) {
      t.photos.forEach(p => { if (p?.id && !p.id.startsWith('local-')) ids.add(p.id); });
    } else if (t.photoId && !String(t.photoId).startsWith('local-')) {
      ids.add(t.photoId);
    }
  });
  if (ids.size === 0) { onProgress?.({ done: 0, total: 0, cached: 0 }); return { done: 0, total: 0 }; }

  const cached = new Set(await idbListPhotoIds());
  const missing = Array.from(ids).filter(id => !cached.has(id));
  const total = missing.length;
  let done = 0;
  onProgress?.({ done: 0, total, cached: cached.size });

  // Throttle: download one at a time to be gentle on bandwidth and Graph rate limits
  for (const id of missing) {
    try {
      const token = await getToken();
      const res = await fetch(GRAPH_URL(`/me/drive/items/${id}/content`), {
        headers: { Authorization: `Bearer ${token}` },
      });
      if (res.ok) {
        const blob = await res.blob();
        try { await idbPutBlob(id, blob); } catch {}
      }
    } catch (e) {
      // network blip — keep going; will retry next session
    }
    done += 1;
    onProgress?.({ done, total, cached: cached.size + done });
  }
  return { done, total };
}

// v3.5: clear all cached photos (frees space; OneDrive copies remain)
async function clearPhotoCache() {
  try {
    const db = await openDB();
    return new Promise((resolve) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).clear();
      tx.oncomplete = () => resolve();
      tx.onerror = () => resolve();
    });
  } catch {}
}

// ========== v2.9: Version archive system ==========
// Stores each new version of index.html in OneDrive /Apps/my money/versions/
// and maintains a CHANGELOG.md so user can audit & downgrade later.

const APP_VERSION = 'v5.5';
const APP_VERSION_TAG = 'Advanced search (3 keywords AND + filters)';

// Check whether a file exists in the app folder
async function odriveFileExists(path) {
  try {
    const token = await getToken();
    const res = await fetch(GRAPH_URL(`/me/drive/special/approot:/${path}`), {
      headers: { Authorization: `Bearer ${token}` },
    });
    return res.ok;
  } catch { return false; }
}

// PUT a text/binary blob to a path inside approot
async function odrivePutText(path, text, contentType = 'text/plain; charset=utf-8') {
  const token = await getToken();
  const res = await fetch(GRAPH_URL(`/me/drive/special/approot:/${path}:/content`), {
    method: 'PUT',
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': contentType },
    body: text,
  });
  if (!res.ok) {
    const t = await res.text();
    throw new Error(`PUT ${path} → ${res.status}: ${t.slice(0,120)}`);
  }
  return res.json();
}

async function odriveGetText(path) {
  try {
    const token = await getToken();
    const res = await fetch(GRAPH_URL(`/me/drive/special/approot:/${path}:/content`), {
      headers: { Authorization: `Bearer ${token}` },
    });
    if (!res.ok) return null;
    return await res.text();
  } catch { return null; }
}

// Archive THIS version of index.html into OneDrive (idempotent: skips if already there)
async function archiveVersionIfNeeded() {
  const archivePath = `versions/index-${APP_VERSION}.html`;
  const exists = await odriveFileExists(archivePath);
  if (exists) return { archived: false, reason: 'already-exists' };

  // Fetch current HTML from the running URL
  let html;
  try {
    const r = await fetch(window.location.href, { cache: 'no-store' });
    if (!r.ok) throw new Error(`fetch failed ${r.status}`);
    html = await r.text();
  } catch (e) {
    console.warn('archive: cannot fetch own HTML:', e);
    return { archived: false, reason: 'fetch-failed' };
  }

  // Save the snapshot
  await odrivePutText(archivePath, html, 'text/html; charset=utf-8');

  // Append to CHANGELOG.md (or create it)
  const now = new Date();
  const stamp = now.toISOString().replace('T', ' ').slice(0, 19) + ' UTC';
  const sizeKB = Math.round(html.length / 1024);
  const entryLines = [
    `## ${APP_VERSION} — ${APP_VERSION_TAG}`,
    `- Archived: ${stamp}`,
    `- Size: ${sizeKB} KB`,
    `- File: \`versions/index-${APP_VERSION}.html\``,
    ``,
  ];
  let existing = await odriveGetText('CHANGELOG.md');
  if (!existing) {
    existing = [
      '# my money — Version History',
      '',
      'This file is auto-generated by the app. Each new version of `index.html`',
      'is also archived under `versions/` so you can downgrade or audit changes.',
      '',
      'Most recent versions are listed at the top.',
      '',
    ].join('\n');
  }
  // Insert this version's entry at the top of the version log section.
  // Find the first "## " heading; insert before it. If none, append at end.
  const newEntry = entryLines.join('\n');
  const firstHeadingIdx = existing.search(/\n## /);
  let updated;
  if (firstHeadingIdx >= 0) {
    updated = existing.slice(0, firstHeadingIdx + 1) + newEntry + existing.slice(firstHeadingIdx + 1);
  } else {
    updated = existing + '\n' + newEntry;
  }
  await odrivePutText('CHANGELOG.md', updated, 'text/markdown; charset=utf-8');
  return { archived: true, sizeKB, stamp };
}


// Resize image using canvas (keeps aspect ratio, outputs JPEG)
function resizeImage(file, maxDim, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          if (width > height) { height = Math.round(height * maxDim / width); width = maxDim; }
          else { width = Math.round(width * maxDim / height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        canvas.toBlob((blob) => blob ? resolve(blob) : reject(new Error('blob failed')),
                      'image/jpeg', quality);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ========== Sync Hook ==========
function useSync(state, setState, isOnline) {
  // status: 'idle' | 'syncing' | 'ok' | 'offline' | 'error'
  const [status, setStatus] = useState('idle');
  const [lastSync, setLastSync] = useState(null);
  const [errMsg, setErrMsg] = useState(null);
  const timerRef = useRef(null);
  const syncingRef = useRef(false);

  // Build the full payload sent to OneDrive. Centralised so we don't forget any
  // top-level field (e.g. v5.0 added `users`).
  const buildPayload = (s) => ({
    app: 'my-money',
    version: 2, // bumped for v5.0 users schema (still readable by older versions which ignore unknown fields)
    lastModified: s.lastModified || new Date().toISOString(),
    transactions: s.transactions || [],
    items:        s.items || [],
    accounts:     s.accounts || [],
    projects:     s.projects || [],
    categories:   s.categories || [],
    users:        s.users || [],   // v5.0
  });

  // Initial pull
  const pullOnce = useCallback(async () => {
    if (!isOnline) { setStatus('offline'); return; }
    setStatus('syncing');
    try {
      const remote = await remoteFetch();
      if (remote && remote.transactions) {
        const remoteTime = remote.lastModified || '';
        const localTime = state.lastModified || '';
        if (!localTime || remoteTime > localTime) {
          setState({
            transactions: remote.transactions,
            items:      remote.items || [],
            accounts:   remote.accounts || [],
            projects:   remote.projects || [],
            categories: remote.categories || [],
            users:      remote.users || [],  // v5.0
            lastModified: remoteTime,
          });
        } else if (localTime > remoteTime) {
          // push local up
          await remoteSave(buildPayload(state));
        }
      } else if (state.transactions.length > 0 || (state.items || []).length > 0 || (state.accounts || []).length > 0 || (state.projects || []).length > 0 || (state.categories || []).length > 0 || (state.users || []).length > 0) {
        // remote is empty but we have local data → push it
        await remoteSave(buildPayload(state));
      }
      setStatus('ok');
      setLastSync(new Date());
      setErrMsg(null);
    } catch (e) {
      console.error(e);
      setStatus('error');
      setErrMsg(String(e.message || e));
    }
  }, [isOnline, state, setState]);

  // Scheduled push (debounced on state change)
  const schedulePush = useCallback(() => {
    if (!isOnline) return;
    if (timerRef.current) clearTimeout(timerRef.current);
    timerRef.current = setTimeout(async () => {
      if (syncingRef.current) return;
      syncingRef.current = true;
      setStatus('syncing');
      try {
        await remoteSave(buildPayload(state));
        setStatus('ok');
        setLastSync(new Date());
        setErrMsg(null);
      } catch (e) {
        console.error(e);
        setStatus('error');
        setErrMsg(String(e.message || e));
      } finally {
        syncingRef.current = false;
      }
    }, 2500);
  }, [isOnline, state]);

  return { status, lastSync, errMsg, pullOnce, schedulePush, setStatus };
}

function PinScreen({ profile, onBack, onSuccess }) {
  const [pin, setPin] = useState('');
  const [error, setError] = useState(false);
  const [verifying, setVerifying] = useState(false);

  const tryPin = async (entered) => {
    setVerifying(true);
    try {
      const expected = profile.pinHash;
      const got = await hashPin(entered);
      if (got === expected) {
        setTimeout(onSuccess, 100);
      } else {
        setError(true);
        setTimeout(() => { setPin(''); setError(false); }, 600);
      }
    } finally {
      setVerifying(false);
    }
  };

  const handleKey = (n) => {
    if (verifying) return;
    if (pin.length >= 4) return;
    const next = pin + n;
    setPin(next);
    if (next.length === 4) {
      tryPin(next);
    }
  };
  const del = () => { if (!verifying) setPin(prev => prev.slice(0, -1)); };

  return (
    <div className="pin-pad rise">
      <button className="pin-back" onClick={onBack} aria-label="ย้อนกลับ">
        <Ic.ChevL size={20}/>
      </button>
      <div className="pin-icon">{profile.icon || '👤'}</div>
      <h2 className="pin-name">{profile.label}</h2>
      <div className={`pin-prompt ${error ? 'err' : ''}`}>
        {error ? 'รหัสผ่านไม่ถูกต้อง' : 'กรุณาใส่รหัส PIN 4 หลัก'}
      </div>
      <div className={`pin-dots ${error ? 'shake' : ''}`}>
        {[0,1,2,3].map(i => (
          <div key={i}
               className={`pin-dot ${pin.length > i ? 'filled' : ''} ${error ? 'err' : ''}`}>
          </div>
        ))}
      </div>
      <div className="pin-keys">
        {[1,2,3,4,5,6,7,8,9].map(n => (
          <button key={n} className="pin-key" onClick={() => handleKey(String(n))}>{n}</button>
        ))}
        <button className="pin-key empty" tabIndex={-1}></button>
        <button className="pin-key" onClick={() => handleKey('0')}>0</button>
        <button className="pin-key del" onClick={del} aria-label="ลบ">⌫</button>
      </div>
    </div>
  );
}

  //   Next time the user opens the URL they must re-enter PIN.

  // - There is NO URL bypass — even ?as=wife or ?unlock= do nothing now.
  const [appProfileId, setAppProfileId] = useState(() => {

  // v5.0: derive current user object from state.users + appProfileId
  const currentUser = useMemo(

    }, 4000);
    return () => clearTimeout(timer);
  }, [account, skipSync, booting]);

  // v3.5: Pre-cache all photos for offline viewing (after login, runs once per session)
  const [cacheStatus, setCacheStatus] = useState({ done: 0, total: 0, running: false });
  const didPrecacheRef = useRef(false);
  useEffect(() => {
    if (!account || skipSync || booting) return;
    if (didPrecacheRef.current) return;
    if (!isOnline) return;
    if (!state.transactions || state.transactions.length === 0) return;
    didPrecacheRef.current = true;
    const timer = setTimeout(async () => {
      setCacheStatus(s => ({ ...s, running: true }));
      const result = await preCacheAllPhotos(state.transactions, (p) => {
        setCacheStatus({ done: p.done, total: p.total, running: p.done < p.total });
      });
      setCacheStatus({ done: result.done, total: result.total, running: false });
      if (result.total > 0) {
        console.log(`[precache] downloaded ${result.done}/${result.total} photos`);
      }
    }, 6000); // wait until after archive task
    return () => clearTimeout(timer);
  }, [account, skipSync, booting, isOnline, state.transactions]);

  // v3.5: Flush pending uploads when coming back online
  const [pendingCount, setPendingCount] = useState(0);
  // Helper that swaps a local-id → OneDrive-id inside transactions and resaves state
  const swapPhotoId = useCallback((localId, newId) => {
    setState(prev => {
      let changed = false;
      const newTx = (prev.transactions || []).map(t => {
        if (Array.isArray(t.photos)) {
          let mod = false;
          const next = t.photos.map(p => {
            if (p.id === localId) { mod = true; changed = true; return { ...p, id: newId }; }
            return p;
          });
          return mod ? { ...t, photos: next } : t;
        }
        if (t.photoId === localId) { changed = true; return { ...t, photoId: newId }; }
        return t;
      });
      if (!changed) return prev;
      return { ...prev, transactions: newTx, lastModified: new Date().toISOString() };
    });
  }, []);
  // Periodically refresh pending count + flush queue when online
  useEffect(() => {
    if (!account || skipSync || booting) return;
    let cancelled = false;
    const refresh = async () => {
      const pend = await idbListPending();
      if (!cancelled) setPendingCount(pend.length);
    };
    refresh();
    const flush = async () => {
      if (!isOnline) return;
      const pend = await idbListPending();
      if (pend.length === 0) return;
      const r = await flushPendingUploads(swapPhotoId);
      if (r.uploaded > 0) {
        pushToast(`อัปโหลดรูปค้าง ${r.uploaded} รูปแล้ว`);
      }
      refresh();
    };
    flush();
    // Check periodically (every 30s) in case user goes offline → online without page reload
    const intv = setInterval(flush, 30000);
    // Also flush immediately when "online" event fires
    const onOnline = () => flush();
    window.addEventListener('online', onOnline);
    return () => { cancelled = true; clearInterval(intv); window.removeEventListener('online', onOnline); };
  }, [account, skipSync, booting, isOnline, swapPhotoId]);

  // Trigger push on change
  const firstChangeRef = useRef(true);
  useEffect(() => {
    if (booting) return;
    if (firstChangeRef.current) { firstChangeRef.current = false; return; }
    if (isOnline && didPullRef.current) schedulePush();
  }, [state.transactions, state.items, state.accounts, state.projects, state.categories, state.users, state.lastModified, isOnline, booting, schedulePush]);

  // Migration: backfill master lists (accounts/projects/items) from existing transactions.
  // This handles legacy data from before the master list feature existed.
  // Runs ONCE per session after data is loaded — not on every state change, otherwise
  // deleting a master entry would re-add it from existing transactions.
  const didMigrateRef = useRef(false);
  useEffect(() => {
    if (booting) return;
    if (didMigrateRef.current) return;
    if (!state.transactions || state.transactions.length === 0) return;
    didMigrateRef.current = true;

    const LEGACY_ACCT = { cash: 'เงินสด', bank: 'ธนาคาร', credit: 'บัตรเครดิต', ewallet: 'e-Wallet' };
    const txAccounts = new Set();
    const txProjects = new Set();
    const txItems = new Set();
    state.transactions.forEach(t => {
      let a = (t.accountName || '').trim();
      if (a) { if (LEGACY_ACCT[a]) a = LEGACY_ACCT[a]; txAccounts.add(a); }
      const p = (t.project || '').trim();
      if (p) txProjects.add(p);
      const i = (t.item || t.payee || '').trim();
      if (i) txItems.add(i);
    });

    const existingA = new Set((state.accounts || []).map(a => (a.name || '').toLowerCase()));
    const existingP = new Set((state.projects || []).map(p => (p.name || '').toLowerCase()));
    const existingI = new Set((state.items || []).map(it => (it.name || '').toLowerCase()));

    const newA = Array.from(txAccounts).filter(n => !existingA.has(n.toLowerCase()));
    const newP = Array.from(txProjects).filter(n => !existingP.has(n.toLowerCase()));
    const newI = Array.from(txItems).filter(n => !existingI.has(n.toLowerCase()));

    if (newA.length === 0 && newP.length === 0 && newI.length === 0) return;

    const now = new Date().toISOString();
    mutate(prev => ({
      ...prev,
      accounts: [...(prev.accounts || []), ...newA.map(name => ({ id: uid(), name, decimals: 2, createdAt: now }))],
      projects: [...(prev.projects || []), ...newP.map(name => ({ id: uid(), name, createdAt: now }))],
      items:    [...(prev.items    || []), ...newI.map(name => ({ id: uid(), name, createdAt: now }))],
    }));
  }, [booting, state.transactions]);

  // v5.0 Migration: seed users + assign legacy transactions to admin.
  // Must run AFTER initial pull from OneDrive (to avoid overwriting remote users
  // that already have non-default PINs). We detect "pull complete" by either:
  //   - account is offline/skipSync (no pull will happen), or
  //   - didPullRef is true AND state.lastModified is set (data has loaded from remote)
  const didMigrateV5Ref = useRef(false);
  useEffect(() => {
    if (booting) return;
    if (didMigrateV5Ref.current) return;
    // Wait for the initial pull to settle before migrating, so we don't seed default
    // users on top of remote users with already-customised PINs.
    const offlineMode = !account || skipSync;
    const pullDone = didPullRef.current && (state.lastModified != null || (state.transactions || []).length === 0);
    if (!offlineMode && !pullDone) return;

    didMigrateV5Ref.current = true;
    (async () => {
      const hasUsers = Array.isArray(state.users) && state.users.length > 0;
      const needsTxOwner = (state.transactions || []).some(t => !t.createdBy);
      if (hasUsers && !needsTxOwner) return;
      // Seed users with default PIN '1234' hashed
      const defaultHash = await hashPin(DEFAULT_PIN);
      const seededUsers = hasUsers
        ? state.users
        : DEFAULT_USERS.map(u => ({ ...u, pinHash: defaultHash }));
      mutate(prev => {
        // Re-check inside mutator in case state changed since the effect started
        const reHasUsers = Array.isArray(prev.users) && prev.users.length > 0;
        const nextUsers = reHasUsers ? prev.users : seededUsers;
        const adminId = (nextUsers.find(u => u.role === 'admin') || nextUsers[0])?.id || 'abi';
        const nextTx = (prev.transactions || []).map(t =>
          t.createdBy ? t : { ...t, createdBy: adminId }
        );
        return { ...prev, users: nextUsers, transactions: nextTx };
      });
    })();
  }, [booting, account, skipSync, state.lastModified, state.users, state.transactions]);

  // Actions
  const mutate = (mutator) => {
    setState(prev => {
      const next = mutator(prev);
      return { ...next, lastModified: new Date().toISOString() };
    });
  };

  const addOrUpdate = (entry) => {
    mutate(prev => {
      const idx = prev.transactions.findIndex(t => t.id === entry.id);
      if (idx >= 0) {
        // Preserve original createdBy on edit — never reassign ownership
        const existing = prev.transactions[idx];
        const merged = { ...entry, createdBy: existing.createdBy || entry.createdBy || appProfileId };
        const copy = [...prev.transactions]; copy[idx] = merged;
        return { ...prev, transactions: copy };
      }
      // New transaction → tag with current user as creator
      const tagged = { ...entry, createdBy: appProfileId };
      return { ...prev, transactions: [tagged, ...prev.transactions] };
    });
    pushToast(entry.type === 'income' ? 'บันทึกรายรับแล้ว' : 'บันทึกรายจ่ายแล้ว');
  };
  const removeTx = (id) => {
    // Clean up associated photos (both v1.4 array and v1.3 single)
    const tx = state.transactions.find(t => t.id === id);
    if (tx) {
      if (Array.isArray(tx.photos)) tx.photos.forEach(p => deletePhoto(p.id));
      else if (tx.photoId) deletePhoto(tx.photoId);
    }
    mutate(prev => ({ ...prev, transactions: prev.transactions.filter(t => t.id !== id) }));
    pushToast('ลบรายการแล้ว');
  };
  // Duplicate a transaction: copy all fields with new ID, current date/time, no photos
  const duplicateTx = (tx) => {
    if (!tx) return;
    const now = new Date();
    const dateStr = now.toISOString().slice(0, 10);
    const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
    const copy = {
      ...tx,
      id: uid(),
      date: dateStr,
      createdAt: combineDateTime(dateStr, timeStr),
      photos: [], // don't copy photos — they belong to the original
      photoId: null, photoName: null,
    };
    mutate(prev => ({ ...prev, transactions: [copy, ...prev.transactions] }));
    pushToast('ทำซ้ำรายการแล้ว');
  };

  // Bulk rename a master field value (item, accountName, or project)
  // across ALL transactions — used by the "manage" modal
  const renameMasterField = (field, oldName, newName) => {
    const oldTrim = (oldName || '').trim();
    const newTrim = (newName || '').trim();
    if (!oldTrim || !newTrim || oldTrim === newTrim) return 0;
    let count = 0;
    mutate(prev => {
      const updated = prev.transactions.map(t => {
        // match item (also legacy payee)
        if (field === 'item') {
          if ((t.item || t.payee || '').trim() === oldTrim) {
            count++;
            return { ...t, item: newTrim, payee: undefined };
          }
        } else if ((t[field] || '').trim() === oldTrim) {
          count++;
          return { ...t, [field]: newTrim };
        }
        return t;
      });
      return { ...prev, transactions: updated };
    });
    return count;
  };

  // Delete all transactions that use a given master field value
  // (also cleans up their photos)
  const deleteMasterField = (field, name) => {
    const target = (name || '').trim();
    if (!target) return 0;
    const matches = state.transactions.filter(t => {
      if (field === 'item') return (t.item || t.payee || '').trim() === target;
      return (t[field] || '').trim() === target;
    });
    // Clean photos
    matches.forEach(tx => {
      if (Array.isArray(tx.photos)) tx.photos.forEach(p => deletePhoto(p.id));
      else if (tx.photoId) deletePhoto(tx.photoId);
    });
    mutate(prev => {
      const kept = prev.transactions.filter(t => {
        if (field === 'item') return (t.item || t.payee || '').trim() !== target;
        return (t[field] || '').trim() !== target;
      });
      return { ...prev, transactions: kept };
    });
    return matches.length;
  };

  // ============ Items Master List Handlers ============
  // Add a new item to master list (ignores duplicates case-insensitively)
  const addMasterItem = (name) => {
    const n = (name || '').trim();
    if (!n) return false;
    const items = state.items || [];
    const exists = items.some(it => it.name.toLowerCase() === n.toLowerCase());
    if (exists) return false;
    mutate(prev => ({
      ...prev,
      items: [...(prev.items || []), { id: uid(), name: n, createdAt: new Date().toISOString() }],
    }));
    return true;
  };
  // Rename a master item — also updates all transactions referring to the old name
  const updateMasterItem = (id, newName) => {
    const n = (newName || '').trim();
    if (!n) return { ok: false, reason: 'empty' };
    const items = state.items || [];
    const target = items.find(it => it.id === id);
    if (!target) return { ok: false, reason: 'notfound' };
    if (target.name === n) return { ok: true, affectedTx: 0 };
    // Check duplicate (case-insensitive, excluding self)
    const dup = items.some(it => it.id !== id && it.name.toLowerCase() === n.toLowerCase());
    if (dup) return { ok: false, reason: 'duplicate' };
    const affected = renameMasterField('item', target.name, n);
    mutate(prev => ({
      ...prev,
      items: (prev.items || []).map(it => it.id === id ? { ...it, name: n } : it),
    }));
    return { ok: true, affectedTx: affected };
  };
  // Remove from master list only; leaves existing transactions alone
  const removeMasterItem = (id) => {
    mutate(prev => ({ ...prev, items: (prev.items || []).filter(it => it.id !== id) }));
  };

  // ============ Accounts Master List Handlers ============
  const addMasterAccount = (name, decimals = 2) => {
    const n = (name || '').trim();
    if (!n) return false;
    const accs = state.accounts || [];
    const exists = accs.some(a => (a.name || '').toLowerCase() === n.toLowerCase());
    if (exists) return false;
    const d = Math.max(0, Math.min(10, Number.isFinite(+decimals) ? +decimals : 2));
    mutate(prev => ({
      ...prev,
      accounts: [...(prev.accounts || []), { id: uid(), name: n, decimals: d, permissions: {}, createdAt: new Date().toISOString() }],
    }));
    return true;
  };
  const updateMasterAccount = (id, newName, newDecimals) => {
    const n = (newName || '').trim();
    if (!n) return { ok: false, reason: 'empty' };
    const d = Math.max(0, Math.min(10, Number.isFinite(+newDecimals) ? +newDecimals : 2));
    const accs = state.accounts || [];
    const target = accs.find(a => a.id === id);
    if (!target) return { ok: false, reason: 'notfound' };
    const dup = accs.some(a => a.id !== id && (a.name || '').toLowerCase() === n.toLowerCase());
    if (dup) return { ok: false, reason: 'duplicate' };
    // Cascade rename transactions if name changed
    let affected = 0;
    if (target.name !== n) {
      affected = renameMasterField('accountName', target.name, n);
    }
    mutate(prev => ({
      ...prev,
      accounts: (prev.accounts || []).map(a => a.id === id ? { ...a, name: n, decimals: d } : a),
    }));
    return { ok: true, affectedTx: affected };
  };
  const removeMasterAccount = (id) => {
    mutate(prev => ({ ...prev, accounts: (prev.accounts || []).filter(a => a.id !== id) }));
  };
  // v5.0: set per-user permission on an account (admin only).
  // perm ∈ { 'none', 'view', 'edit-own' }
  const setAccountPerm = (accountId, userId, perm) => {
    if (!PERM_OPTS.some(p => p.id === perm)) return;
    mutate(prev => ({
      ...prev,
      accounts: (prev.accounts || []).map(a => {
        if (a.id !== accountId) return a;
        const nextPerms = { ...(a.permissions || {}) };
        if (perm === 'none') delete nextPerms[userId];
        else nextPerms[userId] = perm;
        return { ...a, permissions: nextPerms };
      }),
    }));
  };

  // v5.0: user management (admin-only). All ops mutate state.users which syncs to OneDrive.
  const addUser = async (label, role = 'member', icon = '👤', pin = DEFAULT_PIN) => {
    const trimmed = (label || '').trim();
    if (!trimmed) return { ok: false, reason: 'empty' };
    const users = state.users || [];
    // Generate id from label (transliterated to ASCII isn't trivial in the browser without
    // libs; we just slugify whitespace + fallback to random suffix to avoid collisions).
    const baseId = trimmed.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '') || 'user';
    let id = baseId;
    let n = 2;
    while (users.some(u => u.id === id)) { id = `${baseId}-${n++}`; }
    const pinHash = await hashPin(pin);
    mutate(prev => ({
      ...prev,
      users: [...(prev.users || []), { id, label: trimmed, icon, role: role === 'admin' ? 'admin' : 'member', pinHash }],
    }));
    return { ok: true, id };
  };
  const updateUser = (id, patch) => {
    mutate(prev => ({
      ...prev,
      users: (prev.users || []).map(u => u.id === id ? { ...u, ...patch, id: u.id } : u),
    }));
  };
  const changeUserPin = async (id, newPin) => {
    if (!/^\d{4}$/.test(newPin)) return { ok: false, reason: 'format' };
    const pinHash = await hashPin(newPin);
    updateUser(id, { pinHash });
    return { ok: true };
  };
  const removeUser = (id) => {
    // Cannot remove the only admin
    const users = state.users || [];
    const admins = users.filter(u => u.role === 'admin');
    const target = users.find(u => u.id === id);
    if (target?.role === 'admin' && admins.length <= 1) {
      return { ok: false, reason: 'last-admin' };
    }
    mutate(prev => ({
      ...prev,
      users: (prev.users || []).filter(u => u.id !== id),
      // Strip removed user from every account's permissions map
      accounts: (prev.accounts || []).map(a => {
        if (!a.permissions || !a.permissions[id]) return a;
        const next = { ...a.permissions };
        delete next[id];
        return { ...a, permissions: next };
      }),
    }));
    return { ok: true };
  };

  // ============ Projects Master List Handlers ============
  const addMasterProject = (name) => {
    const n = (name || '').trim();
    if (!n) return false;
    const projs = state.projects || [];
    const exists = projs.some(p => (p.name || '').toLowerCase() === n.toLowerCase());
    if (exists) return false;
    mutate(prev => ({
      ...prev,
      projects: [...(prev.projects || []), { id: uid(), name: n, createdAt: new Date().toISOString() }],
    }));
    return true;
  };
  const updateMasterProject = (id, newName) => {
    const n = (newName || '').trim();
    if (!n) return { ok: false, reason: 'empty' };
    const projs = state.projects || [];
    const target = projs.find(p => p.id === id);
    if (!target) return { ok: false, reason: 'notfound' };
    if (target.name === n) return { ok: true, affectedTx: 0 };
    const dup = projs.some(p => p.id !== id && (p.name || '').toLowerCase() === n.toLowerCase());
    if (dup) return { ok: false, reason: 'duplicate' };
    const affected = renameMasterField('project', target.name, n);
    mutate(prev => ({
      ...prev,
      projects: (prev.projects || []).map(p => p.id === id ? { ...p, name: n } : p),
    }));
    return { ok: true, affectedTx: affected };
  };
  const removeMasterProject = (id) => {
    mutate(prev => ({ ...prev, projects: (prev.projects || []).filter(p => p.id !== id) }));
  };

  // ============ Categories Master List Handlers ============
  // Categories are stored as { id, name, icon, type: 'income'|'expense' }.
  // id stays stable across renames. The id is used in tx.category for reference.
  // For backward compat with built-in ids ('food', 'salary', ...), editing a built-in
  // creates a custom entry with the SAME id that overrides it.
  const addMasterCategory = (name, icon, type) => {
    const n = (name || '').trim();
    if (!n) return false;
    const t = (type === 'income') ? 'income' : 'expense';
    const cats = state.categories || [];
    const exists = cats.some(c => c.type === t && (c.name || '').toLowerCase() === n.toLowerCase());
    if (exists) return false;
    mutate(prev => ({
      ...prev,
      categories: [...(prev.categories || []), {
        id: 'cat-' + uid(), name: n, icon: icon || '🏷️', type: t, createdAt: new Date().toISOString(),
      }],
    }));
    return true;
  };
  const updateMasterCategory = (id, newName, newIcon) => {
    const n = (newName || '').trim();
    if (!n) return { ok: false, reason: 'empty' };
    const cats = state.categories || [];
    const target = cats.find(c => c.id === id);
    if (!target) return { ok: false, reason: 'notfound' };
    const dup = cats.some(c => c.id !== id && c.type === target.type && (c.name || '').toLowerCase() === n.toLowerCase());
    if (dup) return { ok: false, reason: 'duplicate' };
    mutate(prev => ({
      ...prev,
      categories: (prev.categories || []).map(c => c.id === id ? { ...c, name: n, icon: newIcon || c.icon } : c),
    }));
    return { ok: true, affectedTx: 0 };
  };
  // Deleting a category: clears the category field on matching transactions
  // (instead of deleting the transactions themselves), per user requirement.
  const removeMasterCategory = (id) => {
    let affected = 0;
    mutate(prev => {
      const kept = (prev.transactions || []).map(t => {
        if (t.category === id) { affected += 1; return { ...t, category: '' }; }
        return t;
      });
      return {
        ...prev,
        transactions: kept,
        categories: (prev.categories || []).filter(c => c.id !== id),
      };
    });
    return affected;
  };

  const doSignIn = async () => {
    setAuthLoading(true); setAuthError(null);
    try {
      const acc = await signIn();
      setAccount(acc);
    } catch (e) {
      console.error(e);
      setAuthError(String(e.message || e));
    } finally { setAuthLoading(false); }
  };
  const doSignOut = async () => {
    try { await signOut(); } catch (e) { console.error(e); }
    setAccount(null);
    didPullRef.current = false;
    lockProfile(); // v4.0: also clear active profile so PIN is needed again next login
    pushToast('ออกจากระบบแล้ว');
  };

  // v4.0: Profile-based visibility filtering (replaces v3.7 shared flag).
  // v5.0: Filter accounts visible to the current user.
  // - Admin sees every account.
  // - Members see accounts where account.permissions[user.id] is 'view' or 'edit-own'.
  // Legacy schema migration is best-effort: 'shared:true' (v3.x) or visibility:'all'
  // (v4.x) → all members get 'view' access. visibility:'<userId>' (v4.x) →
  // that single user gets 'edit-own'. visibility:'owner' (v4.x default) → no member access.
  const visibleAccounts = useMemo(() => {
    if (!currentUser) return [];
    return (state.accounts || []).filter(a => {
      if (currentUser.role === 'admin') return true;
      // Backfill legacy schema on-the-fly for read; persisted by AccountsManager when edited.
      let perms = a.permissions;
      if (!perms) {
        perms = {};
        const allMembers = (state.users || []).filter(u => u.role !== 'admin').map(u => u.id);
        if (a.shared === true || a.visibility === 'all') {
          allMembers.forEach(id => { perms[id] = 'view'; });
        } else if (a.visibility && a.visibility !== 'owner') {
          // legacy v4 single-user visibility → that user gets edit-own
          perms[a.visibility] = 'edit-own';
        }
      }
      return (perms[currentUser.id] || 'none') !== 'none';
    });
  }, [state.accounts, state.users, currentUser]);

  const visibleAccountNames = useMemo(
    () => new Set(visibleAccounts.map(a => (a.name || '').trim())),
    [visibleAccounts]
  );

  const accountList = useMemo(() => {
    const set = new Set();
    state.transactions.forEach(t => {
      const k = (t.accountName || '').trim();
      if (!k) return;
      if (!isAdmin && !visibleAccountNames.has(k)) return;
      set.add(k);
    });
    visibleAccounts.forEach(a => { if (a.name) set.add(a.name); });
    return Array.from(set).sort((a, b) => a.localeCompare(b, 'th'));
  }, [state.transactions, isAdmin, visibleAccountNames, visibleAccounts]);

  // visibleState: filtered view that downstream components consume.
  // Admin sees everything; members see only their permitted accounts + transactions.
  // Master items/projects/users stay intact (admin-only managers gate write access).
  const visibleState = useMemo(() => {
    if (isAdmin) return state;
    const filteredTx = (state.transactions || []).filter(
      t => visibleAccountNames.has((t.accountName || '').trim())
    );
    return { ...state, accounts: visibleAccounts, transactions: filteredTx };
  }, [state, isAdmin, visibleAccounts, visibleAccountNames]);

  // ============ Render boot / setup / signin / app ============
  if (booting) {
    return <div className="boot"><div className="dot-ring"></div><div>กำลังเริ่มแอป...</div></div>;
  }
  if (!HAS_CONFIG) {
    return <SetupNeeded />;
  }
  if (!account && !skipSync) {
    return (
      <SignIn
        loading={authLoading}
        error={authError}
        onSignIn={doSignIn}
        onSkip={() => setSkipSync(true)}
      />
    );
  }
  // v5.0: After Microsoft login, show profile picker → PIN screen.
  // Use the live user list from state so admin can add/remove and changes show immediately.
  if (account && !skipSync && !appProfileId) {
    if (unlockTarget) {
      return (
        <PinScreen
          profile={unlockTarget}
          onBack={() => setUnlockTarget(null)}
          onSuccess={() => switchProfile(unlockTarget)}
        />
      );
    }
    // If users haven't been seeded yet (very first run, before migration completes),
    // show a brief loading state instead of an empty picker.
    if (!state.users || state.users.length === 0) {
      return <div className="boot"><div className="dot-ring"></div><div>กำลังเตรียมโปรไฟล์...</div></div>;
    }
    return <ProfilePicker users={state.users} onPick={(p) => setUnlockTarget(p)} />;
  }

  // Filter by month + account
  const txSource = isAdmin ? state.transactions : visibleState.transactions;
  const monthTx = txSource.filter(t => {
    const d = new Date(t.date);
    if (d.getFullYear() !== viewMonth.y || d.getMonth() !== viewMonth.m) return false;
    if (selectedAccount === 'all') return true;
    return (t.accountName || '').trim() === selectedAccount;
  });
  //begin
 const totals = monthTx.reduce((a, t) => {
    const amt = Number(t.amount) || 0; // ป้องกัน Error จากค่าว่าง
    if (t.type === 'income') a.inc += amt; else a.exp += amt;
    return a;
  }, { inc: 0, exp: 0 });
  totals.bal = totals.inc - totals.exp;

  const grandTotals = visibleState.transactions.reduce((a, t) => {
    const amt = Number(t.amount) || 0; // ป้องกัน Error จากค่าว่าง
    if (t.type === 'income') a.inc += amt; else a.exp += amt;
    return a;
  }, { inc: 0, exp: 0 });
  const grandBal = grandTotals.inc - grandTotals.exp; 

  // end

  return (
    <>
      <main>
        {/* v5.0: profile banner — shows current user with admin badge if applicable */}
        {appProfileId && currentUser && (
          <div className="shared-banner">
            <span>
              {currentUser.icon || '👤'} {currentUser.label}
              {isAdmin && <span className="admin-tag-inline">admin</span>}
            </span>
            <button onClick={lockProfile} className="exit-shared-btn" title="สลับผู้ใช้ / ล็อก">
              สลับผู้ใช้ 🔒
            </button>
          </div>
        )}
        {tab === 'home' && homeView === 'overview' && (
          <AccountsOverviewView
            state={visibleState}
            onSelectAccount={(name) => { setSelectedAccount(name); setHomeView('summary'); }}
            onSelectAll={() => { setSelectedAccount('all'); setHomeView('summary'); }}
            onManageAccounts={() => setShowAccountsManager(true)}
            onManageProjects={() => setShowProjectsManager(true)}
            onManageItems={() => setShowItemsManager(true)}
            onManageCategories={() => setShowCategoriesManager(true)}
            zoomLevel={zoomLevel}
            onZoom={cycleZoom}
          />
        )}
        {tab === 'home' && homeView === 'summary' && (
          <HomeView
            account={account} skipSync={skipSync}
            status={status} lastSync={lastSync}
            viewMonth={viewMonth} setViewMonth={setViewMonth}
            totals={totals} monthTx={monthTx}
            
            grandBal={grandBal}
            onTap={setActionTx}
            accountList={accountList}
            selectedAccount={selectedAccount}
            onSelectAccount={setSelectedAccount}
            masterAccounts={state.accounts || []}
            masterCategories={state.categories || []}
            onManageAccounts={() => setShowAccountsManager(true)}
            onManageProjects={() => setShowProjectsManager(true)}
            onManageItems={() => setShowItemsManager(true)}
            onManageCategories={() => setShowCategoriesManager(true)}
            zoomLevel={zoomLevel}
            onZoom={cycleZoom}
            onBack={() => setHomeView('overview')}
          />
        )}
        {tab === 'list' && (
          <ListView
            viewMonth={viewMonth} setViewMonth={setViewMonth}
            monthTx={monthTx}
            
            grandBal={grandBal}
            
            onTap={setActionTx}
            accountList={accountList}
            selectedAccount={selectedAccount}
            onSelectAccount={setSelectedAccount}
            masterAccounts={state.accounts || []}
            masterCategories={state.categories || []}
            onManageAccounts={() => setShowAccountsManager(true)}
            onManageProjects={() => setShowProjectsManager(true)}
            onManageItems={() => setShowItemsManager(true)}
            onManageCategories={() => setShowCategoriesManager(true)}
            onOpenSearch={() => setShowSearch(true)}
            zoomLevel={zoomLevel}
            onZoom={cycleZoom}
          />
        )}
        {tab === 'chart' && (
          <ChartView
            viewMonth={viewMonth} setViewMonth={setViewMonth}
            monthTx={monthTx}
            accountList={accountList}
            selectedAccount={selectedAccount}
            onSelectAccount={setSelectedAccount}
            masterAccounts={state.accounts || []}
            masterCategories={state.categories || []}
            onManageAccounts={() => setShowAccountsManager(true)}
            onManageProjects={() => setShowProjectsManager(true)}
            onManageItems={() => setShowItemsManager(true)}
            onManageCategories={() => setShowCategoriesManager(true)}
            zoomLevel={zoomLevel}
            onZoom={cycleZoom}
          />
        )}
        {tab === 'settings' && (
          <SettingsView
            account={account} skipSync={skipSync}
            status={status} lastSync={lastSync} errMsg={errMsg}
            state={state} setState={setState}
            pushToast={pushToast}
            onSignIn={doSignIn}
            onSignOut={doSignOut}
            onSyncNow={pullOnce}
            onEnableSync={() => setSkipSync(false)}
            authLoading={authLoading}
            cacheStatus={cacheStatus}
            pendingCount={pendingCount}
            isOnline={isOnline}
            isAdmin={isAdmin}
            currentUser={currentUser}
            onOpenUsersManager={() => setShowUsersManager(true)}
          />
        )}
      </main>

      <TabBar tab={tab} setTab={setTab} onAdd={() => setShowAdd(true)} />

      {(showAdd || editing) && (
        <TxSheet
          initial={editing}
          allTx={state.transactions}
          masterItems={state.items || []}
          masterAccounts={state.accounts || []}
          masterProjects={state.projects || []}
          masterCategories={state.categories || []}
          account={account}
          skipSync={skipSync}
          pushToast={pushToast}
          onOpenItemsManager={() => setShowItemsManager(true)}
          onRenameMaster={renameMasterField}
          onDeleteMaster={deleteMasterField}
          onClose={() => { setShowAdd(false); setEditing(null); }}
          onSave={e => {
            // Auto-add item to master list if new
            const itemName = (e.item || '').trim();
            if (itemName) {
              const exists = (state.items || []).some(it => it.name.toLowerCase() === itemName.toLowerCase());
              if (!exists) addMasterItem(itemName);
            }
            // Auto-add account to master list if new (default 2 decimals)
            const accName = (e.accountName || '').trim();
            if (accName) {
              const accExists = (state.accounts || []).some(a => (a.name || '').toLowerCase() === accName.toLowerCase());
              if (!accExists) addMasterAccount(accName, 2);
            }
            // Auto-add project to master list if new
            const projName = (e.project || '').trim();
            if (projName) {
              const projExists = (state.projects || []).some(p => (p.name || '').toLowerCase() === projName.toLowerCase());
              if (!projExists) addMasterProject(projName);
            }
            addOrUpdate(e);
            setShowAdd(false);
            setEditing(null);
          }}
          onDelete={id => { removeTx(id); setShowAdd(false); setEditing(null); }}
        />
      )}

      {showItemsManager && (
        <ItemsManager
          items={state.items || []}
          transactions={state.transactions}
          onClose={() => setShowItemsManager(false)}
          onAdd={(name) => {
            const ok = addMasterItem(name);
            if (!ok) pushToast('มีชื่อนี้อยู่แล้ว');
            else pushToast('เพิ่มรายการแล้ว');
            return ok;
          }}
          onUpdate={(id, name) => {
            const r = updateMasterItem(id, name);
            if (r.ok) {
              pushToast(r.affectedTx > 0
                ? `แก้ไขแล้ว · อัปเดต ${r.affectedTx} รายการ`
                : 'แก้ไขแล้ว');
            } else if (r.reason === 'duplicate') pushToast('มีชื่อนี้อยู่แล้ว');
            else if (r.reason === 'empty') pushToast('ชื่อต้องไม่ว่าง');
            return r.ok;
          }}
          onRemove={(id) => {
            removeMasterItem(id);
            pushToast('ลบจากรายการแนะนำแล้ว');
          }}
          pushToast={pushToast}
        />
      )}

      {showAccountsManager && (
        <AccountsManager
          accounts={state.accounts || []}
          transactions={state.transactions}
          onClose={() => setShowAccountsManager(false)}
          onAdd={(name, decimals) => {
            const ok = addMasterAccount(name, decimals);
            if (!ok) pushToast('มีบัญชีนี้อยู่แล้ว');
            else pushToast(`เพิ่มบัญชีแล้ว (ทศนิยม ${decimals} ตำแหน่ง)`);
            return ok;
          }}
          onUpdate={(id, name, decimals) => {
            const r = updateMasterAccount(id, name, decimals);
            if (r.ok) {
              pushToast(r.affectedTx > 0
                ? `แก้ไขแล้ว · อัปเดต ${r.affectedTx} รายการ`
                : 'แก้ไขแล้ว');
            } else if (r.reason === 'duplicate') pushToast('มีบัญชีนี้อยู่แล้ว');
            else if (r.reason === 'empty') pushToast('ชื่อต้องไม่ว่าง');
            return r.ok;
          }}
          onRemove={(id) => {
            removeMasterAccount(id);
            pushToast('ลบบัญชีแล้ว');
          }}
          onSetPerm={(accId, userId, perm) => {
            setAccountPerm(accId, userId, perm);
            const u = (state.users || []).find(x => x.id === userId);
            pushToast(`${u?.label || userId}: ${PERM_LABEL(perm)}`);
          }}
          users={state.users || []}
          isAdmin={isAdmin}
          pushToast={pushToast}
        />
      )}

      {showProjectsManager && (
        <ProjectsManager
          projects={state.projects || []}
          transactions={state.transactions}
          onClose={() => setShowProjectsManager(false)}
          onAdd={(name) => {
            const ok = addMasterProject(name);
            if (!ok) pushToast('มีโครงการนี้อยู่แล้ว');
            else pushToast('เพิ่มโครงการแล้ว');
            return ok;
          }}
          onUpdate={(id, name) => {
            const r = updateMasterProject(id, name);
            if (r.ok) {
              pushToast(r.affectedTx > 0
                ? `แก้ไขแล้ว · อัปเดต ${r.affectedTx} รายการ`
                : 'แก้ไขแล้ว');
            } else if (r.reason === 'duplicate') pushToast('มีโครงการนี้อยู่แล้ว');
            else if (r.reason === 'empty') pushToast('ชื่อต้องไม่ว่าง');
            return r.ok;
          }}
          onRemove={(id) => {
            removeMasterProject(id);
            pushToast('ลบโครงการแล้ว');
          }}
        />
      )}

      {showCategoriesManager && (
        <CategoriesManager
          categories={state.categories || []}
          transactions={state.transactions}
          onClose={() => setShowCategoriesManager(false)}
          onAdd={(name, icon, type) => {
            const ok = addMasterCategory(name, icon, type);
            if (!ok) pushToast('มีหมวดหมู่ชื่อนี้แล้ว');
            else pushToast('เพิ่มหมวดหมู่แล้ว');
            return ok;
          }}
          onUpdate={(id, name, icon) => {
            const r = updateMasterCategory(id, name, icon);
            if (r.ok) pushToast('แก้ไขแล้ว');
            else if (r.reason === 'duplicate') pushToast('มีหมวดหมู่ชื่อนี้แล้ว');
            else if (r.reason === 'empty') pushToast('ชื่อต้องไม่ว่าง');
            return r.ok;
          }}
          onRemove={(id) => {
            const affected = removeMasterCategory(id);
            pushToast(affected > 0
              ? `ลบแล้ว · ล้างจาก ${affected} รายการ`
              : 'ลบหมวดหมู่แล้ว');
          }}
        />
      )}

      {/* v5.0: Users manager — admin only */}
      {showUsersManager && isAdmin && (
        <UsersManager
          users={state.users || []}
          currentUserId={appProfileId}
          onClose={() => setShowUsersManager(false)}
          onAdd={addUser}
          onUpdate={updateUser}
          onChangePin={changeUserPin}
          onRemove={removeUser}
          pushToast={pushToast}
        />
      )}

      {/* v5.5: Advanced search — uses visibleState so non-admins only search permitted accounts */}
      {showSearch && (
        <SearchSheet
          allTransactions={visibleState.transactions}
          accounts={visibleState.accounts}
          projects={state.projects || []}
          onClose={() => setShowSearch(false)}
          onPickTx={(t) => { setActionTx(t); setShowSearch(false); }}
        />
      )}

      {/* Row action menu (tap row → show menu) */}
      {actionTx && (
        <TxActionMenu
          tx={actionTx}
          txList={monthTx}
          onNavigate={(t) => setActionTx(t)}
          accounts={state.accounts || []}
          customCats={state.categories || []}
          onClose={() => setActionTx(null)}
          onEdit={() => { setEditing(actionTx); setActionTx(null); }}
          onDuplicate={() => { duplicateTx(actionTx); setActionTx(null); }}
          onDelete={() => { setConfirmDeleteTx(actionTx); setActionTx(null); }}
          canEdit={(() => {
            // v5.0: per-user permission check on this transaction's account
            const acc = (state.accounts || []).find(a =>
              (a.name || '').trim() === (actionTx.accountName || '').trim()
            );
            return canEditTx(currentUser, acc, actionTx);
          })()}
          canDuplicate={(() => {
            const acc = (state.accounts || []).find(a =>
              (a.name || '').trim() === (actionTx.accountName || '').trim()
            );
            return canAddToAccount(currentUser, acc);
          })()}
        />
      )}

      {/* Confirm delete dialog */}
      {confirmDeleteTx && (
        <ConfirmDeleteTx
          tx={confirmDeleteTx}
          accounts={state.accounts || []}
          onCancel={() => setConfirmDeleteTx(null)}
          onConfirm={() => { removeTx(confirmDeleteTx.id); setConfirmDeleteTx(null); }}
        />
      )}

      {toast && <div className="toast fade">{toast}</div>}
    </>
  );
}

// ============ Views ============
function SyncPill({ status, account, skipSync, compact = false }) {
  if (!account || skipSync) {
    return (
      <span className="sync-pill">
        <span className="sync-dot off"></span>
        ออฟไลน์
      </span>
    );
  }
  const map = {
    syncing: { cls: 'sync', text: 'กำลังซิงค์' },
    ok:      { cls: 'ok', text: 'ซิงค์แล้ว' },
    error:   { cls: 'err', text: 'ซิงค์ล้มเหลว' },
    idle:    { cls: 'warn', text: 'พร้อมซิงค์' },
    offline: { cls: 'off', text: 'ออฟไลน์' },
  };
  const s = map[status] || map.idle;
  return (
    <span className="sync-pill">
      <span className={`sync-dot ${s.cls}`}></span>
      {s.text}
    </span>
  );
}

// ============ Kebab Menu (3-dot) with Accordion ============
function ZoomBtn({ level, onCycle }) {
  // level: 0=normal, 1=115%, 2=130%, 3=145%
  const active = level > 0;
  const labels = ['100%', '115%', '130%', '145%'];
  return (
    <button className={`zoom-btn ${active ? 'active' : ''}`}
            onClick={onCycle}
            aria-label="ปรับขนาดตัวอักษร" type="button"
            title={`ขนาด ${labels[level]}`}>
      <span className="zoom-icon">A</span>
      {active && <span className="zoom-plus">+</span>}
      {active && <span className="zoom-level">{level}</span>}
    </button>
  );
}

function KebabMenu({ onOpenAccounts, onOpenProjects, onOpenItems, onOpenCategories }) {
  const [open, setOpen] = useState(false);
  const [expanded, setExpanded] = useState(null); // 'accounts' | 'projects' | 'items' | 'categories' | null
  const wrapRef = useRef(null);

  useEffect(() => {
    if (!open) return;
    const handler = (e) => {
      if (wrapRef.current && !wrapRef.current.contains(e.target)) {
        setOpen(false);
        setExpanded(null);
      }
    };
    document.addEventListener('mousedown', handler);
    document.addEventListener('touchstart', handler);
    return () => {
      document.removeEventListener('mousedown', handler);
      document.removeEventListener('touchstart', handler);
    };
  }, [open]);

  const toggleSection = (key) => {
    setExpanded(prev => prev === key ? null : key);
  };

  const run = (action, manager) => {
    setOpen(false);
    setExpanded(null);
    // Small delay lets the menu dismiss before modal opens
    setTimeout(() => manager(action), 50);
  };

  const sections = [
    { key: 'accounts', icon: '💰', label: 'บัญชี', manager: onOpenAccounts,
      actions: [
        { id: 'add', label: 'เพิ่มบัญชี' },
        { id: 'edit', label: 'แก้ไขบัญชี' },
        { id: 'delete', label: 'ลบบัญชี' },
      ]
    },
    { key: 'projects', icon: '📁', label: 'โครงการ', manager: onOpenProjects,
      actions: [
        { id: 'add', label: 'เพิ่มโครงการ' },
        { id: 'edit', label: 'แก้ไขโครงการ' },
        { id: 'delete', label: 'ลบโครงการ' },
      ]
    },
    { key: 'items', icon: '🏷️', label: 'รายการ', manager: onOpenItems,
      actions: [
        { id: 'add', label: 'เพิ่มรายการ' },
        { id: 'edit', label: 'แก้ไขรายการ' },
        { id: 'delete', label: 'ลบรายการ' },
      ]
    },
    { key: 'categories', icon: '🗂️', label: 'หมวดหมู่', manager: onOpenCategories,
      actions: [
        { id: 'add', label: 'เพิ่มหมวดหมู่' },
        { id: 'edit', label: 'แก้ไขหมวดหมู่' },
        { id: 'delete', label: 'ลบหมวดหมู่' },
      ]
    },
  ];

  return (
    <div className="kebab-wrap" ref={wrapRef}>
      <button className={`kebab-btn ${open ? 'open' : ''}`}
              onClick={() => setOpen(v => !v)}
              aria-label="เมนู" type="button">
        <span className="dot"></span>
        <span className="dot"></span>
        <span className="dot"></span>
      </button>
      {open && (
        <div className="kebab-menu fade">
          {sections.map(sec => {
            const isExpanded = expanded === sec.key;
            return (
              <div key={sec.key} className="kebab-section">
                <button type="button"
                        className={`kebab-section-head ${isExpanded ? 'expanded' : ''}`}
                        onClick={() => toggleSection(sec.key)}>
                  <span className="em">{sec.icon}</span>
                  <span className="lbl">{sec.label}</span>
                  <Ic.ChevDown size={14} className="chev"/>
                </button>
                {isExpanded && (
                  <div className="kebab-submenu">
                    {sec.actions.map(a => (

function AccountFilter({ accountList, selected, onSelect, onManage }) {
  const [open, setOpen] = useState(false);
  const wrapRef = useRef(null);

  // Close on outside click
  useEffect(() => {
    if (!open) return;
    const handler = (e) => {
      if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener('mousedown', handler);
    document.addEventListener('touchstart', handler);
    return () => {
      document.removeEventListener('mousedown', handler);
      document.removeEventListener('touchstart', handler);
    };
  }, [open]);

  const isAll = selected === 'all';
  const displayLabel = isAll ? 'ทั้งหมด' : selected;

  const pick = (value) => {
    onSelect(value);
    setOpen(false);
  };

  const handleManage = () => {
    setOpen(false);
    onManage?.();
  };

  return (
    <div className="acct-filter" ref={wrapRef}>
      <button className={`acct-filter-btn ${open ? 'open' : ''} ${!isAll ? 'active' : ''}`}
              onClick={() => setOpen(v => !v)} type="button">
        <span className="label">{displayLabel}</span>
        <Ic.ChevDown size={14} className="chev"/>
      </button>
      {open && (
        <div className="acct-filter-menu fade">
          <button className={`acct-filter-item all ${isAll ? 'active' : ''}`}
                  onClick={() => pick('all')} type="button">
            <span className="name">ทั้งหมด</span>
            {isAll && <Ic.Check size={14} className="check"/>}
          </button>
          {accountList.length > 0 && <div className="acct-filter-divider"/>}
          {accountList.map(acc => (
            <button key={acc}
                    className={`acct-filter-item ${selected === acc ? 'active' : ''}`}
                    onClick={() => pick(acc)} type="button">
              <span className="name">{acc}</span>
              {selected === acc && <Ic.Check size={14} className="check"/>}
            </button>
          ))}
          {accountList.length === 0 && (
            <div style={{padding: '14px 16px', fontSize: 12, color: 'var(--text-faint)', textAlign: 'center'}}>
              ยังไม่มีบัญชีที่บันทึกไว้
            </div>
          )}
          {onManage && (
            <>
              <div className="acct-filter-divider"/>
              <button className="acct-filter-item manage"
                      onClick={handleManage} type="button">
                <Ic.Settings size={14}/>
                <span className="name">จัดการบัญชี (ทศนิยม)</span>
              </button>
            </>
          )}
        </div>
      )}
    </div>
  );
}

function AccountsOverviewView({ state, onSelectAccount, onSelectAll, onManageAccounts, onManageProjects, onManageItems, onManageCategories, zoomLevel, onZoom }) {
  // Aggregate per-account stats (cumulative, all-time)
  const accountsList = useMemo(() => {
    const stats = new Map(); // key: name.toLowerCase()
    // Seed with master accounts so 0-tx accounts still appear
    (state.accounts || []).forEach(a => {
      const key = (a.name || '').toLowerCase();
      if (!key) return;
      stats.set(key, {
        name: a.name,
        decimals: Number.isFinite(a.decimals) ? a.decimals : 2,
        income: 0, expense: 0, count: 0,
      });
    });
    // Aggregate transactions
    (state.transactions || []).forEach(t => {
      const name = (t.accountName || '').trim();
      if (!name) return;
      const key = name.toLowerCase();
      if (!stats.has(key)) {
        stats.set(key, { name, decimals: 2, income: 0, expense: 0, count: 0 });
      }
      const s = stats.get(key);
      if (t.type === 'income') s.income += t.amount;
      else s.expense += t.amount;
      s.count += 1;
    });
    const arr = Array.from(stats.values()).map(s => ({ ...s, balance: s.income - s.expense }));
    // Thai locale alphabetical sort
    arr.sort((a, b) => a.name.localeCompare(b.name, 'th'));
    return arr;
  }, [state.accounts, state.transactions]);

  return (
    <div>
      <header className="page-head rise">

function DonutChart({ data, palette, total }) {
  const size = 220, cx = size/2, cy = size/2, R = 76, r = 52;
  let angle = -Math.PI / 2;
  const arcs = data.map((d, i) => {
    const frac = d.value / total;
    const end = angle + frac * Math.PI * 2;
    const large = frac > 0.5 ? 1 : 0;
    const x1 = cx + R * Math.cos(angle), y1 = cy + R * Math.sin(angle);
    const x2 = cx + R * Math.cos(end),   y2 = cy + R * Math.sin(end);
    const x3 = cx + r * Math.cos(end),   y3 = cy + r * Math.sin(end);
    const x4 = cx + r * Math.cos(angle), y4 = cy + r * Math.sin(angle);
    const path = `M ${x1} ${y1} A ${R} ${R} 0 ${large} 1 ${x2} ${y2} L ${x3} ${y3} A ${r} ${r} 0 ${large} 0 ${x4} ${y4} Z`;
    angle = end;
    return <path key={d.id} d={path} fill={palette[i % palette.length]} stroke="var(--bg)" strokeWidth="2" />;
  });
  return <svg viewBox={`0 0 ${size} ${size}`}>{arcs}</svg>;
}
