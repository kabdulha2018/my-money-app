            <button className="btn-primary" onClick={onClose} style={{width: '100%'}}>
              เสร็จสิ้น
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ============ Projects Manager Modal ============
function ProjectsManager({ projects, transactions, onClose, onAdd, onUpdate, onRemove }) {
  const [newName, setNewName] = useState('');
  const [editingId, setEditingId] = useState(null);
  const [editDraft, setEditDraft] = useState('');
  const [confirmDelId, setConfirmDelId] = useState(null);

  const usageMap = useMemo(() => {
    const m = new Map();
    (transactions || []).forEach(t => {
      const k = (t.project || '').trim();
      if (k) m.set(k, (m.get(k) || 0) + 1);
    });
    return m;
  }, [transactions]);

  const sortedProjects = useMemo(() => {
    const list = [...(projects || [])];
    list.sort((a, b) => {
      const ca = usageMap.get(a.name) || 0;
      const cb = usageMap.get(b.name) || 0;
      if (ca !== cb) return cb - ca;
      return a.name.localeCompare(b.name, 'th');
    });
    return list;
  }, [projects, usageMap]);

  const handleAdd = () => {
    const n = newName.trim();
    if (!n) return;
    const ok = onAdd(n);
    if (ok) setNewName('');
  };

  const startEdit = (p) => {
    setEditingId(p.id);
    setEditDraft(p.name);
    setConfirmDelId(null);
  };
  const saveEdit = () => {
    const ok = onUpdate(editingId, editDraft);
    if (ok) { setEditingId(null); setEditDraft(''); }
  };
  const cancelEdit = () => { setEditingId(null); setEditDraft(''); };
  const confirmDelete = (id) => { onRemove(id); setConfirmDelId(null); };

  return (
    <div className="sheet-backdrop fade" onClick={onClose} style={{zIndex: 85}}>
      <div className="sheet-wrap sheet-in" onClick={e => e.stopPropagation()}>
        <div className="sheet">
          <div className="sheet-handle"></div>
          <div className="sheet-head">
            <h2>จัดการโครงการ</h2>
            <button className="icon-btn-round" onClick={onClose}><Ic.X size={16}/></button>
          </div>

          <div className="cat-head" style={{marginTop: 16}}>เพิ่มโครงการใหม่</div>
          <div className="items-mgr-addbox">
            <input type="text" value={newName}
                   onChange={e => setNewName(e.target.value)}
                   onKeyDown={e => { if (e.key === 'Enter') handleAdd(); }}
                   placeholder="เช่น ซื้อบ้าน, เที่ยวญี่ปุ่น, การศึกษาลูก"
                   autoFocus/>
            <button onClick={handleAdd} disabled={!newName.trim()}>
              <Ic.Plus size={14}/> เพิ่ม
            </button>
          </div>

          <div className="cat-head" style={{marginTop: 18}}>โครงการทั้งหมด</div>
          {sortedProjects.length === 0 ? (
            <div className="items-mgr-empty">
              <div className="em">📁</div>
              <div>ยังไม่มีโครงการในระบบ</div>
              <div style={{fontSize: 11, marginTop: 4}}>
                โครงการจะถูกเพิ่มอัตโนมัติเมื่อคุณบันทึกธุรกรรม
              </div>
            </div>
          ) : (
            <>
              <div className="items-mgr-list">
                {sortedProjects.map(p => {
                  const isEditing = editingId === p.id;
                  const needsConfirm = confirmDelId === p.id;
                  const usage = usageMap.get(p.name) || 0;
                  return (
                    <div key={p.id} className="items-mgr-row">
                      {isEditing ? (
                        <>
                          <input className="edit" value={editDraft}
                                 onChange={e => setEditDraft(e.target.value)}
                                 onKeyDown={e => {
                                   if (e.key === 'Enter') saveEdit();
                                   else if (e.key === 'Escape') cancelEdit();
                                 }}
                                 autoFocus/>
                          <div className="actions">
                            <button className="save-btn" onClick={saveEdit}
                                    disabled={!editDraft.trim() || editDraft.trim() === p.name}
                                    title="บันทึก"><Ic.Check size={14}/></button>
                            <button className="cancel-btn" onClick={cancelEdit} title="ยกเลิก">
                              <Ic.X size={14}/>
                            </button>
                          </div>
                        </>
                      ) : needsConfirm ? (
                        <>
                          <div className="name-wrap">
                            <div className="name" style={{color: 'var(--expense-soft)'}}>ลบ "{p.name}" ?</div>
                            <div className="meta">
                              {usage > 0 ? `ใช้ใน ${usage} รายการ (ธุรกรรมจะยังอยู่)` : 'จะหายไปจากระบบ'}
                            </div>
                          </div>
                          <div className="actions">
                            <button className="save-btn" onClick={() => confirmDelete(p.id)}
                                    style={{background: 'var(--expense)', color: '#FBFAF6'}}
                                    title="ยืนยันลบ"><Ic.Check size={14}/></button>
                            <button className="cancel-btn" onClick={() => setConfirmDelId(null)}
                                    title="ยกเลิก"><Ic.X size={14}/></button>
                          </div>
                        </>
                      ) : (
                        <>
                          <div className="name-wrap">
                            <div className="name">📁 {p.name}</div>
                            <div className="meta">{usage > 0 ? `ใช้ ${usage} ครั้ง` : 'ยังไม่ถูกใช้'}</div>
                          </div>
                          <div className="actions">
                            <button className="edit-btn" onClick={() => startEdit(p)} title="แก้ไข">
                              <Ic.Pencil size={14}/>
                            </button>
                            <button className="del-btn" onClick={() => { setConfirmDelId(p.id); setEditingId(null); }}
                                    title="ลบ"><Ic.Trash size={14}/></button>
                          </div>
                        </>
                      )}
                    </div>
                  );
                })}
              </div>
              <div className="items-mgr-stats">ทั้งหมด {sortedProjects.length} โครงการ</div>
            </>
          )}

          <div style={{marginTop: 20}}>
            <button className="btn-primary" onClick={onClose} style={{width: '100%'}}>
              เสร็จสิ้น
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ============ Categories Manager Modal ============
// Manages only CUSTOM categories. Built-in categories are shown but not editable.
function CategoriesManager({ categories, transactions, onClose, onAdd, onUpdate, onRemove, pushToast }) {
  const [tab, setTab] = useState('expense'); // 'income' | 'expense'
  const [newName, setNewName] = useState('');
  const [newIcon, setNewIcon] = useState('🏷️');
  const [editingId, setEditingId] = useState(null);
  const [editName, setEditName] = useState('');
  const [editIcon, setEditIcon] = useState('');
  const [confirmDelId, setConfirmDelId] = useState(null);

  // Count usage per category id across transactions of this tab's type
  const usageMap = useMemo(() => {
    const m = new Map();
    (transactions || []).forEach(t => {
      if (t.type !== tab) return;
      const k = (t.category || '').trim();
      if (k) m.set(k, (m.get(k) || 0) + 1);
    });
    return m;
  }, [transactions, tab]);

  // Built-in categories (read-only in the manager; shown for reference)
  const builtins = tab === 'income' ? INCOME_CATS : EXPENSE_CATS;

  // Custom categories for this tab
  const customs = useMemo(() => {
    const list = (categories || []).filter(c => c.type === tab);
    list.sort((a, b) => (a.name || '').localeCompare(b.name || '', 'th'));
    return list;
  }, [categories, tab]);

  const handleAdd = () => {
    const n = newName.trim();
    if (!n) return;
    const ok = onAdd(n, newIcon || '🏷️', tab);
    if (ok) { setNewName(''); setNewIcon('🏷️'); }
  };

  const startEdit = (c) => {
    setEditingId(c.id);
    setEditName(c.name);
    setEditIcon(c.icon || '🏷️');
    setConfirmDelId(null);
  };
  const saveEdit = () => {
    const ok = onUpdate(editingId, editName, editIcon);
    if (ok) { setEditingId(null); setEditName(''); setEditIcon(''); }
  };
  const cancelEdit = () => { setEditingId(null); setEditName(''); setEditIcon(''); };

  return (
    <div className="sheet-backdrop fade" onClick={onClose} style={{zIndex: 85}}>
      <div className="sheet-wrap sheet-in" onClick={e => e.stopPropagation()}>
        <div className="sheet">
          <div className="sheet-handle"></div>
          <div className="sheet-head">
            <h2>จัดการหมวดหมู่</h2>
            <button className="icon-btn-round" onClick={onClose}><Ic.X size={16}/></button>
          </div>

          {/* Tab switcher */}
          <div className="type-toggle" style={{marginTop: 14}}>
            <button className={`type-btn ${tab === 'income' ? 'active in' : ''}`}
                    onClick={() => setTab('income')} type="button">
              <Ic.ArrowIn size={14}/> รายรับ
            </button>
            <button className={`type-btn ${tab === 'expense' ? 'active out' : ''}`}
                    onClick={() => setTab('expense')} type="button">
              <Ic.ArrowOut size={14}/> รายจ่าย
            </button>
          </div>

          {/* Add new */}
          <div className="cat-head" style={{marginTop: 16}}>เพิ่มหมวดหมู่ใหม่</div>
          <div className="acct-mgr-addbox">
            <input type="text" className="icon-pick-input" value={newIcon}
                   onChange={e => setNewIcon(e.target.value.slice(0, 2))}
                   maxLength="2"
                   placeholder="🏷️"
                   style={{width: 54, textAlign: 'center', fontSize: 20, padding: '10px 4px'}}/>
            <input type="text" value={newName}
                   onChange={e => setNewName(e.target.value)}
                   onKeyDown={e => { if (e.key === 'Enter' && newName.trim()) handleAdd(); }}
                   placeholder={tab === 'income' ? 'เช่น เงินปันผล, เงินคืนภาษี' : 'เช่น ดูแลรถ, ค่าขนมลูก'}
                   style={{flex: 1}}/>
            <button onClick={handleAdd} disabled={!newName.trim()} className="add-btn-gold">
              <Ic.Plus size={14}/>
            </button>
          </div>
          <div className="acct-mgr-hint">
            💡 ใส่อิโมจิในช่องซ้าย (เลือก 1 ตัว) · ชื่อในช่องกลาง
          </div>

          {/* Custom list */}
          <div className="cat-head" style={{marginTop: 18}}>
            หมวดหมู่ที่คุณสร้าง ({customs.length})
          </div>
          {customs.length === 0 ? (
            <div className="items-mgr-empty">
              <div className="em">🗂️</div>
              <div>ยังไม่มีหมวดหมู่ที่คุณสร้างเอง</div>
              <div style={{fontSize: 11, marginTop: 4}}>
                เพิ่มได้จากด้านบน
              </div>
            </div>
          ) : (
            <div className="items-mgr-list">
              {customs.map(c => {
                const isEditing = editingId === c.id;
                const needsConfirm = confirmDelId === c.id;
                const usage = usageMap.get(c.id) || 0;

                  <div key={c.id} className="items-mgr-row">

                                 style={{width: 48, textAlign: 'center', fontSize: 18, flex: '0 0 48px'}}/>
                          <input className="edit" value={editName}
                                 onChange={e => setEditName(e.target.value)}
                                 autoFocus
                                 placeholder="ชื่อหมวดหมู่"
                                 onKeyDown={e => {
                                   if (e.key === 'Enter') saveEdit();

                        <div className="actions">

                        </div>
                        <div className="actions">
                          <button className="save-btn"
                                  onClick={() => { onRemove(c.id); setConfirmDelId(null); }}
                                  style={{background: 'var(--expense)', color: '#FBFAF6'}}
                                  title="ยืนยันลบ">
                            <Ic.Check size={14}/>
                          </button>
                          <button className="cancel-btn" onClick={() => setConfirmDelId(null)} title="ยกเลิก">
                            <Ic.X size={14}/>
                          </button>
                        </div>
                      </>
                    ) : (
                      <>
                        <div className="name-wrap" style={{display:'flex', alignItems:'center', gap:10}}>
                          <span style={{fontSize: 22, flexShrink: 0}}>{c.icon}</span>
                          <div style={{flex: 1, minWidth: 0}}>
                            <div className="name">{c.name}</div>
                            <div className="meta">{usage > 0 ? `ใช้ ${usage} ครั้ง` : 'ยังไม่ถูกใช้'}</div>
                          </div>
                        </div>
                        <div className="actions">
                          <button className="edit-btn" onClick={() => startEdit(c)} title="แก้ไข">
                            <Ic.Pencil size={14}/>
                          </button>
                          <button className="del-btn"
                                  onClick={() => { setConfirmDelId(c.id); setEditingId(null); }}
                                  title="ลบ">
                            <Ic.Trash size={14}/>
                          </button>
                        </div>
                      </>
                    )}
                  </div>
                );
              })}
            </div>
          )}

          {/* Built-in list (read-only reference) */}
          <div className="cat-head" style={{marginTop: 20}}>
            หมวดหมู่พื้นฐาน ({builtins.length})

          <div className="items-mgr-list">

                      <div className="meta">{usage > 0 ? `ใช้ ${usage} ครั้ง` : 'ยังไม่ถูกใช้'}</div>
                    </div>
                  </div>
                </div>
              );
            })}

          <div style={{marginTop: 20}}>
            <button className="btn-primary" onClick={onClose} style={{width: '100%'}}>
              เสร็จสิ้น
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ============ Lessons / Journal Editor ============
// Markdown text editor for the user's personal study notes.
// Stored as /Apps/my money/lessons.md on OneDrive.
// ============ v3.5: Offline storage panel ============
// Shows pre-cache progress, pending uploads, and lets the user clear cache.
function OfflineStoragePanel({ account, isOnline, cacheStatus, pendingCount, pushToast }) {
  const [stats, setStats] = useState({ count: 0, bytes: 0 });
  const [busy, setBusy] = useState(false);

  // Refresh storage stats periodically + when key inputs change
  const refreshStats = async () => {
    const s = await idbCacheSize();
    setStats(s);
  };
  useEffect(() => {
    refreshStats();
    const intv = setInterval(refreshStats, 5000);
    return () => clearInterval(intv);
  }, [cacheStatus.done, pendingCount]);

  const formatBytes = (b) => {
    if (b < 1024) return `${b} B`;
    if (b < 1024 * 1024) return `${(b / 1024).toFixed(0)} KB`;
    return `${(b / 1024 / 1024).toFixed(1)} MB`;
  };

  const onClearCache = async () => {
    if (!confirm('ลบรูปที่ cache ในเครื่อง? (รูปบน OneDrive ยังอยู่ — ดาวน์โหลดใหม่เมื่อเปิดดูครั้งหน้า)')) return;
    setBusy(true);
    await clearPhotoCache();
    await refreshStats();
    setBusy(false);
    pushToast('ล้าง cache แล้ว');
  };

  const cachingProgress = cacheStatus.running && cacheStatus.total > 0
    ? Math.round((cacheStatus.done / cacheStatus.total) * 100)
    : null;

  return (
    <div className="panel rise">
      <div className="hd">
        <div className="ico-wrap"><Ic.Download size={16}/></div>
        <div>
          <div className="tt">รูปออฟไลน์</div>
          <div className="sb">
            {isOnline ? 'ออนไลน์ · sync อัตโนมัติ' : '🔌 ออฟไลน์ · ดูรูปจากเครื่องได้'}
          </div>
        </div>
      </div>

      {/* Stats grid */}
      <div className="cache-stats">
        <div className="cell">
          <div className="num">{stats.count.toLocaleString()}</div>
          <div className="lbl">รูปใน cache</div>
        </div>
        <div className="cell">
          <div className="num">{formatBytes(stats.bytes)}</div>
          <div className="lbl">ขนาด</div>
        </div>
        <div className="cell">
          <div className="num" style={{color: pendingCount > 0 ? 'var(--sync-warn)' : 'var(--income-soft)'}}>
            {pendingCount}
          </div>
          <div className="lbl">รออัปโหลด</div>
        </div>
      </div>

      {/* Pre-cache progress bar */}
      {cachingProgress !== null && (
        <div style={{marginTop: 12}}>
          <div style={{display: 'flex', justifyContent: 'space-between', fontSize: 11, color: 'var(--text-dim)', marginBottom: 4}}>
            <span>กำลังดาวน์โหลดรูป...</span>
            <span>{cacheStatus.done} / {cacheStatus.total}</span>
          </div>
          <div className="cache-progress">
            <div className="bar" style={{width: `${cachingProgress}%`}}></div>
          </div>
        </div>
      )}

      {/* Pending uploads notice */}
      {pendingCount > 0 && (
        <div className="cache-notice warn">
          ⏳ มีรูป {pendingCount} รูปรออัปโหลด — จะ upload อัตโนมัติเมื่อออนไลน์
        </div>
      )}

      <p style={{fontSize: 11, color: 'var(--text-dim)', margin: '12px 0 8px', lineHeight: 1.55}}>
        💡 รูปทั้งหมดจะถูกดาวน์โหลดเก็บไว้ในเครื่อง (Chrome) เปิดดูได้แม้ไม่มีเน็ต
        เก็บใน Chrome's IndexedDB ไม่ใช่ Gallery มือถือ — ลบ Chrome data จะหาย แต่ OneDrive ยังมีอยู่
      </p>

      <button className="btn-ghost" style={{width: '100%'}}
              onClick={onClearCache} disabled={busy || stats.count === 0}>
        {busy ? <><Ic.Refresh size={14} className="spin"/> กำลังล้าง</> : <><Ic.Trash size={14}/> ล้าง cache ในเครื่อง</>}
      </button>
    </div>
  );
}

// ============ v5.5: Advanced Search ============
// User can enter up to 3 keyword fragments (AND-combined), filter by project,
// account, and date range. Each non-empty keyword must appear (substring,
// case-insensitive, whitespace-trimmed) somewhere in any field of the transaction.
// Results are tappable — opens TxActionMenu like the regular list.
function SearchSheet({ allTransactions, accounts, projects, onClose, onPickTx }) {
  const [k1, setK1] = useState('');
  const [k2, setK2] = useState('');
  const [k3, setK3] = useState('');
  const [project, setProject] = useState('');
  const [accountName, setAccountName] = useState('');
  const [dateFrom, setDateFrom] = useState('');
  const [dateTo, setDateTo] = useState('');
  const [submitted, setSubmitted] = useState(false); // run search after first click

  // Build a flat searchable string for a transaction across every meaningful field.
  // We deliberately include numbers (amount), dates, ids — same as the user expects
  // for "search every field".
  const searchableText = (t) => {
    const parts = [
      t.type, t.category, t.accountName, t.project, t.item, t.payee,
      t.note, t.date, t.createdAt,
      t.amount != null ? String(t.amount) : '',
      // photo names too (in case user remembers a receipt filename)
      ...(Array.isArray(t.photos) ? t.photos.map(p => p?.name || '') : []),
    ];
    return parts.filter(Boolean).join(' ').toLowerCase();
  };

  const results = useMemo(() => {
    if (!submitted) return null;
    const keywords = [k1, k2, k3].map(s => (s || '').trim().toLowerCase()).filter(Boolean);
    const projF = (project || '').trim();
    const accF = (accountName || '').trim();
    return (allTransactions || []).filter(t => {
      // Date range (inclusive). Skip if date doesn't parse.
      if (dateFrom && t.date && t.date < dateFrom) return false;
      if (dateTo && t.date && t.date > dateTo) return false;
      // Project / account filters (exact match, optional)
      if (projF && (t.project || '').trim() !== projF) return false;
      if (accF && (t.accountName || '').trim() !== accF) return false;
      // Keyword AND across every field
      if (keywords.length > 0) {
        const hay = searchableText(t);
        for (const kw of keywords) {
          if (!hay.includes(kw)) return false;
        }
      }
      return true;
    }).sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  }, [submitted, k1, k2, k3, project, accountName, dateFrom, dateTo, allTransactions]);

  const reset = () => {
    setK1(''); setK2(''); setK3('');
    setProject(''); setAccountName('');
    setDateFrom(''); setDateTo('');
    setSubmitted(false);
  };

  const onSubmit = () => {
    setSubmitted(true);
  };

  // No results yet & not yet submitted → show only the form
  // Submitted → show results list below the form
  return (
    <div className="sheet-backdrop fade" onClick={onClose} style={{zIndex: 90}}>
      <div className="sheet-wrap sheet-in" onClick={e => e.stopPropagation()}>
        <div className="sheet">
          <div className="sheet-handle"></div>
          <div className="sheet-head">
            <h2>🔍 ค้นหารายการ</h2>
            <button className="icon-btn-round" onClick={onClose}><Ic.X size={16}/></button>
          </div>

          {/* Keyword inputs — all optional, AND-combined */}
          <div className="search-form">
            <label className="search-label">คำค้นหา (ใส่อย่างน้อย 1 ช่อง)</label>
            <input
              type="text"
              className="search-input"
              placeholder="ข้อความที่ 1 (เช่น ค่าน้ำ)"
              value={k1}
              onChange={(e) => setK1(e.target.value)}
            />
            <input
              type="text"
              className="search-input"
              placeholder="ข้อความที่ 2 (เช่น เมษ — เพิ่มเงื่อนไข)"
              value={k2}
              onChange={(e) => setK2(e.target.value)}
            />
            <input
              type="text"
              className="search-input"
              placeholder="ข้อความที่ 3 (optional)"
              value={k3}
              onChange={(e) => setK3(e.target.value)}
            />

            <div className="search-divider"></div>

            <label className="search-label">เลือก (optional)</label>
            <select
              className="search-input"
              value={project}
              onChange={(e) => setProject(e.target.value)}>
              <option value="">— ทุกโครงการ —</option>
              {(projects || []).map(p => (
                <option key={p.id} value={p.name}>{p.name}</option>
              ))}
            </select>
            <select
              className="search-input"
              value={accountName}
              onChange={(e) => setAccountName(e.target.value)}>
              <option value="">— ทุกบัญชี —</option>
              {(accounts || []).map(a => (
                <option key={a.id} value={a.name}>{a.name}</option>
              ))}
            </select>

            <div className="search-divider"></div>

            <label className="search-label">ช่วงเวลา (optional)</label>
            <div className="search-date-row">
              <div className="search-date-cell">
                <span className="search-date-lbl">จาก</span>
                <input
                  type="date"
                  className="search-input"
                  value={dateFrom}
                  onChange={(e) => setDateFrom(e.target.value)}
                />
              </div>
              <div className="search-date-cell">
                <span className="search-date-lbl">ถึง</span>
                <input
                  type="date"
                  className="search-input"
                  value={dateTo}
                  onChange={(e) => setDateTo(e.target.value)}
                />
              </div>
            </div>

            <div className="search-actions">
              <button className="btn-ghost" onClick={reset} type="button">
                ล้าง
              </button>
              <button className="btn-primary" onClick={onSubmit} type="button">
                <Ic.Search size={14}/> ค้นหา
              </button>
            </div>
          </div>

          {/* Results list */}
          {submitted && results !== null && (
            <div className="search-results">
              <div className="search-results-hd">
                {results.length === 0
                  ? '— ไม่พบรายการที่ตรง —'
                  : `พบ ${results.length} รายการ`}
              </div>
              {results.map(t => (
                <SearchResultRow key={t.id} tx={t} accounts={accounts}
                                 onTap={() => { onPickTx(t); }}/>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// Compact row for search results — shows date, account, item, amount, project
function SearchResultRow({ tx, accounts, onTap }) {
  const acc = (accounts || []).find(a => (a.name || '').trim() === (tx.accountName || '').trim());
  const decimals = acc?.decimals ?? 2;
  const sign = tx.type === 'income' ? '+' : '-';
  const cls = tx.type === 'income' ? 'in' : 'out';
  const amountStr = (tx.amount || 0).toLocaleString('en-US', {
    minimumFractionDigits: decimals, maximumFractionDigits: decimals,
  });
  const d = new Date(tx.date);
  const dateLabel = isNaN(d) ? tx.date : d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: '2-digit' });
  return (
    <button className="search-result-row" onClick={onTap}>
      <div className="search-result-main">
        <div className="search-result-name">{tx.item || tx.payee || tx.category || '(ไม่ระบุ)'}</div>
        <div className="search-result-meta">
          {dateLabel} · {tx.accountName || '—'}
          {tx.project ? ` · ${tx.project}` : ''}
        </div>
      </div>
      <div className={`search-result-amount ${cls}`}>{sign}{amountStr}</div>
    </button>
  );
}

function LessonsEditor({ onClose, pushToast }) {
  const [content, setContent] = useState('');
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [originalContent, setOriginalContent] = useState('');
  const [savedAt, setSavedAt] = useState(null);

  // Load existing lessons.md once on mount
  useEffect(() => {
    let cancelled = false;
    (async () => {
      const text = await odriveGetText('lessons.md');
      if (cancelled) return;
      const initial = text != null ? text : LESSONS_TEMPLATE;
      setContent(initial);
      setOriginalContent(initial);
      setLoading(false);
    })();
    return () => { cancelled = true; };
  }, []);

  const dirty = content !== originalContent;

  const save = async () => {
    if (saving || !dirty) return;
    setSaving(true);
    try {
      await odrivePutText('lessons.md', content, 'text/markdown; charset=utf-8');
      setOriginalContent(content);
      setSavedAt(new Date());
      pushToast('บันทึกแล้ว');
    } catch (e) {
      pushToast('บันทึกไม่สำเร็จ');
      console.error('save lessons.md failed:', e);
    } finally {
      setSaving(false);
    }
  };

  const insertTimestamp = () => {
    const now = new Date();
    const stamp = now.toLocaleString('th-TH', {
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit',
    });
    const heading = `\n\n## ${stamp}\n\n`;
    setContent(c => c + heading);
  };

  const tryClose = () => {
    if (dirty && !confirm('ยังไม่ได้บันทึก ออกเลยหรือไม่?')) return;
    onClose();
  };

  return (
    <div className="sheet-backdrop fade" onClick={tryClose} style={{zIndex: 90}}>
      <div className="sheet-wrap sheet-in" onClick={e => e.stopPropagation()}>
        <div className="sheet">
          <div className="sheet-handle"></div>
          <div className="sheet-head">
            <h2>📔 สมุดบันทึก</h2>
            <button className="icon-btn-round" onClick={tryClose}><Ic.X size={16}/></button>
          </div>

          <div style={{fontSize: 11, color: 'var(--text-faint)', marginTop: 6, marginBottom: 12}}>
            เก็บที่ <span style={{color: 'var(--gold)', fontFamily: 'IBM Plex Mono, monospace'}}>/Apps/my money/lessons.md</span>
          </div>

          {loading ? (
            <div style={{textAlign: 'center', padding: 40, color: 'var(--text-dim)'}}>
              <Ic.Refresh size={20} className="spin"/>
              <div style={{marginTop: 8, fontSize: 13}}>กำลังโหลด...</div>
            </div>
          ) : (
            <>
              <textarea
                className="lessons-editor"
                value={content}
                onChange={e => setContent(e.target.value)}
                placeholder="เขียนบทเรียน / คำอธิบายของ Claude / โน้ตสำคัญที่นี่..."
                spellCheck={false}
              />

              <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 8, fontSize: 11, color: 'var(--text-faint)'}}>
                <span>{content.length.toLocaleString()} ตัวอักษร</span>
                {savedAt && !dirty && (
                  <span style={{color: 'var(--income-soft)'}}>
                    ✓ บันทึกแล้ว {savedAt.toLocaleTimeString('th-TH', {hour: '2-digit', minute: '2-digit'})}
                  </span>
                )}
                {dirty && <span style={{color: 'var(--sync-warn)'}}>● มีการแก้ไข</span>}
              </div>

              <div className="lessons-savebar">
                <button className="btn-ghost" onClick={insertTimestamp} type="button">
                  <Ic.Plus size={14}/> เพิ่มหัวข้อใหม่
                </button>
                <button className="btn-primary" onClick={save} disabled={!dirty || saving} type="button">
                  {saving ? <><Ic.Refresh size={14} className="spin"/> กำลังบันทึก</> : <><Ic.Cloud size={14}/> บันทึก</>}
                </button>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}
