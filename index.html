<style>
:root {
  /* Sage Green light theme (v2.4) */
  --bg: #F4F1EA;          /* warm cream paper */
  --surface: #FBFAF6;     /* card surface, slightly brighter than bg */
  --surface2: #EDEBE3;    /* secondary surface, slightly tinted */
  --line: rgba(106,134,108,0.18);
  --line-strong: rgba(106,134,108,0.36);
  --text: #2C3A2E;        /* deep forest, high contrast on cream */
  --text-dim: #5C6E5E;
  --text-faint: #8C9A8E;
  --gold: #6A866C;        /* renamed: actual primary accent = sage green */
  --gold-soft: #88A88A;
  --income: #4F8B5C;      /* deeper green for income — distinct from primary */
  --income-soft: #2F6B3D;
  --expense: #B85842;     /* warm terracotta for expenses */
  --expense-soft: #944632;
  --sync-ok: #4F8B5C;
  --sync-warn: #C99A4A;
  --sync-err: #B85842;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
html, body { height: 100%; }
/* v2.8: text-zoom levels (สำหรับสายตายาว) - ใช้ zoom property ปรับขนาดทั้งแอปแบบรักษา layout */
html[data-zoom="1"] body { zoom: 1.15; }
html[data-zoom="2"] body { zoom: 1.30; }
html[data-zoom="3"] body { zoom: 1.45; }
body {
  font-family: 'IBM Plex Sans Thai', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; color: inherit; background: none; border: none; cursor: pointer; }
input { font-family: inherit; color: inherit; }
input::placeholder { color: var(--text-faint); }

.font-display { font-family: 'Noto Serif Thai', serif; letter-spacing: -0.01em; }
.font-mono-n { font-family: 'IBM Plex Mono', monospace; font-variant-numeric: tabular-nums; }

/* Layout */
#root { min-height: 100dvh; position: relative; }
.app-bg {
  position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0;
}
.app-bg::before, .app-bg::after {
  content: ''; position: absolute; border-radius: 50%; filter: blur(10px);
}
.app-bg::before {
  top: -160px; left: -130px; width: 420px; height: 420px; opacity: 0.22;
  background: radial-gradient(closest-side, #B8D2BB, transparent 70%);
}
.app-bg::after {
  top: 33%; right: -160px; width: 520px; height: 520px; opacity: 0.16;
  background: radial-gradient(closest-side, #D4DCB8, transparent 70%);
}
main { position: relative; max-width: 560px; margin: 0 auto; padding: 24px 20px 150px; z-index: 1; }

/* Common */
.rise { animation: rise .4s cubic-bezier(.2,.8,.2,1) both; }
@keyframes rise { from { opacity:0; transform: translateY(12px);} to {opacity:1; transform:translateY(0);} }
.fade { animation: fade .25s ease both; }
@keyframes fade { from {opacity:0;} to {opacity:1;} }
.sheet-in { animation: sheetIn .32s cubic-bezier(.2,.8,.2,1) both; }
@keyframes sheetIn { from {transform: translateY(100%);} to {transform: translateY(0);} }
.spin { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Header */
header.page-head { padding-top: 4px; position: relative; z-index: 10; }
.crumb {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-faint);
}
.crumb::before { content: ''; width: 16px; height: 1px; background: var(--gold); }
h1.page-title {
  font-family: 'Noto Serif Thai', serif;
  font-size: 34px; line-height: 1; margin-top: 8px; letter-spacing: -0.02em;
}

/* v1.7: Title row with account filter inline */
.title-row {
  display: flex; align-items: baseline; gap: 12px;
  margin-top: 8px; flex-wrap: wrap;
}
.title-row h1.page-title { margin-top: 0; }

.acct-filter {
  position: relative;
  align-self: center;
  z-index: 30;
}
.acct-filter-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 999px;
  background: rgba(106,134,108,0.08); color: var(--gold);
  border: 1px solid var(--line-strong);
  font-size: 12px; letter-spacing: 0.04em;
  font-family: 'IBM Plex Sans Thai', sans-serif;
  transition: transform .15s, background .2s;
  max-width: 180px;
}
.acct-filter-btn:active { transform: scale(0.96); }
.acct-filter-btn .label {
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  max-width: 140px;
}
.acct-filter-btn .chev { color: var(--text-dim); transition: transform .2s; flex-shrink: 0; }
.acct-filter-btn.open .chev { transform: rotate(180deg); }
.acct-filter-btn.active {
  background: rgba(106,134,108,0.16);
  border-color: var(--gold);
}

.acct-filter-menu {
  position: absolute; top: calc(100% + 6px); left: 0;
  min-width: 200px; max-width: 260px;
  background: var(--surface); border: 1px solid var(--line-strong);
  border-radius: 14px; z-index: 40;
  overflow: hidden;
  box-shadow: 0 12px 32px rgba(0,0,0,0.6), 0 4px 12px rgba(0,0,0,0.4);
  max-height: 300px; overflow-y: auto;
}
.acct-filter-item {
  width: 100%; padding: 12px 14px;
  display: flex; align-items: center; gap: 10px;
  background: transparent; border: none;
  border-bottom: 1px solid var(--line);
  font-size: 13px; color: var(--text-dim); text-align: left;
  font-family: inherit;
  transition: background .15s;
}
.acct-filter-item:last-child { border-bottom: none; }
.acct-filter-item:active { background: rgba(106,134,108,0.08); }
.acct-filter-item.active {
  background: rgba(106,134,108,0.1); color: var(--gold); font-weight: 500;
}
.acct-filter-item .name {
  flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.acct-filter-item .check { color: var(--gold); flex-shrink: 0; }
.acct-filter-item.all { font-weight: 600; color: var(--text); }
.acct-filter-item.all.active { color: var(--gold); }

/* Hairline separator between ALL and account list */
.acct-filter-divider {
  height: 1px; background: var(--line-strong); margin: 0;
}
.acct-filter-item.manage {
  color: var(--gold); font-size: 12px; font-weight: 500;
  padding: 10px 14px;
}
.acct-filter-item.manage:active { background: rgba(106,134,108,0.12); }

/* v2.0: Accounts Overview (new home) */
.back-btn {
  width: 32px; height: 32px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  background: rgba(106,134,108,0.08); color: var(--gold);
  border: 1px solid var(--line);
  flex-shrink: 0;
  transition: transform .15s, background .2s;
}
.back-btn:active { transform: scale(0.88); background: rgba(106,134,108,0.18); }

.grand-total-card {
  border: 1px solid var(--line) !important;
  transition: transform .2s, border-color .2s;
}
.grand-total-card:active {
  transform: scale(0.99);
  border-color: var(--gold) !important;
}
.grand-sub {
  display: flex; gap: 24px; align-items: flex-end; margin-top: 14px;
  padding-top: 14px; border-top: 1px solid var(--line);
}
.grand-sub .gs-col { display: flex; flex-direction: column; gap: 3px; }
.grand-sub .gs-lbl {
  font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--text-faint); display: inline-flex; align-items: center; gap: 4px;
}
.grand-sub .gs-val {
  font-family: 'IBM Plex Mono', monospace; font-size: 13px;
}
.grand-sub .gs-val.in { color: var(--income-soft); }
.grand-sub .gs-val.out { color: var(--expense-soft); }
.grand-sub .gs-hint {
  margin-left: auto; align-self: flex-end;
  font-size: 10px; color: var(--gold); letter-spacing: 0.06em;
  opacity: 0.8;
}

.accounts-list {
  display: flex; flex-direction: column; gap: 4px; margin-top: 10px;
}
.account-row {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px; border-radius: 12px;
  background: var(--surface2); border: 1px solid var(--line);
  text-align: left; width: 100%;
  font-family: inherit;
  transition: transform .15s, background .2s, border-color .2s;
}
.account-row:active {
  transform: scale(0.99);
  background: var(--surface);
  border-color: var(--line-strong);
}
.acct-main { flex: 1; min-width: 0; }
.acct-name {
  font-size: 14px; color: var(--text); font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.acct-line2 {
  margin-top: 3px;
  display: flex; align-items: baseline; gap: 10px;
}
.acct-balance {
  font-size: 13px;
  font-weight: 500;
  flex-shrink: 0;
}
.acct-meta {
  font-size: 10.5px; color: var(--text-faint);
  flex: 1; min-width: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.acct-dec-badge {
  padding: 1px 5px; border-radius: 4px; margin-left: 4px;
  background: rgba(106,134,108,0.08); color: var(--gold);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9.5px;
}
.acct-chev { color: var(--text-faint); flex-shrink: 0; }

/* v1.9: Kebab Menu (3-dot) */
.kebab-wrap {
  position: relative;
  flex-shrink: 0;
}
.kebab-btn {
  width: 38px; height: 38px; border-radius: 50%;
  background: rgba(106,134,108,0.06);
  border: 1px solid var(--line);
  display: inline-flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 3px;
  transition: all .15s;
  cursor: pointer;
}
.kebab-btn:active { transform: scale(0.92); background: rgba(106,134,108,0.14); }
.kebab-btn.open { background: rgba(106,134,108,0.18); border-color: var(--gold); }
.kebab-btn .dot {
  width: 3.5px; height: 3.5px; border-radius: 50%;
  background: var(--gold);
}

.kebab-menu {
  position: absolute; top: calc(100% + 8px); right: 0;
  min-width: 220px; max-width: 280px;
  background: var(--surface); border: 1px solid var(--line-strong);
  border-radius: 14px; z-index: 50;
  overflow: hidden;
  box-shadow: 0 16px 40px rgba(0,0,0,0.7), 0 4px 12px rgba(0,0,0,0.4);
}
.kebab-section {
  border-bottom: 1px solid var(--line);
}
.kebab-section:last-child { border-bottom: none; }
.kebab-section-head {
  width: 100%; padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
  background: transparent; border: none;
  font-family: inherit; font-size: 14px;
  color: var(--text); text-align: left;
  transition: background .15s;
}
.kebab-section-head:active { background: rgba(106,134,108,0.06); }
.kebab-section-head.expanded {
  background: rgba(106,134,108,0.08);
  color: var(--gold);
}
.kebab-section-head .em { font-size: 18px; flex-shrink: 0; }
.kebab-section-head .lbl { flex: 1; font-weight: 500; }
.kebab-section-head .chev {
  color: var(--text-dim); transition: transform .2s;
}
.kebab-section-head.expanded .chev {
  transform: rotate(180deg); color: var(--gold);
}

.kebab-submenu {
  background: var(--bg);
  padding: 4px 0;
}
.kebab-subitem {
  width: 100%; padding: 11px 16px 11px 50px;
  display: block; background: transparent; border: none;
  font-family: inherit; font-size: 13px;
  color: var(--text-dim); text-align: left;
  transition: background .15s, color .15s;
}
.kebab-subitem:active {
  background: rgba(106,134,108,0.1);
  color: var(--gold);
}
.kebab-subitem:hover { color: var(--text); }

/* Cards */
.card {
  background: var(--surface); border: 1px solid var(--line); border-radius: 22px;
  padding: 20px; position: relative;
}
.card.hero {
  background: linear-gradient(145deg, var(--surface2) 0%, var(--surface) 100%);
  padding: 24px;
}
.hero .label {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-dim);
}
.hero .label::before { content: ''; width: 20px; height: 1px; background: var(--gold); }
.hero .amount {
  display: flex; align-items: baseline; gap: 8px; margin-top: 12px;
}
.hero .amount .currency { font-family: 'IBM Plex Mono', monospace; font-size: 14px; color: var(--text-dim); }
.hero .amount .value {
  font-family: 'Noto Serif Thai', serif; font-variant-numeric: tabular-nums;
  font-size: 44px; line-height: 1; font-weight: 500;
}

/* Stats grid */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
.stat-mini {
  background: rgba(255,255,255,0.025); border: 1px solid var(--line);
  border-radius: 16px; padding: 14px;
}
.stat-mini .lbl {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim);
}
.stat-mini .val {
  font-family: 'IBM Plex Mono', monospace; font-variant-numeric: tabular-nums;
  font-size: 20px; margin-top: 6px;
}

/* Month selector */
.month-sel { margin-top: 20px; display: flex; align-items: center; gap: 8px; }
.month-sel .nav-btn {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--surface); border: 1px solid var(--line);
  display: inline-flex; align-items: center; justify-content: center;
  transition: transform .15s;
}
.month-sel .nav-btn:active { transform: scale(0.9); }
.month-sel .label { flex: 1; text-align: center; }
.month-sel .label .m { font-family: 'Noto Serif Thai', serif; font-size: 18px; line-height: 1; }
.month-sel .label .y {
  font-family: 'IBM Plex Mono', monospace; font-size: 11px;
  color: var(--text-faint); margin-top: 4px;
}
.month-sel .today-btn {
  margin-left: 4px; padding: 0 14px; height: 40px; border-radius: 999px;
  font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
  background: rgba(106,134,108,0.1); color: var(--gold);
  border: 1px solid var(--line-strong);
  transition: transform .15s;
}
.month-sel .today-btn:active { transform: scale(0.95); }

/* Tx row */
.tx-list { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
.tx-row {
  display: flex; align-items: center; gap: 12px; width: 100%;
  padding: 12px 16px; text-align: left;
  background: var(--surface); border: 1px solid var(--line); border-radius: 16px;
  transition: transform .15s;
}
.tx-row:active { transform: scale(0.985); }
.tx-row .date-badge {
  flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-width: 64px;
  padding: 6px 8px;
  border-radius: 12px;
  background: var(--surface2); border: 1px solid var(--line);
}
.tx-row .date-badge .dd {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px; font-weight: 600;
  color: var(--gold); letter-spacing: 0.02em;
  line-height: 1.1;
}
.tx-row .date-badge .tt {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--text-faint);
  margin-top: 3px; letter-spacing: 0.02em;
}
.tx-row .mid { flex: 1; min-width: 0; }
.tx-row .title-ln {
  font-size: 14px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.tx-row .sub-ln { font-size: 11px; color: var(--text-faint); margin-top: 2px; }
.tx-row .amt {
  font-family: 'IBM Plex Mono', monospace; font-variant-numeric: tabular-nums;
  font-size: 15px; flex-shrink: 0;
}
.tx-row .amt.in { color: var(--income-soft); }
.tx-row .amt.out { color: var(--expense-soft); }

/* v2.3: sort toggle button */
.sort-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 10px; border-radius: 999px;
  background: rgba(106,134,108,0.06);
  border: 1px solid var(--line);
  color: var(--gold);
  font-size: 11px; letter-spacing: 0.04em;
  font-family: 'IBM Plex Sans Thai', sans-serif;
  transition: transform .15s, background .2s;
}
.sort-btn:active { transform: scale(0.94); background: rgba(106,134,108,0.16); }
.sort-btn.asc { background: rgba(106,134,108,0.12); }
.sort-btn .ico { font-family: 'IBM Plex Mono', monospace; font-size: 10px; }

/* Section header */
.section-head { margin-top: 28px; display: flex; align-items: center; justify-content: space-between; }
.section-head h2 { font-family: 'Noto Serif Thai', serif; font-size: 18px; font-weight: 500; }
.section-head .count { font-size: 11px; color: var(--text-faint); }

/* Empty state */
.empty {
  text-align: center; padding: 40px 20px; border-radius: 22px;
  background: var(--surface); border: 1px dashed var(--line-strong);
}
.empty .em { font-size: 32px; margin-bottom: 8px; }
.empty .t1 { font-size: 14px; color: var(--text-dim); }
.empty .t2 { font-size: 11px; color: var(--text-faint); margin-top: 4px; }

/* Tab bar */
nav.tabbar {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 50;
  padding: 8px 0 max(14px, env(safe-area-inset-bottom));
  transition: opacity .2s, transform .25s cubic-bezier(.2,.8,.2,1);
}
/* v3.2: hide tab bar while a bottom sheet is open so its sticky buttons aren't covered.
   Uses :has() — supported on Chrome 105+, Safari 15.4+ (Samsung S25 covered). */
body:has(.sheet-backdrop) nav.tabbar {
  opacity: 0;
  transform: translateY(100%);
  pointer-events: none;
}
.tabbar-inner {
  max-width: 560px; margin: 0 auto; padding: 0 20px;
}
.tabbar-box {
  position: relative; display: grid; grid-template-columns: repeat(5, 1fr); align-items: center;
  background: rgba(24,21,18,0.85); backdrop-filter: blur(16px) saturate(1.3);
  -webkit-backdrop-filter: blur(16px) saturate(1.3);
  border: 1px solid var(--line); border-radius: 22px;
  box-shadow: 0 12px 40px rgba(0,0,0,.5);
}
.tab-btn {
  display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 12px 0;
  transition: transform .15s;
}
.tab-btn:active { transform: scale(0.95); }
.tab-btn .lbl { font-size: 10px; letter-spacing: 0.08em; color: var(--text-faint); }
.tab-btn.active .lbl { color: var(--gold); }
.tab-btn .ico { color: var(--text-faint); }
.tab-btn.active .ico { color: var(--gold); }
.add-wrap { display: flex; justify-content: center; margin-top: -24px; }
.add-btn {
  width: 56px; height: 56px; border-radius: 50%;
  background: radial-gradient(circle at 30% 20%, var(--gold-soft), var(--gold) 70%);
  color: #FBFAF6;
  display: inline-flex; align-items: center; justify-content: center;
  box-shadow: 0 10px 24px rgba(106,134,108,.35), inset 0 1px 0 rgba(255,255,255,.3);
  transition: transform .15s;
}
.add-btn:active { transform: scale(0.9); }

/* Sheet */
.sheet-backdrop {
  position: fixed; inset: 0; z-index: 70; display: flex; align-items: flex-end;
  background: rgba(0,0,0,0.6);
}
.sheet-wrap { width: 100%; max-width: 560px; margin: 0 auto; }
.sheet {
  background: var(--surface);
  border-top: 1px solid var(--line-strong);
  border-top-left-radius: 28px; border-top-right-radius: 28px;
  padding: 12px 20px max(24px, env(safe-area-inset-bottom));
  max-height: 92vh; overflow-y: auto;
  box-shadow: 0 -20px 40px rgba(0,0,0,.5);
}
.sheet-handle {
  width: 40px; height: 4px; border-radius: 999px; background: var(--line-strong);
  margin: 0 auto;
}
.sheet-head {
  display: flex; align-items: center; justify-content: space-between; margin-top: 12px;
}
.sheet-head h2 { font-family: 'Noto Serif Thai', serif; font-size: 20px; font-weight: 500; }
.icon-btn-round {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--surface2); border: 1px solid var(--line);
  display: inline-flex; align-items: center; justify-content: center;
  transition: transform .15s;
}
.icon-btn-round:active { transform: scale(0.9); }

/* Type toggle */
.type-toggle {
  position: relative; margin-top: 20px; padding: 4px; display: grid; grid-template-columns: 1fr 1fr;
  background: var(--surface2); border: 1px solid var(--line); border-radius: 16px;
}
.type-toggle .indicator {
  position: absolute; top: 4px; bottom: 4px; width: calc(50% - 4px);
  border-radius: 12px;
  transition: left .3s cubic-bezier(.2,.8,.2,1), background .2s, border-color .2s;
}
.type-toggle button {
  position: relative; padding: 10px 0; font-size: 14px;
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  color: var(--text-dim); transition: color .2s;
}

/* Amount input */
.amount-box { margin-top: 20px; text-align: center; }
.amount-box .lbl {
  font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-faint);
}
.amount-box .row {
  display: flex; align-items: baseline; justify-content: center; gap: 8px; margin-top: 8px;
}
.amount-box .cur {
  font-family: 'IBM Plex Mono', monospace; font-size: 20px; color: var(--text-dim);
}
.amount-box input {
  font-family: 'Noto Serif Thai', serif; font-variant-numeric: tabular-nums;
  font-size: 44px; line-height: 1; background: transparent; outline: none; border: none;
  text-align: center; width: 65%; caret-color: var(--gold);
}

/* Category grid */
.cat-head {
  font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-faint); margin-top: 20px; margin-bottom: 8px;
}
.cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.cat-btn {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 12px 4px; border-radius: 16px;
  background: var(--surface2); border: 1px solid var(--line);
  transition: transform .15s, background .2s, border-color .2s;
}
.cat-btn:active { transform: scale(0.95); }
.cat-btn.active {
  background: rgba(106,134,108,0.12); border-color: var(--gold);
}
.cat-btn .em { font-size: 20px; }
.cat-btn .nm {
  font-size: 10.5px; line-height: 1.2; color: var(--text-dim); text-align: center; padding: 0 2px;
}
.cat-btn.active .nm { color: var(--gold); }

/* Form rows */
.form-rows { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
.form-row {
  background: var(--surface2); border: 1px solid var(--line); border-radius: 16px;
  padding: 12px 16px; display: flex; align-items: center; gap: 12px;
}
.form-row .lbl {
  font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--text-faint); width: 56px; flex-shrink: 0;
}
.form-row input {
  flex: 1; background: transparent; outline: none; border: none; font-size: 14px;
  color: var(--text); color-scheme: dark;
}
.form-row input.mono { font-family: 'IBM Plex Mono', monospace; }

/* Sheet actions */
.sheet-actions { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.btn-primary {
  background: var(--gold); color: #FBFAF6; font-weight: 600; font-size: 14px;
  padding: 14px 0; border-radius: 16px;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  transition: transform .15s;
}
.btn-primary:active { transform: scale(0.98); }
.btn-primary:disabled { opacity: 0.4; }
.btn-ghost {
  background: var(--surface2); color: var(--text-dim); font-size: 14px;
  padding: 14px 0; border-radius: 16px; border: 1px solid var(--line);
  transition: transform .15s;
}
.btn-ghost:active { transform: scale(0.98); }
.btn-danger {
  background: transparent; color: var(--expense-soft); font-size: 14px;
  padding: 14px 0; border-radius: 16px; border: 1px solid var(--expense);
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  transition: transform .15s;
}
.btn-danger:active { transform: scale(0.98); }
.btn-danger.solid { background: var(--expense); color: #FBFAF6; font-weight: 600; border-color: transparent; }

/* Toast */
.toast {
  position: fixed; left: 50%; transform: translateX(-50%); bottom: 112px;
  padding: 10px 16px; font-size: 13px; border-radius: 999px; z-index: 80;
  background: var(--surface2); color: var(--text);
  border: 1px solid var(--line);
  box-shadow: 0 10px 30px rgba(0,0,0,.45);
}

/* Sync status pill (top right) */
.sync-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 999px; font-size: 10.5px;
  background: var(--surface); border: 1px solid var(--line);
  letter-spacing: 0.06em;
}
.sync-dot {
  width: 6px; height: 6px; border-radius: 50%;
}
.sync-dot.ok { background: var(--sync-ok); box-shadow: 0 0 8px var(--sync-ok); }
.sync-dot.warn { background: var(--sync-warn); box-shadow: 0 0 8px var(--sync-warn); }
.sync-dot.err { background: var(--sync-err); box-shadow: 0 0 8px var(--sync-err); }
.sync-dot.off { background: var(--text-faint); }
.sync-dot.sync { background: var(--sync-warn); animation: pulse 1s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

/* Sign-in screen */
.signin {
  min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 40px 24px; text-align: center; position: relative; z-index: 1;
}
.signin .logo {
  width: 84px; height: 84px; border-radius: 50%;
  background: radial-gradient(circle at 30% 20%, var(--gold-soft), var(--gold) 70%);
  display: inline-flex; align-items: center; justify-content: center;
  font-family: 'Noto Serif Thai', serif; font-size: 40px; color: #FBFAF6; font-weight: 700;
  box-shadow: 0 20px 40px rgba(106,134,108,.35), inset 0 2px 0 rgba(255,255,255,.4);
  margin-bottom: 28px;
}
.signin h1 { font-family: 'Noto Serif Thai', serif; font-size: 36px; letter-spacing: -0.02em; }
.signin .tag { margin-top: 10px; color: var(--text-dim); font-size: 14px; max-width: 320px; line-height: 1.5; }
.signin .ms-btn {
  margin-top: 40px; display: inline-flex; align-items: center; gap: 10px;
  padding: 14px 24px; border-radius: 16px;
  background: var(--gold); color: #FBFAF6; font-weight: 600; font-size: 15px;
  box-shadow: 0 10px 24px rgba(106,134,108,.35);
  transition: transform .15s;
}
.signin .ms-btn:active { transform: scale(0.97); }
.signin .ms-btn:disabled { opacity: 0.5; }
.signin .skip {
  margin-top: 14px; font-size: 12px; color: var(--text-dim);
  text-decoration: underline; text-underline-offset: 3px;
}
.signin .hint {
  margin-top: 32px; font-size: 11px; color: var(--text-faint); max-width: 300px; line-height: 1.6;
}
.signin .err {
  margin-top: 20px; padding: 12px 16px; border-radius: 12px;
  background: rgba(184,88,66,0.08); border: 1px solid var(--expense);
  color: var(--expense-soft); font-size: 12px; max-width: 340px;
  text-align: left; line-height: 1.5;
}
.signin .inapp-warn {
  margin: 18px 0 -10px; padding: 12px 14px; border-radius: 12px;
  background: rgba(201,154,74,0.12); border: 1px solid rgba(201,154,74,0.45);
  color: var(--gold); font-size: 12px; max-width: 340px;
  text-align: left; line-height: 1.55;
}
.signin .inapp-warn strong { color: var(--text); }

/* Setup needed */
.setup-needed {
  min-height: 100dvh; padding: 40px 24px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center; position: relative; z-index: 1;
}
.setup-needed .card-wrap {
  background: var(--surface); border: 1px solid var(--line-strong);
  border-radius: 22px; padding: 28px; max-width: 420px; width: 100%; text-align: left;
}
.setup-needed h2 { font-family: 'Noto Serif Thai', serif; font-size: 22px; margin-bottom: 12px; }
.setup-needed p { font-size: 13px; color: var(--text-dim); line-height: 1.6; margin-bottom: 12px; }
.setup-needed code {
  display: block; background: var(--bg); padding: 12px; border-radius: 8px;
  font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--gold);
  margin: 8px 0; word-break: break-all; border: 1px solid var(--line);
}
.setup-needed ol { margin-left: 18px; font-size: 13px; color: var(--text-dim); line-height: 1.8; }
.setup-needed a { color: var(--gold); }

/* Day group */
.day-grp .day-head {
  display: flex; align-items: baseline; justify-content: space-between;
  padding: 0 4px; margin-bottom: 8px;
}
.day-grp .day-head .d1 { font-family: 'Noto Serif Thai', serif; font-size: 16px; }
.day-grp .day-head .d2 {
  font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-faint);
}
.day-grp .chip { text-align: right; font-family: 'IBM Plex Mono', monospace; font-size: 11px; line-height: 1.2; }
.day-grp .chip .in { color: var(--income-soft); }
.day-grp .chip .out { color: var(--expense-soft); }

/* Chart */
.chart-wrap { position: relative; margin-top: 20px; padding: 20px; background: var(--surface); border: 1px solid var(--line); border-radius: 22px; }
.chart-wrap .total-lbl {
  font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-dim);
}
.chart-wrap .total-val {
  font-family: 'IBM Plex Mono', monospace; font-size: 24px;
  margin-top: 4px; color: var(--expense-soft);
}
.chart-wrap svg { width: 100%; height: 220px; display: block; margin-top: 8px; }
.cat-list { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }
.cat-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; background: var(--surface); border: 1px solid var(--line); border-radius: 16px;
}
.cat-item .bar { width: 6px; height: 38px; border-radius: 3px; flex-shrink: 0; }
.cat-item .em { font-size: 20px; flex-shrink: 0; }
.cat-item .mid { flex: 1; }
.cat-item .mid .nm { font-size: 14px; }
.cat-item .mid .pc { font-size: 11px; color: var(--text-faint); }
.cat-item .val { font-family: 'IBM Plex Mono', monospace; font-size: 14px; }

/* Settings panels */
.panel { margin-top: 16px; padding: 20px; background: var(--surface); border: 1px solid var(--line); border-radius: 22px; }
.panel .hd { display: flex; align-items: center; gap: 10px; }
.panel .hd .ico-wrap {
  width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
  background: rgba(106,134,108,0.12); border: 1px solid var(--line);
  display: inline-flex; align-items: center; justify-content: center; color: var(--gold);
}
.panel .hd .tt { font-family: 'Noto Serif Thai', serif; font-size: 16px; }
.panel .hd .sb { font-size: 11px; color: var(--text-faint); margin-top: 2px; }
.panel .two-col { margin-top: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.panel .info-grid { margin-top: 14px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.info-cell { background: var(--surface2); border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px; }
.info-cell .k { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-faint); }
.info-cell .v { font-family: 'IBM Plex Mono', monospace; font-size: 18px; margin-top: 2px; }
.panel .hint-text { margin-top: 14px; font-size: 11px; color: var(--text-dim); line-height: 1.6; }
.panel .hint-text strong { color: var(--text); }

.account-row {
  margin-top: 14px; padding: 12px 14px;
  background: var(--surface2); border: 1px solid var(--line); border-radius: 14px;
  display: flex; align-items: center; gap: 12px;
}
.account-row .av {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(106,134,108,0.15); color: var(--gold);
  display: inline-flex; align-items: center; justify-content: center;
  font-family: 'Noto Serif Thai', serif; font-weight: 600;
}
.account-row .info { flex: 1; min-width: 0; }
.account-row .info .nm { font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.account-row .info .em { font-size: 11px; color: var(--text-faint); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* version strip */
.vstrip { margin-top: 24px; text-align: center; font-size: 11px; color: var(--text-faint); }

/* Initial loading */
.boot {
  min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; color: var(--text-dim); font-size: 14px;
}
.boot .dot-ring {
  width: 32px; height: 32px; border-radius: 50%;
  border: 2px solid var(--line); border-top-color: var(--gold);
  animation: spin 1s linear infinite;
}

/* Install share panel (v1.2) */
.qr-box {
  margin-top: 16px; padding: 16px;
  background: var(--bg); border: 1px solid var(--line);
  border-radius: 16px; display: flex; flex-direction: column; align-items: center; gap: 12px;
}
.qr-box .qr-img {
  width: 180px; height: 180px; display: block; border-radius: 8px;
  background: var(--surface);
}
.qr-box .qr-img-placeholder {
  width: 180px; height: 180px; border-radius: 8px;
  background: var(--surface2); border: 1px dashed var(--line);
  display: flex; align-items: center; justify-content: center; color: var(--text-faint);
  font-size: 12px;
}
.qr-url {
  font-family: 'IBM Plex Mono', monospace; font-size: 11px;
  color: var(--gold); text-align: center; word-break: break-all;
  padding: 8px 12px; background: var(--surface2); border-radius: 8px;
  border: 1px solid var(--line); width: 100%;
}
.readme-box {
  margin-top: 14px; background: var(--surface2); border: 1px solid var(--line);
  border-radius: 14px; overflow: hidden;
}
.readme-box summary {
  list-style: none; padding: 14px 16px; cursor: pointer;
  display: flex; align-items: center; gap: 10px; font-size: 13px;
  user-select: none;
}
.readme-box summary::-webkit-details-marker { display: none; }
.readme-box summary .chev { margin-left: auto; transition: transform .25s; color: var(--text-dim); }
.readme-box[open] summary .chev { transform: rotate(180deg); }
.readme-content {
  padding: 4px 16px 16px; font-size: 13px; color: var(--text-dim); line-height: 1.65;
  border-top: 1px solid var(--line);
}
.readme-content h4 {
  color: var(--gold); font-family: 'Noto Serif Thai', serif; font-size: 14px;
  margin-top: 14px; margin-bottom: 6px; font-weight: 600;
}
.readme-content h4:first-child { margin-top: 10px; }
.readme-content ol, .readme-content ul {
  padding-left: 20px; margin: 4px 0;
}
.readme-content li { margin: 3px 0; }
.readme-content p { margin: 4px 0; }
.readme-content strong { color: var(--text); }
.readme-content code {
  font-family: 'IBM Plex Mono', monospace; font-size: 11px;
  padding: 2px 6px; background: var(--bg); border-radius: 4px;
  border: 1px solid var(--line); color: var(--gold);
}
.installer-status {
  margin-top: 10px; padding: 10px 12px;
  background: var(--surface2); border: 1px solid var(--line); border-radius: 12px;
  font-size: 11.5px; color: var(--text-dim); line-height: 1.5;
  display: flex; align-items: center; gap: 8px;
}
.installer-status.ok { border-color: rgba(127,176,105,0.3); color: var(--text); }

/* Form v1.3: grid fields, photo upload, viewer */
.quick-chip-row {
  margin-top: 6px;
  display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px;
  scrollbar-width: none;
}
.quick-chip-row::-webkit-scrollbar { display: none; }
.quick-chip {
  flex-shrink: 0;
  padding: 6px 12px; border-radius: 999px;
  background: var(--surface2); border: 1px solid var(--line);
  font-size: 12px; color: var(--text-dim);
  display: inline-flex; align-items: center; gap: 6px;
  transition: all .15s;
}
.quick-chip:active { transform: scale(0.95); }
.quick-chip.active {
  background: rgba(106,134,108,0.12);
  border-color: var(--gold); color: var(--gold);
}
.quick-chip .em { font-size: 14px; }

.photo-slot {
  margin-top: 12px; position: relative;
  border: 1px dashed var(--line-strong); border-radius: 14px;
  min-height: 90px; display: flex; align-items: center; justify-content: center;
  background: var(--surface2); padding: 14px;
}
.photo-slot.has-photo {
  border-style: solid; padding: 0; overflow: hidden; min-height: 140px;
}
.photo-slot .placeholder {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  color: var(--text-dim); font-size: 12px;
}
.photo-slot .placeholder .icons { display: flex; gap: 12px; color: var(--gold); }
.photo-slot .preview {
  width: 100%; max-height: 240px; object-fit: cover; display: block;
  background: var(--bg);
}
.photo-slot .loading-overlay {
  position: absolute; inset: 0; background: rgba(24,21,18,0.8);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
  color: var(--text-dim); font-size: 12px;
}
.photo-slot .rm-btn {
  position: absolute; top: 8px; right: 8px;
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(24,21,18,0.85); color: var(--expense-soft);
  border: 1px solid var(--expense);
  display: inline-flex; align-items: center; justify-content: center;
  backdrop-filter: blur(8px);
}
.photo-pick-row {
  margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
}
.photo-btn {
  padding: 10px 14px; border-radius: 12px;
  background: var(--surface2); border: 1px solid var(--line-strong);
  color: var(--text-dim); font-size: 12px;
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  transition: transform .15s;
}
.photo-btn:active { transform: scale(0.97); }
.photo-btn:disabled { opacity: 0.4; }

/* Photo viewer modal */
.photo-viewer {
  position: fixed; inset: 0; z-index: 90;
  background: rgba(0,0,0,0.95);
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
}
.photo-viewer img {
  max-width: 100%; max-height: 100%; object-fit: contain;
  border-radius: 8px;
}
.photo-viewer .close-btn {
  position: absolute; top: max(16px, env(safe-area-inset-top)); right: 16px;
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(255,255,255,0.15); color: #fff;
  display: inline-flex; align-items: center; justify-content: center;
  backdrop-filter: blur(8px);
}

/* Tx row photo thumb */
.tx-row .thumb {
  width: 28px; height: 28px; border-radius: 6px;
  background: var(--surface2);
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--text-faint); flex-shrink: 0;
  margin-right: -4px;
}

/* v1.4: Dropdown select styled */
.select-field {
  background: var(--surface2); border: 1px solid var(--line); border-radius: 16px;
  padding: 12px 16px;
  display: flex; align-items: center; gap: 12px; position: relative;
}
.select-field .lbl {
  font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--text-faint); width: 68px; flex-shrink: 0;
}
.select-field select {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text); font-family: inherit; font-size: 14px;
  appearance: none; -webkit-appearance: none;
  padding-right: 20px;
  background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2024%2024%22%20stroke%3D%22%239E948A%22%20stroke-width%3D%222%22%20fill%3D%22none%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpath%20d%3D%22m6%209%206%206%206-6%22%2F%3E%3C%2Fsvg%3E");
  background-repeat: no-repeat; background-position: right 0 center; background-size: 16px;
}
.select-field select option { background: var(--surface); color: var(--text); }
.select-field.required::after {
  content: '*'; position: absolute; top: 10px; right: 14px;
  color: var(--expense-soft); font-size: 14px; pointer-events: none;
}

/* Autocomplete combobox */
.combo-wrap { position: relative; }
.combo-field {
  background: var(--surface2); border: 1px solid var(--line); border-radius: 16px;
  padding: 12px 16px;
  display: flex; align-items: center; gap: 12px;
}
.combo-field.required { border-color: var(--expense); }
.combo-field.required.filled { border-color: var(--line); }
.combo-field .lbl {
  font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--text-faint); width: 68px; flex-shrink: 0;
}
.combo-field .lbl .star { color: var(--expense-soft); margin-left: 2px; }
.combo-field input {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text); font-size: 14px;
}
.combo-field .add-btn {
  width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
  background: rgba(106,134,108,0.15); color: var(--gold);
  border: 1px solid var(--line-strong);
  display: inline-flex; align-items: center; justify-content: center;
  transition: transform .15s;
}
.combo-field .add-btn:active { transform: scale(0.9); }
.combo-field .add-btn:disabled { opacity: 0.3; }
.combo-dropdown {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  background: var(--surface); border: 1px solid var(--line-strong);
  border-radius: 14px; z-index: 10;
  max-height: 240px; overflow-y: auto;
  box-shadow: 0 12px 32px rgba(0,0,0,0.5);
}
.combo-option {
  padding: 12px 16px; font-size: 13px; cursor: pointer;
  border-bottom: 1px solid var(--line);
  color: var(--text); display: flex; align-items: center; gap: 8px;
  transition: background .15s;
}
.combo-option:last-child { border-bottom: none; }
.combo-option:active, .combo-option.highlight {
  background: rgba(106,134,108,0.08); color: var(--gold);
}
.combo-option.add-new {
  color: var(--gold); font-weight: 500;
  background: rgba(106,134,108,0.05);
}
.combo-option .secondary { color: var(--text-faint); font-size: 11px; margin-left: auto; }

/* v1.4: Multi-photo grid */
.photos-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 16px; margin-bottom: 8px;
}
.photos-header .title {
  font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-faint); display: flex; align-items: center; gap: 6px;
}
.photos-header .count {
  font-family: 'IBM Plex Mono', monospace; font-size: 11px;
  color: var(--gold);
}
.photos-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
  margin-bottom: 10px;
}
.photo-cell {
  position: relative; aspect-ratio: 1; border-radius: 10px;
  overflow: hidden; background: var(--surface2); border: 1px solid var(--line);
}
.photo-cell img { width: 100%; height: 100%; object-fit: cover; display: block; }
.photo-cell .rm {
  position: absolute; top: 4px; right: 4px;
  width: 24px; height: 24px; border-radius: 50%;
  background: rgba(0,0,0,0.7); color: var(--expense-soft);
  display: inline-flex; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
  border: 1px solid rgba(184,88,66,0.4);
}
.photo-cell .loading {
  position: absolute; inset: 0; background: rgba(24,21,18,0.75);
  display: flex; align-items: center; justify-content: center; color: var(--gold);
}
.photo-cell.placeholder-cell {
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
  color: var(--text-faint); font-size: 11px;
  cursor: pointer; border-style: dashed;
  transition: all .15s;
}
.photo-cell.placeholder-cell:active { transform: scale(0.95); background: var(--surface); }
.photo-cell.placeholder-cell.full {
  cursor: not-allowed; opacity: 0.35;
}

/* v1.4: Category dropdown */
.cat-dropdown-btn {
  width: 100%; margin-top: 8px;
  padding: 14px 16px; border-radius: 16px;
  background: var(--surface2); border: 1px solid var(--line);
  display: flex; align-items: center; gap: 12px;
  transition: transform .15s;
}
.cat-dropdown-btn:active { transform: scale(0.99); }
.cat-dropdown-btn .em { font-size: 20px; flex-shrink: 0; }
.cat-dropdown-btn .lbl {
  flex: 1; text-align: left; color: var(--text); font-size: 14px;
}
.cat-dropdown-btn .chev { color: var(--text-dim); transition: transform .25s; }
.cat-dropdown-btn.open .chev { transform: rotate(180deg); }
.cat-dropdown-menu {
  margin-top: 6px; border-radius: 16px; overflow: hidden;
  background: var(--surface2); border: 1px solid var(--line-strong);
  max-height: 260px; overflow-y: auto;
}
.cat-dropdown-item {
  width: 100%; padding: 12px 16px;
  display: flex; align-items: center; gap: 12px; text-align: left;
  font-size: 14px; color: var(--text-dim);
  border-bottom: 1px solid var(--line);
  transition: background .15s;
}
.cat-dropdown-item:last-child { border-bottom: none; }
.cat-dropdown-item.active {
  background: rgba(106,134,108,0.1); color: var(--gold);
}
.cat-dropdown-item:active { background: rgba(106,134,108,0.15); }
.cat-dropdown-item .em { font-size: 18px; flex-shrink: 0; }

/* Required field marker */
.lbl .req { color: var(--expense-soft); margin-left: 2px; }

/* Project chips with add button */
.project-wrap {
  margin-top: 8px;
  padding: 10px; border-radius: 14px;
  background: var(--surface2); border: 1px solid var(--line);
}
.project-row {
  display: flex; gap: 6px; flex-wrap: wrap;
}
.project-chip {
  padding: 8px 14px; border-radius: 999px;
  background: var(--surface); border: 1px solid var(--line);
  font-size: 12.5px; color: var(--text-dim);
  display: inline-flex; align-items: center; gap: 6px;
  transition: all .15s;
}
.project-chip:active { transform: scale(0.95); }
.project-chip.active {
  background: rgba(106,134,108,0.12);
  border-color: var(--gold); color: var(--gold);
}
.project-chip .x {
  margin-left: 2px; color: var(--text-faint); font-size: 14px;
  padding: 0 2px;
}
.project-chip.add-new {
  border-style: dashed; color: var(--gold);
}
.project-input-row {
  margin-top: 8px;
  display: flex; gap: 6px;
}
.project-input-row input {
  flex: 1; padding: 8px 12px; font-size: 13px;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 10px; color: var(--text); outline: none;
}
.project-input-row input:focus { border-color: var(--gold); }
.project-input-row button {
  padding: 0 14px; border-radius: 10px; font-size: 12px;
  background: var(--gold); color: #FBFAF6; font-weight: 600;
}
.project-input-row button:disabled { opacity: 0.4; }

/* Autocomplete dropdown for Item/Note inputs */
.autocomplete-wrap { position: relative; }
.autocomplete-list {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  z-index: 5; max-height: 200px; overflow-y: auto;
  background: var(--surface2); border: 1px solid var(--line-strong);
  border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,.5);
}
.autocomplete-item {
  width: 100%; padding: 10px 14px; text-align: left;
  font-size: 13px; color: var(--text);
  border-bottom: 1px solid var(--line);
  transition: background .15s;
  display: flex; align-items: center; gap: 8px;
}
.autocomplete-item:last-child { border-bottom: none; }
.autocomplete-item:active { background: rgba(106,134,108,0.1); }
.autocomplete-item.new-hint { color: var(--gold); font-style: italic; }
.autocomplete-item .match { color: var(--gold); font-weight: 600; }
.autocomplete-item .count {
  margin-left: auto; font-size: 10.5px; color: var(--text-faint);
  padding: 2px 8px; border-radius: 999px;
  background: var(--bg); border: 1px solid var(--line);
}
.form-row.has-error { border-color: var(--expense); }
.field-error {
  font-size: 11px; color: var(--expense-soft);
  margin-top: 4px; padding-left: 16px;
}

/* Photo gallery (multiple photos) */
.photo-gallery {
  margin-top: 10px;
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
}
.photo-tile {
  position: relative;
  aspect-ratio: 1 / 1;
  border-radius: 12px; overflow: hidden;
  background: var(--surface2); border: 1px solid var(--line);
}
.photo-tile img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  cursor: pointer;
}
.photo-tile .rm-corner {
  position: absolute; top: 4px; right: 4px;
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(184,88,66,0.95); color: #FBFAF6;
  border: 2px solid #FBFAF6;
  display: inline-flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.35);
  z-index: 5; /* above the image so taps register on the button */
  transition: transform .15s, background .2s;
  /* ensure native button doesn't get any default constraints that block taps */
  -webkit-tap-highlight-color: rgba(184,88,66,0.4);
  cursor: pointer;
}
.photo-tile .rm-corner:active {
  transform: scale(0.85);
  background: rgba(148,70,50,0.95);
}
.photo-tile .loading-mini {
  position: absolute; inset: 0;
  background: rgba(24,21,18,0.7);
  display: flex; align-items: center; justify-content: center;
  color: var(--gold);
}
.photo-tile.add-tile {
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 6px;
  border-style: dashed; color: var(--text-dim);
  font-size: 11px; text-align: center;
  padding: 8px;
}
.photo-tile.add-tile:active { background: var(--surface); }
.photo-tile.add-tile:disabled { opacity: 0.4; }
.photo-count-hint {
  font-size: 11px; color: var(--text-faint);
  text-align: right; margin-top: 6px; padding-right: 4px;
}

/* v1.5: Items Manager button inline with label */
.field-with-manage {
  display: flex; align-items: center; gap: 8px;
  margin-top: 16px; margin-bottom: 6px;
}
.field-with-manage .cat-head {
  flex: 1; margin: 0;
}
.manage-btn-inline {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 999px;
  background: rgba(106,134,108,0.08); color: var(--gold);
  border: 1px solid var(--line-strong);
  font-size: 10.5px; letter-spacing: 0.08em;
  transition: transform .15s;
}
.manage-btn-inline:active { transform: scale(0.94); }

/* Items Manager modal */
.items-mgr-list {
  display: flex; flex-direction: column; gap: 6px;
  margin-top: 12px;
  max-height: 50vh; overflow-y: auto;
  padding-right: 2px;
}
.items-mgr-row {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px; border-radius: 14px;
  background: var(--surface2); border: 1px solid var(--line);
}
.items-mgr-row .name-wrap { flex: 1; min-width: 0; }
.items-mgr-row .name {
  font-size: 14px; color: var(--text);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.items-mgr-row .meta {
  font-size: 11px; color: var(--text-faint); margin-top: 2px;
}
.items-mgr-row input.edit {
  width: 100%; padding: 8px 12px; font-size: 14px;
  background: var(--bg); border: 1px solid var(--gold); border-radius: 10px;
  color: var(--text); outline: none;
}
.items-mgr-row .actions {
  display: flex; gap: 4px; flex-shrink: 0;
}
.items-mgr-row .actions button {
  width: 34px; height: 34px; border-radius: 10px;
  background: var(--surface); border: 1px solid var(--line);
  color: var(--text-dim);
  display: inline-flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.items-mgr-row .actions button:active { transform: scale(0.92); }
.items-mgr-row .actions .edit-btn { color: var(--gold); border-color: rgba(106,134,108,0.3); }
.items-mgr-row .actions .save-btn { background: var(--gold); color: #FBFAF6; border-color: transparent; }
.items-mgr-row .actions .del-btn { color: var(--expense-soft); border-color: rgba(184,88,66,0.3); }
.items-mgr-row .actions .cancel-btn { color: var(--text-faint); }

.items-mgr-addbox {
  display: flex; gap: 8px; margin-bottom: 4px;
}
.items-mgr-addbox input {
  flex: 1; padding: 12px 14px; font-size: 14px;
  background: var(--surface2); border: 1px solid var(--line); border-radius: 12px;
  color: var(--text); outline: none;
}
.items-mgr-addbox input:focus { border-color: var(--gold); }
.items-mgr-addbox button {
  padding: 0 18px; border-radius: 12px; font-size: 13px;
  background: var(--gold); color: #FBFAF6; font-weight: 600;
  display: inline-flex; align-items: center; gap: 6px;
  transition: transform .15s;
}
.items-mgr-addbox button:active { transform: scale(0.96); }
.items-mgr-addbox button:disabled { opacity: 0.4; }

.items-mgr-empty {
  text-align: center; padding: 32px 16px;
  color: var(--text-faint); font-size: 13px;
}
.items-mgr-empty .em { font-size: 32px; margin-bottom: 8px; }
.items-mgr-stats {
  font-size: 11px; color: var(--text-faint);
  margin-top: 6px; text-align: right;
}

/* v1.8: Accounts Manager specific */
.acct-mgr-addbox {
  display: flex; gap: 8px; align-items: stretch; margin-bottom: 6px;
}
.acct-mgr-addbox > input[type="text"] {
  flex: 1; padding: 12px 14px; font-size: 14px;
  background: var(--surface2); border: 1px solid var(--line); border-radius: 12px;
  color: var(--text); outline: none; min-width: 0;
}
.acct-mgr-addbox > input[type="text"]:focus { border-color: var(--gold); }

.decimals-input-wrap {
  display: flex; flex-direction: column; gap: 2px; flex-shrink: 0;
}
.decimals-input-wrap.inline { flex-direction: row; align-items: center; gap: 6px; }
.decimals-input-wrap .dec-lbl {
  font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-faint); padding-left: 2px;
}
.decimals-input-wrap .dec-input {
  width: 56px; padding: 10px 6px; font-size: 14px; text-align: center;
  background: var(--surface2); border: 1px solid var(--line); border-radius: 10px;
  color: var(--gold); outline: none;
  font-family: 'IBM Plex Mono', monospace;
  /* hide number input spinners for consistency */
  appearance: textfield; -moz-appearance: textfield;
}
.decimals-input-wrap .dec-input::-webkit-outer-spin-button,
.decimals-input-wrap .dec-input::-webkit-inner-spin-button {
  -webkit-appearance: none; margin: 0;
}
.decimals-input-wrap .dec-input:focus { border-color: var(--gold); }

.add-btn-gold {
  padding: 0 16px; border-radius: 12px;
  background: var(--gold); color: #FBFAF6; font-weight: 600;
  display: inline-flex; align-items: center; gap: 6px;
  transition: transform .15s; flex-shrink: 0;
}
.add-btn-gold:active { transform: scale(0.96); }
.add-btn-gold:disabled { opacity: 0.4; }

.acct-mgr-hint {
  font-size: 11px; color: var(--text-faint);
  padding: 8px 2px 0; line-height: 1.5;
}

.dec-badge {
  display: inline-block; margin-left: 6px;
  padding: 1px 6px; border-radius: 4px;
  background: rgba(106,134,108,0.1); color: var(--gold);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; font-weight: 500;
  vertical-align: middle;
}

.edit-fields {
  flex: 1; display: flex; gap: 6px; min-width: 0;
}
.edit-fields > input.edit { flex: 1; min-width: 0; }

/* Manage button inside a form-row (small gear icon) */
.field-manage-btn {
  width: 32px; height: 32px; border-radius: 10px;
  background: rgba(106,134,108,0.08); color: var(--gold);
  border: 1px solid var(--line-strong);
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all .15s;
}
.field-manage-btn:active { transform: scale(0.9); }
.field-manage-btn:hover { background: rgba(106,134,108,0.15); }

/* v2.5: Full-width transaction preview card */
.action-menu-wrap {
  padding: 20px 16px max(20px, env(safe-area-inset-bottom));
}
.action-menu-preview {
  background: var(--surface2); border: 1px solid var(--line);
  border-radius: 16px;
  padding: 18px 18px 14px;
  margin-bottom: 16px;
}
/* Header row: type badge + amount */
.action-menu-preview .head-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; margin-bottom: 12px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--line);
}
.action-menu-preview .type-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 999px;
  font-size: 11px; letter-spacing: 0.04em;
  border: 1px solid var(--line);
}
.action-menu-preview .type-pill.in {
  color: var(--income-soft); border-color: rgba(47,107,61,0.35);
  background: rgba(47,107,61,0.08);
}
.action-menu-preview .type-pill.out {
  color: var(--expense-soft); border-color: rgba(184,88,66,0.35);
  background: rgba(184,88,66,0.08);
}
.action-menu-preview .amt {
  font-family: 'IBM Plex Mono', monospace; font-variant-numeric: tabular-nums;
  font-size: 22px; font-weight: 600;
  flex-shrink: 0;
}
.action-menu-preview .amt.in { color: var(--income-soft); }
.action-menu-preview .amt.out { color: var(--expense-soft); }

/* Title (item name / payee) */
.action-menu-preview .title {
  font-size: 18px; color: var(--text); line-height: 1.3;
  font-family: 'Noto Serif Thai', serif;
  margin-bottom: 10px;
  word-break: break-word;
}

/* Detail rows */
.action-menu-preview .detail-list {
  display: flex; flex-direction: column; gap: 8px;
}
.action-menu-preview .det {
  display: flex; align-items: flex-start; gap: 10px;
  font-size: 13px;
}
.action-menu-preview .det .lbl {
  flex: 0 0 78px;
  color: var(--text-faint);
  font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
  padding-top: 2px;
}
.action-menu-preview .det .val {
  flex: 1; min-width: 0;
  color: var(--text);
  word-break: break-word;
}
.action-menu-preview .det .val.muted { color: var(--text-dim); font-style: italic; }
.action-menu-preview .det .val.mono {
  font-family: 'IBM Plex Mono', monospace;
}
.action-menu-preview .det .ico-em {
  margin-right: 4px; font-size: 14px;
}

/* v4.0: Profile banner — shows current profile + switch button */
.shared-banner {
  position: sticky;
  top: 0;
  z-index: 30;
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
  padding: 8px 14px;
  margin: 0 -16px 14px;
  background: linear-gradient(90deg, rgba(106,134,108,0.18), rgba(47,107,61,0.18));
  border-bottom: 1px solid var(--line-strong);
  font-size: 13px; color: var(--income-soft);
  letter-spacing: 0.02em;
  backdrop-filter: blur(8px);
}
.exit-shared-btn {
  font-size: 11px;
  color: var(--gold);
  padding: 4px 10px;
  border-radius: 999px;
  background: rgba(255,255,255,0.55);
  border: 1px solid var(--line);
  font-family: inherit;
  text-decoration: none;
}
.exit-shared-btn:active { transform: scale(0.94); }

/* v5.0: Per-user permission panel + admin badges */
.vis-select {
  font-size: 11px;
  padding: 5px 8px;
  border-radius: 8px;
  background: var(--surface); color: var(--text);
  border: 1px solid var(--line);
  font-family: inherit;
}
.shared-badge {
  display: inline-block;
  margin-right: 5px;
  font-size: 13px;
  vertical-align: -1px;
}
.admin-tag {
  display: inline-block;
  margin-top: 4px;
  padding: 2px 8px;
  background: rgba(201,154,74,0.15);
  border: 1px solid rgba(201,154,74,0.4);
  border-radius: 999px;
  font-size: 9px;
  font-family: 'IBM Plex Mono', monospace;
  letter-spacing: 0.08em;
  color: var(--gold);
  text-transform: uppercase;
}
.admin-tag-inline {
  display: inline-block;
  margin-left: 8px;
  padding: 1px 7px;
  background: var(--gold);
  color: var(--bg);
  border-radius: 999px;
  font-size: 9px;
  font-family: 'IBM Plex Mono', monospace;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  vertical-align: middle;
}
.perm-btn {
  width: 30px; height: 30px; border-radius: 8px;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--surface); color: var(--text-faint);
  border: 1px solid var(--line);
  transition: transform .15s, background .2s, color .2s;
}
.perm-btn:active { transform: scale(0.9); background: rgba(106,134,108,0.18); color: var(--gold); }
.perm-panel {
  margin-top: 12px;
  padding: 12px;
  background: var(--surface2);
  border: 1px solid var(--line);
  border-radius: 12px;
  display: flex; flex-direction: column; gap: 8px;
}
.perm-panel-hd {
  font-size: 11px; color: var(--text-faint);
  letter-spacing: 0.04em; text-transform: uppercase;
  margin-bottom: 4px;
}
.perm-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
  padding: 6px 4px;
}
.perm-user {
  font-size: 13px; color: var(--text);
  display: inline-flex; align-items: center; gap: 8px;
  flex: 1; min-width: 0;
}
.perm-user-icon { font-size: 18px; }
.perm-empty {
  font-size: 12px; color: var(--text-faint);
  text-align: center; padding: 8px;
}

/* v5.0: Users manager UI */
.user-add-card {
  background: var(--surface2);
  border: 1px solid var(--gold);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 14px;
}
.user-add-row {
  display: flex; gap: 8px; align-items: center;
}
.user-icon-select {
  font-size: 22px;
  padding: 6px 4px;
  border-radius: 8px;
  background: var(--surface);
  border: 1px solid var(--line);
  color: var(--text);
  font-family: inherit;
  width: 56px; text-align: center;
}
.user-name-input {
  flex: 1; min-width: 0;
  font-size: 14px;
  padding: 10px 12px;
  border-radius: 10px;
  background: var(--surface);
  border: 1px solid var(--line);
  color: var(--text);
  font-family: inherit;
}
.user-row-icon {
  font-size: 22px;
  margin-right: 8px;
  vertical-align: -2px;
}
.me-tag {
  display: inline-block;
  margin-left: 8px;
  font-size: 10px;
  color: var(--gold);
  font-style: italic;
}
.mgr-row.me {
  background: rgba(106,134,108,0.06);
  border-color: rgba(106,134,108,0.3);
}
.del-btn-confirm {
  width: 30px; height: 30px; border-radius: 8px;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--expense); color: #fff;
  border: 1px solid var(--expense);
}
.del-btn-confirm:active { transform: scale(0.9); }

/* v5.5: Advanced search */
.search-btn {
  width: 36px; height: 36px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--surface); color: var(--gold);
  border: 1px solid var(--line);
  transition: transform .15s, background .2s;
}
.search-btn:active { transform: scale(0.9); background: rgba(106,134,108,0.18); }
.search-form {
  display: flex; flex-direction: column; gap: 10px;
  margin-top: 6px;
}
.search-label {
  font-size: 11px;
  color: var(--text-faint);
  letter-spacing: 0.06em; text-transform: uppercase;
  margin-top: 4px;
}
.search-input {
  width: 100%;
  font-size: 14px;
  padding: 11px 13px;
  border-radius: 10px;
  background: var(--surface); border: 1px solid var(--line);
  color: var(--text); font-family: inherit;
}
.search-input:focus { outline: 1px solid var(--gold); border-color: var(--gold); }
.search-divider {
  height: 1px; background: var(--line);
  margin: 6px 0; opacity: 0.5;
}
.search-date-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
}
.search-date-cell {
  display: flex; flex-direction: column; gap: 4px;
}
.search-date-lbl {
  font-size: 10px; color: var(--text-faint);
  letter-spacing: 0.04em;
}
.search-actions {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-top: 10px;
}
.search-results {
  margin-top: 16px;
  display: flex; flex-direction: column; gap: 6px;
  border-top: 1px solid var(--line);
  padding-top: 14px;
}
.search-results-hd {
  font-size: 11px; color: var(--text-faint);
  letter-spacing: 0.06em; text-transform: uppercase;
  margin-bottom: 4px;
}
.search-result-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
  padding: 11px 12px; border-radius: 10px;
  background: var(--surface); border: 1px solid var(--line);
  font-family: inherit; color: var(--text);
  text-align: left; width: 100%;
  transition: transform .12s, background .2s;
}
.search-result-row:active { transform: scale(0.98); background: var(--surface2); }
.search-result-main {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column; gap: 3px;
}
.search-result-name {
  font-size: 14px; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.search-result-meta {
  font-size: 11px; color: var(--text-faint);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.search-result-amount {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 14px; font-variant-numeric: tabular-nums;
  white-space: nowrap;
}
.search-result-amount.in  { color: var(--income); }
.search-result-amount.out { color: var(--expense); }

/* v4.0: Profile picker (post-login screen) */
.profile-picker {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center;
  min-height: 100dvh; padding: 20px; text-align: center;
}
.profile-picker .logo-mini {
  font-family: Georgia, serif;
  font-size: 56px;
  width: 88px; height: 88px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: var(--gold); color: var(--bg);
  margin-bottom: 18px;
  box-shadow: 0 8px 30px rgba(106,134,108,0.35);
}
.profile-picker-title {
  font-size: 26px;
  margin-bottom: 28px;
  color: var(--text);
}
.profile-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
  width: 100%; max-width: 320px;
}
.profile-grid.three-col {
  grid-template-columns: repeat(2, 1fr);
  max-width: 360px;
}
@media (min-width: 380px) {
  .profile-grid.three-col { grid-template-columns: repeat(3, 1fr); }
}
.profile-btn {
  display: flex; flex-direction: column; align-items: center;
  padding: 22px 12px; border-radius: 16px;
  background: var(--surface); border: 1px solid var(--line);
  color: var(--text); font-family: inherit;
  transition: transform .15s, background .2s, border-color .2s;
}
.profile-btn:active {
  transform: scale(0.96);
  background: var(--surface2);
  border-color: var(--gold);
}
.profile-btn .icon { font-size: 40px; margin-bottom: 8px; }
.profile-btn .name { font-size: 13px; line-height: 1.3; }
.profile-hint {
  margin-top: 22px; font-size: 12px; color: var(--text-faint);
}

/* v4.0: PIN pad screen */
.pin-pad {
  display: flex; flex-direction: column; align-items: center;
  justify-content: flex-start;
  min-height: 100dvh; padding: 60px 20px 32px;
  text-align: center;
  position: relative;
}
.pin-back {
  position: absolute; top: 16px; left: 16px;
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--surface); border: 1px solid var(--line);
  color: var(--text); display: inline-flex; align-items: center; justify-content: center;
}
.pin-back:active { transform: scale(0.92); }
.pin-icon { font-size: 56px; margin-bottom: 8px; }
.pin-name { font-family: 'Noto Serif Thai', serif; font-size: 22px; color: var(--text); margin: 0; }
.pin-prompt { font-size: 13px; color: var(--text-dim); margin-top: 10px; }
.pin-prompt.err { color: var(--expense-soft); }

.pin-dots { display: flex; gap: 14px; margin: 26px 0 28px; }
.pin-dot {
  width: 16px; height: 16px; border-radius: 50%;
  border: 2px solid var(--gold);
  background: transparent;
  transition: background .15s, border-color .15s;
}
.pin-dot.filled { background: var(--gold); }
.pin-dot.err { border-color: var(--expense-soft); background: var(--expense-soft); }
.pin-dots.shake { animation: pin-shake 0.4s; }
@keyframes pin-shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(6px); }
}

.pin-keys {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 18px; max-width: 280px; margin: 0 auto;
}
.pin-key {
  width: 64px; height: 64px; border-radius: 50%;
  background: var(--surface); border: 1px solid var(--line);
  font-size: 24px; font-family: 'IBM Plex Mono', monospace;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--text);
  transition: transform .1s, background .15s;
}
.pin-key:active { transform: scale(0.9); background: rgba(106,134,108,0.18); }
.pin-key.empty { background: transparent; border: none; pointer-events: none; }
.pin-key.del { font-size: 20px; }

/* v3.5: Offline storage panel */
.cache-stats {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  margin-top: 12px;
}
.cache-stats .cell {
  background: var(--surface2); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 6px;
  text-align: center;
}
.cache-stats .num {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 18px; font-weight: 600;
  color: var(--gold);
}
.cache-stats .lbl {
  font-size: 10px; color: var(--text-faint);
  margin-top: 2px; letter-spacing: 0.04em;
}
.cache-progress {
  height: 8px; border-radius: 4px;
  background: var(--surface2);
  overflow: hidden;
}
.cache-progress .bar {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--income));
  transition: width .3s ease-out;
}
.cache-notice {
  margin-top: 12px;
  padding: 10px 12px;
  border-radius: 10px;
  font-size: 12px; line-height: 1.5;
}
.cache-notice.warn {
  background: rgba(201,154,74,0.1);
  border: 1px solid rgba(201,154,74,0.3);
  color: var(--sync-warn);
}

/* v2.9: Lessons editor */
.lessons-editor {
  width: 100%;
  min-height: 220px;
  max-height: 38vh;
  padding: 14px;
  border-radius: 12px;
  background: var(--surface);
  border: 1px solid var(--line);
  color: var(--text);
  font-family: 'IBM Plex Sans Thai', sans-serif;
  font-size: 14px;
  line-height: 1.6;
  resize: vertical;
  outline: none;
  transition: border-color .2s;
}
.lessons-editor:focus { border-color: var(--gold); }
/* Sticky save bar — pinned to the bottom of the sheet so the buttons aren't
   covered by the app's tab bar (v3.0 fix) */
.lessons-savebar {
  position: sticky;
  bottom: 0;
  margin: 12px -8px 0; /* slight bleed to match sheet padding */
  padding: 12px 8px max(12px, env(safe-area-inset-bottom));
  background: linear-gradient(to top, var(--surface) 65%, transparent);
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  z-index: 5;
}

/* v2.8: text zoom toggle button */
.zoom-btn {
  position: relative;
  width: 36px; height: 36px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  background: rgba(106,134,108,0.06);
  border: 1px solid var(--line);
  color: var(--gold);
  flex-shrink: 0;
  transition: all .2s;
}
.zoom-btn:active { transform: scale(0.9); background: rgba(106,134,108,0.18); }
.zoom-btn.active { background: rgba(106,134,108,0.18); border-color: var(--gold); }
.zoom-btn .zoom-icon {
  font-family: 'Noto Serif Thai', serif;
  font-size: 16px; font-weight: 700;
  line-height: 1;
}
.zoom-btn .zoom-plus {
  position: absolute; top: 6px; right: 7px;
  font-size: 10px; font-weight: 700; line-height: 1;
  color: var(--gold);
}
.zoom-btn .zoom-level {
  position: absolute; bottom: 4px; right: 5px;
  background: var(--gold); color: var(--bg);
  font-size: 9px; font-weight: 700; line-height: 1;
  width: 14px; height: 14px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'IBM Plex Mono', monospace;
}

/* v2.7: Navigation header for swipeable preview */
.nav-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
  padding: 0 4px;
}
.nav-btn {
  width: 38px; height: 38px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  background: rgba(106,134,108,0.08); color: var(--gold);
  border: 1px solid var(--line);
  flex-shrink: 0;
  transition: transform .15s, background .2s, opacity .2s;
}
.nav-btn:active:not(:disabled) { transform: scale(0.88); background: rgba(106,134,108,0.18); }
.nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }
.nav-counter {
  flex: 1; text-align: center;
  font-family: 'IBM Plex Mono', monospace; font-size: 13px;
  color: var(--text-dim); font-weight: 500;
  letter-spacing: 0.05em;
}
.nav-counter .nav-hint {
  font-family: 'IBM Plex Sans Thai', sans-serif;
  font-size: 9.5px; color: var(--text-faint);
  margin-top: 2px; letter-spacing: 0.18em;
}
.swipe-area {
  touch-action: pan-y; /* allow vertical scroll, but we control horizontal */
}

/* v2.6: Thumbnail strip in preview (separate card, full width) */
.preview-thumbs {
  margin-top: 12px; margin-bottom: 16px;
  background: var(--surface2); border: 1px solid var(--line);
  border-radius: 16px;
  padding: 14px;
}
.preview-thumbs-head {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 10px;
}
.preview-thumbs-head > span:first-child {
  font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--text-faint);
}
.preview-thumbs-head .ct {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; color: var(--gold);
}
.preview-thumbs-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.thumb-cell {
  position: relative; aspect-ratio: 1;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 10px;
  overflow: hidden;
  padding: 0;
  transition: transform .15s, border-color .2s;
}
.thumb-cell:active { transform: scale(0.96); border-color: var(--gold); }
.thumb-cell img { width: 100%; height: 100%; object-fit: cover; display: block; }
.thumb-cell .loading {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: var(--gold);
}

.action-btn-list {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}
.action-btn-row {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 6px;
  padding: 14px 6px;
  border-radius: 14px;
  background: var(--surface2); border: 1px solid var(--line);
  text-align: center;
  transition: transform .15s, background .2s, border-color .2s;
}
.action-btn-row:active { transform: scale(0.94); background: var(--surface); }
.action-btn-row .ico {
  width: 44px; height: 44px; border-radius: 12px;
  background: var(--surface); border: 1px solid var(--line);
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.action-btn-row .lbl {
  font-size: 11px; line-height: 1.1;
  color: var(--text-dim);
  letter-spacing: 0.02em;
}
.action-btn-row.primary { border-color: rgba(106,134,108,0.35); }
.action-btn-row.primary .ico {
  background: rgba(106,134,108,0.14); color: var(--gold); border-color: var(--line-strong);
}
.action-btn-row.primary .lbl { color: var(--gold); font-weight: 500; }
.action-btn-row.neutral .ico { color: var(--text-dim); }
.action-btn-row.danger { border-color: rgba(184,88,66,0.3); }
.action-btn-row.danger .ico {
  background: rgba(184,88,66,0.1); color: var(--expense-soft); border-color: rgba(184,88,66,0.3);
}
.action-btn-row.danger .lbl { color: var(--expense-soft); }
.action-btn-row.cancel .ico { color: var(--text-faint); }
.action-btn-row.cancel .lbl { color: var(--text-faint); }
/* legacy chevron (no longer rendered, kept hidden in case stale markup appears) */
.action-btn-row .chev { display: none; }

/* Confirm delete modal */
.confirm-backdrop {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.confirm-dialog {
  max-width: 400px; width: 100%;
  background: var(--surface); border-radius: 22px;
  border: 1px solid var(--line-strong);
  padding: 24px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}
.confirm-dialog .c-icon {
  width: 56px; height: 56px; border-radius: 50%;
  background: rgba(184,88,66,0.15); color: var(--expense-soft);
  border: 1px solid rgba(184,88,66,0.3);
  display: inline-flex; align-items: center; justify-content: center;
  margin: 0 auto 14px; display: flex;
}
.confirm-dialog h3 {
  font-family: 'Noto Serif Thai', serif; font-size: 20px; text-align: center;
  color: var(--text); margin-bottom: 8px;
}
.confirm-dialog .c-desc {
  text-align: center; font-size: 13px; color: var(--text-dim);
  line-height: 1.5; margin-bottom: 20px;
}
.confirm-dialog .c-desc strong { color: var(--text); }
.confirm-dialog .c-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* "Now" button shared style (for date + time) */
.now-btn {
  font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 4px 10px; border-radius: 999px;
  background: rgba(106,134,108,0.1); color: var(--gold);
  border: 1px solid var(--line-strong); flex-shrink: 0;
  transition: transform .15s;

const getCat = (type, id, customCats) => {
  if (!id) return NO_CAT;
  // Custom categories take priority (allow user overrides)
  if (Array.isArray(customCats)) {
    const found = customCats.find(c => c.id === id && (!c.type || c.type === type));
    if (found) return { id: found.id, label: found.name, icon: found.icon || '•' };
  }
  const base = type === 'income' ? INCOME_CATS : EXPENSE_CATS;
  return base.find(c => c.id === id) || { id, label: id, icon: '•' };
};

const getCatList = (type, customCats) => {
  const base = type === 'income' ? INCOME_CATS : EXPENSE_CATS;
  const custom = (Array.isArray(customCats) ? customCats : [])
    .filter(c => !c.type || c.type === type)
    .map(c => ({ id: c.id, label: c.name, icon: c.icon || '•', _custom: true }));
  return [NO_CAT, ...base, ...custom];
};

const fmtMoney = (n, decimals = 2) => {
  const abs = Math.abs(n);
  // Always show exactly `decimals` places (minimum 2). This lets users visually
  // identify high-precision accounts even when the balance is 0 or a round number.
  const d = Math.max(2, Number.isFinite(decimals) ? decimals : 2);
  return abs.toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d });
};
// Look up how many decimal places a given account uses (fallback: 2)
const getAccountDecimals = (accountName, accounts) => {
  if (!accountName || !Array.isArray(accounts)) return 2;
  const n = accountName.trim().toLowerCase();
  const found = accounts.find(a => (a.name || '').toLowerCase() === n);
  return found ? (Number.isFinite(found.decimals) ? found.decimals : 2) : 2;
};

const timeFromIso = (iso) => {
  if (!iso) return null;

  if (isNaN(d)) return null;
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
};
// Combine date (YYYY-MM-DD) + time (HH:MM:SS) into ISO string
const combineDateTime = (dateStr, timeStr) => {
  const [h, m, s] = (timeStr || '00:00:00').split(':').map(n => parseInt(n, 10) || 0);
  const d = new Date(dateStr + 'T00:00:00');
  d.setHours(h, m, s, 0);
  return d.toISOString();
};
