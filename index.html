          <button type="button" className={`cat-dropdown-btn ${catOpen ? 'open' : ''}`}
                  onClick={() => setCatOpen(v => !v)}>
            <span className="em">{currentCat.icon}</span>
            <span className="lbl">{currentCat.label}</span>
            <Ic.ChevDown size={16} className="chev"/>
          </button>
          {catOpen && (
            <div className="cat-dropdown-menu fade">
              {cats.map(c => (
                <button key={c.id} type="button"
                  className={`cat-dropdown-item ${category === c.id ? 'active' : ''}`}
                  onClick={() => { setCategory(c.id); setCatOpen(false); }}>
                  <span className="em">{c.icon}</span>
                  <span>{c.label}</span>
                </button>
              ))}
            </div>
          )}

          {/* Account - autocomplete, required */}
          <div className="autocomplete-wrap" style={{marginTop: 12}}>
            <label className={`form-row ${attemptedSave && accountMissing ? 'has-error' : ''}`}>
              <span className="lbl">บัญชี<span className="req">*</span></span>
              <ClearableTextarea value={accountName}
                     onChange={e => setAccountName(e.target.value)}
                     onFocus={() => setAccountFocused(true)}
                     onBlur={() => setTimeout(() => setAccountFocused(false), 180)}
                     placeholder="เช่น เงินสด, ธนาคารกสิกร, บัตรเครดิต KTC"
                     minRows={1} maxRows={3}/>
            </label>
            {accountFocused && (accountMatches.length > 0 || accountName.trim()) && (
              <div className="autocomplete-list">
                {accountMatches.map(m => (
                  <button key={m.label} type="button"
                    className="autocomplete-item"
                    onMouseDown={(e) => { e.preventDefault(); setAccountName(m.label); setAccountFocused(false); }}>
                    <span>{highlight(m.label, accountName.trim())}</span>
                    <span className="count">{m.count}×</span>
                  </button>
                ))}
                {accountName.trim() && !accountExactExists && (
                  <button type="button"
                    className="autocomplete-item new-hint"
                    onMouseDown={(e) => { e.preventDefault(); setAccountFocused(false); }}>
                    <Ic.Plus size={12}/> เพิ่มใหม่: "{accountName.trim()}"
                  </button>
                )}
              </div>
            )}
            {attemptedSave && accountMissing && (
              <div className="field-error">⚠️ ต้องกรอกบัญชี/กระเป๋า</div>
            )}
          </div>

          {/* Project - chips with add */}
          <div className="cat-head" style={{marginTop: 16}}>
            โครงการ <span style={{color: 'var(--text-faint)', fontWeight: 400, letterSpacing: 0, textTransform: 'none'}}>(ไม่บังคับ)</span>
          </div>
          <div className="project-wrap">
            <div className="project-row">
              <button type="button"
                className={`project-chip ${!project ? 'active' : ''}`}
                onClick={() => setProject('')}>
                ไม่ระบุ
              </button>
              {projectList.map(p => (
                <button key={p} type="button"
                  className={`project-chip ${project === p ? 'active' : ''}`}
                  onClick={() => setProject(p)}>
                  📁 {p}
                </button>
              ))}
              <button type="button"
                className="project-chip add-new"
                onClick={() => setShowNewProject(v => !v)}>
                <Ic.Plus size={12}/> เพิ่มใหม่
              </button>
            </div>
            {showNewProject && (
              <div className="project-input-row fade">
                <ClearableInput type="text" value={newProjectName}
                       onChange={e => setNewProjectName(e.target.value)}
                       placeholder="ชื่อโครงการใหม่"
                       autoFocus
                       onKeyDown={e => { if (e.key === 'Enter') addNewProject(); }}/>
                <button type="button" onClick={addNewProject}
                        disabled={!newProjectName.trim()}>
                  เพิ่ม
                </button>
              </div>
            )}
          </div>

          {/* Date + Time */}
          <div className="form-rows">
            <label className="form-row">
              <span className="lbl">วันที่</span>
              <input type="date" className="mono" value={date} onChange={e => setDate(e.target.value)}/>
              <button type="button" className="now-btn" onClick={() => setDate(todayISO())}>
                วันนี้
              </button>
            </label>
            <label className="form-row">
              <span className="lbl">เวลา</span>
              <input type="time" step="1" className="mono" value={time} onChange={e => setTime(e.target.value)}/>
              <button type="button" className="now-btn" onClick={() => setTime(nowTime())}>
                ตอนนี้
              </button>
            </label>

            {/* Item - required, with autocomplete + manager */}
            <div className="autocomplete-wrap">
              <label className={`form-row ${attemptedSave && itemMissing ? 'has-error' : ''}`}>
                <span className="lbl">ชื่อรายการ<span className="req">*</span></span>
                <ClearableTextarea value={item}
                       onChange={e => setItem(e.target.value)}
                       onFocus={() => setItemFocused(true)}
                       onBlur={() => setTimeout(() => setItemFocused(false), 180)}
                       placeholder="เช่น กาแฟ, ข้าวมันไก่, ค่าแท็กซี่"
                       minRows={1} maxRows={4}/>
                <span className="field-actions">
                  <button type="button" className="field-manage-btn"
                          onMouseDown={(e) => e.preventDefault()}
                          onClick={() => { onOpenItemsManager?.(); }}
                          title="จัดการรายการ">
                    <Ic.Settings size={14}/>
                  </button>
                </span>
              </label>
              {itemFocused && itemMatches.length > 0 && (
                <div className="autocomplete-list">
                  {itemMatches.map(m => (
                    <button key={m.label} type="button"
                      className="autocomplete-item"
                      onMouseDown={(e) => { e.preventDefault(); setItem(m.label); setItemFocused(false); }}>
                      <span>{highlight(m.label, item.trim())}</span>
                      <span className="count">{m.count}×</span>
                    </button>
                  ))}
                  {item.trim() && !itemExactExists && (
                    <button type="button"
                      className="autocomplete-item new-hint"
                      onMouseDown={(e) => { e.preventDefault(); setItemFocused(false); }}>
                      <Ic.Plus size={12}/> เพิ่มใหม่: "{item.trim()}"
                    </button>
                  )}
                </div>
              )}
              {attemptedSave && itemMissing && (
                <div className="field-error">⚠️ ต้องกรอกชื่อรายการ</div>
              )}
            </div>

            {/* Note - with substring autocomplete */}
            <div className="autocomplete-wrap">
              <label className="form-row">
                <span className="lbl">บันทึก</span>
                <ClearableTextarea value={note}
                       onChange={e => setNote(e.target.value)}
                       onFocus={() => setNoteFocused(true)}
                       onBlur={() => setTimeout(() => setNoteFocused(false), 180)}
                       placeholder="รายละเอียดเพิ่มเติม (ไม่บังคับ)"
                       minRows={1} maxRows={4}/>
              </label>
              {noteFocused && noteMatches.length > 0 && (
                <div className="autocomplete-list">
                  {noteMatches.map(m => (
                    <button key={m.label} type="button"
                      className="autocomplete-item"
                      onMouseDown={(e) => { e.preventDefault(); setNote(m.label); setNoteFocused(false); }}>
                      <span>{highlight(m.label, note.trim())}</span>
                      <span className="count">{m.count}×</span>
                    </button>
                  ))}
                </div>
              )}
            </div>
          </div>

          {/* Photo gallery - up to 5 */}
          <div className="cat-head" style={{marginTop: 16, display: 'flex', alignItems: 'center', gap: 6}}>
            <Ic.Image size={12}/> รูป
            <span style={{marginLeft: 'auto', fontSize: 10.5, color: 'var(--text-faint)',
                          fontWeight: 400, letterSpacing: 0, textTransform: 'none'}}>
              สูงสุด 5 รูป
            </span>
          </div>
          <div className="photo-gallery">
            {photos.map((p, i) => (
              <div key={p.id} className="photo-tile">
                {photoUrls[p.id] ? (
                  <img src={photoUrls[p.id]} alt={`receipt ${i+1}`}
                       onClick={() => setViewerIdx(i)}/>
                ) : (
                  <div className="loading-mini">
                    <Ic.Refresh size={16} className="spin"/>
                  </div>
                )}
                <button className="rm-corner" type="button"
                        aria-label="ลบรูปนี้"
                        onClick={(e) => {
                          e.stopPropagation();
                          if (confirm('ลบรูปนี้?')) removePhotoAt(i);
                        }}>
                  <Ic.Trash size={14}/>
                </button>
              </div>
            ))}
            {photos.length < 5 && (
              <>
                <button type="button" className="photo-tile add-tile"
                        onClick={() => openFilePicker(true)}
                        disabled={!isOnline || uploadingPhoto}>
                  {uploadingPhoto ? <Ic.Refresh size={18} className="spin"/> : <Ic.Camera size={20}/>}
                  <span>ถ่ายรูป</span>
                </button>
                <button type="button" className="photo-tile add-tile"
                        onClick={() => openFilePicker(false)}
                        disabled={!isOnline || uploadingPhoto}>
                  <Ic.Image size={20}/>
                  <span>แกลเลอรี</span>
                </button>
              </>
            )}
            <input ref={photoInputRef} type="file" accept="image/*"
                   onChange={onPhotoPick} style={{display:'none'}}/>
          </div>
          <div className="photo-count-hint">
            {photos.length}/5 รูป
            {!isOnline && ' · ต้องเข้าสู่ระบบเพื่อแนบรูป'}
          </div>

          <div className="sheet-actions">
            <button className="btn-ghost" onClick={onClose}>ยกเลิก</button>
            <button className="btn-primary" onClick={save} disabled={!canSave && attemptedSave}>
              {/* v5.26: button label depends on whether we're editing a tx
                  that already exists on OneDrive (a real edit), or a tx
                  that's still local (a fresh add, e.g. from Duplicate, or
                  a brand-new entry the user just hasn't deployed yet). */}
              <Ic.Check size={16}/> {!initial?.id || isPendingNew ? 'บันทึกเป็นรายการใหม่' : 'บันทึก'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ============ Photo Viewer with Zoom/Pan ============
function ZoomableImage({ src, onClose }) {
  const [scale, setScale] = useState(1);
  const [pos, setPos] = useState({ x: 0, y: 0 });
  const [isDragging, setIsDragging] = useState(false);
  const dragRef = useRef({ startX: 0, startY: 0, lastX: 0, lastY: 0, startDist: 0, startScale: 1 });
  const lastTapRef = useRef(0);

  // v5.18: Hardware/software back-button handling. On Android (and Chrome's
  // back gesture), pressing back in this fullscreen viewer used to navigate
  // away from the app entirely — confusing because users expected back to
  // dismiss only the lightbox. We push a synthetic history entry on mount,
  // then listen for popstate: if the user pops, we close the viewer instead
  // of navigating. On normal close (X button or backdrop tap), we go back
  // ourselves so we don't leave a phantom entry behind.
  //
  // closeRef lets the popstate listener call the latest onClose without
  // re-binding when the prop identity changes mid-render.
  const closeRef = useRef(onClose);
  closeRef.current = onClose;
  // poppedRef tracks whether the close was triggered BY popstate already, so
  // the unmount cleanup doesn't try to history.back() a second time.
  const poppedRef = useRef(false);
  useEffect(() => {
    // Push a placeholder state so back has something to pop off.
    try { window.history.pushState({ _photoViewer: true }, ''); } catch {}
    const onPop = () => {
      poppedRef.current = true;
      closeRef.current?.();
    };
    window.addEventListener('popstate', onPop);
    return () => {
      window.removeEventListener('popstate', onPop);
      // If we're unmounting because the user closed via X / backdrop / esc
      // (not because they hit back), the placeholder entry is still on the
      // history stack — pop it ourselves so the next back press works as
      // the user expects.
      if (!poppedRef.current) {
        try { window.history.back(); } catch {}
      }
    };
  }, []);

  // v5.18: also support Esc on desktop browsers (mostly for keyboard users).
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose?.(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [onClose]);

  const getDist = (t1, t2) => Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);

  const onTouchStart = (e) => {
    if (e.touches.length === 2) {
      setIsDragging(true);
      dragRef.current.startDist = getDist(e.touches[0], e.touches[1]);
      dragRef.current.startScale = scale;
    } else if (e.touches.length === 1) {
      setIsDragging(true);
      dragRef.current.startX = e.touches[0].clientX;
      dragRef.current.startY = e.touches[0].clientY;
      dragRef.current.lastX = pos.x;
      dragRef.current.lastY = pos.y;
    }
  };

  const onTouchMove = (e) => {
    if (!isDragging) return;
    if (e.touches.length === 2) {
      const dist = getDist(e.touches[0], e.touches[1]);
      let s = dragRef.current.startScale * (dist / dragRef.current.startDist);
      if (s < 0.5) s = 0.5;
      if (s > 15) s = 15; // ขยายได้สูงสุด 15 เท่า
      setScale(s);
    } else if (e.touches.length === 1 && scale > 1) {
      const dx = e.touches[0].clientX - dragRef.current.startX;
      const dy = e.touches[0].clientY - dragRef.current.startY;
      setPos({ x: dragRef.current.lastX + dx, y: dragRef.current.lastY + dy });
    }
  };

  const onTouchEnd = (e) => {
    if (e.touches.length === 0) setIsDragging(false);
    if (scale < 1) { setScale(1); setPos({ x: 0, y: 0 }); }
  };

  const handleTap = () => {
    const now = Date.now();
    if (now - lastTapRef.current < 300) {
      if (scale > 1) { setScale(1); setPos({ x: 0, y: 0 }); }
      else { setScale(3); setPos({ x: 0, y: 0 }); } // เคาะ 2 ทีซูม 3 เท่า
      lastTapRef.current = 0;
    } else {
      lastTapRef.current = now;
    }
  };

  return (
    <div className="photo-viewer fade"
         onClick={(e) => { if (e.target === e.currentTarget && scale === 1) onClose(); }}>
      <button className="close-btn" onClick={onClose} style={{ zIndex: 100 }}>
        <Ic.X size={18}/>
      </button>
      <img
        src={src} alt="receipt zoom"
        onDragStart={(e) => e.preventDefault()}
        onTouchStart={onTouchStart} onTouchMove={onTouchMove}
        onTouchEnd={onTouchEnd} onTouchCancel={onTouchEnd} onClick={handleTap}
        style={{
          transform: `translate(${pos.x}px, ${pos.y}px) scale(${scale})`,
          transition: isDragging ? 'none' : 'transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1)',
          touchAction: 'none', transformOrigin: 'center center',
          userSelect: 'none', WebkitUserSelect: 'none'
        }}
      />
    </div>
  );
}

// ============ Row Action Menu (Edit/Duplicate/Delete) ============
function TxActionMenu({ tx, onClose, onEdit, onDuplicate, onDelete, accounts, customCats, txList, onNavigate, canEdit = true, canDuplicate = true }) {
  const cat = getCat(tx.type, tx.category, customCats);
  const timeStr = timeFromIso(tx.createdAt);
  const title = (tx.item || tx.payee || '').trim() || tx.note?.trim() || (tx.category ? cat.label : 'รายการ');
  const isIn = tx.type === 'income';
  const decimals = getAccountDecimals(tx.accountName, accounts);

  // Find current index + neighbors in the list
  const list = Array.isArray(txList) ? txList : [];
  const curIdx = list.findIndex(t => t.id === tx.id);
  const hasPrev = curIdx > 0;
  const hasNext = curIdx >= 0 && curIdx < list.length - 1;
  const goPrev = () => { if (hasPrev) onNavigate?.(list[curIdx - 1]); };
  const goNext = () => { if (hasNext) onNavigate?.(list[curIdx + 1]); };

  // Swipe gesture state
  const [dragX, setDragX] = useState(0);   // current finger offset
  const [animX, setAnimX] = useState(null); // when set, sheet glides to this X then resets
  const dragRef = useRef({ startX: 0, startY: 0, active: false, locked: null });

  const SWIPE_THRESH = 70;  // px to trigger
  const onTouchStart = (e) => {
    if (e.touches.length > 1) { dragRef.current.active = false; return; } // ปล่อยให้ใช้ 2 นิ้วซูม
    const t = e.touches[0];
    dragRef.current = { startX: t.clientX, startY: t.clientY, active: true, locked: null };
    setAnimX(null);
  };
  const onTouchMove = (e) => {
    if (!dragRef.current.active) return;
    if (e.touches.length > 1) { dragRef.current.active = false; return; } // ปล่อยให้ใช้ 2 นิ้วซูม
    const t = e.touches[0];
    const dx = t.clientX - dragRef.current.startX;
    const dy = t.clientY - dragRef.current.startY;
    if (dragRef.current.locked === null) {
      if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
        dragRef.current.locked = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
      }
    }
    if (dragRef.current.locked === 'h') {
      // prevent vertical scroll only when horizontal swipe is active
      e.preventDefault?.();
      // resistance at the boundary: if no neighbor, dampen
      let adjusted = dx;
      if ((dx > 0 && !hasPrev) || (dx < 0 && !hasNext)) adjusted = dx * 0.3;
      setDragX(adjusted);
    }
  };
  const onTouchEnd = () => {
    if (!dragRef.current.active) return;
    const final = dragX;
    dragRef.current.active = false;
    if (final <= -SWIPE_THRESH && hasNext) {
      // swiped left → next; glide off-screen to the left then load next
      setAnimX(-window.innerWidth);
      setTimeout(() => { setDragX(0); setAnimX(null); goNext(); }, 180);
    } else if (final >= SWIPE_THRESH && hasPrev) {
      setAnimX(window.innerWidth);
      setTimeout(() => { setDragX(0); setAnimX(null); goPrev(); }, 180);
    } else {
      // snap back
      setAnimX(0);
      setTimeout(() => { setDragX(0); setAnimX(null); }, 200);
    }
  };

  // Keyboard arrows for desktop / accessibility
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'ArrowLeft') goPrev();
      else if (e.key === 'ArrowRight') goNext();
      else if (e.key === 'Escape') onClose();
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [curIdx, hasPrev, hasNext]);

  // Normalize photos: support both v1.4 photos[] and legacy v1.3 single photoId
  const photoList = useMemo(() => {
    if (Array.isArray(tx.photos) && tx.photos.length > 0) return tx.photos;
    if (tx.photoId) return [{ id: tx.photoId, name: tx.photoName || 'photo' }];
    return [];
  }, [tx.photos, tx.photoId, tx.photoName]);
  const photoCount = photoList.length;

  // Load photo thumbnails (uses local cache first, then fetches from OneDrive)
  const [photoUrls, setPhotoUrls] = useState({}); // { id: blobUrl }
  const [viewerIdx, setViewerIdx] = useState(-1);
  useEffect(() => {
    let cancelled = false;
    photoList.forEach(p => {
      if (photoUrls[p.id]) return;
      fetchPhotoUrl(p.id)
        .then(url => { if (!cancelled) setPhotoUrls(prev => ({ ...prev, [p.id]: url })); })
        .catch(() => {});
    });
    return () => { cancelled = true; };
  }, [photoList]);

  // Format date as DD/MM/YYYY (Buddhist year)
  const dStr = (() => {
    if (!tx.date) return '';
    const d = new Date(tx.date + 'T00:00:00');
    const dd = String(d.getDate()).padStart(2, '0');
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const yy = d.getFullYear() + 543;
    const dayName = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'][d.getDay()];
    return `${dd}/${mm}/${yy} (${dayName})`;
  })();

  // CSS transform style for the swipe-aware section (preview + thumbnails)
  const swipeTransform = animX !== null ? animX : dragX;
  const swipeStyle = {
    transform: `translateX(${swipeTransform}px)`,
    transition: animX !== null ? 'transform .18s cubic-bezier(.2,.8,.2,1)' : 'none',
    willChange: 'transform',
  };
  // Subtle opacity hint while dragging
  const swipeOpacity = Math.max(0.55, 1 - Math.min(Math.abs(dragX), 200) / 400);

  return (
    <div className="sheet-backdrop fade" onClick={onClose}>
      <div className="sheet-wrap sheet-in" onClick={e => e.stopPropagation()}>
        <div className="sheet">
          <div className="sheet-handle"></div>
          <div className="action-menu-wrap">

            {/* Navigation header: prev / counter / next */}
            {list.length > 1 && (
              <div className="nav-header">
                <button className="nav-btn" onClick={goPrev} disabled={!hasPrev}
                        aria-label="รายการก่อนหน้า">
                  <Ic.ChevL size={16}/>
                </button>
                <div className="nav-counter">
                  {curIdx >= 0 ? `${curIdx + 1} / ${list.length}` : ''}
                  <div className="nav-hint">ปัด ← →</div>
                </div>
                <button className="nav-btn" onClick={goNext} disabled={!hasNext}
                        aria-label="รายการถัดไป">
                  <Ic.ChevR size={16}/>
                </button>
              </div>
            )}

            {/* Swipe-aware container */}
            <div className="swipe-area"
                 style={{ ...swipeStyle, opacity: swipeOpacity }}
                 onTouchStart={onTouchStart}
                 onTouchMove={onTouchMove}
                 onTouchEnd={onTouchEnd}
                 onTouchCancel={onTouchEnd}>
            <div className="action-menu-preview">
              <div className="head-row">
                <span className={`type-pill ${isIn ? 'in' : 'out'}`}>
                  {isIn ? <><Ic.ArrowIn size={11}/> รายรับ</> : <><Ic.ArrowOut size={11}/> รายจ่าย</>}
                </span>
                <span className={`amt ${isIn ? 'in' : 'out'}`}>
                  {fmtAmount(tx.amount, isIn, tx.accountName, accounts)}
                </span>
              </div>

              <div className="title">{title}</div>

              <div className="detail-list">
                <div className="det">
                  <span className="lbl">วันที่</span>
                  <span className="val mono">{dStr || '—'}</span>
                </div>
                <div className="det">
                  <span className="lbl">เวลา</span>
                  <span className="val mono">{timeStr || '—'}</span>
                </div>
                <div className="det">
                  <span className="lbl">บัญชี</span>
                  <span className="val">{tx.accountName || <span className="muted">—</span>}</span>
                </div>
                <div className="det">
                  <span className="lbl">หมวดหมู่</span>
                  <span className="val">
                    {tx.category ? (
                      <><span className="ico-em">{cat.icon}</span>{cat.label}</>
                    ) : (
                      <span className="muted">ไม่ระบุ</span>
                    )}
                  </span>
                </div>
                {tx.project && (
                  <div className="det">
                    <span className="lbl">โครงการ</span>
                    <span className="val"><span className="ico-em">📁</span>{tx.project}</span>
                  </div>
                )}
                {tx.note && tx.note.trim() && (
                  <div className="det">
                    <span className="lbl">บันทึก</span>
                    <span className="val">{tx.note}</span>
                  </div>
                )}
              </div>
            </div>

            {/* Thumbnail strip outside the detail card so it can grow full width */}
            {photoCount > 0 && (
              <div className="preview-thumbs">
                <div className="preview-thumbs-head">
                  <span>รูป</span>
                  <span className="ct">{photoCount} รูป</span>
                </div>
                <div className="preview-thumbs-grid">
                  {photoList.map((p, i) => (
                    <button key={p.id} type="button" className="thumb-cell"
                            onClick={() => photoUrls[p.id] && setViewerIdx(i)}>
                      {photoUrls[p.id] ? (
                        <img src={photoUrls[p.id]} alt="receipt"/>
                      ) : (
                        <div className="loading"><Ic.Refresh size={14} className="spin"/></div>
                      )}
                    </button>
                  ))}
                </div>
              </div>
            )}
            </div>{/* /swipe-area */}

            <div className="action-btn-list">
              <button className="action-btn-row primary" onClick={onEdit} aria-label="แก้ไข"
                      disabled={!canEdit}
                      title={!canEdit ? 'ไม่มีสิทธิ์แก้ไขรายการนี้' : 'แก้ไข'}>
                <div className="ico">{canEdit ? <Ic.Pencil size={20}/> : <Ic.Lock size={20}/>}</div>
                <div className="lbl">{canEdit ? 'แก้ไข' : 'ดูอย่างเดียว'}</div>
              </button>
              <button className="action-btn-row neutral" onClick={onDuplicate} aria-label="ทำซ้ำ"
                      disabled={!canDuplicate}
                      title={!canDuplicate ? 'ไม่มีสิทธิ์เพิ่มในบัญชีนี้' : 'ทำซ้ำรายการ (ยกเว้นรูปภาพ)'}>
                <div className="ico"><Ic.Copy size={20}/></div>
                <div className="lbl">ทำซ้ำ</div>
              </button>
              <button className="action-btn-row danger" onClick={onDelete} aria-label="ลบ"
                      disabled={!canEdit}
                      title={!canEdit ? 'ไม่มีสิทธิ์ลบรายการนี้' : 'ลบ'}>
                <div className="ico"><Ic.Trash size={20}/></div>
                <div className="lbl">ลบ</div>
              </button>
              <button className="action-btn-row cancel" onClick={onClose} aria-label="ยกเลิก">
                <div className="ico"><Ic.X size={20}/></div>
                <div className="lbl">ยกเลิก</div>
              </button>
            </div>
          </div>
        </div>
      </div>

      {/* Full-screen photo viewer — opens when user taps a thumbnail */}
      {viewerIdx >= 0 && photoList[viewerIdx] && photoUrls[photoList[viewerIdx].id] && (
        <ZoomableImage
          src={photoUrls[photoList[viewerIdx].id]}
          onClose={() => setViewerIdx(-1)}
        />
      )}
    </div>
  );
}

// ============ Confirm Delete Dialog ============
function ConfirmDeleteTx({ tx, onCancel, onConfirm, accounts }) {
  const cat = getCat(tx.type, tx.category);
  const title = (tx.item || tx.payee || '').trim() || tx.note?.trim() || cat.label;
  const photoCount = Array.isArray(tx.photos) ? tx.photos.length : (tx.photoId ? 1 : 0);
  const decimals = getAccountDecimals(tx.accountName, accounts);
  return (
    <div className="confirm-backdrop fade" onClick={onCancel}>
      <div className="confirm-dialog sheet-in" onClick={e => e.stopPropagation()}>
        <div className="c-icon"><Ic.Trash size={22}/></div>
        <h3>ลบรายการนี้?</h3>
        <div className="c-desc">
          <strong>{title}</strong> — {fmtAmount(tx.amount, null, tx.accountName, accounts)}
          <br/>
          การลบนี้ถาวร ไม่สามารถกู้คืนได้
          {photoCount > 0 && (
            <><br/><span style={{color: 'var(--expense-soft)'}}>รูป {photoCount} รูปจะถูกลบจาก OneDrive ด้วย</span></>
          )}
        </div>
        <div className="c-actions">
          <button className="btn-ghost" onClick={onCancel}>ยกเลิก</button>
          <button className="btn-danger solid" onClick={onConfirm}>
            <Ic.Trash size={14}/> ยืนยันลบ
          </button>
        </div>
      </div>
    </div>
  );
}

// ============ Items Manager Modal ============
// ============ v5.0: Users Manager (admin only) ============
// Lets the admin add/rename/remove users, change PINs, and toggle admin role.
// Each user has: id (immutable, generated from label), label, icon, role, pinHash.
// PIN changes are immediately hashed before storing.
function UsersManager({ users, currentUserId, onClose, onAdd, onUpdate, onChangePin, onRemove, pushToast, pendingByUserId }) {
  const [editingId, setEditingId] = useState(null);
  const [editLabel, setEditLabel] = useState('');
  const [editIcon, setEditIcon] = useState('👤');
  const [editRole, setEditRole] = useState('member');
  const [pinTarget, setPinTarget] = useState(null); // user being PIN-reset
  const [pinValue, setPinValue] = useState('');
  const [confirmDelId, setConfirmDelId] = useState(null);
  // Add form state
  const [adding, setAdding] = useState(false);
  const [newLabel, setNewLabel] = useState('');
  const [newIcon, setNewIcon] = useState('👤');
  const [newRole, setNewRole] = useState('member');

  const startEdit = (u) => {
    setEditingId(u.id);
    setEditLabel(u.label);
    setEditIcon(u.icon || '👤');
    setEditRole(u.role || 'member');
  };
  const cancelEdit = () => { setEditingId(null); };
  const saveEdit = () => {
    const n = editLabel.trim();
    if (!n) { pushToast('ชื่อต้องไม่ว่าง'); return; }
    onUpdate(editingId, { label: n, icon: editIcon, role: editRole });
    pushToast('แก้ไขแล้ว');
    setEditingId(null);
  };

  const startAdd = () => { setAdding(true); setNewLabel(''); setNewIcon('👤'); setNewRole('member'); };
  const cancelAdd = () => setAdding(false);
  const saveAdd = async () => {
    const r = await onAdd(newLabel, newRole, newIcon);
    if (r.ok) {
      pushToast(`เพิ่ม ${newLabel} แล้ว · PIN เริ่มต้น 1234`);
      setAdding(false);
    } else if (r.reason === 'empty') {
      pushToast('ชื่อต้องไม่ว่าง');
    }
  };

  const startPinReset = (u) => { setPinTarget(u); setPinValue(''); };
  const cancelPinReset = () => { setPinTarget(null); setPinValue(''); };
  const savePinReset = async () => {
    if (!/^\d{4}$/.test(pinValue)) { pushToast('PIN ต้องเป็นตัวเลข 4 หลัก'); return; }
    const r = await onChangePin(pinTarget.id, pinValue);
    if (r.ok) {
      pushToast(`เปลี่ยน PIN ของ ${pinTarget.label} แล้ว`);
      setPinTarget(null);
      setPinValue('');
    }
  };

  const ICONS = ['👤','👨','👩','👴','👵','👦','👧','👶','👑','🧑','👨‍🦱','👩‍🦱','🧔','👨‍🦳','👩‍🦳'];

  // PIN reset overlay
  if (pinTarget) {
    return (
      <div className="sheet-backdrop fade" onClick={cancelPinReset} style={{zIndex: 95}}>
        <div className="sheet-wrap sheet-in" onClick={e => e.stopPropagation()}>
          <div className="sheet">
            <div className="sheet-handle"></div>
            <div className="sheet-head">
              <h2>🔑 ตั้ง PIN ใหม่</h2>
              <button className="icon-btn-round" onClick={cancelPinReset}><Ic.X size={16}/></button>
            </div>
            <div style={{textAlign: 'center', padding: '14px 8px'}}>
              <div style={{fontSize: 40, marginBottom: 8}}>{pinTarget.icon || '👤'}</div>
              <div style={{fontSize: 16, color: 'var(--text)'}}>{pinTarget.label}</div>
              <div style={{fontSize: 11, color: 'var(--text-faint)', marginTop: 4}}>
                ใส่ PIN ใหม่ 4 หลัก
              </div>
            </div>
            <input
              type="tel"
              maxLength={4}
              pattern="\d{4}"
              inputMode="numeric"
              value={pinValue}
              onChange={(e) => setPinValue(e.target.value.replace(/\D/g, '').slice(0, 4))}
              autoFocus
              style={{
                width: '100%',
                fontSize: 28, textAlign: 'center', letterSpacing: '0.5em',
                fontFamily: 'IBM Plex Mono, monospace',
                padding: '14px 12px', borderRadius: 12,
                background: 'var(--surface)', border: '1px solid var(--line)',
                color: 'var(--text)',
              }}
            />
            <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginTop: 16}}>
              <button className="btn-ghost" onClick={cancelPinReset}>ยกเลิก</button>
              <button className="btn-primary" onClick={savePinReset} disabled={pinValue.length !== 4}>
                <Ic.Check size={14}/> บันทึก
              </button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="sheet-backdrop fade" onClick={onClose}>
      <div className="sheet-wrap sheet-in" onClick={e => e.stopPropagation()}>
        <div className="sheet">
          <div className="sheet-handle"></div>
          <div className="sheet-head">
            <h2>👥 จัดการผู้ใช้</h2>
            <button className="icon-btn-round" onClick={onClose}><Ic.X size={16}/></button>
          </div>
          <div style={{fontSize: 11, color: 'var(--text-faint)', marginTop: 6, marginBottom: 12}}>
            ผู้ใช้ทุกคนเริ่มต้นด้วย PIN <code style={{color: 'var(--gold)'}}>1234</code> · เปลี่ยนได้ที่ปุ่ม 🔑
          </div>

          {/* Add user form */}
          {adding ? (() => {
            // v5.17: Real-time validation, per Gemini's suggestion. Compute the
            // validity state once per render so the input border, the helper
            // line, and the disabled prop on the submit button all stay in
            // sync. Threshold is 1 char (not 3) — short Thai nicknames like
            // "นิ่ม" or even "ก" should be allowed; this is a personal app,
            // not a corporate user directory. Uses the app's CSS variables
            // (--income-soft / --expense-soft / --sync-warn) instead of raw
            // hex codes so it follows the sage-green light theme + dark mode.
            const trimmed = newLabel.trim();
            const isDup = trimmed && (users || []).some(
              u => u.label.toLowerCase() === trimmed.toLowerCase()
            );
            const tooShort = trimmed.length > 0 && trimmed.length < 1; // currently always false; kept as a hook for future tightening
            let validState = 'neutral';   // 'neutral' | 'ok' | 'dup' | 'short'
            let validMsg = '';
            if (trimmed) {
              if (isDup) { validState = 'dup'; validMsg = '❌ ชื่อนี้มีในระบบแล้ว'; }
              else if (tooShort) { validState = 'short'; validMsg = '⚠️ ชื่อสั้นเกินไป'; }
              else { validState = 'ok'; validMsg = '✅ ใช้ชื่อนี้ได้'; }
            }
            const borderColor = (
              validState === 'ok'    ? 'var(--income-soft)'  :
              validState === 'dup'   ? 'var(--expense-soft)' :
              validState === 'short' ? 'var(--sync-warn)'    :
              'var(--line)'
            );
            const msgColor = borderColor;
            const canSubmit = trimmed.length > 0 && !isDup && !tooShort;
            return (
            <div className="user-add-card">
              <div className="user-add-row">
                <select
                  value={newIcon}
                  onChange={(e) => setNewIcon(e.target.value)}
                  className="user-icon-select">
                  {ICONS.map(i => <option key={i} value={i}>{i}</option>)}
                </select>
                <input
                  type="text"
                  placeholder="ชื่อผู้ใช้ เช่น ลูกสาว"
                  value={newLabel}
                  onChange={(e) => setNewLabel(e.target.value)}
                  className="user-name-input"
                  style={{ borderColor, outlineColor: borderColor }}
                  autoFocus
                />
              </div>
              {validMsg && (
                <div style={{fontSize: 11, marginTop: 6, fontWeight: 600, color: msgColor}}>
                  {validMsg}
                </div>
              )}
              <select
                value={newRole}
                onChange={(e) => setNewRole(e.target.value)}
                className="vis-select"
                style={{width: '100%', marginTop: 8}}>
                <option value="member">👤 ผู้ใช้ทั่วไป</option>
                <option value="admin">👑 ผู้ดูแลระบบ (admin)</option>
              </select>
              <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginTop: 10}}>
                <button className="btn-ghost" onClick={cancelAdd}>ยกเลิก</button>
                <button className="btn-primary" onClick={saveAdd} disabled={!canSubmit}>
                  <Ic.Plus size={14}/> เพิ่ม
                </button>
              </div>
            </div>
            );
          })() : (
            <button className="btn-ghost" style={{width: '100%', marginBottom: 14}} onClick={startAdd}>
              <Ic.Plus size={14}/> เพิ่มผู้ใช้ใหม่
            </button>
          )}

          {/* Users list */}
          <div className="items-mgr-list">
            {(users || []).map(u => {
              const isMe = u.id === currentUserId;
              return (
                <div key={u.id} className={`mgr-row ${isMe ? 'me' : ''}`}>
                  {editingId === u.id ? (
                    <>
                      <select
                        value={editIcon}
                        onChange={(e) => setEditIcon(e.target.value)}
                        className="user-icon-select">
                        {ICONS.map(i => <option key={i} value={i}>{i}</option>)}
                      </select>
                      <input
                        className="user-name-input"
                        value={editLabel}
                        onChange={(e) => setEditLabel(e.target.value)}
                      />
                      <select
                        value={editRole}
                        onChange={(e) => setEditRole(e.target.value)}
                        className="vis-select">
                        <option value="member">👤 ทั่วไป</option>
                        <option value="admin">👑 admin</option>
                      </select>
                      <div className="actions">
                        <button className="edit-btn" onClick={saveEdit} title="บันทึก">
                          <Ic.Check size={14}/>
                        </button>
                        <button className="del-btn" onClick={cancelEdit} title="ยกเลิก">
                          <Ic.X size={14}/>
                        </button>
                      </div>
                    </>
                  ) : confirmDelId === u.id ? (
                    <>
                      <div className="name-wrap">
                        <div className="name" style={{color: 'var(--expense-soft)'}}>
                          ลบ "{u.label}" ?
                        </div>
                        <div className="meta">บัญชีเก่าจะคงอยู่ แต่ user หาย</div>
                      </div>
                      <div className="actions">
                        <button className="del-btn-confirm" onClick={() => {
                          const r = onRemove(u.id);
                          if (r.ok) { pushToast(`ลบ ${u.label} แล้ว`); setConfirmDelId(null); }
                          else if (r.reason === 'last-admin') pushToast('ลบไม่ได้ — เหลือ admin คนสุดท้าย');
                        }}>
                          <Ic.Check size={14}/>
                        </button>
                        <button className="del-btn" onClick={() => setConfirmDelId(null)}>
                          <Ic.X size={14}/>
                        </button>
                      </div>
                    </>
                  ) : (
                    <>
                      <div className="name-wrap">
                        <div className="name" style={{
                          textDecoration: pendingByUserId?.get(u.id)?.action === 'delete' ? 'line-through' : 'none',
                        }}>
                          <span className="user-row-icon">{u.icon || '👤'}</span>
                          {u.label}
                          {isMe && <span className="me-tag">(คุณ)</span>}
                          {u.role === 'admin' && <span className="admin-tag-inline">admin</span>}
                          {pendingByUserId?.get(u.id) && (() => {
                            const op = pendingByUserId.get(u.id);
                            const meta = op.action === 'add'    ? { c: 'var(--sync-warn)',    e: '🟡' } :
                                         op.action === 'edit'   ? { c: 'orange',               e: '🟠' } :
                                         op.action === 'delete' ? { c: 'var(--expense-soft)', e: '🔴' } :
                                         null;
                            return meta ? (
                              <span style={{
                                display: 'inline-block', marginLeft: 6, padding: '1px 6px',
                                borderRadius: 6, background: meta.c, color: '#fff',
                                fontSize: 10, fontWeight: 600, verticalAlign: 'middle',
                              }} title={`รอ deploy: ${op.action}`}>
                                {meta.e} pending
                              </span>
                            ) : null;
                          })()}
                        </div>
                        <div className="meta">
                          ID: <code style={{color: 'var(--gold)'}}>{u.id}</code>
                        </div>
                      </div>
                      <div className="actions">
                        <button className="perm-btn" onClick={() => startPinReset(u)} title="ตั้ง PIN ใหม่">
                          🔑
                        </button>
                        <button className="edit-btn" onClick={() => startEdit(u)} title="แก้ไข">
                          <Ic.Pencil size={14}/>
                        </button>
                        {!isMe && (
                          <button className="del-btn" onClick={() => setConfirmDelId(u.id)} title="ลบ">
                            <Ic.Trash size={14}/>
                          </button>
                        )}
                      </div>
                    </>
                  )}
                </div>
              );
            })}
          </div>

          <div style={{marginTop: 20}}>
            <button className="btn-primary" onClick={onClose} style={{width: '100%'}}>
              เสร็จสิ้น
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ============ v5.19 Phase 1: Manage Pending Operations ============
// A bottom-sheet-style screen that lists the user's pending operations,
// lets them remove individual ones, or clear the whole batch. It's
// intentionally simple — no "edit op" affordance (per the design decision:
// edit = remove + redo from the main list). No cascade dialogs (per the
// user's preference: let dependent ops fail at deploy time with status
// 'cancelled' instead).
function ManagePendingScreen({ ops, onClose, onRemove, onClearAll, pushToast }) {
  if (!ops) ops = [];

  // Pretty label for the action chip
  const actionMeta = (op) => {
    if (op.action === 'add')    return { icon: '➕', label: 'ADD',    color: 'var(--income-soft)' };
    if (op.action === 'edit')   return { icon: '✏️', label: 'EDIT',   color: 'orange' };
    if (op.action === 'delete') return { icon: '🗑️', label: 'DELETE', color: 'var(--expense-soft)' };
    return { icon: '?', label: '?', color: 'var(--text-faint)' };
  };

  // For human display: pull a short summary out of the op's snapshot. For
  // adds we summarise the new row; for edits we summarise both before/after
  // amounts; for deletes we summarise what's being removed.
  // v5.23 Phase 5a: now resource-aware. Each resource shows its own
  // identifying field(s): tx = item/amount, account = name, etc.
  const RESOURCE_LABEL = {
    tx:       'รายการ',
    account:  'บัญชี',
    item:     'รายการชื่อ',
    project:  'โครงการ',
    category: 'หมวด',
    user:     'ผู้ใช้',
  };
  const summary = (op) => {
    const resource = op.resource || 'tx';
    const snap = op.after || op.before || {};
    if (resource === 'tx') {
      const item = (snap.item || snap.payee || snap.note || 'รายการ').toString().slice(0, 40);
      const amt = typeof snap.amount === 'number' ? snap.amount : null;
      const acct = snap.accountName || '';
      if (op.action === 'edit' && op.before && op.after) {
        const a = op.before.amount, b = op.after.amount;
        if (a !== b && a != null && b != null) {
          return `${item} · ${acct} · ${a.toLocaleString()} → ${b.toLocaleString()}`;
        }
      }
      return `${item}${amt != null ? ' · ' + amt.toLocaleString() : ''}${acct ? ' · ' + acct : ''}`;
    }
    if (resource === 'user') {
      // Users have label + role
      const label = snap.label || snap.id || 'ผู้ใช้';
      const role = snap.role ? ` · ${snap.role}` : '';
      if (op.action === 'edit' && op.before?.label !== op.after?.label) {
        return `${op.before?.label || ''} → ${op.after?.label || ''}${role}`;
      }
      return `${label}${role}`;
    }
    if (resource === 'category') {
      const name = snap.name || 'หมวด';
      const icon = snap.icon || '';
      const type = snap.type === 'income' ? 'รายรับ' : (snap.type === 'expense' ? 'รายจ่าย' : '');
      return `${icon} ${name}${type ? ' · ' + type : ''}`.trim();
    }
    // account, item, project — all keyed by `name`
    const name = snap.name || snap.id || '?';
    if (op.action === 'edit' && op.before?.name !== op.after?.name) {
      return `${op.before?.name || ''} → ${op.after?.name || ''}`;
    }
    return name;
  };

  // Resource chip — small colored badge that says what kind of thing this op
  // touches. Helps the user scan a mixed list at a glance.
  const resourceChip = (op) => {
    const resource = op.resource || 'tx';
    const label = RESOURCE_LABEL[resource] || resource;
    return (
      <span style={{
        flexShrink: 0, padding: '1px 6px', borderRadius: 6,
        background: 'var(--surface)', color: 'var(--text-dim)',
        border: '1px solid var(--line)',
        fontSize: 10, fontWeight: 600,
        marginRight: 4,
      }}>{label}</span>
    );
  };

  return (
    <div className="sheet-backdrop fade" onClick={onClose}>
      <div className="sheet-wrap sheet-in" onClick={e => e.stopPropagation()}>
        <div className="sheet" style={{maxHeight: '85vh', overflowY: 'auto'}}>
          <div className="sheet-handle"></div>
          <div className="sheet-head">
            <h2>รายการรอ deploy ({ops.length})</h2>
            <button className="icon-btn-round" onClick={onClose} aria-label="ปิด">
              <Ic.X size={16}/>
            </button>
          </div>

          {ops.length === 0 ? (
            <div style={{padding: '40px 20px', textAlign: 'center', color: 'var(--text-faint)'}}>
              <div style={{fontSize: 36, marginBottom: 8}}>✨</div>
              <div>ไม่มีรายการที่รอ deploy</div>
            </div>
          ) : (
            <div style={{padding: '8px 4px 20px'}}>
              {ops.map((op, idx) => {
                const meta = actionMeta(op);
                return (
                  <div key={op.id} style={{
                    display: 'flex', alignItems: 'flex-start', gap: 10,
                    padding: '12px 0',
                    borderBottom: idx === ops.length - 1 ? 'none' : '1px solid var(--line)',
                  }}>
                    <span style={{
                      flexShrink: 0, padding: '3px 8px', borderRadius: 8,
                      background: meta.color, color: '#fff',
                      fontSize: 11, fontWeight: 700,
                      minWidth: 64, textAlign: 'center',
                    }}>
                      {meta.icon} {meta.label}
                    </span>
                    <div style={{flex: 1, minWidth: 0, fontSize: 13, lineHeight: 1.4}}>
                      <div style={{color: 'var(--text)', wordBreak: 'break-word', display: 'flex', alignItems: 'center', flexWrap: 'wrap', gap: 2}}>
                        {resourceChip(op)}
                        <span>{summary(op)}</span>
                      </div>
                      <div style={{fontSize: 10, color: 'var(--text-faint)', marginTop: 2}}>
                        {new Date(op.ts).toLocaleString('th-TH', {dateStyle: 'short', timeStyle: 'short'})}
                      </div>
                    </div>
                    <button
                      onClick={async () => {
                        await onRemove(op.id);
                        pushToast('ลบรายการรอ deploy แล้ว');
                      }}
                      className="del-btn"
                      title="ลบรายการนี้ออกจากคิว"
                      style={{flexShrink: 0}}>
                      <Ic.Trash size={14}/>
                    </button>
                  </div>
                );
              })}

              <button
                onClick={async () => {
                  if (window.confirm(`ลบรายการรอ deploy ทั้งหมด ${ops.length} รายการ?\n(การแก้ไขในแอปจะไม่หาย — เพียงไม่ส่งขึ้น cloud ในรอบนี้)`)) {
                    await onClearAll();
                    pushToast('ลบรายการรอ deploy ทั้งหมดแล้ว');
                    onClose();
                  }
                }}
                style={{
                  width: '100%', marginTop: 16,
                  padding: '12px',
                  background: 'transparent',
                  border: '1px solid var(--expense-soft)',
                  color: 'var(--expense-soft)',
                  borderRadius: 10, fontSize: 13, fontWeight: 600,
                  cursor: 'pointer',
                }}>
                <Ic.Trash size={14}/> ลบทั้งหมด ({ops.length})
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ============ v5.21 Phase 3: Deploy Result Summary ============
// Shown after a Deploy run completes. Tells the user how many ops succeeded,
// how many were cancelled (target row was already deleted/missing), and how
// many need retry-later (target row was edited by someone else between when
// the user prepared their edit and when their turn in the queue arrived).
// The retry-later ones stay in the user's active queue; the user closes
// this modal, optionally adjusts those ops in Manage Pending, and presses
// Deploy again.
function DeployResultScreen({ result, onClose }) {
  if (!result) return null;
  const results = result.results || [];
  const ok        = results.filter(r => r.status === 'success').length;
  const cancelled = results.filter(r => r.status === 'cancelled').length;
  const retry     = results.filter(r => r.status === 'retry-later').length;

  const actionLabel = (action) => (
    action === 'add'    ? '➕ ADD' :
    action === 'edit'   ? '✏️ EDIT' :
    action === 'delete' ? '🗑️ DELETE' :
    action
  );
  // v5.23 Phase 5a: short Thai label per resource. Shown beside the action
  // so the user knows whether a failure was on a tx vs an account vs a
  // user, etc.
  const resourceLabel = (resource) => (
    !resource || resource === 'tx' ? 'รายการ' :
    resource === 'account'         ? 'บัญชี'   :
    resource === 'item'            ? 'รายการชื่อ' :
    resource === 'project'         ? 'โครงการ' :
    resource === 'category'        ? 'หมวด'   :
    resource === 'user'            ? 'ผู้ใช้' :
    resource
  );
  const statusMeta = (status) => (
    status === 'success'      ? { icon: '✅', color: 'var(--income-soft)', label: 'สำเร็จ' } :
    status === 'cancelled'    ? { icon: '⏭️', color: 'var(--text-faint)',  label: 'ยกเลิก' } :
    status === 'retry-later'  ? { icon: '⚠️', color: 'var(--sync-warn)',   label: 'รอลองใหม่' } :
                                { icon: '?',  color: 'var(--text-faint)',  label: status }
  );

  return (
    <div className="sheet-backdrop fade" onClick={onClose}>
      <div className="sheet-wrap sheet-in" onClick={e => e.stopPropagation()}>
        <div className="sheet" style={{maxHeight: '85vh', overflowY: 'auto'}}>
          <div className="sheet-handle"></div>
          <div className="sheet-head">
            <h2>Deploy เสร็จสิ้น</h2>
            <button className="icon-btn-round" onClick={onClose} aria-label="ปิด">
              <Ic.X size={16}/>
            </button>
          </div>

          {/* Summary row of counts */}
          <div style={{
            display: 'flex', gap: 8, margin: '8px 0 16px',
            flexWrap: 'wrap',
          }}>
            {ok > 0 && (
              <div style={{flex: 1, minWidth: 90, padding: 12, borderRadius: 10,
                           background: 'var(--income-soft)', color: '#fff', textAlign: 'center'}}>
                <div style={{fontSize: 24, fontWeight: 700}}>{ok}</div>
                <div style={{fontSize: 11, opacity: 0.9}}>✅ สำเร็จ</div>
              </div>
            )}
            {cancelled > 0 && (
              <div style={{flex: 1, minWidth: 90, padding: 12, borderRadius: 10,
                           background: 'var(--text-faint)', color: '#fff', textAlign: 'center'}}>
                <div style={{fontSize: 24, fontWeight: 700}}>{cancelled}</div>
                <div style={{fontSize: 11, opacity: 0.9}}>⏭️ ยกเลิก</div>
              </div>
            )}
            {retry > 0 && (
              <div style={{flex: 1, minWidth: 90, padding: 12, borderRadius: 10,
                           background: 'var(--sync-warn)', color: '#fff', textAlign: 'center'}}>
                <div style={{fontSize: 24, fontWeight: 700}}>{retry}</div>
                <div style={{fontSize: 11, opacity: 0.9}}>⚠️ รอลองใหม่</div>
              </div>
            )}
          </div>

          {/* v5.21+: photo cleanup notice. Only show when at least one photo
              was actually deleted — most deploys won't touch photos at all. */}
          {result.orphanedPhotos > 0 && (
            <div style={{
              fontSize: 12, color: 'var(--text-dim)',
              marginBottom: 12, padding: '8px 12px',
              background: 'var(--surface)', borderRadius: 8,
              border: '1px solid var(--line)',
            }}>
              🧹 ลบรูปที่ไม่ใช้แล้ว {result.orphanedPhotos} รูปออกจาก OneDrive
            </div>
          )}

          {/* Per-op detail. Useful when something went wrong — the user can
              see exactly which row drifted and decide what to do. */}
          <div style={{padding: '4px 0 20px'}}>
            {results.map((r, i) => {
              const meta = statusMeta(r.status);
              return (
                <div key={r.opId || i} style={{
                  display: 'flex', alignItems: 'flex-start', gap: 10,
                  padding: '10px 0',
                  borderBottom: i === results.length - 1 ? 'none' : '1px solid var(--line)',
                  fontSize: 13,
                }}>
                  <span style={{
                    flexShrink: 0, fontSize: 11, fontWeight: 600,
                    minWidth: 70, color: 'var(--text-dim)',
                  }}>
                    {actionLabel(r.action)}
                  </span>
                  <span style={{
                    flexShrink: 0, fontSize: 10, fontWeight: 500,
                    color: 'var(--text-faint)',
                    padding: '2px 4px',
                  }}>
                    {resourceLabel(r.resource)}
                  </span>
                  <span style={{
                    flexShrink: 0, padding: '2px 8px', borderRadius: 6,
                    background: meta.color, color: '#fff',
                    fontSize: 11, fontWeight: 600, minWidth: 60, textAlign: 'center',
                  }}>
                    {meta.icon} {meta.label}
                  </span>
                  <span style={{flex: 1, minWidth: 0, color: 'var(--text-dim)', lineHeight: 1.4}}>
                    {r.reason || (r.status === 'success' ? 'OK' : '')}
                  </span>
                </div>
              );
            })}
          </div>

          {retry > 0 && (
            <div style={{
              marginBottom: 16, padding: 12,
              background: 'rgba(251,191,36,0.12)',
              border: '1px solid var(--sync-warn)',
              borderRadius: 10, fontSize: 12, lineHeight: 1.5,
            }}>
              💡 รายการที่ "รอลองใหม่" ยังอยู่ในคิว — เปิด "จัดการ" เพื่อแก้ไข
              หรือกด Deploy ใหม่อีกครั้ง (ระบบจะดึงข้อมูลล่าสุดจาก cloud มาเทียบ)
            </div>
          )}

          <button
            onClick={onClose}
            style={{
              width: '100%', padding: '12px',
              background: 'var(--gold)', color: '#fff',
              border: 'none', borderRadius: 10,
              fontSize: 14, fontWeight: 600, cursor: 'pointer',
            }}>
            ปิด
          </button>
        </div>
      </div>
    </div>
  );
}

// ============ v5.29 Phase 4: Deploy History Viewer ============
// Shows the user's past deploys (success, cancelled, retry-later that
// eventually went stale and got dropped, etc.). Read-only — purely for
// audit and "wait, did my last edit go through?" peace of mind.
//
// Source of truth: userOpsDoc.history, which commitDeployResults populates
// after each Deploy (capped at 100 newest). Each entry is a normal op
// object plus { status, reason?, deployedAt }.
//
// Grouped by deployedAt date because users think in days, not in
// individual ops. Within a day we keep the natural order (newest first).
function HistoryViewer({ history, onClose }) {
  const list = Array.isArray(history) ? history : [];

  // Group by yyyy-mm-dd of deployedAt; preserve insertion order within group.
  const groups = useMemo(() => {
    const map = new Map();
    for (const op of list) {
      const ts = op.deployedAt || op.ts || new Date().toISOString();
      const day = ts.slice(0, 10); // yyyy-mm-dd
      if (!map.has(day)) map.set(day, []);
      map.get(day).push(op);
    }
    // Sort by day descending (newest day first).
    return Array.from(map.entries()).sort((a, b) => (a[0] < b[0] ? 1 : -1));
  }, [list]);

  const actionLabel = (a) => (a === 'add' ? '➕' : a === 'edit' ? '✏️' : a === 'delete' ? '🗑️' : '?');
  const resourceLabel = (r) => (
    !r || r === 'tx' ? 'รายการ' :
    r === 'account'  ? 'บัญชี'   :
    r === 'item'     ? 'รายการชื่อ' :
    r === 'project'  ? 'โครงการ' :
    r === 'category' ? 'หมวด'   :
    r === 'user'     ? 'ผู้ใช้' :
    r
  );
  const statusMeta = (s) => (
    s === 'success'      ? { c: 'var(--income-soft)', icon: '✅', label: 'สำเร็จ' } :
    s === 'cancelled'    ? { c: 'var(--text-faint)',  icon: '⏭️', label: 'ยกเลิก' } :
    s === 'retry-later'  ? { c: 'var(--sync-warn)',   icon: '⚠️', label: 'รอลอง' } :
                           { c: 'var(--text-faint)',  icon: '?',  label: s || '-' }
  );
  const summary = (op) => {
    const snap = op.after || op.before || {};
    const r = op.resource || 'tx';
    if (r === 'tx') {
      const item = (snap.item || snap.payee || snap.note || 'รายการ').toString().slice(0, 30);
      const amt = typeof snap.amount === 'number' ? snap.amount : null;
      return amt != null ? `${item} · ${amt.toLocaleString()}` : item;
    }
    if (r === 'user') return snap.label || snap.id || 'ผู้ใช้';
    if (r === 'category') return `${snap.icon || ''} ${snap.name || ''}`.trim();
    return snap.name || snap.id || '?';
  };
  const formatDay = (day) => {
    try {
      const d = new Date(day + 'T00:00:00');
      return d.toLocaleDateString('th-TH', { dateStyle: 'medium' });
    } catch { return day; }
  };
  const formatTime = (iso) => {
    try { return new Date(iso).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }); }
    catch { return ''; }
  };

  return (
    <div className="sheet-backdrop fade" onClick={onClose}>
      <div className="sheet-wrap sheet-in" onClick={e => e.stopPropagation()}>
        <div className="sheet" style={{maxHeight: '85vh', overflowY: 'auto'}}>
          <div className="sheet-handle"></div>
          <div className="sheet-head">
            <h2>ประวัติ Deploy ({list.length})</h2>
            <button className="icon-btn-round" onClick={onClose} aria-label="ปิด">
              <Ic.X size={16}/>
            </button>
          </div>

          {list.length === 0 ? (
            <div style={{padding: '40px 20px', textAlign: 'center', color: 'var(--text-faint)'}}>
              <div style={{fontSize: 36, marginBottom: 8}}>📜</div>
              <div>ยังไม่มีประวัติ deploy</div>
              <div style={{fontSize: 11, marginTop: 4}}>
                หลังจากกด Deploy สำเร็จ รายการจะมาแสดงตรงนี้
              </div>
            </div>
          ) : (
            <div style={{padding: '4px 0 20px'}}>
              {groups.map(([day, ops]) => (
                <div key={day} style={{marginBottom: 16}}>
                  <div style={{
                    fontSize: 12, fontWeight: 600, color: 'var(--text-dim)',
                    margin: '8px 0 6px', letterSpacing: '0.04em',
                  }}>
                    {formatDay(day)} <span style={{color: 'var(--text-faint)', fontWeight: 400}}>· {ops.length} รายการ</span>
                  </div>
                  {ops.map((op, i) => {
                    const m = statusMeta(op.status);
                    return (
                      <div key={op.id || i} style={{
                        display: 'flex', alignItems: 'flex-start', gap: 10,
                        padding: '8px 0',
                        borderBottom: i === ops.length - 1 ? 'none' : '1px solid var(--line)',
                        fontSize: 13,
                      }}>
                        <span style={{
                          flexShrink: 0, fontSize: 11, fontWeight: 600,
                          minWidth: 32, color: 'var(--text-dim)', textAlign: 'center',
                        }}>
                          {actionLabel(op.action)}
                        </span>
                        <span style={{
                          flexShrink: 0, padding: '2px 6px', borderRadius: 6,
                          background: m.c, color: '#fff',
                          fontSize: 10, fontWeight: 600, minWidth: 50, textAlign: 'center',
                        }}>
                          {m.icon} {m.label}
                        </span>
                        <div style={{flex: 1, minWidth: 0, lineHeight: 1.4}}>
                          <div style={{color: 'var(--text)', wordBreak: 'break-word'}}>
                            <span style={{fontSize: 10, color: 'var(--text-faint)', marginRight: 4}}>
                              {resourceLabel(op.resource)}
                            </span>
                            {summary(op)}
                          </div>
                          {op.reason && (
                            <div style={{fontSize: 10, color: 'var(--text-faint)', marginTop: 2}}>
                              {op.reason}
                            </div>
                          )}
                        </div>
                        <span style={{
                          flexShrink: 0, fontSize: 10, color: 'var(--text-faint)',
                          alignSelf: 'center',
                        }}>
                          {formatTime(op.deployedAt)}
                        </span>
                      </div>
                    );
                  })}
                </div>
              ))}
              <div style={{
                fontSize: 11, color: 'var(--text-faint)', textAlign: 'center',
                marginTop: 16, paddingTop: 12, borderTop: '1px solid var(--line)',
              }}>
                เก็บประวัติ 100 รายการล่าสุด
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ============ v5.29 Phase 4: Storage Manager (admin) ============
// One screen, two tools that share the same emergency / cleanup theme:
//   1. Reset Queue — wipes Q.json. Last-resort recovery for a stuck lock
//      that the LEASE_TIMEOUT eviction somehow didn't clear. Confirms before
//      acting because it WILL kick whoever's currently mid-deploy.
//   2. Orphan Photos — runs scanOrphanedPhotos(), shows totals + a confirm
//      step before deleteOrphans(). Counts both cloud and local cache.
//
// Both tools are admin-only at the call site (SettingsView gates the entry)
// but we don't re-check admin here — defence in depth would be nice but the
// scanOrphanedPhotos/qReset functions touch OneDrive which already requires
// the caller to be signed in with appropriate scope. UI gating is enough.
function StorageManager({ onClose, onResetQueue, resettingQueue,
                          onScanOrphans, orphanScanResult, scanningOrphans,
                          onDeleteOrphans, onClearScan, pushToast }) {
  const orphanCounts = orphanScanResult ? (() => {
    const c = orphanScanResult.cloud || {};
    const l = orphanScanResult.local || {};
    return {
      cloudOrphans: (c.orphanIds || []).length,
      cloudTotal:   c.totalCount || 0,
      cloudBytes:   c.totalBytes || 0,
      localOrphans: (l.orphanIds || []).length,
      localTotal:   l.totalCount || 0,
    };
  })() : null;
  const fmtBytes = (n) => {
    if (!n) return '0 B';
    if (n < 1024) return `${n} B`;
    if (n < 1024*1024) return `${(n/1024).toFixed(1)} KB`;
    return `${(n/(1024*1024)).toFixed(1)} MB`;
  };

  return (
    <div className="sheet-backdrop fade" onClick={onClose}>
      <div className="sheet-wrap sheet-in" onClick={e => e.stopPropagation()}>
        <div className="sheet" style={{maxHeight: '85vh', overflowY: 'auto'}}>
          <div className="sheet-handle"></div>
          <div className="sheet-head">
            <h2>🧹 จัดการพื้นที่</h2>
            <button className="icon-btn-round" onClick={onClose} aria-label="ปิด">
              <Ic.X size={16}/>
            </button>
          </div>

          {/* --- Orphan photos --- */}
          <div style={{marginTop: 8, padding: '12px 4px'}}>
            <div style={{fontSize: 14, fontWeight: 600, marginBottom: 4}}>🖼️ ลบรูปที่ไม่ใช้แล้ว</div>
            <div style={{fontSize: 12, color: 'var(--text-dim)', lineHeight: 1.5, marginBottom: 12}}>
              สแกนหารูปใน OneDrive และ cache ในเครื่องที่ไม่มี tx ใดอ้างถึง — ปลอดภัยที่จะลบ
              <br/>
              <span style={{color: 'var(--text-faint)'}}>(ยกเว้นรูปของ pending ops ที่ยังไม่ deploy)</span>
            </div>

            {orphanScanResult ? (
              <div style={{
                padding: 12, borderRadius: 10,
                background: 'var(--surface)', border: '1px solid var(--line)',
                fontSize: 12, lineHeight: 1.6,
              }}>
                <div>☁️ Cloud: <b>{orphanCounts.cloudOrphans}</b> รูปที่ไม่ใช้แล้ว
                  {orphanCounts.cloudOrphans > 0 && (
                    <span style={{color: 'var(--text-faint)'}}> ({fmtBytes(orphanCounts.cloudBytes)})</span>
                  )}
                  <span style={{color: 'var(--text-faint)'}}> · ทั้งหมด {orphanCounts.cloudTotal} รูป</span>
                </div>
                <div>💾 Cache: <b>{orphanCounts.localOrphans}</b> รูปที่ไม่ใช้แล้ว
                  <span style={{color: 'var(--text-faint)'}}> · ทั้งหมด {orphanCounts.localTotal} รูป</span>
                </div>
                <div style={{marginTop: 6, fontSize: 11, color: 'var(--text-faint)'}}>
                  อ้างถึง {orphanScanResult.referencedCount} photoId · สแกนเมื่อ {new Date(orphanScanResult.scannedAt).toLocaleTimeString('th-TH')}
                </div>

                {(orphanCounts.cloudOrphans + orphanCounts.localOrphans) > 0 ? (
                  <div style={{display: 'flex', gap: 8, marginTop: 12}}>
                    <button className="btn-ghost" style={{flex: 1}}
                            onClick={async () => {
                              if (!window.confirm(`ลบรูป ${orphanCounts.cloudOrphans + orphanCounts.localOrphans} รูปที่ไม่ใช้แล้ว?\n(ทำหลังจาก deploy เสร็จแล้วเท่านั้น)`)) return;
                              await onDeleteOrphans();
                            }}>
                      <Ic.Trash size={14}/> ลบทั้งหมด
                    </button>
                    <button className="btn-ghost" style={{flex: 1}} onClick={onClearScan}>
                      ⊘ ยกเลิก
                    </button>
                  </div>
                ) : (
                  <div style={{marginTop: 12, textAlign: 'center', color: 'var(--income-soft)', fontWeight: 600}}>
                    ✨ ไม่มีรูปที่ไม่ใช้แล้ว
                  </div>
                )}
              </div>
            ) : (
              <button className="btn-ghost" style={{width: '100%'}}
                      onClick={onScanOrphans}
                      disabled={scanningOrphans}>
                {scanningOrphans ? '⏳ กำลังสแกน...' : '🔍 สแกนหารูปที่ไม่ใช้'}
              </button>
            )}
          </div>

          <div style={{height: 1, background: 'var(--line)', margin: '20px 0'}}/>

          {/* --- Reset Queue --- */}
          <div style={{padding: '4px'}}>
            <div style={{fontSize: 14, fontWeight: 600, marginBottom: 4}}>🚨 รีเซ็ตคิว Q.json</div>
            <div style={{fontSize: 12, color: 'var(--text-dim)', lineHeight: 1.5, marginBottom: 12}}>
              ใช้ตอนระบบ lock ค้าง (ผิดปกติมาก — heartbeat 30s ควรจัดการเองได้)
              <br/>
              <span style={{color: 'var(--expense-soft)'}}>
                ⚠️ จะ kick ทุกคนที่กำลัง deploy อยู่ — ใช้เฉพาะกรณีฉุกเฉิน
              </span>
            </div>
            <button className="btn-ghost" style={{
                      width: '100%',
                      borderColor: 'var(--expense-soft)',
                      color: 'var(--expense-soft)',
                    }}
                    onClick={async () => {
                      if (!window.confirm('รีเซ็ต Q.json ตอนนี้?\nคนที่กำลัง deploy จะถูก interrupt (อาจต้อง deploy ใหม่)')) return;
                      await onResetQueue();
                    }}
                    disabled={resettingQueue}>
              {resettingQueue ? '⏳ กำลังรีเซ็ต...' : '🚨 รีเซ็ตคิว'}
            </button>
          </div>

          <div style={{marginTop: 20}}>
            <button className="btn-primary" onClick={onClose} style={{width: '100%'}}>
              ปิด
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function ItemsManager({ items, transactions, onClose, onAdd, onUpdate, onRemove, pushToast, isAdmin = true, pendingByItemId }) {
  const [newName, setNewName] = useState('');
  const [editingId, setEditingId] = useState(null);
  const [editDraft, setEditDraft] = useState('');
  const [confirmDelId, setConfirmDelId] = useState(null);

  // Count usage of each item across transactions
  const usageMap = useMemo(() => {
    const m = new Map();
    (transactions || []).forEach(t => {
      const k = (t.item || t.payee || '').trim();
      if (k) m.set(k, (m.get(k) || 0) + 1);
    });
    return m;
  }, [transactions]);

  // Sort: when the user is typing in the "เพิ่มรายการใหม่" box, push items
  // that contain that substring to the top so they can spot existing entries
  // and avoid duplicates. Otherwise: most-used first, then alphabetical.
  const sortedItems = useMemo(() => {
    const list = [...(items || [])];
    const q = newName.trim().toLowerCase();
    list.sort((a, b) => {
      // When typing, items matching the query come first
      if (q) {
        const aMatch = (a.name || '').toLowerCase().includes(q);
        const bMatch = (b.name || '').toLowerCase().includes(q);
        if (aMatch !== bMatch) return aMatch ? -1 : 1;
      }
      const ca = usageMap.get(a.name) || 0;
      const cb = usageMap.get(b.name) || 0;
      if (ca !== cb) return cb - ca;
      return a.name.localeCompare(b.name, 'th');
    });
    return list;
  }, [items, usageMap, newName]);

  const handleAdd = () => {
    const n = newName.trim();
    if (!n) return;
    const ok = onAdd(n);
    if (ok) setNewName('');
  };

  const startEdit = (it) => {
    setEditingId(it.id);
    setEditDraft(it.name);
    setConfirmDelId(null);
  };
  const saveEdit = () => {
    const ok = onUpdate(editingId, editDraft);
    if (ok) { setEditingId(null); setEditDraft(''); }
  };
  const cancelEdit = () => { setEditingId(null); setEditDraft(''); };

  const confirmDelete = (id) => {
    onRemove(id);
    setConfirmDelId(null);
  };

  return (
    <div className="sheet-backdrop fade" onClick={onClose} style={{zIndex: 85}}>
      <div className="sheet-wrap sheet-in" onClick={e => e.stopPropagation()}>
        <div className="sheet">
          <div className="sheet-handle"></div>
          <div className="sheet-head">
            <h2>จัดการรายการ</h2>
            <button className="icon-btn-round" onClick={onClose}><Ic.X size={16}/></button>
          </div>

          {/* Add new */}
          <div className="cat-head" style={{marginTop: 16}}>เพิ่มรายการใหม่</div>
          <div className="items-mgr-addbox">
            <input type="text" value={newName}
                   onChange={e => setNewName(e.target.value)}
                   onKeyDown={e => { if (e.key === 'Enter') handleAdd(); }}
                   placeholder="เช่น กาแฟลาเต้, ค่าเน็ตบ้าน"
                   autoFocus/>
            <button onClick={handleAdd} disabled={!newName.trim()}>
              <Ic.Plus size={14}/> เพิ่ม
            </button>
          </div>

          {/* List */}
          <div className="cat-head" style={{marginTop: 18}}>
            รายการทั้งหมด
          </div>
          {sortedItems.length === 0 ? (
            <div className="items-mgr-empty">
              <div className="em">🏷️</div>
              <div>ยังไม่มีรายการในรายการแนะนำ</div>
              <div style={{fontSize: 11, marginTop: 4}}>
                รายการจะถูกเพิ่มอัตโนมัติเมื่อคุณบันทึกธุรกรรม
              </div>
            </div>
          ) : (
            <>
              <div className="items-mgr-list">
                {sortedItems.map(it => {
                  const isEditing = editingId === it.id;
                  const needsConfirm = confirmDelId === it.id;
                  const usage = usageMap.get(it.name) || 0;
                  return (
                    <div key={it.id} className="items-mgr-row">
                      {isEditing ? (
                        <>
                          <input className="edit" value={editDraft}
                                 onChange={e => setEditDraft(e.target.value)}
                                 onKeyDown={e => {
                                   if (e.key === 'Enter') saveEdit();
                                   else if (e.key === 'Escape') cancelEdit();
                                 }}
                                 autoFocus/>
                          <div className="actions">
                            <button className="save-btn" onClick={saveEdit}
                                    disabled={!editDraft.trim() || editDraft.trim() === it.name}
                                    title="บันทึก">
                              <Ic.Check size={14}/>
                            </button>
                            <button className="cancel-btn" onClick={cancelEdit} title="ยกเลิก">
                              <Ic.X size={14}/>
                            </button>
                          </div>
                        </>
                      ) : needsConfirm ? (
                        <>
                          <div className="name-wrap">
                            <div className="name" style={{color: 'var(--expense-soft)'}}>
                              ลบ "{it.name}" ?
                            </div>
                            <div className="meta">
                              {usage > 0
                                ? `ใช้ใน ${usage} รายการ (ธุรกรรมจะยังอยู่)`
                                : 'จะหายไปจากรายการแนะนำ'}
                            </div>
                          </div>
                          <div className="actions">
                            <button className="save-btn" onClick={() => confirmDelete(it.id)}
                                    style={{background: 'var(--expense)', color: '#FBFAF6'}}
                                    title="ยืนยันลบ">
                              <Ic.Check size={14}/>
                            </button>
                            <button className="cancel-btn" onClick={() => setConfirmDelId(null)}
                                    title="ยกเลิก">
                              <Ic.X size={14}/>
                            </button>
                          </div>
                        </>
                      ) : (
                        <>
                          <div className="name-wrap">
                            <div className="name" style={{
                              textDecoration: pendingByItemId?.get(it.id)?.action === 'delete' ? 'line-through' : 'none',
                            }}>
                              {it.name}
                              {pendingByItemId?.get(it.id) && (() => {
                                const op = pendingByItemId.get(it.id);
                                const meta = op.action === 'add'    ? { c: 'var(--sync-warn)',    e: '🟡' } :
                                             op.action === 'edit'   ? { c: 'orange',               e: '🟠' } :
                                             op.action === 'delete' ? { c: 'var(--expense-soft)', e: '🔴' } :
                                             null;
                                return meta ? (
                                  <span style={{
                                    display: 'inline-block', marginLeft: 6, padding: '1px 6px',
                                    borderRadius: 6, background: meta.c, color: '#fff',
                                    fontSize: 10, fontWeight: 600, verticalAlign: 'middle',
                                  }} title={`รอ deploy: ${op.action}`}>
                                    {meta.e} pending
                                  </span>
                                ) : null;
                              })()}
                            </div>
                            <div className="meta">
                              {usage > 0 ? `ใช้ ${usage} ครั้ง` : 'ยังไม่ถูกใช้'}
                            </div>
                          </div>
                          <div className="actions">
                            {isAdmin && (
                              <>
                                <button className="edit-btn" onClick={() => startEdit(it)}
                                        title="แก้ไข">
