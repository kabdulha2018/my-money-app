const combineDateTime = (dateStr, timeStr) => {
  const [h, m, s] = (timeStr || '00:00:00').split(':').map(n => parseInt(n, 10) || 0);
  const d = new Date(dateStr + 'T00:00:00');
  d.setHours(h, m, s, 0);
  return d.toISOString();
};
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);

// ========== Local Storage ==========
const LS_KEY = 'mymoney:v1';
function loadLocal() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return { transactions: [], items: [], accounts: [], projects: [], categories: [], users: [], lastModified: null };
    const d = JSON.parse(raw);
    return {
      transactions: d.transactions || [],
      items:        d.items || [],
      accounts:     d.accounts || [],
      projects:     d.projects || [],
      categories:   d.categories || [],
      users:        d.users || [], // v5.0
      lastModified: d.lastModified || null,
    };
  } catch { return { transactions: [], items: [], accounts: [], projects: [], categories: [], users: [], lastModified: null }; }
}
function saveLocal(state) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch(e) { console.error(e); }
}

// ============ ⚠️ v5.0: User & Permission System ============
// User registry is stored INSIDE state.users (synced via OneDrive).
// PINs are stored as SHA-256 hashes — even someone with raw OneDrive access can't
// read the PIN.
//
// On first run after upgrading from v4.x (or fresh install), DEFAULT_USERS is
// seeded into state. Admin can then add/remove/rename/change-PIN from inside the app.

const DEFAULT_USERS = [
  { id: 'abi',     label: 'อาบี',       icon: '👑', role: 'admin'  },
  { id: 'amimoh',  label: 'อามีเมาะห์', icon: '👩', role: 'member' },
  { id: 'ummirin', label: 'อุมมีรีน',   icon: '👩', role: 'member' },
  { id: 'hakam',   label: 'ฮากัม',      icon: '👦', role: 'member' },
];
const DEFAULT_PIN = '1234'; // ทุก user เริ่มต้นด้วย PIN 1234 — admin ควรเปลี่ยนทันทีหลัง deploy

// Per-account permission levels (for non-admin users; admins always have full access)
const PERM_OPTS = [
  { id: 'none',     label: '🚫 ไม่เห็น'                    },
  { id: 'view',     label: '👁️ ดูอย่างเดียว'                },
  { id: 'edit-own', label: '✏️ ดู+แก้เฉพาะของตัวเอง'        },
];
const PERM_LABEL = (id) => (PERM_OPTS.find(p => p.id === id) || PERM_OPTS[0]).label;

// Hash a PIN using SHA-256 + a fixed app salt. Pure function, no side effects.
// Returns hex string. Used both when creating a user and when verifying a PIN entry.
async function hashPin(pin) {
  const text = `mymoney:v5:${pin}`;
  const buf = new TextEncoder().encode(text);
  const digest = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(digest))
    .map(b => b.toString(16).padStart(2, '0'))
    .join('');
}

// Resolve effective permission for a user on a given account.
// Admin → always 'edit-own' (treated as full edit; combined with admin role checks
// elsewhere they can edit any tx, not just their own).
// Member → looks up account.permissions[userId], defaults to 'none'.
function getAccountPerm(user, account) {
  if (!user || !account) return 'none';
  if (user.role === 'admin') return 'admin';
  return (account.permissions && account.permissions[user.id]) || 'none';
}
// True if user can see this account at all
function canViewAccount(user, account) {
  const p = getAccountPerm(user, account);
  return p !== 'none';
}
// True if user can edit/delete this specific transaction
function canEditTx(user, account, tx) {
  // v5.15 (rule 1ง): non-admin members CANNOT edit or delete transactions —
  // not even ones they created themselves. The user's reasoning is that an
  // edit could ripple into another account's balance (e.g. a transfer between
  // their own account and a shared account would touch the shared one). The
  // safe rule is: members write-once-only. If they need to fix a typo they
  // must ask the admin. The previous v5.0 rule of "edit-own = your own
  // transactions on accounts you can edit" is removed.
  const p = getAccountPerm(user, account);
  if (p === 'admin') return true;
  return false;
}
// True if user can ADD new transactions to this account.
// v5.15: Members keep the ability to ADD even though they can't edit/delete —
// adding is the primary use case for shared books (mom logs grocery spend).
function canAddToAccount(user, account) {
  const p = getAccountPerm(user, account);
  return p === 'admin' || p === 'edit-own';
}

// ========== MSAL + Graph ==========
const CFG = window.APP_CONFIG;
const HAS_CONFIG = CFG.clientId && !CFG.clientId.startsWith("REPLACE_");
const GRAPH_URL = (path) => `https://graph.microsoft.com/v1.0${path}`;
const FILE_PATH = `/me/drive/special/approot:/${CFG.dataFileName}:/content`;

let msalInstance = null;
async function initMsal() {
  if (!HAS_CONFIG) return null;
  if (msalInstance) return msalInstance;
  msalInstance = new msal.PublicClientApplication({
    auth: {
      clientId: CFG.clientId,
      authority: CFG.authority,
      redirectUri: window.location.origin + window.location.pathname,
    },
    cache: {
      cacheLocation: 'localStorage',
      storeAuthStateInCookie: false,
    },
  });
  await msalInstance.initialize();
  // handle redirect if coming back from auth (safety)
  try { await msalInstance.handleRedirectPromise(); } catch {}
  return msalInstance;
}

async function getAccount() {
  const inst = await initMsal();
  if (!inst) return null;
  const accs = inst.getAllAccounts();
  return accs[0] || null;
}

// v5.2: Detect in-app browsers (Messenger, LINE, Facebook, Instagram, etc.)
// These browsers run pages inside a popup which prevents MSAL popup-based login.
// When detected we skip popup entirely and use redirect from the start.
function isInAppBrowser() {
  try {
    const ua = navigator.userAgent || '';
    // Common in-app browser markers — covers Messenger, FB, Instagram, LINE,
    // KakaoTalk, WeChat, TikTok, etc.
    // v5.12: Removed the `window.opener !== null` check because Chrome on Android
    // sometimes has a non-null opener even when running as a normal tab (e.g. when
    // the user followed a link from Messenger → opened in Chrome). That false
    // positive made us route to redirect prematurely, but worse, we still tried
    // popup first when the user clicked the button explicitly, leading to a
    // visible block_nested_popups error before the redirect fallback kicked in.
    if (/FBAN|FBAV|Messenger|Instagram|Line\/|KAKAOTALK|MicroMessenger|Twitter|TikTok|Snapchat/i.test(ua)) {
      return true;
    }
  } catch {}
  return false;
}

async function signIn() {
  const inst = await initMsal();
  // to redirect — popup will only fail with block_nested_popups.
  if (isInAppBrowser()) {
    await inst.loginRedirect({ scopes: CFG.scopes, prompt: 'select_account' });
    return null; // navigation happens; nothing more to do
  }
  // v5.12: Try popup first (works in regular Chrome desktop and most mobile
  // Chrome). On any popup-related failure we silently fall through to redirect
  // so the user never sees the raw "block_nested_popups" error in the UI.
  try {
    const res = await inst.loginPopup({ scopes: CFG.scopes, prompt: 'select_account' });
    return res.account;
  } catch (e) {
    const code = String(e?.errorCode || e?.errorMessage || e?.message || '');
    const isPopupBlocked =
      /block_nested_popups|popup_window_error|empty_window_error|popup_blocked|user_cancelled/i.test(code)
      || (e?.name === 'BrowserAuthError' && /popup/i.test(code));
    if (isPopupBlocked) {
      // Silent transition — user will be redirected to Microsoft, not see an error.
      try {
        await inst.loginRedirect({ scopes: CFG.scopes, prompt: 'select_account' });
      } catch (redirErr) {
        // If even redirect fails (very rare — bad config etc.) re-throw the
        // original popup error so the user gets some feedback rather than a
        // silent dead end.
        throw e;
      }
      return null;
    }
    throw e;
  }
}

// v5.12: Explicit redirect-based sign-in for users where popup doesn't work.
// Triggered by the "ลองวิธีอื่น" link on the sign-in screen. This always
// navigates away from the page, so the function never returns normally.
async function signInRedirect() {
  const inst = await initMsal();
  await inst.loginRedirect({ scopes: CFG.scopes, prompt: 'select_account' });
}

async function signOut() {
  const inst = await initMsal();
  const account = inst.getAllAccounts()[0];
  if (account) {
    try {
      await inst.logoutPopup({ account, mainWindowRedirectUri: window.location.origin + window.location.pathname });
    } catch (e) {
      // Popup blocked (in-app browser) or other error — clear local cache as last resort.
      // We deliberately don't try logoutRedirect here because users normally want to
      // stay on this page after sign-out, not navigate to Microsoft's logout page.
      try { await inst.clearCache(); } catch {}
    }
  }
}

async function getToken() {
  const inst = await initMsal();
  const account = inst.getAllAccounts()[0];
  if (!account) throw new Error('Not signed in');
  try {
    const r = await inst.acquireTokenSilent({ scopes: CFG.scopes, account });
    return r.accessToken;
  } catch (e) {
    if (e.name === 'InteractionRequiredAuthError' || /interaction_required|consent_required|login_required/i.test(String(e?.errorCode || e?.message))) {
      // v5.2: in in-app browser go straight to redirect
      if (isInAppBrowser()) {
        await inst.acquireTokenRedirect({ scopes: CFG.scopes, account });
        throw new Error('Redirecting for token...');
      }
      try {
        const r = await inst.acquireTokenPopup({ scopes: CFG.scopes, account });
        return r.accessToken;
      } catch (popupErr) {
        const code = String(popupErr?.errorCode || popupErr?.errorMessage || popupErr?.message || '');
        const isPopupBlocked = /block_nested_popups|popup_window_error|empty_window_error|popup_blocked/i.test(code)
          || (popupErr?.name === 'BrowserAuthError' && /popup/i.test(code));
        if (isPopupBlocked) {
          await inst.acquireTokenRedirect({ scopes: CFG.scopes, account });
          throw new Error('Redirecting for token...');
        }
        throw popupErr;
      }
    }
    throw e;
  }
}

async function remoteFetch() {
  const token = await getToken();
  const res = await fetch(GRAPH_URL(FILE_PATH), {
    headers: { Authorization: `Bearer ${token}` },
  });
  if (res.status === 404) return null;
  if (!res.ok) throw new Error(`Load ${res.status}`);
  return await res.json();
}

// v5.14: Wrap the save with two safety nets that didn't exist in v5.13:
//
// 1. Empty state guard — refuse to upload an obviously-blank state if the
//    remote file is non-trivial. This is the failure mode that nuked the
//    vault on May 2: a stale tab on a different device booted with default
//    empty state, then sync'd that empty state up over the real data.
//
// 2. Optimistic locking — before writing, fetch the remote file's lastModified
//    and compare to the timestamp this client started from. If the remote has
//    moved forward (another device saved while we were editing), abort and
//    let the caller decide how to merge.
//
// Both checks can be bypassed with the {force:true} option for cases where
// we DO want to overwrite (e.g. user explicitly chose "use my version" in a
// conflict prompt, or the very first save that creates the file).
async function remoteSave(data, options = {}) {
  const { force = false, expectedLastModified = null, allowEmpty = false } = options;

  // ----- Empty-state guard -----
  // We define "empty-looking" as: zero transactions AND zero accounts AND
  // zero items. A brand-new vault with just {users:[], categories:[]} fits
  // this; so does a state object that was reset to defaults before sync
  // finished. Either way, if the REMOTE file currently has real data, we
  // refuse to overwrite without explicit caller consent.
  if (!force && !allowEmpty) {
    const looksEmpty =
      (!Array.isArray(data?.transactions) || data.transactions.length === 0) &&
      (!Array.isArray(data?.accounts)     || data.accounts.length === 0) &&
      (!Array.isArray(data?.items)        || data.items.length === 0);
    if (looksEmpty) {
      try {
        const remote = await remoteFetch();
        const remoteHasData =
          (Array.isArray(remote?.transactions) && remote.transactions.length > 0) ||
          (Array.isArray(remote?.accounts)     && remote.accounts.length > 0)     ||
          (Array.isArray(remote?.items)        && remote.items.length > 0);
        if (remoteHasData) {
          const err = new Error('REFUSED_EMPTY_OVERWRITE');
          err.code = 'EMPTY_OVERWRITE_REFUSED';
          err.remote = remote;
          throw err;
        }
      } catch (e) {
        if (e && e.code === 'EMPTY_OVERWRITE_REFUSED') throw e;
        // Couldn't fetch remote (network issue) — fail closed: don't risk it.
        const err = new Error('REFUSED_EMPTY_NO_REMOTE_CHECK');
        err.code = 'EMPTY_OVERWRITE_REFUSED';
        throw err;
      }
    }
  }

  // ----- Optimistic locking -----
  // If caller passed an expectedLastModified, fetch the remote and abort if
  // someone else wrote since we last loaded. This catches the multi-device
  // race where two phones save back-to-back and the second one would silently
  // erase the first one's edits.
  if (!force && expectedLastModified) {
    try {
      const remote = await remoteFetch();
      const remoteTs = remote?.lastModified || null;
      if (remoteTs && remoteTs !== expectedLastModified) {
        const err = new Error('REMOTE_MOVED_FORWARD');
        err.code = 'REMOTE_NEWER';
        err.remote = remote;
        err.remoteLastModified = remoteTs;
        err.expectedLastModified = expectedLastModified;
        throw err;
      }
    } catch (e) {
      if (e && e.code === 'REMOTE_NEWER') throw e;
      // Couldn't check (e.g. 404 = file doesn't exist yet). Allow save.
    }
  }

  // ----- Stamp + write -----
  // Always set lastModified so subsequent loads can use it for the OL check.
  const stamped = { ...data, lastModified: new Date().toISOString() };
  const token = await getToken();
  const res = await fetch(GRAPH_URL(FILE_PATH), {
    method: 'PUT',
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(stamped),
  });
  if (!res.ok) { const t = await res.text(); throw new Error(`Save ${res.status}: ${t.slice(0,120)}`); }
  return await res.json();
}

// ========== v5.21 Phase 3: applyOpsToVault — replay ops onto my-money.json ==========
//
// This runs INSIDE the editing critical section (i.e. only after useDeploy
// has acquired the Q.json lock). It:
//
//   1. Downloads the freshest copy of my-money.json from OneDrive
//   2. Walks the user's pending operations in order, applying each one
//      against the working copy. Each op gets a status:
//        - 'success'      — applied successfully
//        - 'cancelled'    — target tx no longer exists (was already deleted)
//        - 'retry-later'  — target tx exists but its data has drifted from
//                            the snapshot in op.before (concurrent edit by
//                            someone else); the user should review and decide
//   3. Uploads the final working copy back to OneDrive
//   4. Returns the per-op results so the caller can show a summary and move
//      successful/cancelled ops into the user's history bucket.
//
// Drift detection (the heart of the system): for edit/delete, we compare the
// CURRENT row in my-money.json against op.before. If they differ on any
// non-trivial field, we know someone else has edited that row in the
// meantime, and we mark the op 'retry-later' rather than blindly overwriting
// their changes.
// v5.23 Phase 5a: per-resource drift detection. Different resources have
// different "meaningful" fields — comparing an account row using tx fields
// would always say "drift" because the fields don't exist. The field lists
// here capture what each resource's identity meaningfully consists of, so
// drift means "someone changed something a user would care about".
const RESOURCE_DRIFT_FIELDS = {
  tx:       ['type', 'amount', 'item', 'payee', 'note', 'category',
             'project', 'accountName', 'date'],
  // Accounts: name + decimal config + the per-user permissions blob.
  // (createdBy isn't editable so we leave it out.)
  account:  ['name', 'decimals', 'unitSymbol', 'unitPosition', 'createdBy'],
  // Master items/projects/categories are mostly just names. Categories
  // also carry an emoji/icon and a type (income/expense).
  item:     ['name'],
  project:  ['name'],
  category: ['name', 'icon', 'type'],
  // Users: label, role, icon. We deliberately DO NOT include pinSalt/pinHash
  // here — PIN changes go through a separate flow (changeUserPin) and
  // comparing hashes shouldn't gate other edits.
  user:     ['label', 'role', 'icon'],
};

function rowsEqualForDrift(a, b, resource = 'tx') {
  if (!a || !b) return a === b;
  const fields = RESOURCE_DRIFT_FIELDS[resource] || RESOURCE_DRIFT_FIELDS.tx;
  for (const f of fields) {
    const av = a[f] == null ? '' : a[f];
    const bv = b[f] == null ? '' : b[f];
    // Nested object compare (e.g. account.permissions {abi:{view:true,...}}).
    // JSON.stringify is overkill in theory but cheap in practice for the
    // small objects we deal with, and avoids a deep-equal dependency.
    if (typeof av === 'object' || typeof bv === 'object') {
      if (JSON.stringify(av) !== JSON.stringify(bv)) return false;
    } else if (av !== bv) {
      return false;
    }
  }
  return true;
}

// v5.23 Phase 5a: maps each resource type to the vault's collection key
// where its rows live. tx → vault.transactions, account → vault.accounts,
// etc. Used by applyOpsToVault to look up the right array without a
// chain of if/else.
const RESOURCE_VAULT_KEY = {
  tx:       'transactions',
  account:  'accounts',
  item:     'items',
  project:  'projects',
  category: 'categories',
  user:     'users',
};

async function applyOpsToVault(operations) {
  if (!Array.isArray(operations) || operations.length === 0) {
    return { results: [], finalState: null, applied: 0, cancelled: 0, retry: 0 };
  }

  // 1) Download the latest my-money.json. We MUST work on the freshest copy
  //    so concurrent edits from other users (made before they entered the
  //    queue, or from this user from another device) are visible during
  //    drift detection.
  const remote = await remoteFetch();
  const vault = remote || {
    transactions: [], items: [], accounts: [], projects: [],
    categories: [], users: [], lastModified: null,
  };
  // Make sure every collection we might touch exists as an array (older
  // vaults may not have e.g. `projects` or `categories` at all).
  for (const key of Object.values(RESOURCE_VAULT_KEY)) {
    if (!Array.isArray(vault[key])) vault[key] = [];
  }

  // 2) Walk operations IN ORDER. Each op transforms `vault` in place. The
  //    op's `resource` field tells us which collection to touch; if it's
  //    missing (legacy ops written before Phase 5a) we default to 'tx' for
  //    backwards compatibility.
  const results = [];
  for (const op of operations) {
    let status = 'success';
    let reason = null;
    const resource = op.resource || 'tx';
    const collKey = RESOURCE_VAULT_KEY[resource];

    if (!collKey) {
      // Unknown resource — defensively cancel rather than corrupting vault.
      status = 'cancelled';
      reason = 'ไม่รู้จัก resource: ' + resource;
      results.push({ opId: op.id, resource, action: op.action, status, reason });
      continue;
    }
    const coll = vault[collKey];

    if (op.action === 'add') {
      // Always succeed — duplicate ids are theoretically possible but our
      // `uid()` generator makes collisions astronomically unlikely. We put
      // tx at the FRONT (newest first, matches existing app behaviour) but
      // master-list rows at the END (preserves their natural creation order).
      if (resource === 'tx') coll.unshift(op.after);
      else coll.push(op.after);
    } else if (op.action === 'edit') {
      const idx = coll.findIndex(r => r.id === op.before?.id);
      if (idx === -1) {
        status = 'cancelled';
        reason = 'รายการต้นฉบับถูกลบแล้ว';
      } else if (!rowsEqualForDrift(coll[idx], op.before, resource)) {
        status = 'retry-later';
        reason = 'มีการแก้ไขจากอุปกรณ์อื่นก่อน';
      } else {
        coll[idx] = { ...op.after };
      }
    } else if (op.action === 'delete') {
      const idx = coll.findIndex(r => r.id === op.before?.id);
      if (idx === -1) {
        status = 'cancelled';
        reason = 'รายการถูกลบไปแล้ว';
      } else if (!rowsEqualForDrift(coll[idx], op.before, resource)) {
        status = 'retry-later';
        reason = 'มีการแก้ไขจากอุปกรณ์อื่นก่อน';
      } else {
        coll.splice(idx, 1);
      }
    } else {
      status = 'cancelled';
      reason = 'ไม่รู้จัก action: ' + op.action;
    }

    results.push({ opId: op.id, resource, action: op.action, status, reason });
  }

  // 3) Upload. We use force:true because we hold the Q.json lock — that's
  //    the source of truth for "who can write right now" in the new world.
  await remoteSave(vault, { force: true });

  // 4) v5.21 follow-up: Photo cleanup. When a delete-tx succeeds, or an
  //    edit-tx removes some photos from a tx's photos[] array, those photo
  //    files are now orphaned in OneDrive (and in our IndexedDB cache).
  //    Walk the just-applied successful ops to figure out which photoIds
  //    are no longer referenced by ANY transaction in the freshly-saved
  //    vault, then delete them from cloud + cache.
  //
  //    Why "fresh vault" matters: another user might still be referencing
  //    the same photoId from a different tx (rare in practice — uploadPhoto
  //    creates a new id each time — but worth the safety check, especially
  //    after duplicate-tx flows that may copy photos refs).
  //
  //    We deliberately do this AFTER remoteSave() so a network failure on
  //    the photo delete step doesn't leave the vault unsaved. Failed photo
  //    deletes are logged but do NOT throw — the user's data write is
  //    already committed, and an orphaned photo is a leak, not a corruption.
  const orphanedPhotoIds = collectOrphanedPhotoIds(operations, results, vault);
  for (const photoId of orphanedPhotoIds) {
    try {
      await deletePhoto(photoId);
    } catch (e) {
      console.warn('orphaned photo delete failed for', photoId, e);
    }
  }

  const counts = results.reduce((acc, r) => {
    acc[r.status] = (acc[r.status] || 0) + 1;
    return acc;
  }, {});
  return {
    results,
    finalState: vault,
    applied:   counts['success']      || 0,
    cancelled: counts['cancelled']    || 0,
    retry:     counts['retry-later']  || 0,
    orphanedPhotos: orphanedPhotoIds.length,
  };
}

// Helper for applyOpsToVault step 4. Returns the list of photoIds that were
// referenced by op.before but are no longer referenced by ANY tx in the
// final vault. Only counts ops whose result was 'success' — retry-later or
// cancelled ops didn't actually mutate the vault, so their photos must be
// preserved (they may still be referenced once the user retries).
function collectOrphanedPhotoIds(operations, results, finalVault) {
  // Build the set of "candidate" photoIds — anything that COULD have become
  // orphaned this round.
  const candidates = new Set();
  for (let i = 0; i < operations.length; i++) {
    const op = operations[i];
    const result = results[i];
    if (!result || result.status !== 'success') continue;

    if (op.action === 'delete') {
      // Whole tx removed → all its photos become candidates.
      const photos = (op.before && Array.isArray(op.before.photos)) ? op.before.photos : [];
      for (const p of photos) {
        if (p && p.id) candidates.add(p.id);
      }
      // Legacy v1.3 single-photo shape — keep it covered too.
      if (op.before && op.before.photoId) candidates.add(op.before.photoId);
    } else if (op.action === 'edit') {
      // Photos that were on the row before but are not on the row after.
      const beforePhotos = (op.before && Array.isArray(op.before.photos)) ? op.before.photos : [];
      const afterPhotos  = (op.after  && Array.isArray(op.after.photos))  ? op.after.photos  : [];
      const afterIds = new Set(afterPhotos.map(p => p && p.id).filter(Boolean));
      for (const p of beforePhotos) {
        if (p && p.id && !afterIds.has(p.id)) candidates.add(p.id);
      }
      // Legacy: single photoId removed by an edit
      if (op.before && op.before.photoId &&
          !(op.after && op.after.photoId === op.before.photoId)) {
        candidates.add(op.before.photoId);
      }
    }
  }

  if (candidates.size === 0) return [];

  // Build the set of photoIds STILL referenced anywhere in the saved vault.
  // Anything not in this set is a true orphan and safe to delete.
  const stillUsed = new Set();
  for (const tx of (finalVault?.transactions || [])) {
    if (Array.isArray(tx.photos)) {
      for (const p of tx.photos) {
        if (p && p.id) stillUsed.add(p.id);
      }
    } else if (tx.photoId) {
      stillUsed.add(tx.photoId); // legacy v1.3 single-photo shape
    }
  }

  return [...candidates].filter(id => !stillUsed.has(id));
}

// Move just-deployed ops out of `operations` into `history`. Retry-later
// ops stay active; success/cancelled go to history (capped at 100 newest).
async function commitDeployResults(userId, results) {
  if (!userId || !Array.isArray(results) || results.length === 0) return;
  const doc = await idbGetUserOps(userId);
  const resultByOpId = new Map(results.map(r => [r.opId, r]));

  const deployed = [];
  const stillPending = [];
  for (const op of doc.operations) {
    const r = resultByOpId.get(op.id);
    if (r) {
      deployed.push({
        ...op,
        status: r.status,
        reason: r.reason || null,
        deployedAt: new Date().toISOString(),
      });
    } else {
      stillPending.push(op);
    }
  }

  // 'retry-later' stays active (but tagged with reason for the UI). Other
  // statuses go to history.
  const retryOps = deployed.filter(d => d.status === 'retry-later');
  const finalOps = deployed.filter(d => d.status !== 'retry-later');

  doc.operations = [...stillPending, ...retryOps.map(r => {
    const { deployedAt, status, ...rest } = r;
    return rest;
  })];
  doc.history = [...finalOps, ...(doc.history || [])].slice(0, 100);
  await idbPutUserOps(userId, doc);
}

// ========== v5.20 Phase 2: Q.json — distributed queue file ==========
// Q.json sits next to my-money.json in the OneDrive app folder. It tracks
// who is currently editing the shared vault, who's waiting in line, and
// when each lock holder last sent a heartbeat. Schema:
//
//   {
//     queue: [
//       {
//         userId:    'abi',
//         userLabel: 'อาบี',
//         timestamp: '2026-05-07T04:23:45.678Z',
//         txOrderId: 1715055825678123,           // tie-breaker if two users
//                                                // have the exact same ms
//         status:    'waiting' | 'editing',
//         opCount:   5,                          // how many ops they'll deploy
//         heartbeat: '2026-05-07T04:23:50.123Z', // updated every 10s while editing
//         acquiredAt:'2026-05-07T04:23:48.001Z'  // when status flipped to editing
//       }
//     ],
//     lastModified: '2026-05-07T04:23:45.678Z'
//   }
//
// IMPORTANT: this is a separate file from my-money.json. We never put queue
// state inside the main vault, because the queue is metadata about WHO can
// write it, not vault content. Putting them together would create a chicken-
// and-egg problem (you'd need to acquire a lock to write the lock file).
//
// Lock semantics (the contract):
//
//   * Adding yourself to the queue with status='waiting' is permitted at any
//     time — it only requires that the file's optimistic-lock check passes.
//   * Promoting yourself to 'editing' requires that you ARE the queue head
//     after sorting by (timestamp asc, txOrderId asc) AND no one else has
//     status='editing'. If two clients both promote at once, a re-validation
//     pass detects it: whichever's timestamp is later demotes back to
//     'waiting'.
//   * While editing, you must update `heartbeat` every 10 seconds. Other
//     clients treat any 'editing' entry whose heartbeat is older than 30s
//     as dead, and may evict it (move it out of the queue) so the next
//     waiter can proceed.
//   * Releasing the lock means removing your entry from the queue entirely.
//
// All Q.json mutations use OneDrive ETag-based optimistic locking so that
// two clients writing concurrently don't silently overwrite each other.

const Q_FILE_NAME = 'Q.json';
const Q_FILE_PATH = `/me/drive/special/approot:/${Q_FILE_NAME}:/content`;
const Q_META_PATH = `/me/drive/special/approot:/${Q_FILE_NAME}`;
const HEARTBEAT_INTERVAL_MS = 10000;  // 10s — how often the editor refreshes its heartbeat
const LEASE_TIMEOUT_MS      = 30000;  // 30s — after this, an editor is considered dead

// Default empty Q.json document.
function emptyQDoc() {
  return { queue: [], lastModified: new Date().toISOString() };
}

// Fetch Q.json AND its ETag (we need the ETag for optimistic locking on PUT).
// Returns { doc, etag } where doc is emptyQDoc() if the file doesn't exist
// yet (HTTP 404 — first run on a fresh OneDrive). We use a single Graph call
// that returns both metadata and content via the ":/content" form, but the
// ETag actually lives on the file metadata, not the content endpoint, so we
// make one extra call. The cost is ~150ms; an acceptable tax for safety.
async function qFetch() {
  const token = await getToken();
  // Try content first — if it 404s we know we need to bootstrap.
  const res = await fetch(GRAPH_URL(Q_FILE_PATH), {
    headers: { Authorization: `Bearer ${token}` },
  });
  if (res.status === 404) return { doc: emptyQDoc(), etag: null };
  if (!res.ok) throw new Error(`Q load ${res.status}`);
  const doc = await res.json();
  // Now fetch the ETag from metadata. We grab only the eTag field to keep
  // the response tiny.
  const metaRes = await fetch(GRAPH_URL(`${Q_META_PATH}?$select=eTag`), {
    headers: { Authorization: `Bearer ${token}` },
  });
  let etag = null;
  if (metaRes.ok) {
    const meta = await metaRes.json();
    etag = meta.eTag || null;
  }
  // Defensive: ensure the doc actually has the shape we expect. Forgiving
  // parsing — if someone (or a previous bug) wrote a malformed Q.json,
  // we recover with an empty queue rather than throwing.
  if (!doc || !Array.isArray(doc.queue)) {
    return { doc: emptyQDoc(), etag };
  }
  return { doc, etag };
}

// Save Q.json with optimistic locking. The caller passes the etag they got
// from qFetch(); if the remote file has been modified since then (etag
// mismatch), Graph returns 412 Precondition Failed and we throw
// QError('CONFLICT'). Callers handle CONFLICT by re-fetching and retrying.
class QError extends Error {
  constructor(code, message) { super(message || code); this.code = code; }
}

async function qSave(doc, etag) {
  const stamped = { ...doc, lastModified: new Date().toISOString() };
  const token = await getToken();
  const headers = {
    Authorization: `Bearer ${token}`,
    'Content-Type': 'application/json',
  };
  // If we have an etag (file existed when we read it), require it to still
  // match. If we don't have one (file didn't exist), require the file to
  // STILL not exist using If-None-Match: *.
  if (etag) {
    headers['If-Match'] = etag;
  } else {
    headers['If-None-Match'] = '*';
  }
  const res = await fetch(GRAPH_URL(Q_FILE_PATH), {
    method: 'PUT',
    headers,
    body: JSON.stringify(stamped),
  });
  if (res.status === 412) {
    throw new QError('CONFLICT', 'Q.json was modified by another device');
  }
  if (!res.ok) {
    const t = await res.text();
    throw new QError('SAVE_FAILED', `Q save ${res.status}: ${t.slice(0,120)}`);
  }
  // The PUT response contains the new file metadata including the new etag,
  // which the caller can chain into the next save without re-fetching.
  const newMeta = await res.json();
  return { etag: newMeta.eTag || null };
}

// High-level helper: read-modify-write Q.json with automatic conflict retry.
// `mutator` is a synchronous function that takes the current doc and returns
// the new doc; if it returns null/undefined we treat that as a no-op cancel.
// We retry up to maxAttempts times on CONFLICT — concurrent writes from
// other devices are common and shouldn't surface as errors to the user.
async function qMutate(mutator, maxAttempts = 5) {
  let lastError = null;
  for (let attempt = 0; attempt < maxAttempts; attempt++) {
    const { doc, etag } = await qFetch();
    const next = mutator(doc);
    if (!next) return doc; // mutator decided to cancel; return current doc unchanged
    try {
      await qSave(next, etag);
      return next;
    } catch (e) {
      if (e.code === 'CONFLICT') {
        lastError = e;
        // Brief backoff before retry — random jitter (50-150ms) reduces the
        // chance that two retrying clients keep colliding in lockstep.
        await new Promise(r => setTimeout(r, 50 + Math.random() * 100));
        continue;
      }
      throw e;
    }
  }
  throw lastError || new QError('CONFLICT', 'too many retries');
}

// ----- Queue helpers (pure functions over a queue array) -----

// Sort the queue by (timestamp asc, txOrderId asc). The head of this sorted
// array is whoever should hold the lock next.
function qSortQueue(q) {
  return [...q].sort((a, b) => {
    if (a.timestamp !== b.timestamp) return a.timestamp < b.timestamp ? -1 : 1;
    return (a.txOrderId || 0) - (b.txOrderId || 0);
  });
}

// Evict any 'editing' entries whose heartbeat is too old. This is what
// allows the queue to recover from a dead client (browser crash, tab close,
// Chrome freeze that lasts > LEASE_TIMEOUT_MS, etc.).
function qEvictDead(queue, now = Date.now()) {
  return queue.filter(entry => {
    if (entry.status !== 'editing') return true;
    const hb = entry.heartbeat ? Date.parse(entry.heartbeat) : 0;
    return (now - hb) < LEASE_TIMEOUT_MS;
  });
}

// v5.29 Phase 4: emergency "wipe the queue" for the admin. Use cases:
//   * Q.json got corrupted somehow (e.g. someone hand-edited it on OneDrive
//     and it's no longer valid JSON).
//   * A lock got stuck because the device that held it crashed AND the
//     LEASE_TIMEOUT eviction isn't kicking in (shouldn't happen by design,
//     but the safety valve is here just in case).
//   * Concurrent retries on Q.json saves are looping and the admin wants
//     to break the cycle.
// This force-overwrites Q.json with an empty queue, ignoring any existing
// etag (we use If-Match: * which matches any version). It does NOT touch
// my-money.json or any user's userx.json — those are independent.
async function qReset() {
  const token = await getToken();
  const empty = { queue: [], lastModified: new Date().toISOString() };
  const res = await fetch(GRAPH_URL(Q_FILE_PATH), {
    method: 'PUT',
    headers: {
      Authorization: `Bearer ${token}`,
      'Content-Type': 'application/json',
      // No If-Match — we want this to overwrite unconditionally. We could
      // omit the header entirely, but being explicit makes the intent clear.
    },
    body: JSON.stringify(empty),
  });
  if (!res.ok) {
    const t = await res.text();
    throw new Error(`Q reset ${res.status}: ${t.slice(0, 120)}`);
  }
  return empty;
}

// ========== v5.29 Phase 4: Orphan photo scan (background sweeper) ==========
//
// Inline cleanup (Phase 3+ in applyOpsToVault) handles photos that are
// orphaned BY a deploy — i.e. a successful delete or an edit that drops
// some photos[]. But that doesn't cover every leak path:
//
//   * Smart merge in appendUserOp drops an op_add for a tx whose delete op
//     was just appended. The original tx never reaches OneDrive, but its
//     photos were already uploaded by uploadPhoto() during the add flow.
//   * Older versions of the app (pre v5.22) didn't have inline cleanup at
//     all, so any history of edits/deletes left photos behind.
//   * Photos uploaded then never attached to any tx (user picked the wrong
//     receipt then closed the sheet without saving).
//   * Local IDB cache holds photos for tx that have since been deleted
//     elsewhere — the cache will eventually expire but we can clean
//     proactively.
//
// scanOrphanedPhotos walks both stores, cross-references with the current
// my-money.json, and returns the orphan ids. The caller decides whether
// to delete them (we recommend a confirm dialog — the user might have
// pending uploads that aren't in the vault YET).

// List every photo file under /Apps/<approot>/photos/ in OneDrive.
// Returns array of { id, name, size }. Pages through `@odata.nextLink` so
// vaults with many photos still work.
async function listOneDrivePhotos() {
  const token = await getToken();
  // We only need id+name+size — keep the response small. Page size 200
  // (Graph default is 200; max useful for our purposes).
  let url = GRAPH_URL(`/me/drive/special/approot:/photos:/children?$select=id,name,size&$top=200`);
  const out = [];
  // Safety guard: cap at 50 pages (10000 photos) so a corrupted server
  // response can't loop forever.
  for (let page = 0; page < 50; page++) {
    const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
    if (res.status === 404) {
      // photos folder doesn't exist yet — empty result is correct here.
      return [];
    }
    if (!res.ok) {
      throw new Error(`list photos ${res.status}`);
    }
    const data = await res.json();
    const values = Array.isArray(data.value) ? data.value : [];
    for (const v of values) {
      if (v.id) out.push({ id: v.id, name: v.name, size: v.size || 0 });
    }
    const next = data['@odata.nextLink'];
    if (!next) break;
    url = next; // Graph returns a fully-qualified URL for next pages.
  }
  return out;
}

// Walk every tx in the vault and collect every photoId referenced (covering
// both v1.4 photos[] and legacy v1.3 single photoId). Plus any pending ops
// the user has — we don't want to delete a photo just because its tx hasn't
// been deployed yet.
function collectReferencedPhotoIds(vault, pendingOps = []) {
  const refs = new Set();
  for (const tx of (vault?.transactions || [])) {
    if (Array.isArray(tx.photos)) {
      for (const p of tx.photos) if (p && p.id) refs.add(p.id);
    } else if (tx.photoId) {
      refs.add(tx.photoId);
    }
  }
  // Pending ops carry full snapshots — include any photoIds from their
  // before/after so we don't sweep photos that the user is about to write.
  for (const op of pendingOps) {
    const consider = (rec) => {
      if (!rec) return;
      if (Array.isArray(rec.photos)) {
        for (const p of rec.photos) if (p && p.id) refs.add(p.id);
      } else if (rec.photoId) {
        refs.add(rec.photoId);
      }
    };
    consider(op.before);
    consider(op.after);
  }
  return refs;
}

// The actual scan. Returns:
//   {
//     cloud:    { orphanIds:[...], totalBytes:N, totalCount:N },
//     local:    { orphanIds:[...], totalCount:N },
//     scannedAt: ISO,
//   }
//
// The caller can then call deleteOrphans(...) to remove them, or just
// display the numbers.
async function scanOrphanedPhotos({ pendingOps = [] } = {}) {
  // 1) Fresh vault from OneDrive. We do NOT use local state — the scan is
  //    a sanity check against truth, not local optimism.
  const vault = await remoteFetch();
  const referenced = collectReferencedPhotoIds(vault || {}, pendingOps);

  // 2) Cloud orphans: anything in /photos/ that isn't referenced.
  let cloudOrphans = [];
  let cloudBytes = 0;
  let cloudCount = 0;
  try {
    const cloud = await listOneDrivePhotos();
    cloudCount = cloud.length;
    for (const f of cloud) {
      if (!referenced.has(f.id)) {
        cloudOrphans.push({ id: f.id, name: f.name, size: f.size });
        cloudBytes += (f.size || 0);
      }
    }
  } catch (e) {
    console.warn('cloud photo scan failed:', e);
  }

  // 3) Local cache orphans: anything in IDB whose id isn't referenced.
  //    NOTE: photoIds that start with 'local-' are pending uploads that
  //    haven't reached OneDrive yet — never sweep those.
  let localOrphans = [];
  let localCount = 0;
  try {
    const cached = await idbListPhotoIds();
    localCount = cached.length;
    for (const id of cached) {
      if (typeof id !== 'string') continue;
      if (id.startsWith('local-')) continue; // pending upload
      if (!referenced.has(id)) localOrphans.push(id);
    }
  } catch (e) {
    console.warn('local cache scan failed:', e);
  }

  return {
    cloud: { orphanIds: cloudOrphans, totalBytes: cloudBytes, totalCount: cloudCount },
    local: { orphanIds: localOrphans, totalCount: localCount },
    referencedCount: referenced.size,
    scannedAt: new Date().toISOString(),
  };
}

// Delete the orphans returned by scanOrphanedPhotos. Cloud deletes use the
// existing deletePhoto() (which also clears the local cache entry). Local-
// only orphans (in cache but with no matching cloud file) need a direct
// idbDeleteBlob. We tolerate per-photo failures so a single bad delete
// doesn't block the rest.
async function deleteOrphans(orphans) {
  let cloudOk = 0, cloudFail = 0, localOk = 0, localFail = 0;
  const cloudIds = (orphans?.cloud?.orphanIds || []).map(o => o.id);
  const localIds = orphans?.local?.orphanIds || [];

  for (const id of cloudIds) {
    try {
      await deletePhoto(id); // also clears local cache for this id
      cloudOk++;
    } catch (e) {
      console.warn('delete cloud orphan failed:', id, e);
      cloudFail++;
    }
  }
  // For local-only orphans (no matching cloud file), only nuke the cache.
  for (const id of localIds) {
    if (cloudIds.includes(id)) continue; // already handled above
    try {
      await idbDeleteBlob(id);
      localOk++;
    } catch (e) {
      console.warn('delete local orphan failed:', id, e);
      localFail++;
    }
  }
  return { cloudOk, cloudFail, localOk, localFail };
}

// ========== Local photo store (IndexedDB) ==========
// v3.5: bumped to v2 — added 'pending' store for offline uploads queue
// v5.19: bumped to v3 — added 'pending_ops' store for userx.json (Phase 1
//        of the lock-based sync system). The store holds a single record
//        keyed by user.id; each record is the userx.json document with
//        { operations[], history[] }. This is per-device — one user with
//        two devices will have two independent userx.json's, which matches
//        the user's intent: they want device-level batches that get
//        explicitly deployed via the Deploy button.
const IDB_NAME = 'mymoney-photos';
const IDB_STORE = 'photos';        // cached photos: key = OneDrive ID, value = Blob
const IDB_PENDING = 'pending';     // queued uploads: key = local-temp-id, value = { blob, txId, name, createdAt }
const IDB_USEROPS = 'pending_ops'; // v5.19: per-user pending operation log; key = userId, value = { operations[], history[] }
let _idbPromise = null;
function openDB() {
  if (_idbPromise) return _idbPromise;
  _idbPromise = new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, 3); // v5.19: bumped to 3 for IDB_USEROPS
    req.onupgradeneeded = (e) => {
      const db = req.result;
      if (!db.objectStoreNames.contains(IDB_STORE)) {
        db.createObjectStore(IDB_STORE); // key = photoId (OneDrive ID)
      }
      if (!db.objectStoreNames.contains(IDB_PENDING)) {
        db.createObjectStore(IDB_PENDING); // key = local-temp-id, value = { blob, txId, name }
      }
      if (!db.objectStoreNames.contains(IDB_USEROPS)) {
        db.createObjectStore(IDB_USEROPS); // v5.19: key = userId, value = { operations[], history[] }
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
  return _idbPromise;
}
async function idbPutBlob(key, blob) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).put(blob, key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}
async function idbGetBlob(key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, 'readonly');
    const req = tx.objectStore(IDB_STORE).get(key);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = () => reject(req.error);
  });
}
async function idbDeleteBlob(key) {
  try {
    const db = await openDB();
    return new Promise((resolve) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).delete(key);
      tx.oncomplete = () => resolve();
      tx.onerror = () => resolve();
    });
  } catch { /* ignore */ }
}
// v3.5: list all photo IDs currently cached locally
async function idbListPhotoIds() {
  try {
    const db = await openDB();
    return new Promise((resolve) => {
      const tx = db.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).getAllKeys();
      req.onsuccess = () => resolve(Array.isArray(req.result) ? req.result : []);
      req.onerror = () => resolve([]);
    });
  } catch { return []; }
}
// v3.5: estimate total cached size (sum of blob sizes)
async function idbCacheSize() {
  try {
    const db = await openDB();
    return new Promise((resolve) => {
      const tx = db.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).getAll();
      req.onsuccess = () => {
        const blobs = req.result || [];
        const total = blobs.reduce((sum, b) => sum + (b.size || 0), 0);
        resolve({ count: blobs.length, bytes: total });
      };
      req.onerror = () => resolve({ count: 0, bytes: 0 });
    });
  } catch { return { count: 0, bytes: 0 }; }
}

// v3.5: pending uploads queue (offline mode)
async function idbAddPending(localId, payload) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_PENDING, 'readwrite');
    tx.objectStore(IDB_PENDING).put(payload, localId);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}
async function idbGetPending(localId) {
  const db = await openDB();
  return new Promise((resolve) => {
    const tx = db.transaction(IDB_PENDING, 'readonly');
    const req = tx.objectStore(IDB_PENDING).get(localId);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = () => resolve(null);
  });
}
async function idbDeletePending(localId) {
  try {
    const db = await openDB();
    return new Promise((resolve) => {
      const tx = db.transaction(IDB_PENDING, 'readwrite');
      tx.objectStore(IDB_PENDING).delete(localId);
      tx.oncomplete = () => resolve();
      tx.onerror = () => resolve();
    });
  } catch {}
}
async function idbListPending() {
  try {
    const db = await openDB();
    return new Promise((resolve) => {
      const tx = db.transaction(IDB_PENDING, 'readonly');
      const req = tx.objectStore(IDB_PENDING).getAll();
      const reqKeys = tx.objectStore(IDB_PENDING).getAllKeys();
      const out = [];
      tx.oncomplete = () => {
        const values = req.result || [];
        const keys = reqKeys.result || [];
        for (let i = 0; i < keys.length; i++) out.push({ localId: keys[i], ...values[i] });
        resolve(out);
      };
      tx.onerror = () => resolve([]);
    });
  } catch { return []; }
}

// ========== v5.19 Phase 1: userx.json (pending operation log) ==========
// Per-device, per-user log of changes the user has made but hasn't deployed
// yet. Each record is keyed by user.id and looks like:
//
//   {
//     userId: 'abi',
//     operations: [          ← active queue (will be deployed)
//       { id: 'op_001', action: 'add'|'edit'|'delete',
//         before: <tx snapshot or null>,
//         after:  <tx snapshot or null>,
//         status: 'pending',
//         ts: ISO string },
//       ...
//     ],
//     history: [             ← deployed ops, capped at 100 newest
//       { ...same shape, status: 'success'|'cancelled'|'retry-later',
//         deployedAt: ISO string },
//       ...
//     ]
//   }
//
// IMPORTANT: this lives in IndexedDB on the device only — it never gets
// uploaded to OneDrive. That means a user with two devices has two separate
// userx.json's, which is intentional: each device has its own batch that the
// user explicitly deploys with the Deploy button.

// Default empty document for a user we haven't seen before.
function emptyUserOpsDoc(userId) {
  return { userId, operations: [], history: [] };
}

// Generate a fresh op id. We use a short ulid-like pattern (timestamp+random)
// because op_ids only need to be unique within a single device's userx.json
// — they don't sync, so they don't need to be globally unique.
function newOpId() {
  return 'op_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

async function idbGetUserOps(userId) {
  if (!userId) return emptyUserOpsDoc('anonymous');
  try {
    const db = await openDB();
    return new Promise((resolve) => {
      const tx = db.transaction(IDB_USEROPS, 'readonly');
      const req = tx.objectStore(IDB_USEROPS).get(userId);
      tx.oncomplete = () => {
        const v = req.result;
        if (v && Array.isArray(v.operations) && Array.isArray(v.history)) resolve(v);
        else resolve(emptyUserOpsDoc(userId));
      };
      tx.onerror = () => resolve(emptyUserOpsDoc(userId));
    });
  } catch {
    return emptyUserOpsDoc(userId);
  }
}

async function idbPutUserOps(userId, doc) {
  if (!userId) return;
  try {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_USEROPS, 'readwrite');
      tx.objectStore(IDB_USEROPS).put(doc, userId);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  } catch (e) {
    console.error('idbPutUserOps failed:', e);
  }
}

// Append a new pending operation. If the user is creating an op that targets
// a tx that already has a pending op of their own (e.g. they edit an item
// they just added but haven't deployed yet), we MERGE rather than append —
// this matches the user's spec from the conversation: "ลบ op เดิม" /
// "update op_edit.after เป็น value ใหม่". Concretely:
//
//   action=add → no merge possible (new tx, no existing op to merge with)
//
//   action=edit on a tx that has pending add  → mutate that add's `after`
//     so the deployed result already reflects the latest edit.
//   action=edit on a tx that has pending edit → update that edit's `after`
//     (keep the original `before`, which captures the pre-edit state).
//
//   action=delete on a tx that has pending add  → DROP the add entirely.
//     The user adds and then immediately removes — net effect is nothing to
//     deploy, so we cancel the add. (User confirmed this in conversation.)
//   action=delete on a tx that has pending edit → replace the edit with a
//     delete (keep `before` from the edit so the apply step can verify the
//     row hasn't drifted on the server).
async function appendUserOp(userId, op) {
  const doc = await idbGetUserOps(userId);
  // v5.23 Phase 5a: every op now has a resource (default 'tx' for older
  // ops). Merging only happens between ops on the SAME (resource, id) —
  // an account-add and a tx-add with the same id field would not (and
  // SHOULD not) merge, even on the absurd off-chance their generated ids
  // collided.
  const opResource = op.resource || 'tx';
  const targetId =
    op.action === 'add'    ? op.after?.id  :
    op.action === 'edit'   ? (op.after?.id || op.before?.id) :
    op.action === 'delete' ? op.before?.id :
    null;

  let merged = false;
  if (targetId) {
    for (let i = 0; i < doc.operations.length; i++) {
      const existing = doc.operations[i];
      const existingResource = existing.resource || 'tx';
      if (existingResource !== opResource) continue;
      const existingId =
        existing.action === 'add'    ? existing.after?.id  :
        existing.action === 'edit'   ? (existing.after?.id || existing.before?.id) :
        existing.action === 'delete' ? existing.before?.id :
        null;
      if (existingId !== targetId) continue;

      // Found a pending op for the same (resource, id) → merge per the rules.
      if (op.action === 'edit' && existing.action === 'add') {
        // Edit on a pending-add: update what we'll add.
        existing.after = op.after;
        existing.ts = op.ts;
        merged = true;
        break;
      }
      if (op.action === 'edit' && existing.action === 'edit') {
        // Edit-on-edit: keep the original `before` (so apply can still
        // verify drift against the server's pre-edit state), but the
        // latest `after` wins.
        existing.after = op.after;
        existing.ts = op.ts;
        merged = true;
        break;
      }
      if (op.action === 'delete' && existing.action === 'add') {
        // Add then delete on the same row = nothing to deploy. Drop the add.
        doc.operations.splice(i, 1);
        merged = true;
        break;
      }
      if (op.action === 'delete' && existing.action === 'edit') {
        // Edit then delete = just delete. Keep the original `before` so the
        // apply step can still verify the row hasn't drifted on the server.
        existing.action = 'delete';
        existing.after = null;
        existing.ts = op.ts;
        merged = true;
        break;
      }
      // Otherwise (e.g. add on a row that already has a pending add —
      // shouldn't happen since ids are unique) fall through to append.
    }
  }

  if (!merged) {
    doc.operations.push(op);
  }
  await idbPutUserOps(userId, doc);
  return doc;
}

// Remove a single pending op by its id. Used by the Manage Pending UI.
// If the user wanted cascade behaviour we'd also drop dependent ops here,
// but per their explicit decision we DON'T cascade — dependent ops fail at
// deploy time with status='cancelled' instead. Simpler logic, fewer surprises.
async function removeUserOp(userId, opId) {
  const doc = await idbGetUserOps(userId);
  const before = doc.operations.length;
  doc.operations = doc.operations.filter(o => o.id !== opId);
  if (doc.operations.length !== before) {
    await idbPutUserOps(userId, doc);
  }
  return doc;
}

// Clear all pending operations for a user (used by "ลบทั้งหมด" button and
// also by the deploy step once it has successfully recorded results in the
// history bucket). Does NOT clear history.
async function clearUserOps(userId) {
  const doc = await idbGetUserOps(userId);
  doc.operations = [];
  await idbPutUserOps(userId, doc);
  return doc;
}

// Upload photo: saves to BOTH OneDrive (/photos/) AND local IndexedDB.
// v3.5: if offline OR upload fails → queue for later (returns local-id-prefixed result)
async function uploadPhoto(file, txId) {
  // If offline, queue immediately
  if (!navigator.onLine) {
    return await queuePhotoForUpload(file, txId);
  }
  // Resize first
  const blob = await resizeImage(file, 1600, 0.82);
  const ext = (file.name.split('.').pop() || 'jpg').toLowerCase().replace(/[^a-z]/g, '') || 'jpg';
  const filename = `${txId}-${Date.now()}.${ext}`;
  try {
    const token = await getToken();
    const path = `/me/drive/special/approot:/photos/${filename}:/content`;
    const res = await fetch(GRAPH_URL(path), {
      method: 'PUT',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': blob.type || 'image/jpeg' },
      body: blob,
    });
    if (!res.ok) {
      // Network/auth error — fall back to queue rather than losing the photo
      console.warn(`Upload failed (${res.status}), queueing offline`);
      return await queuePhotoForUpload(file, txId);
    }
    const meta = await res.json();
    // Cache locally — keyed by OneDrive ID for later fast retrieval
    try { await idbPutBlob(meta.id, blob); } catch (e) { console.warn('local cache save failed', e); }
    return { id: meta.id, name: meta.name, size: meta.size };
  } catch (e) {
    console.warn('Upload error, queueing offline:', e);
    return await queuePhotoForUpload(file, txId);
  }
}

// Fetch photo URL: tries local IndexedDB first, falls back to OneDrive.
// v3.5: local-* IDs are pending uploads — never reach out to OneDrive for them.
async function fetchPhotoUrl(photoId) {
  // Try local first
  try {
    const blob = await idbGetBlob(photoId);
    if (blob) return URL.createObjectURL(blob);
  } catch {}
  // If this is a local-only ID and we don't have it, give up — it's not on cloud yet
  if (String(photoId).startsWith('local-')) {
    throw new Error('Pending upload not found in local cache');
  }
  // Fallback to OneDrive
  const token = await getToken();
  const res = await fetch(GRAPH_URL(`/me/drive/items/${photoId}/content`), {
    headers: { Authorization: `Bearer ${token}` },
  });
  if (!res.ok) throw new Error(`Photo fetch ${res.status}`);
  const blob = await res.blob();
  // Cache for next time
  try { await idbPutBlob(photoId, blob); } catch {}
  return URL.createObjectURL(blob);
}

// Delete photo from BOTH OneDrive and local cache.
// v3.5: handle local-* IDs that haven't been uploaded yet (no OneDrive call needed).
async function deletePhoto(photoId) {
  // Delete from local cache (always, even offline)
  idbDeleteBlob(photoId);
  // If pending, also remove from queue
  if (String(photoId).startsWith('local-')) {
    idbDeletePending(photoId);
    return;
  }
  // Delete from OneDrive
  try {
    const token = await getToken();
    await fetch(GRAPH_URL(`/me/drive/items/${photoId}`), {
      method: 'DELETE',
      headers: { Authorization: `Bearer ${token}` },
    });
  } catch (e) { console.warn('Photo delete failed:', e); }
}

// ========== v3.5: Offline mode helpers ==========

// Save a photo locally for later upload. Returns a synthetic local ID with
// "local-" prefix so the rest of the app can recognise it as not-yet-on-cloud.
async function queuePhotoForUpload(file, txId) {
  const blob = await resizeImage(file, 1600, 0.82);
  const localId = 'local-' + Math.random().toString(36).slice(2, 10) + '-' + Date.now();
  const ext = (file.name.split('.').pop() || 'jpg').toLowerCase().replace(/[^a-z]/g, '') || 'jpg';
  const name = `${txId}-${Date.now()}.${ext}`;
  // Store the blob in BOTH stores: photos (so it can be displayed by ID) and pending (queue)
  await idbPutBlob(localId, blob);
  await idbAddPending(localId, { txId, name, contentType: blob.type || 'image/jpeg', createdAt: new Date().toISOString() });
  return { id: localId, name, size: blob.size };
}

// Push all pending uploads to OneDrive. Updates state to swap local IDs → OneDrive IDs.
// Returns { uploaded, failed, skipped } counts. Caller should pass a `swapId` callback
// that will rewrite the photo ID inside transactions.
async function flushPendingUploads(swapId) {
  const pending = await idbListPending();
  let uploaded = 0, failed = 0;
  for (const item of pending) {
    try {
      const blob = await idbGetBlob(item.localId);
      if (!blob) { await idbDeletePending(item.localId); continue; }
      const token = await getToken();
      const path = `/me/drive/special/approot:/photos/${item.name}:/content`;
      const res = await fetch(GRAPH_URL(path), {
        method: 'PUT',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': item.contentType || 'image/jpeg' },
        body: blob,
      });
      if (!res.ok) { failed += 1; continue; }
      const meta = await res.json();
      // Re-key the cached blob from local-id → OneDrive id, so future fetches by OneDrive id hit cache
      try {
        await idbPutBlob(meta.id, blob);
        await idbDeleteBlob(item.localId);
      } catch {}
      await idbDeletePending(item.localId);
      // Tell the React layer to swap IDs in transactions
      try { swapId?.(item.localId, meta.id); } catch (e) { console.warn(e); }
      uploaded += 1;
    } catch (e) {
      console.warn('flush pending: one item failed', e);
      failed += 1;
    }
  }
  return { uploaded, failed, total: pending.length };
}

// Pre-cache: download every photo referenced in transactions[] that isn't already in IDB.
// Called in background after login. Reports progress through an optional callback.
async function preCacheAllPhotos(transactions, onProgress) {
  // Collect every OneDrive photo ID from transactions (skip local- ids)
  const ids = new Set();
  (transactions || []).forEach(t => {
    if (Array.isArray(t.photos)) {
      t.photos.forEach(p => { if (p?.id && !p.id.startsWith('local-')) ids.add(p.id); });
    } else if (t.photoId && !String(t.photoId).startsWith('local-')) {
      ids.add(t.photoId);
    }
  });
  if (ids.size === 0) { onProgress?.({ done: 0, total: 0, cached: 0 }); return { done: 0, total: 0 }; }

  const cached = new Set(await idbListPhotoIds());
  const missing = Array.from(ids).filter(id => !cached.has(id));
  const total = missing.length;
  let done = 0;
  onProgress?.({ done: 0, total, cached: cached.size });

  // Throttle: download one at a time to be gentle on bandwidth and Graph rate limits
  for (const id of missing) {
    try {
      const token = await getToken();
      const res = await fetch(GRAPH_URL(`/me/drive/items/${id}/content`), {
        headers: { Authorization: `Bearer ${token}` },
      });
      if (res.ok) {
        const blob = await res.blob();
        try { await idbPutBlob(id, blob); } catch {}
      }
    } catch (e) {
      // network blip — keep going; will retry next session
    }
    done += 1;
    onProgress?.({ done, total, cached: cached.size + done });
  }
  return { done, total };
}

// v3.5: clear all cached photos (frees space; OneDrive copies remain)
async function clearPhotoCache() {
  try {
    const db = await openDB();
    return new Promise((resolve) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).clear();
      tx.oncomplete = () => resolve();
      tx.onerror = () => resolve();
    });
  } catch {}
}

// ========== v2.9: Version archive system ==========
// Stores each new version of index.html in OneDrive /Apps/my money/versions/
// and maintains a CHANGELOG.md so user can audit & downgrade later.

const APP_VERSION = 'v5.30';
const APP_VERSION_TAG = 'หลัง deploy บังคับ refresh state จาก vault ใหม่เสมอ';

// Check whether a file exists in the app folder
async function odriveFileExists(path) {
  try {
    const token = await getToken();
    const res = await fetch(GRAPH_URL(`/me/drive/special/approot:/${path}`), {
      headers: { Authorization: `Bearer ${token}` },
    });
    return res.ok;
  } catch { return false; }
}

// PUT a text/binary blob to a path inside approot
async function odrivePutText(path, text, contentType = 'text/plain; charset=utf-8') {
  const token = await getToken();
  const res = await fetch(GRAPH_URL(`/me/drive/special/approot:/${path}:/content`), {
    method: 'PUT',
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': contentType },
    body: text,
  });
  if (!res.ok) {
    const t = await res.text();
    throw new Error(`PUT ${path} → ${res.status}: ${t.slice(0,120)}`);
  }
  return res.json();
}

async function odriveGetText(path) {
  try {
    const token = await getToken();
    const res = await fetch(GRAPH_URL(`/me/drive/special/approot:/${path}:/content`), {
      headers: { Authorization: `Bearer ${token}` },
    });
    if (!res.ok) return null;
    return await res.text();
  } catch { return null; }
}

// Archive THIS version of index.html into OneDrive (idempotent: skips if already there)
async function archiveVersionIfNeeded() {
  const archivePath = `versions/index-${APP_VERSION}.html`;
  const exists = await odriveFileExists(archivePath);
  if (exists) return { archived: false, reason: 'already-exists' };

  // Fetch current HTML from the running URL
  let html;
  try {
    const r = await fetch(window.location.href, { cache: 'no-store' });
    if (!r.ok) throw new Error(`fetch failed ${r.status}`);
    html = await r.text();
  } catch (e) {
    console.warn('archive: cannot fetch own HTML:', e);
    return { archived: false, reason: 'fetch-failed' };
  }

  // Save the snapshot
  await odrivePutText(archivePath, html, 'text/html; charset=utf-8');

  // Append to CHANGELOG.md (or create it)
  const now = new Date();
  const stamp = now.toISOString().replace('T', ' ').slice(0, 19) + ' UTC';
  const sizeKB = Math.round(html.length / 1024);
  const entryLines = [
    `## ${APP_VERSION} — ${APP_VERSION_TAG}`,
    `- Archived: ${stamp}`,
    `- Size: ${sizeKB} KB`,
    `- File: \`versions/index-${APP_VERSION}.html\``,
    ``,
  ];
  let existing = await odriveGetText('CHANGELOG.md');
  if (!existing) {
    existing = [
      '# my money — Version History',
      '',
      'This file is auto-generated by the app. Each new version of `index.html`',
      'is also archived under `versions/` so you can downgrade or audit changes.',
      '',
      'Most recent versions are listed at the top.',
      '',
    ].join('\n');
  }
  // Insert this version's entry at the top of the version log section.
  // Find the first "## " heading; insert before it. If none, append at end.
  const newEntry = entryLines.join('\n');
  const firstHeadingIdx = existing.search(/\n## /);
  let updated;
  if (firstHeadingIdx >= 0) {
    updated = existing.slice(0, firstHeadingIdx + 1) + newEntry + existing.slice(firstHeadingIdx + 1);
  } else {
    updated = existing + '\n' + newEntry;
  }
  await odrivePutText('CHANGELOG.md', updated, 'text/markdown; charset=utf-8');
  return { archived: true, sizeKB, stamp };
}


// Resize image using canvas (keeps aspect ratio, outputs JPEG)
function resizeImage(file, maxDim, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          if (width > height) { height = Math.round(height * maxDim / width); width = maxDim; }
          else { width = Math.round(width * maxDim / height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        canvas.toBlob((blob) => blob ? resolve(blob) : reject(new Error('blob failed')),
                      'image/jpeg', quality);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ========== Sync Hook ==========
function useSync(state, setState, isOnline) {
  // v5.15: expanded the status state machine to fix Gemini's diagnosis that
  // the old indicator could lie — it would show 'ok' (green) for the 2.5s
  // debounce window before the upload even started, so a user who closed
  // their tab during that window thought their data was safe when in fact
  // nothing had been sent yet. The new states make the contract explicit:
  //
  //   'idle'    — no pending change AND last save confirmed by Graph
  //   'pending' — local change exists but PUT hasn't gone out yet (debouncing,
  //               or sitting in a frozen tab); GREEN MUST NOT BE SHOWN HERE
  //   'syncing' — PUT in flight; awaiting Graph response
  //   'ok'      — Graph returned 200 for the most recent payload (the only
  //               state where green is honest)
  //   'offline' — navigator says we're offline
  //   'error'   — last attempt failed (errMsg has the reason)
  const [status, setStatus] = useState('idle');
  const [lastSync, setLastSync] = useState(null);
  const [errMsg, setErrMsg] = useState(null);
  const timerRef = useRef(null);
  const syncingRef = useRef(false);

  // v5.14: Track the last lastModified value we received from OneDrive.
  // This is the "expected" timestamp we send back during save — if the remote
  // file's timestamp has changed (someone else wrote), the save aborts so we
  // can pull-and-merge instead of clobbering. Lives in a ref so changes don't
  // re-trigger our debounce effects.
  const remoteBaselineRef = useRef(null);

  // v5.14: Until the very first pullOnce() resolves, we MUST NOT push our
  // local state up — at boot, local state is the empty default, and pushing
  // it would erase the remote vault on every fresh tab open. This was the
  // exact mechanism behind the May 2 data loss.
  const initialSyncDoneRef = useRef(false);

  // Build the full payload sent to OneDrive. Centralised so we don't forget any
  // top-level field (e.g. v5.0 added `users`).
  const buildPayload = (s) => ({
    app: 'my-money',
    version: 2, // bumped for v5.0 users schema (still readable by older versions which ignore unknown fields)
    lastModified: s.lastModified || new Date().toISOString(),
    transactions: s.transactions || [],
    items:        s.items || [],
    accounts:     s.accounts || [],
    projects:     s.projects || [],
    categories:   s.categories || [],
    users:        s.users || [],   // v5.0
  });

  // Initial pull
  const pullOnce = useCallback(async () => {
    if (!isOnline) { setStatus('offline'); return; }
    setStatus('syncing');
    try {
      const remote = await remoteFetch();
      if (remote && remote.transactions) {
        const remoteTime = remote.lastModified || '';
        const localTime = state.lastModified || '';
        // Update baseline regardless of which way we're going to sync —
        // it represents what we know the remote file's lastModified is.
        remoteBaselineRef.current = remoteTime || null;
        if (!localTime || remoteTime > localTime) {
          setState({
            transactions: remote.transactions,
            items:      remote.items || [],
            accounts:   remote.accounts || [],
            projects:   remote.projects || [],
            categories: remote.categories || [],
            users:      remote.users || [],  // v5.0
            lastModified: remoteTime,
          });
        } else if (localTime > remoteTime) {
          // push local up — this is the rare case where the user edited
          // offline and we're now reconnected. Pass the remote's timestamp
          // as the optimistic-lock baseline so we don't clobber a write
          // that landed in between.
          const result = await remoteSave(buildPayload(state), {
            expectedLastModified: remoteTime || null,
          });
          remoteBaselineRef.current = result?.lastModifiedDateTime || new Date().toISOString();
        }
      } else if (state.transactions.length > 0 || (state.items || []).length > 0 || (state.accounts || []).length > 0 || (state.projects || []).length > 0 || (state.categories || []).length > 0 || (state.users || []).length > 0) {
        // remote is empty but we have local data → push it. This is the
        // first-ever save for this account, so allow the empty-state guard
        // to be lenient (there's nothing to overwrite).
        const result = await remoteSave(buildPayload(state), { force: true });
        remoteBaselineRef.current = result?.lastModifiedDateTime || new Date().toISOString();
      }
      // v5.17: avoid the false-green race Gemini flagged. If a debounced push
      // is currently mid-flight (syncingRef is true), claiming 'ok' here would
      // briefly turn the indicator green even though the user's most recent
      // edit hasn't been confirmed yet. The pending push's own success/error
      // handler will set the final status — we just refrain from stomping on
      // it. lastSync still updates because the read itself is genuinely a
      // successful sync touch.
      if (!syncingRef.current) {
        setStatus('ok');
      }
      setLastSync(new Date());
      setErrMsg(null);
      initialSyncDoneRef.current = true;
    } catch (e) {
      console.error(e);
      setStatus('error');
      setErrMsg(String(e.message || e));
    }
  }, [isOnline, state, setState]);

  // Scheduled push (debounced on state change)
  const schedulePush = useCallback(() => {
    if (!isOnline) return;
    // v5.14: hold all pushes until the first pull has confirmed what's on the
    // server. Pushing a fresh empty state on top of a real vault is exactly
    // how data got nuked — the first tab to load on a slow network would
    // overwrite everything before the pull finished.
    if (!initialSyncDoneRef.current) return;

    // v5.15: Mark the indicator as 'pending' the instant a save is queued so
    // the green "ok" badge can never linger over an unsaved edit. The badge
    // only flips back to green after Graph confirms the PUT (see below).
    setStatus('pending');

    if (timerRef.current) clearTimeout(timerRef.current);
    timerRef.current = setTimeout(async () => {
      if (syncingRef.current) return;
      syncingRef.current = true;
      setStatus('syncing');
      try {
        const result = await remoteSave(buildPayload(state), {
          expectedLastModified: remoteBaselineRef.current,
        });
        // Update our baseline so subsequent saves don't false-positive on the
        // optimistic-lock check. We use our own stamp because Graph's response
        // lastModifiedDateTime occasionally lags the body we just wrote.
        remoteBaselineRef.current = new Date().toISOString();
        // v5.15: Only set 'ok' AFTER Graph returned 200. The contract: a
        // green light means the server has the data, not "we plan to send it".
        setStatus('ok');
        setLastSync(new Date());
        setErrMsg(null);
      } catch (e) {
        console.error(e);
        // Translate the v5.14 error codes into user-readable status messages.
        if (e && e.code === 'EMPTY_OVERWRITE_REFUSED') {
          setStatus('error');
          setErrMsg('ปลอดภัย: ปฏิเสธการเขียนข้อมูลว่างทับ — กรุณารีเฟรช');
        } else if (e && e.code === 'REMOTE_NEWER') {
          setStatus('error');
          setErrMsg('มีอุปกรณ์อื่นแก้ไขก่อน — กรุณารีเฟรชเพื่อดึงข้อมูลล่าสุด');
        } else {
          setStatus('error');
          setErrMsg(String(e.message || e));
        }
      } finally {
        syncingRef.current = false;
      }
    }, 2500);
  }, [isOnline, state]);

  // v5.15: Manual immediate sync, bypassing the 2.5s debounce. Powers the
  // tap-to-sync behaviour on the SyncPill and any explicit "ซิงค์ตอนนี้"
  // button. This is the user's escape hatch for the Chrome-tab-freeze issue
  // Gemini diagnosed: if the OS suspended a queued setTimeout, the user can
  // press the pill while the tab is foregrounded to fire the PUT immediately.
  // All the v5.14 guards (empty-state, optimistic-lock) still apply.
  const forcePush = useCallback(async () => {
    if (!isOnline) {
      setStatus('offline');
      return { ok: false, reason: 'offline' };
    }
    if (!initialSyncDoneRef.current) {
      // No initial pull yet → safest is to do that first so we don't overwrite
      // remote data with our default empty state.
      return { ok: false, reason: 'not-ready' };
    }
    if (syncingRef.current) return { ok: false, reason: 'busy' };

    if (timerRef.current) { clearTimeout(timerRef.current); timerRef.current = null; }

    syncingRef.current = true;
    setStatus('syncing');
    try {
      await remoteSave(buildPayload(state), {
        expectedLastModified: remoteBaselineRef.current,
      });
      remoteBaselineRef.current = new Date().toISOString();
      setStatus('ok');
      setLastSync(new Date());
      setErrMsg(null);
      return { ok: true };
    } catch (e) {
      console.error(e);
      if (e && e.code === 'EMPTY_OVERWRITE_REFUSED') {
        setStatus('error');
        setErrMsg('ปลอดภัย: ปฏิเสธการเขียนข้อมูลว่างทับ — กรุณารีเฟรช');
      } else if (e && e.code === 'REMOTE_NEWER') {
        setStatus('error');
        setErrMsg('มีอุปกรณ์อื่นแก้ไขก่อน — กรุณารีเฟรชเพื่อดึงข้อมูลล่าสุด');
      } else {
        setStatus('error');
        setErrMsg(String(e.message || e));
      }
      return { ok: false, reason: 'error', error: e };
    } finally {
      syncingRef.current = false;
    }
  }, [isOnline, state]);

  return { status, lastSync, errMsg, pullOnce, schedulePush, forcePush, setStatus };
}

// ========== v5.20 Phase 2: useDeploy — distributed lock state machine ==========
//
// useDeploy implements the queue-based locking protocol the user designed:
//
//   STANDBY  → user can edit; pending ops accumulate locally in userx.json
//   WAITING  → user clicked Deploy; we appended ourselves to Q.json's queue
//              with status='waiting' and are polling to see if it's our turn
//   EDITING  → we're at the head of the queue; we hold the lock, send
//              heartbeats, and (in Phase 3) actually apply ops to my-money.json
//   STANDBY  → done; we've removed ourselves from Q.json
//
// This hook only handles the LOCK lifecycle. The actual op-apply logic
// (download my-money.json, replay ops, upload, etc.) is the caller's job
// (Phase 3 will plug it in via the onApply callback). For Phase 2, the
// caller can pass a no-op onApply just to verify the lock flow end-to-end.
//
// Concurrency notes:
//   * Acquiring uses qMutate's CONFLICT-retry loop, so two clients pressing
//     Deploy at literally the same millisecond won't lose each other's
//     queue entry — the loser's append happens against the winner's new
//     etag.
//   * Re-validation runs after we promote ourselves from waiting to editing:
//     we re-fetch Q.json, sort, and check the head is still us. If not
//     (because two clients raced on the promote step), we demote ourselves
//     back to waiting and the next poll will retry.
//   * The heartbeat interval is short (10s) compared to LEASE_TIMEOUT_MS
//     (30s), giving us 3 missed heartbeats of slack before others consider
//     us dead. This balances battery cost (don't poll too often) against
//     responsiveness (don't make others wait too long for a dead client).
function useDeploy(currentUser, isOnline) {
  // 'idle' is the externally-visible synonym for STANDBY. We use 'idle'
  // internally to match React conventions for "nothing in flight".
  const [phase, setPhase] = useState('idle');           // 'idle' | 'waiting' | 'editing' | 'releasing' | 'error'
  const [queuePosition, setQueuePosition] = useState(null);  // 1-indexed; 1 = next up
  const [queueLength, setQueueLength] = useState(0);
  const [errMsg, setErrMsg] = useState(null);

  // Refs let async callbacks see the latest values without forcing them to
  // be rebuilt every render. txOrderIdRef captures the unique sub-millisecond
  // tie-breaker we generated at acquire time; we need to remember it across
  // multiple Q.json reads/writes during the wait/edit phases.
  const txOrderIdRef = useRef(null);
  const heartbeatTimerRef = useRef(null);
  const pollTimerRef = useRef(null);
  const cancelledRef = useRef(false);  // user pressed cancel mid-wait
  const phaseRef = useRef('idle');     // mirror of phase for use in async callbacks
  phaseRef.current = phase;

  // ----- helpers -----
  const stopHeartbeat = useCallback(() => {
    if (heartbeatTimerRef.current) {
      clearInterval(heartbeatTimerRef.current);
      heartbeatTimerRef.current = null;
    }
  }, []);
  const stopPoll = useCallback(() => {
    if (pollTimerRef.current) {
